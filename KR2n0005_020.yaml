body:
  text: 直齋書録解題卷二十宋陳振孫撰詩集類下伍喬集一卷本江南進士後歸朝李九齡集一卷洛陽李九齡撰乾德二年進士第三人巴東集三卷丞相萊國忠愍公下邽冦凖平仲撰初以將作監丞知巴東縣自擇其詩百餘首且為之序今刻於巴東忠愍公集三卷河陽守范雍得冦公詩二百首為三卷今刻板道州草堂集二卷處士巨鹿魏野仲先撰巨鹿東觀集十卷野之子間集其父詩四百篇薛田為之序野既沒贈著作郎故以東觀名集潘逍遙集一卷案文獻通考作三卷四門助教廣陵潘閬逍遙撰案朝公武讀書志作大名人嘗賜及第後坐追奪或云坐盧多遜黨追捕變姓名僧服入中條山卒於泗州又有嚴陵刻本同但少卷末三首東里楊聘君集一卷處士鄭圃楊朴契元撰太宗嘗召對拜郎中不受以其子為長水尉滕工部集一卷滕白撰篇首寄陳摶知為國初人又有右省懷山中及臺中寄朱從事詩則其揚歷清要亦多矣史傳亡所見未有考也後見實録載嘗以戶部判官為南面前轉運使坐軍糧損折免官王嵒集一卷王嵒撰集中有春日感懷上滕白郎中蓋亦國初人又有聖駕親征河東及有甲午避冦全家欲下荆南之語則是李順亂蜀之歲嵒蓋蜀人也耶漁舟集五卷案文獻通考作一卷處士成都郭震希聲撰自稱汾陽山人李畋為作集序淳化四年忽作詩曰朝出東門遊東門好春色青青原上草莫放征馬食詣闕獻書言蜀利病未幾順賊已作矣王初歌詩集一卷王初撰未詳何人有延平天慶觀詩當是祥符後人也書臺集三卷處士南隆朱有大有撰自稱雲臺山人天禧中王晦叔守蜀以古風六十言遺之書臺者其所居坊名也甘棠集一卷知制誥上蔡孫僅鄰幾撰咸平元年進士第一人後其兄何一榜嘗從何通判陜府以所賦詩集而序之首篇曰甘棠思循吏故以名集僅兄弟皆不壽故不大顯錢希白歌詩二卷翰林學士吳越錢易希白撰廢王倧之子咸平二年進士第二人景德二年制科初錢氏歸國羣從皆補官獨易與兄昆不見録遂刻志讀書皆第進士昆至諫議大夫易子彥遠明逸又皆以賢良方正入等宋興父子兄弟制舉登科者惟錢氏一門易有集百五十卷未見家止有此及滑稽集四卷而已和靖集三卷西湖紀逸一卷案宋史藝文志和靖詩集七卷又詩二卷處士錢唐林逋君復撰梅聖俞為之序紀逸者近時桑世昌澤卿所輯遺文逸事也清風集一卷職方員外郎鮑當撰石曼卿歌詩集一卷祕閣校理宋城石延年曼卿撰自為序石介復為作序其仕以三舉進士為三班奉職出處詳見歐陽公所作墓志吕文靖集五卷丞相許國文靖公壽春吕夷簡坦夫撰文靖不以文鳴而其詩清潤和雅未易及也藥名詩一卷司封郎中陳亞亞之撰咸平五年進士有集三卷藥名詩特其一體爾如馬嘶曾到寺犬吠乍行村吏辭如賀日民送似迎時皆佳句不在此集也金陵覽古詩三卷虞部員外郎楊備撰億之弟也李問集一卷國子博士廣陵李問舜俞撰朝君成集十卷别集一卷新城令朝端友君成撰東坡為作序補之其子也擊壤集二十卷處士共城邵雍堯夫撰自為之序始自共城徙河南卒於熙寧十年諡康節臨川詩選一卷汪藻彥章得半山别集皆罷相後山居時老筆過江失之遂於臨川集録出又言有表啓十餘篇不存一字注荆公集五十卷案文獻通考作十五卷參政眉山李璧季章撰謫居臨川時所為也助之者曾極景建魏鶴山為作序注東坡集四十二卷年譜目録各一卷司諫吳興施元之德初與吳郡顧景蕃共為之元之子宿從而推廣且為年譜以傳於世陸放翁為作序頗言注之難蓋其一時事實既非親見又無故老傳聞有不能盡知者噫豈獨坡詩也哉注杜詩者非不多往往穿鑿傅會皆臆決之過也沈括先與坡同在館閣後察訪兩浙至杭求坡近詩籖貼以為訕懟李定等論詩置獄實本於括云山谷集三十卷外集十一卷别集二卷案宋史藝文志外集作十四卷黃庭堅魯直撰江西所刻詩派即豫章前後集中詩也别集者慶元中莆田黃汝嘉增刻山谷編年詩集三十卷年譜二卷山谷詩文其甥洪氏兄弟所編斷自進德堂以後今外集所載數卷有晚年刪去者故任子淵所注亦惟取前集而已監丞黃畇子耕者其諸孫也既會稡别集復盡取其平生詩以歲月次第編録且為之譜今刋板括蒼青城史容儀甫近注外集外集者謂山谷曾欲以前後倣莊子為內外也后山集六卷外集五卷陳師道無已撰亦於正集中録出入詩派江西宗派之説出於吕本中居仁前輩固有議其不然者矣后山雖曰見豫章之詩盡棄其學而學焉然其造詣平淡真趣自然實豫章之所缺也注黃山谷詩二十卷注後山詩六卷案原本脫注後山詩六卷與解題中二集皆取前集二語不符今據文獻通考補入新津任淵子淵注鄱陽許尹為序大抵不獨注事而兼注意用功為深二集皆取前集陳詩以魏衍集記冠焉盧載雜歌詩一卷盧載厚元撰集中有與胡則錢惟演往來詩琴軒集一卷題南榮浪翁李有慶撰與石昌言任師中同時卷末贈答十二絶闕其六其曰癸巳歲者殆皇祐中耶元章簡玉堂集十卷參政元絳厚之撰劉景文集一卷左藏庫使知隰州劉季孫景文撰環慶死事將平之子也東坡嘗薦之坡在杭季孫寄詩有四海共知霜鬢滿重陽曾插菊花無之句其詩慷慨有氣如其為人廣諷味集五卷吏部侍郎南京王欽臣仲至撰海門集八卷渤海張重撰有上蘇子瞻內翰詩又有與張伯玉遊鑑湖晚歸詩伯玉知越州當嘉祐末而東坡為翰苑在元祐間重皆與同時特未詳其人王岐公宫詞一卷王圭禹玉撰逸民鳴一卷盱江李樵撰泰伯之姪孫湛推官集一卷長樂湛鴻季潛撰紹聖初韓昌國序青山集三十卷朝奉郎當塗郭祥正功父撰初見賞於梅聖俞後見知於王介甫仕不達而卒李端叔晚寓其鄉祥正與之爭名未嘗同堂語至為俚語以譏誚之則其為人不足道也方祕校集十卷莆田方惟深通子撰其父屯田龜年葬吳遂為吳人與朱伯原厚善以女嫁伯原之子嘗舉進士冠其鄉不第晚得興化軍助教年八十三以卒王荆公最愛其詩精詣警絶始余得其詩二卷乃其姪孫蕭山宰翺所編後乃知莆中嘗刊板為十卷且載程俱致道所作墓志於末曾慥詩選直以為姑蘇人者誤也詩選又言荆公愛其春江渺渺一絶手書之遂載臨川集曾紆南遊記舊亦云而其詩則客帆收浦者也二詩皆不在今集中豈以臨川集已收故耶二本大略同亦微有出入慶湖遺老集九卷拾遺二卷朝奉郎共城賀鑄方回撰自序言外監知章之後且推本其初出王子慶忌以慶為姓居越之湖澤今所謂鏡湖者本慶湖也避漢安帝及清河王諱改為賀氏慶湖亦轉為鏡未知其説何所據也其東山樂府張文潛序之鑄後居吳下葉少藴為作傳詳其出處且言與米芾齊名然鑄生皇祐壬辰視米芾猶為前輩也操縵集五卷周邦彥撰亦有前集中所無者得全居士集三卷趙鼎元鎮撰全集號忠正德文其曾孫璧别刊其詩附以樂府陸遊曰忠簡謫朱崖臨終自書銘旌曰身騎箕尾歸天上氣作山河壯本朝嗚呼可不謂偉人乎高隱集七卷高隱處士蘄春林敏功子仁撰案宋史藝文志有林敏功集十卷曾端伯作高隱小傳稱林敏功兄弟皆隱君子也原本脫姓氏今補入嘗以春秋預鄉薦不第有詩文百卷號蒙山集兵火後不存無思集四卷林敏修子來撰敏功之弟柯山集二卷齊安潘大臨邠老撰所謂滿城風雨近重陽者也溪堂集五卷補遺二卷臨川謝逸無逸撰竹友集七卷謝薖幼槃撰逸之弟日涉園集十卷廬山李彭商老撰公擇之從孫清虛集一卷豫章洪朋龜父撰老圃集一卷諫議大夫洪芻駒父撰西渡集一卷案原本作西漢集今據文獻通考改正中書舍人洪炎玉父撰洪氏兄弟四人其母黃魯直之妹不淑早世所為賦毁璧者也龜父舉進士不第其季羽鴻父坐上書元符入籍終其身芻炎皆貴而芻靖康失節貶廢羽詩不傳陵陽集四卷案文獻通考作三卷宋史藝文志作十五卷别集二卷韓駒子蒼撰還還集二卷直龍圖閣江陵高荷子勉撰東湖集三卷樞密豫章徐俯師川撰禧之子亦魯直諸甥也思陵以黃庭堅故召用之丞相吕頤浩作書具道上旨而一時或言其由中人以進其初除大坡也程俱在西掖繳奏不行奉祠去其然乎否耶然俯在位亦不聞有所建明也東萊集二十卷外集二卷中書舍人吕本中居仁撰希哲之孫好問之子而祖謙之伯祖也撰江西宗派者後人亦以其詩入派中具茨集十卷案文獻通考作三卷朝沖之叔用撰沖之在羣從中亦有才華而獨不第紹聖以來黨禍既作超然獨往侍郎公武子止蓋其子也青溪集一卷臨川汪革信民撰吕居仁序之倚松集二卷臨川饒節德操撰後為僧號如璧遠遊堂集二卷知江州蘄春夏倪均父撰歸叟集一卷開封王直方立之撰其高祖顯事晉邸至樞密使直方喜從蘇黃諸名士遊家有園池娶宗女假為承奉郎自號歸叟年甫四十而死李希聲集一卷祕書丞李錞希聲撰與徐師川潘邠老同時案與徐師川二句原本脫漏今據文獻通考補入楊信祖集一卷楊符信祖撰未詳出處陳留集一卷開封江端本子之撰案江端本開封人原本誤作開州今改正以上至林子仁皆入詩派七里先生自然集七卷江端友子我撰端本兄也休復鄰幾之孫其父懋相有遺澤子我以遜端本靖康初吳敏元中薦子我召見賜出身為京官後至太常少卿臨漢居士集七卷南豐曾紘伯容撰其父阜子山於子固為從兄弟懷峴居士集六卷曾思顯道撰紘之子也阜嘗將漕湖南後家襄陽紘父子皆有官而皆高亢不仕楊誠齋序其詩以附詩派之後見南山集二十卷祕閣修撰吳興劉燾無言撰案劉燾字無言原本作劉燾言誤今改正灊山集三卷中書舍人龍舒朱翌新仲撰曾文清集十五卷禮部侍郎章貢曾幾吉父撰案曾幾字吉父原本作士父誤今改正本朝曾氏三望最初溫陵宣靖公公亮明仲次南豐舍人鞏子固兄弟然其祖致堯起家又在溫陵之先矣其後則幾之族也自贛徙河南與其兄楙叔夏開天遊皆嘗二春官楙至尚書開沮和議得罪並有名於世又有長兄弼為湖北提舉學士渡江溺死幾以其遺澤補官銓試第一賜上舍出身清江三孔之甥也紹興末幾已老始擢用乾道中年八十三以死號茶山先生其子逢逮皆顯於時天台集十卷外集四卷長短句三卷附臨海陳克子高撰李庚子長跋其後云刪定鄉人也少時侍運判公貽序宦學四方曾慥詩選敘為金陵人蓋失其實今考集中首末多在建康且嘗就試焉當是僑寓也詩選又言不事科舉以吕安老薦入幕府得官按集有聞榜二絶則嘗應舉矣又有甲午歲所作詩云三十四則其生當在元豐辛酉得官入幕蓋已老矣詩多情致詞尤工簡齋集十卷參政洛陽陳與義去非撰其先蓋蜀人東坡所傳陳希亮公弼者其曾祖也崇觀間尚王氏經學風雅幾廢絶而去非獨以詩鳴中興後遂顯用西溪居士集五卷案姚寬集號西溪居士原本作西漢誤今改正剡川姚寬令威撰待制舜明廷輝之子兄宏令聲為刪定官得罪秦檜死大理獄寬為六部監門海陵南下寬言木德所照必無虞言驗將除郎召對得疾仆殿上卒遂用其弟憲令則後至執政集句詩三卷江隂葛次仲亞卿撰勝仲之兄兄弟皆為大司成盧溪集七卷直敷文閣盧陵王庭圭民瞻撰政和八年進士仕不合棄去隱居數十年坐作詩送胡邦衡除名徙辰州年已七十矣阜陵初政召為國子監主簿九十餘乃終寄祿才承奉郎澤竟不及後周益公在位欲委曲成就之卒不可韋齋小集一卷朱松喬年撰玉瀾集一卷朱橰逢年撰韋齋之弟晦庵之叔父也嘗夢為玉瀾堂之遊甚異有詩紀之雲壑隱居集三卷南城蔡柟堅老撰宣和以前人沒於乾道庚寅曾公衮吕居仁輩皆與之倡和陳正獻集十卷丞相福正獻公莆田陳俊卿應求撰紹興八年進士第二人乾淳間名相與虞并父異論去國靜泰堂集十卷參政莆田龔茂良實之撰黃公度以莆人魁天下陳正獻次之故事拜黃甲推最老者一人最少者一人是歲茂良年最少莆人以為盛事後參大政相位久虛實行相事坐撻曾覿直省官忤阜陵意用謝廓然賜出身入臺擊罷之遂謫英州以沒其風節凜凜為世名臣寓山集三卷案文獻通考作三十卷吳興沈仲哲明遠撰丞相該之姪紹興五年進士改官為江西運管嘗為悲扇工詩忤魏良臣陷以深文奪三官不得志以卒劔南詩藁二十卷續藁六十七卷陸遊務觀撰初為嚴州刻前集藁止淳熙丁未自戊申以及其終當嘉定庚午二十餘年為詩益多其幼子遹復守嚴州續刻之篇什之富以萬計古所無也雪巢小集二卷東魯林憲景思撰初寓吳興從徐度敦立遊後為參政賀允中子忱孫壻寓臨海其人高尚詩清淡五言四韻古句尤佳殆逼陶謝梁溪尤延之誠齋楊廷秀皆為之序且為雪巢賦及記余為南城其子遊謁至邑以家集見示愛而録之及守天台則板行久矣視所録本稍多然其暮年詩似不逮其初往往以貧為纍不能不衰索也王季夷北海集二卷北海王嵎季夷撰紹淳間名士寓居吳興陸務觀與之厚善三子甲田申皆登科易足居士自鳴集十五卷鄱陽章甫冠之撰居吳下自號轉菴作易足堂韓無咎為之記屏山匕者翁十卷從事郎崇安劉㻫平父撰子翬彥沖之子也玉雪小集六卷外集七卷太常博士龍泉何稱德揚撰隆興初在朝言和議觸時相去後遂不復召歷麾節而卒雪山集三卷富川王質景文撰質遊太學治詩有聲仕為樞屬嘗著詩解三十卷未之見也景物類要詩十卷東陽曹冠宗臣撰隨物為題類事成詩凡二百餘篇冠為秦檜客與其孫塤同登甲科未幾秦亡奪前名恩數再赴廷試仕至知郴州同菴集一卷吳興施士衡德求撰嘗試中教官為宣州簽幕坐廢雖牽復仕竟不進柟山老人集八卷龍泉季相文成撰三徑老人碔砆集十三卷福建提舉常平昭武杜圯受言撰胡憲原仲為之序其上世龍圖閣直學士鎬本常州無錫人其孫天章閣待制把於圯為曾祖榖城集五卷建安黃銖子厚撰晦庵作序極稱之松坡集七卷樂府一卷丞相豫章京鏜仲遠撰鏜使金執節驟用其在相位當韓托胄用事無所立白石道人集三卷鄱陽薑夔堯章撰千巖蕭東夫識之於年少客遊以其兄之子妻之石湖范至能尤愛其詩楊誠齋亦愛之嘗稱其歲除舟行十絶以為有裁雲縫月之妙思敲金戛玉之竒聲夔頗解音律進樂書免解不第而卒詞亦工轉菴集一卷閣門舍人永嘉潘柳德久撰王祕監集四卷永嘉王柟木叔撰平菴悔藁十五卷後編六卷案宋史藝文志作丙辰悔藁四十七卷太府卿松陽項安世平父撰悔藁者以語言得罪悔不復為也自序當慶元丙辰後編自丁巳終壬戌醒菴遺珠集十卷臨川俞國寶撰淳熙前人東平集二十七卷鞏豐仲至撰淳熙甲辰進士白石丁藁一卷三山黃景説巖老撰淳熙辛丑進士復齋漫藁二卷知台州黃畇子耕撰梅山詩藁六卷續藁五卷案文獻通考續藁作卜五卷括蒼薑特立邦傑撰以父死事得西班纍舉不第晚為閣職春坊攀附己酉龍飛恩至節度使周益公留衛公皆為其所間特立詩亦粗佳韓無咎陸務觀皆愛之本亦士人也塗轍一異儼然􅉏御之態豈其居使之然耶泠然齋集十二卷山陰蘇泂召叟撰丞相子容四世孫師德仁仲之孫曾谹父詩詞一卷知台州曾惇谹父撰紆之子也皆在台時所作瓦全居士詩詞二卷太常博士寧海王澡身甫撰初名津字子知疏寮集三卷四明高似孫續古撰少有俊聲登甲辰科不自愛重為館職上韓托胄生日詩九首皆暗用錫字為時清議所不齒晚知處州貪酷尤甚其讀書以隱僻為博其作文以怪澀為竒至有甚可笑者就中詩猶可觀也徐照集三卷永嘉徐照道暉撰自號山民案文獻通考山民作天民道暉又字靈暉致中又字靈淵紫芝又字靈秀翁卷又字靈舒是為四靈水心為選詩隨齋批注徐璣集二卷徐璣致中撰翁卷集一卷翁卷靈舒撰趙師秀集二卷别本天樂堂集一卷趙師秀紫芝撰四人者號永嘉四靈皆為晚唐體者也惟師秀嘗登科改官亦不顯李孟達集一卷宗正丞宣城李兼孟達撰唐末李咸用披沙集者即其遠祖也嘗知台州時稱善士柯東海集十五卷莆田柯夢得東海撰嘗試春官不第山中集一卷莆田趙庚夫仲白撰兩上春官不第以取應得右選不得志而沒劉潛夫志其墓擇其詩百篇屬趙南塘序而傳之磬沼集一卷崇仁羅鑑正仲撰樞密春伯之從弟磬沼者為池因地曲折如磬然茅齋集二卷南城鄧繼祖撰梔林集十卷吳郡沈繼祖撰慶元初有為察官者家富川豈即其人耶人固不足道詩亦無可觀者花翁集一卷開封孫惟信季蕃撰在江湖中頗有標致多見前輩多聞舊事善雅談長短句尤工嘗有官棄去不仕惠崇集十卷淮南僧惠崇撰與潘閬同時在九僧之數亦善畫天竺靈苑集三卷採遺一卷錢塘僧遵式撰所謂式懺主者也渚宫集三卷錢塘僧文瑩道溫撰及識蘇子美嘗題其詩後欲挽致於歐陽永叔而瑩辭不往老於荆州之金鑾鄭毅為作序揀金集一卷螺江僧可尚撰有送徐鉉詩蓋國初人螺江集一卷僧有朋撰號囷山禪師族陳氏閩帥巖六世孫參寥集十二卷僧道潛撰唐人舊有號參寥子者用莊子語也物外集三卷僧德洪覺範撰瀑泉集十二卷僧祖可正平撰蘇養直之弟有惡疾號癩可真隱集三卷僧善權巽中撰靖安人落魄嗜酒化庵湖海集二卷僧法具圓復撰吳興人浯溪集二十一卷僧顯萬撰洪景盧作序前二卷為賦餘皆詩也女郎謝希孟集二卷閩人謝景山之妹嫁陳安國年三十三而死其詩甚可觀歐公為之序言有古淑女幽間之風雅非特婦人之言也景山者按歐陽詩話言謝伯初字景山當天聖景祐間以詩知名余謫夷陵景山方為許州法曹以長韻見寄頗多佳句仕不偶困窮以卒詩亦不見於世此序又言景山少以進士一舉甲科考登科記天聖二年甲科但有謝伯景而謝伯初者乃在寶元元年公謫夷陵當景祐三年景山已為法曹則非寶元登第者名字差齵如此未可考也處士女王安之集一卷簡池王亢子倉之女尚恭字安之年二十未嫁而死乾道戊子也亢自志其墓有任公鼐者為作集序援歐公所序謝希孟為比而稱其詩不傳今余家有之任蓋未之見也英華集三卷李季萼死後為鬼仙事見夷堅志縉雲人傳其集亦怪矣直齋書録解題卷二十
