body:
  text: 直齋書録解題卷十七宋陳振孫撰别集類中趙韓王遺藁十卷丞相韓忠獻王范陽趙普則平撰普開國元臣不以文著而彗星班師二疏天下至今傳誦末有劉昌言所撰行状案館閣書目惟有奏議一卷今麻沙書坊刋本奏議止數篇餘皆表状之屬也徐常侍集三十卷左散騎常侍廣陵徐鉉鼎臣撰其二十卷仕河南所作餘十卷歸朝後所作也所撰李煜墓銘婉媺有體文鑑取之咸平集五十一卷右諫議大夫漢嘉田錫表聖撰太平興國三年進士第二人范文正公誌其墓東坡序其奏議十篇所謂憂治世而危明主者也今首卷有奏議十二篇即東坡所序案此句原本脱去今據文獻通攷增入錫之子孫亡顯者端平初南充游似景仁為成都漕案原本作為成憲今據文獻通攷改正奏言朝廷方用端拱咸平之舊紀元而臣之部内乃有端拱咸平之直臣宜褒表之以示勸願下有司議諡博士徐清叟直翁考功黄朴誡甫議諡曰獻翼云今漢嘉田氏子孫不知存亡而文集板之在州者亦燬於兵燼矣可為永慨廣平公集一百卷翰林學士文安公大名宋白太素撰栁仲塗集十五卷如京使大名栁開仲塗撰開開寳六年進士歴知常潤州以殿中侍御史换崇儀使又歴八郡以卒門人張景為行状及集序本朝為古文自開始然其體艱澁為人忼慨喜功名急義史亦稱其傲狠强愎云穆參軍集三卷泰州司法參軍東平穆修伯長撰修祥符二年經明行修進士仕不遇困窮以死師事陳摶傳其易學以授李之才之才傳邵雍而尹洙兄弟亦從之學古文且傳其春秋學或曰太極圖亦修所傳於陳摶种放者今其遺文傳世者僅如此門人祖無擇為之序江南小集二卷工部侍郎終南种放明逸撰淳化中有李介者序之於九江故以為名館閣書目别有正集十卷大畧與此同原註正集名豹林小畜集三十卷外集二十卷知制誥濟陽王禹偁元之撰自為之序畧曰閱平生所為文類而第之得三十卷将名其集以易筮之遇乾之小畜象曰君子以懿文德未能行其施但可懿文而已外集者其曾孫汾裒輯遺文得三百四十首又有承明集十卷奏議集三卷後集詩三卷未見案宋史藝文志無奏議集後集詩而有别集十六卷乖崖集十二卷附録一卷樞宻直學士忠定公鄄城張詠復之撰案宋史詠字復之原本作詠之誤今改正乖崖其自號也錢希白為墓誌韓魏公為神道碑近時郭森卿宰崇陽刻此集舊本十卷今增廣并語録為十二卷武夷集二十卷别集十二卷翰林學士文公浦城楊億大年撰案本傳所著括蒼武夷潁隂韓城退居汝陽蓬山冠鼇等集及内外制刀筆共一百九十四卷館閣書目猶有一百四十六卷今所有者惟此而已武夷新集者億初入翰苑當景德丙午明年條次十年詩筆而序之别集者祥符五年避讒佯狂歸陽翟時所作也君可思賦居其首亦見本傳餘書疏皆作其弟倚酬答倚亦景德中進士中山刀筆集三卷翰林學士大名劉筠子儀撰皆四六應用之文筠與楊大年同時號楊劉詩號西崑體别有冊府應言集十卷榮遇集十二卷表奏六卷淝川集四卷見館閣書目滑稽集四卷翰林學士吳越錢易希白撰多譎諷之詞淳化癸巳自序擁旄集五卷伊川集五卷案文獻通攷作三卷樞宻使思公吳越錢惟演希聖撰易倧之子惟演俶之子也惟演文集甚多此特其二集爾出鎮河陽河南時所作也全集未見臨川集三十卷二府集二十五卷年譜一卷丞相臨淄元獻公臨川晏殊同叔撰其五世孫大正為年譜言先元獻嘗自差次起儒館至學士為臨川集起樞廷至宰席為二府集今案本傳有文集二百四十卷中興書目亦九十四卷今所刋止此爾臨川集有自序夏文荘集一百卷樞宻使鄭國文荘公九江夏竦子喬撰竦父死王事身中賢科工為文辭復多材術而不自愛重甘心姦邪聲伎之盛冠於承平夫婦反目隂慝彰播皆可為世戒也吕文靖試卷一卷丞相許國文靖公夀春吕夷簡坦夫撰咸平二年夀州應舉此其程文也真本藏范太史氏前有家状大略與今同其所習曰春秋何論大義何論者當是何晏論語也其所問各十條皆非深義逐條所答纔數句或止一言或直稱未審考官二人花書其上并批通不又禮行於郊賦建侯置守孰優論其所習又稱雜文時務策則不復存此可以見國初塲屋事體文法簡寛士習純茂得人之盛後世反不能及文盛則實衰世變蓋可覩矣范文正集二十卷别集四卷參政文正公吳郡范仲淹希文撰祥符八年進士曰朱説者即公也幼孤從其母適朱氏其為兗州推官始復姓更名范文正尺牘五卷其家所傳在正集之外安陽集五十卷丞相魏國忠獻公安陽韓琦稚圭撰文潞公集四十卷補遺一卷丞相介休文彦博寛夫撰富文忠集二十七卷丞相韓國文忠公河南富弼彦國撰奉使録亦在其末武溪集二十卷集賢院學士襄公曲江余靖安道撰徂徠集二十卷國子監直講魯國石介守道撰集中有南京夏尚書啟及夫子廟上梁文皆為夏竦作此介所謂大姦之去如距斯脫者也豈當是時竦之姦猶未著耶陸子遹刻於新定述其父放翁之言曰老蘇之文不能及然世自有公論也歐公所以重介者非緣其文也滄浪集十五卷集賢校理蘇舜欽子美撰舜欽易簡之孫杜祁公衍之壻坐進奏院用公錢㑹客為王拱辰軰所擠坐以深文廢逐而死置園蘇州為滄浪亭水竹之勝冠於吳下至今猶存嘗答韓持國書具見其意趣本傳載之歐陽公序其文言子美之齒少於予而予學古文反在其後同時得罪者未幾復顯用舜欽獨先没可哀也宛陵集六十卷外集十卷都官員外郎國子監直講宣城梅堯臣聖俞撰凡五十九卷為詩他文賦纔一卷而已謝景初所集歐公為之序外集者吳郡宋績臣所序謂皆前集所不載今考之首卷諸賦已載前集不可曉也聖俞為詩古澹深逺有盛名於一時近世少有喜者或加毁訾惟陸務觀重之此可為知者道也自世競宗江西已看不入眼况晚唐卑格方錮之時乎杜少陵猶有竊議妄論者其於宛陵何有尹子漸集六卷太常博士知懐州河南尹源子漸撰待制焞彦明其孫也尹師魯集二十二卷案文獻通攷作二十卷直龍圖閣尹洙師魯撰源之弟也其父仲宣明經入仕父子皆歐陽公誌其墓洙與穆伯長同為古文范文正公為作集序歐公亦稱其文簡而有法以剛直數忤時卒以貶死死時精明不亂有過人者書判一卷尹洙撰洙天聖二年進士後以安德軍節推試書判拔萃科中之前十道是程文餘當為擬卷本朝惟余安道亦中是科集中有判詞二卷文鑑亦載一二又有王回判二道而回不以此科進餘未有聞宋元憲集四十四卷丞相鄭國元憲公安陵宋庠公序撰本名郊字伯庠天聖二年進士第一後有忌者讒之以姓符國號名應郊天仁宗命改焉忌者之力止此後卒大用為名臣宋景文集一百卷翰林學士景文公宋祁子京撰庠弟也自布衣名動塲屋號二宋天聖二年同登第祁本首唱章獻謂弟不可以先兄以為第十人而庠遂魁天下兄弟後皆貴顯景文清約荘重不逮其兄以此不至公輔所撰唐書列傳不稱良史景文筆記余於為文似蘧瑗年五十知四十九年非余年六十始知五十九年非其庶幾至於道乎每見舊所作文章憎之必欲燒棄梅堯臣喜曰公之文進矣景文未第時為學於永陽僧舍或問曰君好讀何書答曰余最好大誥故景文為文謹嚴至修唐書其言艱其思苦蓋亦有所自歟案景文筆記以下原夲俱脱去今據文獻通攷增入六一居士集一百五十二卷附録四卷年譜一卷參政文忠公廬陵歐陽修永叔撰本朝初為古文者栁開穆修其後有二尹二蘇兄弟歐公本以辭賦擅名塲屋既得韓文刻意為之雖皆在諸公後而獨出其上遂為一代文宗其集徧行海内而無善本周益公解相印歸用諸本編校定為此本且為之年譜自居士集外集而下至於書簡集凡十各刋之家塾其子綸又以所得歐陽氏傳家本乃公之子棐叔弼所編次者屬益公舊客曾三異校正益完善無遺恨矣居士集歐公手所定也李泰伯退居類藁十二卷續藁八卷常語三卷周禮致太平論十卷後集六卷太學說書南城李覯泰伯撰其自序曰天将夀我歟固為未足也不然斯亦足以藉手見古人矣類藁慶歴所録續藁皇祐所録後集則門人傅野編泰伯不喜孟子常語専辨之嘗舉茂材不中世傳閣試論題有全不記所出者曰此必孟子注也擲筆而出少微集三十卷職方員外郎會稽齊唐祖之撰齊澣之後天聖八年進士兩應制科皆為首選以切直報罷居鑑湖東北去城五里名其山曰少微其集顧臨為之序樂全先生集四十卷玉堂集二十卷參政文定公南都張方平安道撰初舉茂材異等再舉賢良方正皆中其科識略過人知蘇洵父子於布衣惡王安石於考試進士之日皆人所不能及也夀至八十五薨於元祐中於當時最為耆德然頗為司馬温公所不喜胡文恭集七十卷樞宻副使文恭公晉陵胡宿武平撰晉陵之胡自文恭始大其猶子宗愈仍執政子孫為侍從九卿者以十數紹興初世将承公亦其後也至今猶名族臨川集一百卷案文獻通攷作一百三十卷丞相荆國文公臨川王安石介甫撰後改封舒王方嘉祐以前名重一世迹其文學論議操守使不至大位則光明俊偉不可瑕疵矣老蘇曰使斯人而不用也則吾言為過而斯人有不遇之歎孰知其禍之至此哉何其知之明也王魏公集二十卷案宋史本傳不言安禮封魏國此稱魏公未詳尚書左丞王安禮和甫撰近時厚之順伯其曾孫也王校理集六十卷祕閣校理王安國平甫撰安國雖安石親弟而意向頗不合尤惡吕惠卿卒為所䧟坐鄭俠事奪官歸田里亦㑹惠卿方叛安石故也尋復之命下而卒華陽集一百卷丞相岐國文恭公龍舒王珪禹玉撰本成都人故稱華陽典内外制十八年集中多大典冊詔令其詩號至寳丹以其好為富貴語也在相位無所建明人目為三㫖於上前曰取聖㫖曰領聖旨退謂吏則曰已得旨元豐末命珪本無異論亦緣其備相位不能早發大議依違遷延以召讒賊卒為本朝大禍需事之賊也豈不然哉珪一身追貶不足道也傳家集一百卷丞相温國文正公洓水司馬光君實撰生於光州故名今光州有集本丹淵集四十卷集賢校理潼川文同與可撰東坡與之厚善墨君堂記篔簹竹記皆為同作也司馬温公稱其襟韻瀟灑如晴雲秋月塵埃不到則其為人可知矣其為湖州蓋未至而卒蔡忠惠集三十六卷案文獻通攷作十七卷端明殿學士忠惠莆田蔡襄君謨撰近世始刻於泉州王十朋龜齡為之序余嘗官莆至其居去城三里荔子號玉堂紅者正在其處矮屋欲壓頭猶是當時舊物歐公所撰墓誌石立堂下真蹟及諸公書帖多有存者京卞同郡晚出欲自附於名閥自稱族弟本傳云爾襄孫佃唱名第一京時當國以族孫引嫌降第二佃終身恨之元章簡玉堂集二十卷參政章簡公錢塘元絳原之撰絳之祖德昭相吳越本姓危氏臨川人唐末危全諷其伯父也德昭父曰仔倡聚衆保鄉里兵敗自臨川奔杭州易姓元至今建昌撫州邵武多危姓絳能文辭晚嵗以王介甫薦入翰林甚稱職遂柄用吕正獻集三十卷丞相東萊吕公著晦叔撰劉状元東歸集十卷大理評事鉛山劉煇之道撰煇嘉祐四年進士第一人堯舜性之賦至今人所傳誦始在塲屋有聲文體奇澁歐公惡之下第及是在殿廬得其賦大喜既唱名乃煇也公為之愕然蓋與前所試文如出二人手可謂速化矣仕止於郡幕年三十六以卒世傳煇既黜於歐陽公怨憤造謗為猥䙝之詞今觀楊傑志煇墓稱其祖母死雖有諸叔援古誼以適孫解官承重服又嘗買田數百畆以聚其族而餉給之蓋篤厚之士也肯以一試之淹而為此憸薄之事哉古靈集二十五卷樞宻直學士長樂陳襄述古撰襄在經筵薦司馬光而下三十三人皆顯於時紹興詔㫖布之天下集序李忠定綱作也年譜載其世系出陳夷行之弟夷實自光州固始從王緒入閩家于福州攷之唐世系表有不合者嘗怪閩之士族推本家世輒言出自固始光在唐為下州固始又其一縣當時不聞顯人安得衣冠望族如許就令有之王緒以夀春屠者為盗王潮從之為部曲轉鬭萬里而後入閩士大夫何緣隨逐不置蓋嘗思之王氏初建國人不自保謾言鄉人幸其不殺後世子孫承襲其説世禩緜邈并與其初而忘之爾若陳氏尤不應云然當永嘉之亂林黄陳鄭四姓先入閩林諝為閩中記明著之矣尚得以一時脱死賊手之說守之而不變乎鄖溪集五十卷翰林學士安陸鄭獬毅夫撰皇祐五年進士首選坐知開封府不肯用案問新法為王安石所惡而出廷試圜丘象天賦時獬與滕甫俱有塲屋聲甫賦首曰大禮必簡圜丘自然自謂人莫能及獬但倒一字曰禮大必簡圜丘自然甫聞之大服果居其次云廣陵集二十卷揚州布衣王令逄原撰令少年有盛名王介甫尤重之年二十八而卒其妻吳氏安石夫人之女弟也守志不嫁一女遺孕嫁吳師禮其子曰説所謂吳傳朋也令之墓安石銘之案原本作令之墓誌安石名之㨿文獻通攷無誌字名作銘今改正後有劉發者為之傳吳氏之墓其姪王雲銘之奉使死磁州者也公是集七十五卷侍讀學士新喻劉敞仲邍父撰號公是先生彭城集六十卷中書舍人劉攽叔贛父撰號公非先生敞兄弟俊敏博洽同登慶歴六年進士第敞本首冠以内兄王堯臣為編排官引嫌遂得第二人仕早貴而不永年年財五十攽歴州縣二十年晚乃游館學元祐中始掌外制敞子奉世仲馮亦有名官至執政世稱三劉老蘇嘉祐集十五卷文安主簿編修禮書眉山蘇洵明允撰洵初入京師益帥張文定薦之歐陽公世皆知之而有雷簡夫者為雅守以書薦之張歐及韓魏公尤力張之知洵由簡夫世罕知之雷之書文亦慷慨偉麗可觀東坡集四十卷後集二十卷内制集十卷外制集三卷奏議十五卷和陶集四卷應詔集十卷端明殿學士文忠公蘇軾子瞻撰一字和仲自謫黄州始號東坡居士杭蜀本同但杭無應詔集欒城集五十卷後集二十四卷第三集十卷應詔集十二卷案應詔集文獻通攷作二十卷門下侍郎文定公蘇轍子由撰一字同叔欒城真定府縣也蘇氏望趙郡欒城元魏時屬趙郡故云晚居潁濵自號潁濵遺老故集或名三蘇年表三卷右奉議郎孫汝聽撰汝聽當是蜀人叙蜀甚詳東坡别集四十六卷坡之曾孫給事嶠季真刋家集於建安大畧與杭本同蓋杭本當坡公無恙時已行於世矣麻沙書坊又有大全集兼載志林雜説之類亦雜以潁濵及小坡之文且間有訛偽勦入者有張某為吉州取建安本所遺盡刋之而不加攷訂中載應詔策論蓋建安本亦無應詔集也陳都官集三十卷都官員外郎嘉禾陳舜俞令舉撰舜俞慶歴六年進士嘉祐四年制科以言新法謫官南康與劉凝之騎牛游廬山詩畫皆傳於世舜俞居湖秀境上初從安定胡先生學熙寧中六客其一也其墓在城南之蘓灣子孫猶宅於烏鎮濂溪集七卷廣東提刑營道周敦頤茂叔撰遺文纔數篇為一卷餘皆附録也本名敦實避英宗舊名改焉其仕以舅鄭向任晚年以疾求知南康軍因家廬山前有溪取營道故居濂溪名之二程所從學也又本并太極圖為一卷遺事行状附焉明道集四卷遺文一卷監察御史河南程顥伯淳撰三司使羽之後也其父曰珦顥之没文潞公題其墓曰明道先生伊川集九卷案文獻通攷作二十卷崇政殿説書程頤正叔撰河南程氏文集十二卷二程共為一集建寧所刻本元豐類藁五十卷續四十卷年譜一卷中書舍人南豐曾鞏子固撰王震為之序年譜朱熹所輯也案韓持國為鞏神道碑稱類藁五十卷續四十卷外集十卷本傳同之及朱公為譜時類藁之外但有别集六卷以為散逸者五十卷而别集所存其什一也開禧乙丑建昌守趙汝礪丞陳東得於其族孫濰者校而刋之因碑傳之舊定著為四十卷然所謂外集者又不知何當則四十卷亦未必合其舊也曲阜集四十卷奏議十二卷西垣集十二卷外制集三卷内制集五卷案文獻通攷西垣集作西掖集外制集三卷作三十卷内制集五卷作五十卷翰林學士文昭公曾肇子開撰肇元祐中為西掖元符末冄入故别名庚辰外制集肇制誥温潤典雅其草兄布拜相制汪玉山稱之以為得命次相之體王直講集十五卷天台縣令南城王无咎補之撰无咎嘉祐二年進士曾鞏之妹夫從王安石游最久将用為國子學官未及而卒為之誌墓曾肇序其集云二十卷今惟十五卷南陽集二十卷門下侍郎潁昌韓維持國撰封南陽郡公故以名集沈晦元用其外孫也卷首載鮮于綽所述行状而晦跋其後南澗元吉无咎其四世孫無為集十五卷别集十卷禮部郎濡須楊傑次公撰嘉祐四年進士元祐中為郎傑善談禪别集皆為釋老而釋又居十之九清江三孔集四十卷中書舍人新淦孔文仲經父禮部侍郎武仲常父户部郎中平仲毅父撰寔先聖四十八世孫嘉祐六年八年治平二年連三科兄弟以次登第文仲舉賢良對策切直忤時罷舉官范鎮景仁因求致仕而制科亦自此廢武仲為禮部第一人中甲科平仲亦嘗舉制科其著述各數十篇多散逸弗傳今其存者文仲纔二卷武仲十七卷平仲二十一卷而已慶元中濡須王􅂒少愚守臨江裒輯刋行而周益公必大為之序序畧曰遺文雖存一二於千百然讀之者知其為有德之言非雕篆之習也昔黄太史頌當時人才有曰二蘇聯璧三孔分鼎張丞相天覺在元符中詆元祐詞臣極其荒唐謂兩蘇為狂率則剛直也謂公兄弟配之文行如何哉案序畧曰以下原本脱去今㨿文獻通攷增入西溪集十卷翰林學士錢塘沈遘文通撰初以郊社齋郎舉進士第一執政謂已宦者不應先多士遂居其次實皇祐元年自是為故事文通吏事精明强敏為杭州開封府皆有能名從容閒暇夙興治事及午而畢卒時年四十餘其孫晦元用宣和中亦魁天下長興集四十一卷翰林學士沈括存中撰括於文通為叔而年少於文通世傳文通常稱括叔今四朝史本傳以為從弟者非也文通之父扶扶之父同括之父曰周皆以進士起家官皆至太常少卿王荆公志周與文通墓及文通弟遼誌其伯父振之墓可攷括坐永樂事貶晚居京口自號夢溪翁自叙甚詳雲巢集十卷審官西院主簿沈遼叡逹撰遘親弟也以兄任為京官坐法流貶事見揮麈録自永徙池築室齊山號雲巢竟不復起以上三集刋於括蒼號三沈集其次序如此蓋未之攷也蘇魏公集七十二卷丞相魏國公温陵蘇頌子容撰紳之子也紳在兩禁人稱其險詖而頌器局閎厚未嘗與人較短長其為相在元祐末大臣奏事多禀宣仁獨頌必冄以白哲廟其後免於遷謫蓋上以為識君臣之禮故也年逾八十薨於建中靖國之初自草遺表卻醫屏藥死生之際了然集前後序汪藻周必大撰傅獻簡集七卷中書侍郎獻簡公河陽傅堯俞欽之撰赤城集十卷兩浙提刑寧海羅適正之撰治平二年進士學於四明樓郁為吏健敏頗為蘇子瞻劉貢父諸公所知台士有聞於世自適始西塘集二十卷監安上門三山鄭俠介夫撰治平四年甲科小臣劘上言人所不敢言上為之感動略施行其言不惟不怒而已既而竟墮深譴良由吕惠卿欲傾王安石而俠與安國游從厚善遂起獄併陷之俠既得罪新法遂不罷而本朝之禍本成矣小人勿用之戒可不畏哉安石親惠卿而疎俠豈惟誤國亦以危身後之君子可以鑒矣范忠宣集二十卷丞相忠宣公吳郡范純仁堯夫撰文正公之次子也文正子四人長純佑尤俊有賢行早年病廢以死富文忠誌其墓近時吏部尚書之柔者其四世孫也次純禮純粹皆顯用至大官劉忠肅集四十卷丞相忠肅公東光劉摯莘老撰凡四舉於鄉試禮部為第一登嘉祐四年甲科劉元城為集序述其出處大槩畫墁集一百卷吏部侍郎邠國張舜民芸叟撰舜民初用於元祐至元符末為諌議大夫居職七日所上事六十章崇寧初坐謝表言紹聖逐臣有曰脱禁錮者何止一千人計水陸者不啻一萬里又曰古先未之或聞畢竟不知其罪以為譏謗坐貶自號浮休居士淇水集八十卷門下侍郎大名李清臣邦直撰清臣韓魏公姪壻案原本無姪字攷宋史本傳韓琦以兄女妻之蓋姪壻也今補正治平二年中制科歐陽公愛其文以比蘇軾其為人亦寛博有度而趨時嗜權利首主紹述之論意規宰相亦卒不如其志范太史集五十五卷翰林學士成都范祖禹淳甫撰灌園集三十卷鄉貢進士吕南公次儒撰淳熙初試禮部不利㑹以新經取士遂罷舉欲修三國志題其齋曰衮斧書将成而死其書亦不傳元祐初諸公欲薦進之不及伐檀集二卷案文獻通攷作一卷知康州豫章黄庶亞夫撰自為序庭堅其子也世所傳山魈水怪著薜荔之詩集中多此體庭堅詩律蓋有自來也庶慶歴二年進士豫章集五十卷案文獻通攷作三十卷外集十四卷著作郎黄庭堅魯直撰自號山谷道人豫章别集二十卷案文獻通攷作一卷皆集中所遺者如承天塔記黄給事行状毁璧其顯顯者也諸孫㽦子耕集而傳之宛丘集七十卷年譜一卷起居舍人樵國張耒文潜撰宛丘陳州其所居也蜀本七十五卷后山集十四卷外集六卷談叢六卷理究一卷詩話一卷長短句二卷祕書省正字彭城陳師道無已撰一字履常蜀本但有詩文合二十卷案魏衍作集序云離詩為六卷類文為十四卷今蜀本正如此又言受其所遺甲乙丙藁詩曰五七文曰千百今四明本如此此本劉孝韙刋於臨川云未見魏全本仍其舊十四卷為正集蓋不知其所謂十四卷者止於文而詩不與也外集詩二百餘篇文三篇皆正集所無談叢詩話或謂非后山作后山者其自號也淮海集四十卷後集六卷長短句三卷祕書省正字高郵秦觀少游撰一字太虚觀才極俊嘗應制舉不得召終以疎蕩不檢見薄於世後亦不免貶死雞肋集七十卷吏部員外郎鉅野晁補之无咎撰濟南集二十卷鄉貢進士華山李廌方叔撰又號月巖集東坡知貢舉得試卷以為薦也置之首選已而不然賦詩自咎有平生漫説古戰場過眼方迷日五色之句後竟不第豫章集四十四卷宛丘集七十五卷后山集二十卷淮海集四十六卷濟北集七十卷濟南集二十卷蜀刋本號蘇門六君子集何博士備論四卷武學博士浦城何去非正通撰去非以累舉對策稱㫖授左班殿直教授武學後以東坡薦授承奉郎司農寺丞通判廬州别有文集二十卷未見呻吟集一卷原武邢居實敦夫撰恕之長子幼有俊才名聲藉甚一時前軰皆愛之年十九而卒宣仁之誣謗恕為之也居實未死或能當不義而爭萬一有補於世道是以諸賢尤痛惜焉晁以道追為其墓表尤反覆致意姑溪集五十卷後集二十卷朝請大夫趙郡李之儀端叔撰嘗從東坡辟中山幕府後代范忠宣作遺表為世傳誦然坐是得罪編置當塗遂居焉其弟之純官至尚書大名集四十卷簽書樞密魏郡王巖叟彦霖撰韓魏公客也錢塘韋先生集十八卷主客郎中錢塘韋驤子駿撰驤皇祐五年進士元祐中以近臣薦為監司數路知明州以左朝議大夫致仕崇寧中乃卒少以辭賦有聲場屋王荆公喜其借箸賦頗稱道之陳師錫誌其墓强祠部集四十卷三司户部判官餘杭强至幾聖撰亦韓魏公客也在幕府表章書記多出其手曾南豐作集序稱其文備古今體兼人所長云節孝集二十卷楚州敎授山陽徐積仲車撰治平四年進士以耳聵不能仕事其母極孝行義純篤古所謂卓行也東坡謂其文詩怪而放如玉川子案東坡句原本節去今㨿文獻通攷增入政和中賜諡節孝處士樂静集三十卷起居舍人鉅野李昭玘成季撰案成季原本作成孝文獻通攷作季成俱誤今據宋史本傳改正元豐二年甲科所居有樂静堂故以名集其姪邴漢老為書其後學易集二十卷朝奉郎東光劉跂斯立撰忠肅公摯之長子也與其弟蹈同登元豐二年進士第元祐初以其父在言路政府不得用紹聖以後復坐黨家連蹇終其身晁景迂誌其墓比孫明復石守道之徒為文無所不長宣防宫賦學易堂記世傳誦之田承君集三卷大宗正丞陽翟田晝承君撰案晝原本作畫誤今㨿宋史本傳改正晝樞密况之侄也與鄒道鄉善鄒之貶晝曰願毋以此舉自滿士所當為者未止此也道鄉集四十卷吏部侍郎晉陵鄒浩志完撰浩既諫立楊后坐貶徽宗初召還對上首及之奨歎再三問諌草安在曰焚之矣退告陳瓘瓘曰禍其始此乎異時姦臣妄出一緘則不可辨矣蔡京素忌之使其黨作偽疏言劉后殺卓氏而奪其子遂得罪其在昭州作青詞告上帝有追省當時奏御之三章初無殺母取子之一字云婆娑集三十卷右正言陽翟崔鶠德符撰鶠坐元符上書邪等廢於家治圃號婆娑靖康初召為諫官力論馮澥之罪案澥原本作獬誤今㨿宋史本傳改正忽得攣疾不能行而卒無子其壻衛昂裒輯其遺文潏水集四十卷集英殿修撰長安李復履中撰元豐三年進士案文獻通攷作二年博學有氣節其為熙河漕有㫖造戰艦戰車復奏斥議者之謬妄以為兒戲遂罷其役時論韙之馬子才集八卷鎮南節度推官鄱陽馬存子才撰元祐三年進士第四人崇福集三十五卷四六集十五卷朝請郎晁詠之之道撰景迂弟也為作集序詠之初以廕為揚州法曹未上時東坡守揚族兄无咎為倅以其文呈東坡及至揚案此句原本云坡方守揚今㨿文獻通攷改正詠之具參軍禮趨謁坡走下庭擕手以上謂坐客曰此奇才也紹聖元年登第繼中詞科坐元符邪等罷廢後奉崇福祠故以名集陶山集二十卷尚書左丞山隂陸佃農師撰東堂集六卷詩四卷書簡二卷樂府二卷祠部郎江山毛滂澤民撰滂為杭州法曹以樂府詞有佳句受知於東坡遂有名嘗知武康縣縣有東堂集所以名也又嘗知秀州修月波樓為之記其詩文視樂府頗不逮溪堂集二十卷臨川謝逸無逸撰竹友集十卷臨川謝薖幼槃撰逸從弟也吕居仁題其後曰逸詩似康樂薖詩似元暉了齋集四十二卷案文獻通攷作三十卷司諌延平陳瓘瑩中撰汪應辰為集序以為出死力攻權姦者天下一人而已矣非虚語也約論十七卷陳瓘撰起戰國至後漢安帝蓋讀通鑑隨事有所發明者也浮沚先生集十六卷後集三卷祕書省正字永嘉周行已恭叔撰十七入太學有盛名師事程伊川元祐六年進士為太學博士以親老歸教授其鄉再入為館職復出作縣永嘉學問所從出也鄉人至今稱周博士集序林越撰言為祕書郎則不然先祖妣先生之第三女先君子其自出也故知其本末所居謝池坊有浮沚書院斜川集十卷通直郎蘇過叔黨撰世號小坡坐黨家不得仕進終於通判中山府晁以道誌墓稱其純孝給事中嶠其孫也九峰集四十卷太常少卿眉山蘇元老在廷撰東坡從孫也坡在海上嘗有書往來其罷奉常歸潁昌正坐元祐邪説未幾遂卒年四十七清真集二十四卷徽猷閣待制錢塘周邦彦羙成撰元豐七年進汴都賦自諸生命為太學正邦彦博文多能尤長於長短句自度曲其提舉大晟府亦由此既盛行於世而他文未傳嘉泰中四明樓鑰始為之序而太守陳杞刋之蓋其子孫家居於明故也汴都賦已載文鑑世傳賦初奏御詔李清臣讀之多古文奇字清臣誦之如素所習熟者乃以偏傍取之爾鑰為音釋附之卷末清真雜著三卷邦彦嘗為溧水令故邑有詞集其後有好事者取其在邑所作文記詩歌併刻之寳晉集十四卷禮部員外郎襄陽米芾元章撰其母閻氏與宣仁后在藩時有舊故以后恩補試銜入仕其上世皆武官蓋國初勲臣米信之後也視芾為五世孫酷嗜古法書家藏二王真蹟故號寳晉齋蓋由得謝東山二王各一帖遂刋置無為而名齋云玉池集十二卷考功郎湘隂鄧忠臣慎思撰熙寧三年進士坐元符黨廢不用言者論其議范忠宣諡過實又坐罰銅崇觀間卒平生著述至多嘗和杜詩全帙又嘗獻郊祀慶成賦及原廟詩百韻裕陵喜之擢為館職今皆軼弗傳所存一二而已玉池其所居山峯名橘林集十六卷後集十五卷密州教授石􅐂敏若撰崇寧壬午以同進士出身中詞科其文雕琢怪奇殊乏藴藉壓卷策問言王金陵配饗先聖事謂其以百聖芻豢甘四海口以六經河漢洗四海心以九逹夷路破四海迷以萬金良藥起四海病讀之不覺大笑其人與文皆不足道也集僅二册而卷數如此麻沙坊本往往皆然龍雲集三十二卷附録一卷著作佐郎廬陵劉弇偉明撰元豐進士紹聖詞科曾慥詩選以比石敏若非其倫也龍雲安福縣鄉名弇所居也唐子西集二十卷案文獻通攷作十卷宗學博士眉山唐庚子西撰張商英拜相庚作内前行後坐貶惠州歸蜀而卒其文長於論議所著名治存舊正友議賞諸論皆精確東觀餘論二卷案文獻通攷作三卷秘書郎昭武黄伯思長睿撰伯思右丞黄履之孫吳園張根之壻於李忠定綱為中外襟袂故忠定誌其墓伯思元符庚辰進士年四十而卒好古博雅喜神仙家言自號雲林子别字霄賔有集一百卷此書止法帖刋誤及序跋古書畫器物故名餘論北湖集十卷長短句一卷直秘閣知虢州富川吳則禮子副撰其父中復以孫抃薦為御史不求識面臺官者也中復弟幾復嗣復子立禮及嗣復子審禮皆登科有名譽則禮以父澤入仕晚居豫章自號北湖居士劉左史集四卷起居郎永嘉劉安節元承撰與從弟安上皆嘗事二程同游太學號二劉安節元符三年進士為察官左史晚知宣州以没箕潁集二十卷潁昌曹組元寵撰組本與兄緯有聲太學亦能詩文而以滑稽下俚之詞行於世得名良可惜也謝克家任伯為集序其子勛跋其後略見其出處蓋宣和三年始登第郊禮進祥光賦有㫖换武階兼閤職詔中書召試仍給事殿中未幾而卒然集中有謝及第啟自序云蚤預諸生竟叨右列則未第之前已在西班未知何以也曾慥詩選云六舉不第宣和中詔赴廷試賜第啓中所謂特舉孱微許從俊造慥之言良是序跋不著其實爾梅文安集十五卷户部尚書浦江梅執禮和勝撰執禮死於靖康之禍人固哀其不幸而不知吳革趙子昉之謀執禮實主之事既泄范瓊殺革徐秉哲以子昉遺金金知執禮預謀以根括金銀為罪問誰為長官意在執禮也安扶恐其坐之進曰皆長官也遂俱死文安者所封開國縣也李忠愍集十二卷吏部侍郎臨洺李若水清卿撰後二卷為附録其死事時財三十五嵗本名若氷以靖康出使改今名詩文雖不多而詩有風度文有氣槩足以知其所存矣夷白堂小集二十卷别集三卷考功員外郎括蒼鮑慎由欽止撰元祐初以任子試吏部銓第一復登六年進士乙科甫脱選即為郎然自是數坐累官竟不進其父粹始居吳故𦵏於吳興清溪集十卷附録一卷案文獻通攷清作青楚州教授臨川汪革信民撰紹聖四年試禮部第一遂登甲科蔡京當國召為宗子博士力辭不就年財四十卒吕原明誌其墓晁以道為辭以哀之革嘗有言曰咬得菜根則萬事可做誠名言也玉溪集二十二卷左司員外郎永嘉倪濤巨濟撰其父始徙居廣德濤大觀三年進士燕山之役誦言其非以沮軍罷謫衡州茶陵以死年三十九吕居仁誌其墓曾吉父為作集序竹隠畸士集四十卷右文殿修撰韋城趙鼎臣承之撰元祐甲科紹聖宏詞又自號葦溪翁其孫綱立刋於復州本百二十卷刋止四十卷而代去遂止傅忠肅集三卷待制濟源傅察公晦撰堯俞從孫也宣和七年以吏部郎接伴金使金人入冦使人不來為敵驅去斡里布脅使拜不屈見殺丁永州集三卷知永州吳興丁注葆光撰元豐中余中牓進士喜為歌詞世所傳催雪無悶及重午慶清朝皆有承平閒雅氣象有女適樂清令冨春李素見素寔先妣之大父母也石門文字禪三十卷僧高安喻德洪覺範撰一作惠洪其在釋門得法於真浄克文而於士大夫則與黨人皆厚善誦習其文得罪不悔為張商英陳瓘鄒浩尤盡力其文俊偉不類浮屠語韓駒子蒼為塔銘云爾直齋書録解題卷十七
