body:
  text: 直齋書録解題卷二宋陳振孫撰書類尚書十二卷尚書注十三卷漢諌議大夫魯國孔安國傳初伏生以書教授財二十九篇以舜典合於堯典益稷合於臯陶謨盤庚三篇合為一康王之誥合於顧命實三十四篇及安國攷論魯壁所藏始出舜典諸篇又定其可知者増多二十五篇引序以冠諸篇之首定為五十八篇雖作傳既成㑹巫蠱事作不復以聞故未甞列於學官世亦莫之見也攷之儒林傳安國以古文授都尉朝弟子相承以及塗惲桑欽至東都則賈逵作訓馬融鄭康成作傳注解而逵父徽實受書於塗惲逵傳父業雖曰逺有源流然而兩漢名儒皆未嘗實見孔氏古文也豈惟兩漢魏晉猶然凡杜征南以前所注經傳有援大禹謨五子之歌𦙍征諸篇皆云逸書其援泰誓者則云今泰誓無此文盖伏生書亡泰誓泰誓後出或云武帝末民有獻者或云宣帝時河南女子得之所載白魚火烏之祥實偽書也然則馬鄭所解豈真古文哉故孔頴達謂賈馬輩惟傳孔學三十三篇即伏生書也亦未得為孔學矣頴達又云王肅注書始似竊見孔傳故於亂其紀綱以為太康時皇甫謐得古文尚書於外弟梁柳作帝王世紀徃徃載之蓋自太保鄭沖授蘇愉愉授梁栁栁授臧曹曹授梅賾賾為豫章内史奏上其書時已亡舜典一篇至齊明帝時有姚方興者得於大航頭而獻之隋開皇中搜索遺典始得其篇夫以孔注歴漢末無傳晉初猶得存者雖不列學官而散在民間故耶然終有可疑者余嘗辨之書古經四卷序一卷侍講朱熹晦庵所録分經與序仍為五十九篇以存古也尚書正義二十卷唐孔頴逹與博士王徳韶等共為之其序云歐陽夏侯二家之所說蔡邕碑石刻之古文安國所注寢而不用及魏晉稍興故馬鄭諸儒莫覩其學江左學者咸悉祖焉隋初始流河朔為正義者蔡大寶巢猗費甝顧彪文義皆淺畧惟劉焯劉炫最為詳雅然焯穿鑿煩雜炫就而刪焉雖稍省要義更太略詞又過華未為得也案此序本係節錄而自為正義者以下又脱十餘字今據文獻通攷校補尚書釋文一卷唐陸徳明撰其言伏生二十餘篇即馬鄭所注是也可證馬鄭非見古文又言梅賾所上亡舜典一篇以王肅注頗類孔氏故取王注從慎徽五典以下為舜典以續孔傳又言若稽古至重華協于帝十二字是姚方興所上孔氏傳本無或此下更有濬哲文明止乃命以位總二十八字尚書大傳四卷案唐宋藝文志文獻通攷俱作三卷漢濟南伏勝撰大司農北海鄭康成注凡八十有三篇當是其徒歐陽張生之徒雜記所聞然亦未必當時本書也印板刓缺合更求完善本汲冢周書十卷晉五經博士孔晁注太康中汲郡發魏安釐王冢所得竹簡書此其一也凡七十篇序一篇在其末今京口刋本以序散在諸篇盖以倣孔安國尚書相傳以為孔子刪書所餘者未必然也文體與古書不類似戰國後人依倣為之者古三墳書一卷元豐中毛漸正仲奉使京西得之唐州民舍其辭詭誕不經盖偽書也三墳之名惟見於左氏右尹子革之言盖自孔子定書斷自唐虞以下前乎唐虞無徴不信不復采取於時固己影響不存去之二千載而其書忽出何可信也况皇謂之墳帝謂之典皆古史也不當如毛所録其偽明甚人之好竒有如此其僻者晁公武云張商英偽撰以比李筌隂符經書義十三卷侍講臨川王雱元澤撰其父安石序之曰熙寧三年臣安石以尚書入侍遂與政案王安石與政在熙寧三年原本作二年誤今改正而子雱實嗣講事有㫖為之說以進八年下其說太學頒焉雱盖述其父之學王氏三經義此其一也初熙寧六年命知制誥吕惠卿充修撰經義以安石提舉修定又以安石子雱惠卿弟升卿為修撰官八年安石復入相新傳乃成雱盖主是經者也王氏學獨行于世者六十年科舉之士熟於此乃合程度前輩謂如脱墼然案其形模而出之爾士習膠固更喪亂乃已東坡書傳十三卷蘇軾撰其於𦙍征以為羲和貳於羿而忠於夏於康王之誥以釋衰服冕為非禮曰予於書見聖人之所不取而猶存者有二可謂卓然獨見於千載之後者又言昭王南征不復穆王初無憤恥之意哀痛惻怛之語平王當傾覆禍敗之極其書與平康之世無異有以知周徳之衰而東周之不復興也嗚呼其論偉矣二典義一卷尚書在丞山隂陸佃農師撰為王氏學長於攷訂待制游其孫也石林書傳十卷尚書左丞吳郡葉夢得少藴撰博極羣書彊記絶人書與春秋之學視諸儒最為精詳書禆傳十三卷案宋史藝文志作十二卷太常丞建安吳棫才老撰首卷舉要曰總說曰書序曰君辨曰臣辨曰攷異曰詁訓曰差牙曰孔傳凡八篇攷據詳博書辨訛七卷樞宻院編修官莆田鄭樵漁仲撰其目曰糾謬四闕疑一復古二樵以遺逸召用博物洽聞然頗迂僻居莆之夾漈陳博士書解三十卷禮部郎中永嘉陳鵬飛少南撰秦檜子熺甞從之遊在禮部時熺為侍郎文書不應令鵬飛輒批還之熺浸不平鵬飛說書崇政殿因論春秋母以子貴言公羊說非是檜怒謫惠州以沒今觀其書紹興十三年所序於文侯之命其言驪山之禍申侯啟之平王感申侯之立已而不知其徳之不足以償怨鄭桓公友死於難而武公復娶於申君臣如此而望其振國恥難矣嗚呼其得罪於檜者豈一端而已哉無垢尚書詳説五十卷禮部侍郎錢塘張九成子韶撰無垢諸經解大抵援引詳博文義瀾翻似乎少簡嚴而務欲開廣後學之見聞使不墮於淺狹故讀之者亦徃徃有得焉書譜二十卷程大昌撰本以解經而不盡解有所發明則篇為一論禹貢論二卷圖二卷案宋史藝文志作禹貢論五卷禹貢論圖五卷後論一卷程大昌撰凡論五十三篇後論八篇圖三十一其於江河淮漢濟黒弱水七大川以為舊傳失實皆辨證之淳熙四年上進宇宙廣矣逺矣上下數千載幅員數萬里身不親厯耳目不親聞見而欲决於一心定於一說烏保其皆無牴牾然要為卓然不詭隨傳註者也東莱書說十卷案宋史藝文志作三十五卷吕祖謙撰其始為之也慮不克終篇故自秦誓以上逆為之說然亦僅能至洛誥而止世有别本全書者其門人續成之非東莱本書也晦庵書說七卷朱熹門人黄士毅集其師說之遺以為此書晦庵於書一經獨無訓傳每以為錯簡脫文處多不可彊通吕伯恭書解不可彊通者彊欲通之甞以言伯恭而未能改也又嘗疑孔安國傳恐是假書小序决非孔門之舊安國序决非西漢文章至謂與孔叢子文中子相似則豈以其書出於東晉之世故耶非有絶識獨見不能及此至言今文多艱澁古文多平易伏生背文暗誦乃偏得其所難而安國攷定於科斗古書錯亂磨滅之餘反專得其所易此誠有不可曉者今惟二典禹謨召誥洛誥金縢有解及九江彭蠡皇極有辨其他皆文集語録中摘出尚書講義三十卷參政金壇張綱彦正撰政和四年上舍及第釋褐授承事郎以三中首選除太學官其仕三朝歴蔡京王黼秦檜三權臣皆不為之屈紹興末乃預政年八十四而終此書為學官時作拙齋書集解五十八卷校書郎三山林之竒少頴撰從吕紫微本中居仁學而太史祖謙則其門人也初第以樞密陳誠之薦徑入館以末疾去而終書說七卷禮部尚書㑹稽黄度文叔撰度篤學窮經老而不倦晚年制閫江淮著述不輟時得新意徃徃晨夜叩書塾為友朋道之潔齋家塾書鈔十卷禮部侍郎鄞袁燮和叔潔齋先生其子喬崇謙録其家庭所聞至君奭而止袁氏家塾讀書記二十三卷題四明袁覺集未詳何人大畧倣吕氏讀詩記集諸說或述已意於後當亦是潔齋之族耶尚書精義六十卷三山黄倫彛卿編次或書坊所託梅教授書集解三冊不分卷不著名未詳何人柯山書解十六卷柯山夏僎元肅撰集二孔王蘇陳林程頤張九成及諸儒之說便於舉子書小傳十八卷新安王炎晦叔撰南塘書說三卷案宋史藝文志作二卷趙汝談撰疑古文非真者五條朱文公嘗疑之而未若此之決也然于伏生所傳諸篇亦多所掊擊觝排則似過甚詩類毛詩二十卷毛詩故訓傳二十卷漢河間王博士趙人毛公撰後漢大司農鄭康成箋漢初齊魯韓三家並行而毛氏後出獨河間獻王好之未得立其後三家皆廢而毛獨傳故曰毛詩毛公者有大毛公小毛公案後漢儒林傳稱毛萇傳詩而孔氏正義据鄭譜云魯人大毛公為詁訓傳於其家河間獻王得而獻之以小毛公為博士則未知萇者大毛公歟小毛公歟鄭氏曰箋者案正義云鄭於諸經皆謂之注獨此言箋者字林云箋表也識也鄭遵毛學表明毛言記識其事故稱為箋又案後漢傳注引張華博物志鄭注毛詩曰箋不解此意或云毛公曽為北海相鄭是郡人故以為敬雖未必由此然漢魏間逹上之辭皆謂之牋則其為敬明矣其間與毛異義者甚多王肅盖甞述毛非鄭云詩風雅頌四卷序一卷朱熹所録以為序出後世不當引冠篇首故别録為一卷毛詩正義四十卷唐孔穎達與王徳韶等撰専述毛鄭之學且備鄭譜於卷首蓋亦増損劉焯劉炫之疏而為之也晁氏讀書志云自晉東遷學有南北之異南學簡約得其英華北學深博窮其枝葉至頴逹義疏始混南北以為一雖未必盡得聖人之意而其形名度數亦已詳矣自兹以後郊社宗廟冠婚䘮祭其儀法莫不本此元豐以來廢而不行甚亡謂也毛詩釋文二卷唐陸徳明撰韓詩外傳十卷漢常山太傅燕韓嬰撰案藝文志有韓故三十六卷内傳四卷外傳六卷韓說四十一卷今皆亡所存惟外傳而卷多於舊葢多記雜説不專解詩果當時本書否也故者通其指義也作誥非隨齋批注詩譜三卷漢鄭康成撰歐陽修補亡其序云慶歴四年至絳州得之有注而不見名氏譜序自周公致太平已上皆亡之取孔氏正義所載補足之因為之注自此以下即用舊注攷春秋史記合以毛鄭之說補譜之亡者於是其書復完案宋兩朝國史志歐陽修於綘州得注本卷首殘闕因補成進之而不知注者乃太叔求也毛詩鳥獸草木蟲魚疏二卷題吳郡庶子陸璣撰案館閣書目稱吳中庻子烏程令字元恪吳郡人据陸氏釋文也其名從玉固非晉之士衡而其書引郭璞注爾雅則當在郭之後亦未必為吳時人也孔疏吕記多引之詩折衷二十卷皇祐中莆田劉宇撰凡毛鄭異義折衷從一盖倣唐陳岳三傳折衷論之例凡一百六十八篇詩本義十六卷圖譜附歐陽修撰先為論以辨毛鄭之失然後斷以己見末二卷為一義解取舍義時世本末二論豳魯序三問而補亡鄭譜及詩圖總序附於卷末大意以為毛鄭之已善者皆不改不得已乃易之非樂求異於先儒也新經詩義三十卷案宋史藝文志作二十卷王安石撰亦三經義之一也皆雱訓其辭而安石釋其義詩解集傳二十卷門下侍郎眉山蘇轍子由撰於序止存其首一言餘皆刪去詩學名物解二十卷知樞密院莆田蔡卞元度撰卞王介甫壻故多用字說其目自釋天至雜釋凡十類大畧如爾雅而𤨏碎穿鑿於經無補也詩物性門類八卷不著名氏多取說文今攷之盖陸農師所作埤雅藁也詳見埤雅廣川詩故四十卷董逌撰其說兼取三家不傳毛鄭謂魯詩但見取於諸書其言莫究齊詩尚存可据韓詩雖亡缺猶可參攷案逌藏書志有齊詩六卷今館閣無之逌自言隋唐亦已亡久矣不知今所傳何所從來或疑後世依託為之然則安得便以為齊詩尚存也然其所援引諸家文義與毛氏異者亦足以廣見聞續㣲絶云耳毛詩補音十卷吳棫撰其說以為詩韻無不叶者如來之為釐慶之為羌馬之為姥之類詩音舊有九家唐陸徳明始定為釋文燕燕以南韻心沈重讀南作尼心切徳明則謂古人韻緩不煩改字揚之水以沃韻樂徐邈讀沃鬰縛切徳明亦所不載顔氏糺謬正俗以傅毅郊祀賦穰作而成切張衡東京賦激作吉躍切今之所作大略倣此其援據精博信而有證朱晦翁注楚辭亦用棫例皆叶其韻棫又有韻補一書不專為詩作也要之古人韻緩之說最為確論不必一一改字詳見韻補夾漈詩傳二十卷辨妄六卷鄭樵撰辨妄者專指毛鄭之妄謂小序非子夏所作可也盡削去之而以已意為之序可乎樵之學雖自成一家而其師心自是殆孔子所謂不知而作者也毛詩詳解三十六卷案宋史藝文志作四十六卷長樂李樗迂仲撰博取諸家說訓釋名物文意末用己意為論以斷之樗閩之名儒於林少穎為外兄林李出也詩集傳二十卷詩序辨說一卷朱熹撰以大小序自為一編而辨其是非其序吕氏讀詩記自謂少年淺陋之說久而知其有所未安或不免有所更定今江西所刻晚年本得於南康胡泳伯量校之建安本更定者幾什一云吕氏家塾讀詩記三十二卷吕祖謙撰博采諸家存其名氏先列訓詀後陳文義剪截貫穿如出一手己意有所發明則别出之詩學之詳正未有逾於此書者也然自公劉以後編纂已備而條例未竟學者惜之岷隱續讀詩紀三卷戴溪撰其書出於吕氏之後謂吕氏於字訓章已悉而篇意未貫案謂吕氏以下原本脱今校補故以續記為名其實自述己意亦多不用小序黄氏詩說三十卷黄度撰葉適正則為之序毛詩前說一卷項安世撰攷定風雅篇次而為之說其曰前說者末年之論有少不同故也詩解二十卷陳鵬飛撰不解商魯二頌以為商頌當闕而魯頌可廢王氏詩總聞三卷案宋史藝文志作二十卷不知名氏及時代其自序言丁丑入吳見謝君士燮丙戌入蜀見陳君彦深庚寅再入蜀見楊君左車所稱甲子不著年號而謝陳楊三君亦竟莫詳為何人也當俟知者問之其書有聞音聞訓聞章聞句聞字聞物聞用聞迹聞事聞人凡十聞每篇為總聞又有聞風聞雅聞頌等其說多出新意不循舊傳案朱彛尊王氏詩總聞序王氏名質字景文汶陽人紹興庚辰進士召試館職不就歴樞密院編修官出通判荆南府不行奉祠山居有集四十卷此書亦作二十卷白石詩傳二十卷宗正少卿樂清錢文子文季撰所居白石巖以為號案宋史藝文志白石詩傳二十卷又詩訓詁三卷魏了翁作錢氏集傳序曰别為詁釋如爾雅類例詩古音辨一卷從政郎信安鄭庠撰禮類古禮經十七卷古禮注十七卷漢大司農北海鄭康成撰相傳以為髙堂生所傳者也古禮釋文一卷唐陸徳明撰古禮疏五十卷唐𢎞文館學士臨洛賈公彦等撰初有齊黄慶隋李孟悊二家行於世公彦據以為本而増損之古禮十七卷釋文一卷識誤三卷永嘉張淳忠甫所校乾道中太守章貢曾逮仲躬刻之首有目録一卷載大小戴劉向篇第異同以古監本巾箱本杭細本嚴本校定識其誤而為之序謂髙堂生所傳士禮爾今此書兼有天子諸侯卿大夫禮決非髙堂所傳其篇數偶同自陸徳明賈公彦皆云然不知何所據也案朱子曰張淳所云不深攷於劉向所訂之誤又不察其所謂士禮者特畧舉首篇以名之其云推而致於天子者盖專指冠昏䘮祭而言若燕射朝聘則士豈有是禮而可推耶古禮經傳通解二十三卷集傳集注十四卷朱熹撰以古十七篇為主而取大小戴禮及他書傳所載繫於禮者附入之二十三卷已成書缺書數一篇其十四卷草定未刪改曰集傳集注者盖此書初名也其子在刻之南康一切仍其舊云古禮經傳續通解二十九卷外府丞長樂黄榦直卿撰榦朱侍講之髙弟以其子妻之自號勉齋因婦翁廕入仕為吏亦以材稱始晦庵著禮書䘮祭二禮未及論次以屬榦續成之然亦有未備者集釋古禮十七卷釋宫一卷綱目一卷廬陵李如圭寶之撰淳熙癸丑進士案文獻通攷作紹興癸丑進士嘗為福建撫幹釋宫者經所載堂室門庭今人所不曉者一一釋之周禮十二卷周禮注十二卷漢鄭康成撰案藝文志周官經六篇本注云王莽時劉歆置博士顔師古曰即今之周禮也亡其冬官以攷工記足之愚嘗疑周禮六典與書周官不同司徒掌邦教敷五典擾兆民司空掌邦土居四民時地利二官各有攸司盖自唐虞九官禹契所職則已然矣今地官於教事殊畧而田野井牧鄉遂稼穡之事殆皆司空職耳周官初無邦事之名今所謂事典者未知定為何事書缺亡而以攷工記足之天下之事止於百工而已耶先儒固有疑於是書者若林孝存以為武帝知周官末世瀆亂不經之書作十論七難以排棄之何休亦以為六國隂謀之書甚者或謂劉歆附益以佐王莽者也惟鄭康成博覽以為周公致太平之迹故其學遂行於世愚案此書多古文竒字名物度數可攷不誣其為先秦古書似無可疑愚所疑者邦土邦事灼然不同其他繁碎駁雜與夫劉歆王安石一再用之而亂天下猶未論也康成之學出於扶風馬融而參取杜子春鄭大夫鄭司農之說子春河南緱氏人生漢末至永平初尚在年九十餘鄭衆賈逵皆受業焉大夫者河南鄭興少贛也司農者鄭衆仲師興之子也融字季長周禮釋文二卷唐陸徳明撰周禮疏五十卷唐賈公彦撰其序周禮廢興起於成帝劉歆而成於鄭康成又言鄭衆以為書周官即此周官也失之矣書止一篇周禮乃六篇文異數萬非書類是則然矣但周禮六官實本於周官周官舉其凡周禮詳其目鄭衆之說未得為失而其大可疑者則邦土邦事之不同也館閣書目案藝文志謂之周官經此禮器所謂經禮者是也志有周官經六篇傳四篇但曰經傳云爾廼便以為經禮尤為可笑廣川藏書志云公彦此疏据陳邵異同評及沈重義疏為之二書並見唐藝文志今不復存周禮新義二十二卷王安石撰其序言自周衰至今歴載千數而太平之遺迹掃蕩殆盡學者所見無復全經於是時乃欲訓而發之臣誠不自揆知其難也案自周襄以下七句原本脱漏今據文獻通攷補入以訓而發之之為難又知夫立政造事追而復之之為尤難也新法誤國於此可推其原矣熙寧八年詔頒之國子監且置之義解之首其解止於秋官不及攷工記周禮中義八卷祠部員外郎長樂劉彛執中撰彛諸經皆有中義周禮詳解四十卷王昭禹撰未詳何人近世為舉子業者多用之其學皆宗王氏新說周禮講義四十九卷林之竒撰周禮說三卷中書舍人永嘉陳傅良君舉撰曰格君心正朝綱均國勢各四篇周禮井田譜二十卷進士㑹稽夏休撰紹興時表上之淳熙中樓鑰刻之永嘉陳止齋為之序休有破禮記二十卷未見周禮丘乗圖說一卷項安世撰周禮說五卷黄度撰不解攷工記葉水心序之周禮綱目八卷摭說一卷紹興府教授括蒼林椅竒卿撰嘉定初上之朝鶴山周禮折衷二卷樞密臨卭魏了翁華父之門人稅與權所録條列經文附以傳注鶴山或時有所發明止於天官餘皆未及也大戴禮十三卷漢信都王太傅梁戴徳延君九江太守聖次君皆受禮於后蒼所謂大小戴禮者也漢初以來迄於劉向校定中書諸家所記殆數百篇戴徳刪其煩重為八十五篇聖又刪為四十九篇相傳如此今小戴四十九篇行於世而大戴之書所存止此自隋唐志所載卷數皆與今同而篇第乃自三十九而下止於八十一其前缺三十八篇末缺四篇所存當四十三而於中又缺四篇第七十二複出一篇實存四十篇意其缺者即聖所刪耶然哀公問投壺二篇與今禮記文不異他亦間有同者保傅傳世言賈誼書所從出也今考禮詧篇湯武秦定取舍一則盡出誼疏中反若取誼語勦入其中者公符篇全録漢昭帝冠辭則此書殆後人好事者采獲諸書為之故駁雜不經決非戴徳本書也題九江太守廼戴聖所歴官尤非是禮記二十卷即所謂小戴禮也凡四十九篇漢儒輯録前記固非一家之言大抵駁而不純獨大學中庸為孔氏之正傳然初非專為禮作也唐魏徵嘗以小戴禮綜彚不倫更作類禮二十篇蓋有以也禮記注二十卷漢鄭康成撰禮記釋文四卷唐陸徳明撰禮記正義七十卷唐孔穎達等撰舊有義疏行於世者惟皇甫侃熊安生二家案此句原本脱生字今校補皇勝於熊故據皇氏為本有不備則以熊氏補焉芸閣禮記解十六卷秘書省正字京兆吕大臨與叔撰案館閣書目作一卷止有表記冠昏鄉射燕聘義䘮服四制凡八篇今又有曲禮上下中庸緇衣大學儒行深衣投壺八篇此晦庵朱氏所傳本刻之臨漳射垜書坊稱芸閣呂氏解者即其書也續書目始别載之禮記解二十卷新安方慤性夫撰案此句原本脫今校補政和三年表進自為之序以王氏父子獨無解義乃取其所撰三經義及字說申而明之著為此解由是得上舍出身其所解文義亦明白禮記解七十卷馬希孟彥醇撰未詳何人亦宗王氏中庸大學廣義一卷司馬光撰中庸大學說各一卷少儀解附張九成撰曲江本中庸六卷大學二卷兼山中庸說一卷太中大夫河南郭忠孝立之撰中庸集解二卷㑹稽石􅗐子重集録周敦頤程顥程頤張載吕大臨謝良佐游酢楊時侯仲良尹焞凡十家之說晦翁為之序大學章句一卷或問二卷中庸章句一卷或問二卷朱熹撰其說大略宗程氏㑹衆說而折其中又記所辨論取舍之意别為或問以附其後皆自為之序至大學則頗補正其脫簡闕文中庸輯略一卷案宋史藝文志作二卷朱熹既為章句復取石子重所集解刪其繁亂名以輯略其取舍之意則或問詳之曲禮口義二卷戴溪撰中庸說一卷項安世撰禮記集說一百六十卷直秘閣崑山衛湜正叔集諸家說自注疏而下為一書各著其姓氏寶慶二年表上之由此寓直中秘魏鶴山為作序孔子閒居講義一卷龍圖閣學士慈溪楊簡敬仲撰三禮義宗三十卷梁國子博士清河崔靈恩撰凡一百四十九條其說推本三禮參取諸儒之論博而覈矣案本傳四十七卷中興書目一百五十六篇皆與今卷篇數不同書目又云慶厯中髙陽許聞誨為之序家本亦無此序也三禮圖二十卷國子司業太常博士河南聶崇義撰自周顯徳中受詔至建隆二年奏之盖用舊圖六本參定故題集註詔國學圖於宣聖殿後北軒之屋壁至道中改作於論堂之上以版代壁判監李至為之記吾郷郡庠安定胡先生所剏論堂繪三禮圖當是依倣京監嘉熙戊戌風水堂壞今不存矣禮象十五卷陸佃撰以改舊圖之失其尊爵彛舟皆取公卿家及秘府所藏古遺器與聶圖大異岷隱戴先生分教吾鄉作閣齋館池上畫此圖於壁而以禮象名閣與論堂禮圖相媲云禮書一百五十卷太常博士長樂陳祥道用之撰論辨詳博間以繪畫於唐代諸儒之論近世聶崇義之圖或正其失或補其闕元祐中表上之夾漈鄉飲禮七卷鄭樵撰直齋書録解題卷二
