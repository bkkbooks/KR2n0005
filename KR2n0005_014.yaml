body:
  text: 直齋書録解題卷十四宋陳振孫撰音樂類劉歆班固雖以禮樂著之六藝略要皆非孔氏之舊也然三禮至今行於世猶是先秦舊傳而所謂樂六家者影響不復存矣竇公之大司樂章既已見於周禮河間獻王之樂記亦已録於小戴則古樂已不復有書而前志相承乃取樂府教坊琵琶羯鼓之類以充樂類與聖經並列不亦悖乎晚得鄭子敬氏書目獨不然其為説曰儀注編年各自為類不得附於禮春秋則後之樂書固不得列於六藝今從之而著於子録雜藝之前琴説一卷唐工部尚書李勉撰琴書三卷唐待詔趙惟暕撰稱前進士滁州全椒尉琴經一卷托名諸葛亮淺俚之甚琴説一卷唐待詔薛易簡撰衡州耒陽尉琴義一卷稱野人劉籍撰琴三訣一卷稱天台白雲先生指訣一卷唐道士趙邪利撰一名彈琴古手法琴操一卷不著名氏中興書目云晉廣陵守孔衍以琴調周詩五篇古操引共五十篇述所以命題之意今周詩篇同而操引財二十一篇似非全書也琴曲詞一卷不知作者凡十一曲辭皆鄙俚琴史六卷吳郡朱長文伯原撰唐虞以來迄於本朝琴之人與事備矣製琴法一卷不知何人撰大胡笳十九拍一卷題隴西董庭蘭撰連劉商辭又云祝家聲沈家譜不可曉也案文獻通考又有小胡笳子十九拍一卷引崇文總目云琴曲有大小胡笳大胡笳十八拍沈遼集世名沈家聲小胡笳又有契聲一拍共十九拍謂之祝家聲此題曰大胡笳十九拍疑有誤琴譜八卷鄞學魏邸舊書有之己卯分教傳録亦益以他所得譜琴操譜十五卷調譜四卷參政歷陽張巖肖翁以善鼓琴聞一時余從其子佖得此譜琴譜十六卷新昌石孝隆君大所録羯鼓録一卷唐婺州刺史南卓撰琵琶故事一卷段安節撰案以上二條文獻通考引陳氏之言原本脫漏今補入景祐樂府奏議一卷殿中丞致仕胡瑗翼之撰皇祐樂府奏議一卷胡瑗撰三聖樂書一卷宋祁子京撰景祐廣樂記八十卷翰林院侍講學士馮元等撰闕八卷景祐元年判太常寺燕肅建言鐘律不調欲以王朴律凖更加考詳詔宋祁與集賢校理李照共領其事照言朴律太髙比之古樂約髙五律遂欲改定大樂制管鑄鐘并引校理聶冠卿為檢討官又詔元等修撰樂書為一代之典三年七月書成然未幾照樂廢不用皇祐新樂圖記三卷屯田員外郎阮逸光祿寺丞胡瑗撰凡十二篇首載詔旨次及律度量衡鐘磬鼓鼎鸞刀圖其形製刋校頒之天下虎丘寺有本當時所頒藏之名山者也其末志頒降歲月實皇祐五年十二月二十一日用蘇州觀察使印長二押字余平生每見承平故物未嘗不起敬因録藏之一切依元本摹寫不少異大樂演義三卷案文獻通考大樂演義上有補亡樂書三卷成都房審權撰皇祐中宋祁田况薦益州進士房庶曉音律上其樂書補亡三卷庶自言得古本漢書云度起於黃鍾之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鍾之長一為一分今本脫之起積一千二百黍八字故前世纍黍為尺以制律是律生於尺非尺生於律也且一為一分者蓋九十分之一也後世誤以一黍為一分非是當以秬黍中者一千二百實管中黍盡得九十分為黃鍾之長九寸加一以為尺則律定矣惟范鎮是之時胡瑗阮逸制樂已有定議遂格不行詳見國史律歷志審權庶之子也元豐四年為此書以述父之意其後元祐初范蜀公老矣自為新樂奏之於朝蓋用其説云樂書二百卷祕書省正字三山陳暘晉之撰建中靖國元年進之為禮書陳祥道者其兄也其書雅俗胡部音器歌舞下及優伶雜戲無不備載博則博矣未免於蕪穢也㿩紹聖元年制科終禮部侍郎大晟樂書二十卷大中大夫開封劉炳子蒙撰大晟者本方士魏漢津妄出新意以祐陵指節定尺律傅會身為度之説炳為大司樂精為緣飾又有圖譜一卷隆韶導和集一卷案文獻通考題隆韶道百和集誤保義郎大晟府案協律姚公立撰以律吕節氣隂陽為説凡四十九條雜藝類九鏡射經一卷案文獻通考九鏡作几鏡唐檢校太子詹事韋韞撰制弓矢法三篇射法九篇射訣一卷韋韞撰敘其學射之初有張宗者授之訣遂著於篇射評要略一卷稱李廣撰固依托也而亦鄙淺亡奇射訓一卷監察御史張仲殷撰中興書目云本朝人果也不應名犯廟諱射議一卷元城王越石仲寶撰凡七條增廣射譜七卷淳熙中詔進士習射書坊為此以射利末二卷為盧宗邁射法亦簡要可觀書品七卷梁度支尚書庾肩吾撰書評一卷梁侍中袁昂撰藥石論一卷唐升州司馬張懷瓘撰六體論一卷書斷三卷書估一卷論書一卷以上四種亦皆張懷瓘撰翰林禁書三卷無名氏案文獻通考有翰林禁經八卷引朝公武讀書志曰唐李陽氷撰論書勢筆法所禁故以名書疑即此書也書後品一卷唐御史中丞李嗣真撰墨藪一卷案文獻通考作十卷不知何人所集凡十八篇又一本二十一篇古今法書苑十卷主客郎中臨淄周越撰越與兄起皆有書名起書未見越書間有之俗甚案越書二句原本脫去今據文獻通考補入金壺記一卷僧適之撰集書家故事以二字為題而注所出於其下凡三百餘條書史一卷禮部員外郎米芾元章撰祕閣法帖跋一卷米芾撰翰墨志一卷髙宗皇帝御製法帖刋誤二卷黃伯思長睿撰淳化法帖出於待詔王著去取時祕府墨迹真贋雜居著不能辨也但欲備晉宋間名迹遂至以江南人一手偽帖竄入其間鄙惡之甚米南宫辨之十已得七八至長睿益精詳矣籀史二卷翟耆年伯夀撰裒諸家鐘鼎圖説為一編頗有考究續書譜一卷鄱陽薑夔堯章撰絳帖評一卷薑夔撰法帖要録十卷唐大理卿河東張彥逺愛賔撰彥逺宏靖之孫三世相門其父文規嘗刺湖州著吳興雜録飛白敘録一卷錢惟演希聖撰天聖四年序進蘭亭博議十五卷淮海桑世昌澤卿撰世昌居天台放翁陸氏諸甥也博雅能詩又嘗為西湖紀逸考林逋遺事甚詳蘭亭考十二卷即前書浙東庾司所刻視初本頗有刪改初十五篇今存十三篇去其集字篇後人集蘭亭字作書帖詩銘之類者又附見篇兼及右軍他書迹於樂毅論尤詳其書始成本名博議髙內翰文虎炳如為之序及其刊也其子似孫主為刪改去此二篇固當而其他務從省文多失事實或戻本意其最甚者序文本亦條達可觀亦竄改無完篇首末闕漏文理斷續於其父猶然深可怪也此書纍十餘卷不過為晉人一遺帖自是作無益玩物喪志本無足云其中所録諸家跋語有昭然偽妄而不能辨者未暇疏舉法書撮要十卷吳興蔡專山父撰以書家事實分門條類亦無所發明淳熙中人云紹聖御史之孫吾鄉不聞有此人也當考然其名專而字山父專者物之初生從屮不從山也案屮原本作而誤文獻通考自紹聖御史以下俱刪去今據文義改正偏旁之未審何取其為法書余於小學家黜書法於雜藝有以也武岡法帖釋文二十卷案文獻通考作十卷劉次莊元祐中為官帖釋文刻石於臨江而武岡又嘗傳刻絳州民潘氏帖嘉定中汪立中取劉本分入二十卷中官帖所無者增附之書苑菁華二十卷臨安書肆陳思者集齊梁畫目録一卷唐竇蒙子泉録案此條原本脫去今據文獻通考補入古今畫人名一卷唐李嗣真録唐朝畫斷一卷唐翰林學士朱景元撰一名唐朝名畫録前有目録後有天聖三年商宗儒後序與畫斷大同小異案一名唐朝名畫録以下原本刪去今據文獻通考補入歷代名畫記十卷唐張彥逺撰彥逺家世藏法書名畫收藏鑒識自謂有一日之長既作法書要録又為此記且曰有好事者傳余二書書畫之事畢矣五代名畫記大梁劉道醇撰嘉祐四年陳洵直序案洵文獻通考作詢聖朝名畫評一卷案文獻通考作三卷劉道醇撰益州名畫録三卷黃休復撰中興書目以為李略撰而謂休復書今亡案此書有景祐三年序不著名氏其為休復所録明甚又有休復自為後序則固未嘗亡也未知題李略者與此同異案文獻通考有益州名畫録三卷載陳氏之言此本脫去今補入山水受筆法一卷唐沁水荆浩浩然撰圖畫見聞志六卷太原郭若虛撰元豐中自序稱大父司徒公未知何人郭氏在國初無顯人但有郭承祐耳其書欲繼張彥逺之後畫史一卷米芾撰德隅堂畫品一卷李豸方叔撰趙今畤德麟官襄陽行橐中諸畫方叔皆為評品之元符元年也林泉髙致集一卷直徽猷閣待制河陽郭思撰其父熙字淳夫善畫思元豐五年進士既貴追述其父遺迹事實待制許光疑為之序曰畫訓畫意畫題畫訣案文獻通考畫訓上多畫記二字而序又稱詩歌贊記詔誥銘志今本闕廣川畫跋五卷董逌撰畫繼十卷鄧椿公夀撰以繼郭若虛之後張彥逺記止會昌元年若虛志止熙寧七年今書止乾道三年文房四譜五卷參政梓潼蘇易簡太簡撰歙硯圖譜一卷太子中舍知婺源縣唐積撰治平丙午歲案歙硯圖譜以下三種俱係洪適撰其弟邁有跋可證此以歙硯圖譜為唐積撰而下二種俱不知名氏文獻通考宋史藝文志及説郛遂因之然適本有譜無圖或圖係唐積所補邪歙硯説一卷又辨歙石説一卷皆不著名氏墨苑三卷趙郡李孝美伯揚撰曰圖曰式曰法元符中馬涓李元膺為之序硯史一卷米芾撰間堂雜記四卷不著名氏述文房四譜而首載唐氏硯録硯箋一卷髙似孫撰續文房四譜五卷司農卿李洪秀穎撰案文獻通考馬端臨曰朝陳二家書録以醫相牛馬茶經酒譜之屬俱入雜藝術門蓋仍諸史之舊原本自論畫以下至博戲酒令皆附音樂之末與馬氏所言互異蓋係誤編今以評畫及文房之類次於書法而香譜以下俱附算學之後庶有次第算經三卷案文獻通考作一卷夏侯陽撰大扺乘除法隋志二卷唐志一卷甄鸞注今本無注元豐京監本算經三卷張邱建撰有序首言算者不患乘除之為難而患分之為難是以序列諸分之本原宣明約通之要法案唐志作一卷甄鸞注今本稱漢中郡守前司𨽻甄鸞注太史令李淳風等注釋算學博士劉孝孫撰細草細草者乘除法實之詳悉也應用算法一卷夷門叟郭京元豐三年序稱平陽奇士蔣舜元撰凡八篇曰釋數田畝粟米端匹斤稱修築差分雜法總為百五十七門前志在歷算類案射御書數均一藝也不専為歷算設故列於此香譜一卷不知名氏萱堂香譜一卷稱侯氏萱堂而不著名香嚴三昧一卷案文獻通考作十卷不知名氏茶經一卷案文獻通考作三卷唐陸羽鴻漸撰羽自號竟陵子又號桑苧翁煎茶水記一卷唐涪州刺史張又新撰案館閣書目作江州刺史本刑部侍郎劉伯芻稱水之與茶宜者凡七等又新復言得李季卿所筆録陸鴻漸水品凡二十歐公大明水記嘗辨之今亦載卷末余足迹所至不廣於水品僅嘗三四若惠山泉甘美置之第二不沗特未知康王谷水何如爾其次吳松第四橋水亦不惡虎丘劍池殊未佳而在第四已不可曉至於雪水清甘絶佳而居其末尤不可曉也大扺水活而後宜茶活而不清潔猶不宜故乳泉石池漫流者為上案乳文獻通考作浮為其活且潔也若夫天一生水蒸為雲雨水之活且潔者何以過此余嘗用淨器承雨水試以烹煎不減雪水故知又新之説妄也茶譜一卷後蜀毛文錫撰北苑拾遺一卷劉升撰案升文獻通考及宋史藝文志俱作異慶歷元年序補茶經一卷知建州周絳撰當大中祥符間茶山節對一卷攝衢州長史蔡宗顔撰宣和北苑貢茶録一卷建陽熊蕃叔茂撰其子克又益寫其形製而傳之酒譜一卷汶上竇蘋叔野撰其人即著唐書音訓者北山酒經三卷大隱翁撰泉志十五卷洪遵景伯撰記歷代錢貨浸銅要略一卷張甲撰稱德興草澤紹聖元年序蓋膽水浸鐵成銅之始甲參政子公之祖治金録原闕卷泉司吏所為也案此條原本脫去今據文獻通考增入又卷數通考原闕彈棊經一卷題張柬之撰五木經一卷并圖例唐李翺撰元革注蓋古樗蒱之戲也三象戲圖一卷汲陽成師仲編打馬格局一卷無名氏打馬圖式一卷鄭寅子敬撰用五十馬打馬賦一卷易安李氏撰用二十馬以上三者各不同今世打馬大約與古之樗蒱相類譜雙十卷洪遵集此戲今人不復為進士采選一卷趙明逺景昭撰此元豐未改官制時遷轉格例也希古集一卷括蒼何宗姚取投壺新舊式及馮氏射法為一編忘憂清樂集一卷棊待詔李逸民撰集通逺集一卷無名氏視清樂為略象棊神機集一卷稱於陽葉茂卿撰案文獻通考於陽作杉陽釣鰲圖一卷採珠格局一卷勸酒玉燭詩一卷皆無名氏捉卧甕人事數一卷李庭中撰以上四種皆酒邊雅戲類書類語麗十卷梁湘東王功曹參軍朱淡逺撰採托書語之麗者為四十門案前志但有雜家而無類書新唐書志始别出為一類此書乃猶列雜家要之實類書也但其分門類無倫理淡逺又有語對一卷不傳修文殿御覽三百六十卷北齊尚書左僕射范陽祖珽孝徴等撰案唐志類書在前者有皇覽類苑華林遍略等六家今皆不存則此書當為古今類書之首珽之行事姦貪凶險盜賊小人之尤無良者言之則汙口舌而其所編集乃獨至今傳於世然珽嘗以他人所賣遍略質錢受杖又嘗盜官遍略一部坐獄論罪今書毋乃亦盜遍略之舊以為已功耶遍略者梁徐僧權所為也又案隋志作聖夀堂御覽卷數同聖夀者實齊後主所居北堂書鈔一百六十卷案文獻通考作一百七十三卷唐祕書監餘姚虞世南伯施撰其書成於隋世藝文類聚一百卷唐宏文館學士長沙歐陽詢信本撰案唐志令狐德棻趙宏智等同修其所載詩文賦頌之屬多今世所無之文集初學記三十卷唐集賢院學士長城徐堅元固撰六帖三十卷唐太子少傅太原白居易撰唐志作白氏經史事類一名六帖醉吟先生墓志云又著事類集要三十部時人目為白氏六帖金鑰二卷唐太學博士河內李商隱義山撰分四部曰帝室職官歲時州府大略為箋啓應用之備玉屑十五卷無名氏蒙求三卷唐李翰撰本無義例信手肆意雜襲成章取其韻語易於訓誦而已遂至舉世誦之以為小學發蒙之首事有甚不可曉者余家諸子在褓未嘗令誦此也戚苑纂要十卷案原本作戚畹文獻通考作戚英俱誤今據唐書藝文志改正唐劉揚名撰皆集內外宗族姻親故事戚苑英華十卷唐仙居令袁悅撰唐志云重修蓋因揚名之舊而廣之太平御覽一千卷翰林學士李昉扈蒙等撰以前代修文御覽藝文類聚文思博要及諸書參詳條次修纂本號太平編類太平興國二年受詔八年書成改名御覽或言國初古書多未亡以御覽所引用書名故也其實不然特因前諸家類書之舊爾以三朝國史考之館閣及禁中書總三萬六千餘卷而御覽所引書多不著録蓋可見矣鹿門家鈔詩詠五十卷鴻臚少卿襄陽皮文璨撰以羣書分類事為詩而注釋之其祖日休有書名鹿門家鈔故今述其名册府元龜一千卷景德二年命資政殿學士王欽若知制誥楊億修歷代君臣事迹八年而成總五十部部有總序一千一百四門案文獻通考作一千二百四門門有小序賜名製序所采正經史之外惟取戰國䇿國語韓詩外傳吕氏春秋管晏韓子孟子淮南子及修文殿御覽每門具進上親覽摘其舛誤多出手書或召對指示商略天和殿御覽四十卷侍讀學士臨川晏殊等天聖中受詔取册府元龜掇其要者分類為二百十五門案文獻通考作一百十五門天和者禁中便殿也類要七十六卷晏殊撰曽鞏為序案中興書目七十七卷比曽序七十四篇多三篇今此本七十六卷豈併目録為七十七耶事類賦三十卷校理丹陽吳淑正儀撰進并注韻類題選一百卷朝奉大夫知處州鄞袁轂容直撰以韻類事纂集頗精要世所行書林韻會蓋依倣而附益之者也轂嘉祐六年進士東坡守杭時為倅風月平分之詞為轂作也其後纍世登科潔齋燮其四世孫也本朝蒙求三卷案文獻通考作二卷端明殿學士成都范鎮景仁撰十七史蒙求一卷案文獻通考作二卷題王先生不著名氏或云王令也書敘指南二十卷任廣撰案文獻通考作任浚崇寧中人皆經傳四字語備尺牘應用者也史韻四十九卷嘉禾錢諷正初撰附韻類事頗便檢閲後六帖三十卷知撫州孔傳世文撰以續白氏之後也傳襲封衍聖公海録碎事三十三卷知泉州建安葉廷圭撰皇朝事實類苑二十六卷知吉州江少虞撰紹興中人其書亦可入小説類兩漢蒙求十卷樞密吳興劉珏希范撰紹聖中所序補注蒙求八卷徐子光撰以李翰蒙求句為之注本句之外兼及其人他事羣書類句十四卷三山葉鳳撰以羣書新語增廣自五字以至九字為七百五十一門各以平仄聲為偶對書林韻會一百卷無名氏蜀書坊所刻規模韻類題選而加詳焉幼學須知五卷餘姚孫應符仲潛撰次此書本書坊所為以教小學應符從而增廣之兩漢博聞二十卷無名氏或云楊侃班左誨蒙三卷程俱致道撰左氏摘奇十三卷案文獻通考作十二卷給事中吳郡胡元質長文撰諸史提要十五卷參政吳越錢端禮處和撰泛然鈔録無義類漢雋十卷括蒼林越撰以西漢書分類為十五篇案文獻通考作五十篇皆句字之古雅者雋者取雋永之義也文選雙字類要三卷蘇易簡撰摘取雙字以類編集選腴五卷天台王若撰以五聲韻編集文選中字淳熙元年序晉史屬辭三卷永嘉戴迅簡之撰用蒙求體以類晉事元祐癸酉歲也觀史類編六卷吕祖謙撰初輯此篇為六門曰擇善曰警戒曰閫範曰治體曰論議曰處事而閫範最先成既别行今惟五門而論議分上下卷帝王經世圖譜十卷著作佐郎金華唐仲友與正撰凡天文地理禮樂刑政隂陽度數兵農王霸本之經典兼采傳注類聚羣分凡百二十二篇經子法語二十四卷左傳法語六卷史記法語十八卷西漢法語二十卷後漢精語十六卷三國精語六卷晉書精語五卷南史精語十卷洪邁撰自博聞誨蒙漢雋摘奇提要及此法語諸書皆所以備遺忘而洪氏多取句法漢雋類例有倫餘皆隨筆信意鈔録者也遷史刪改古書異辭十二卷倪思撰以遷史多易經語更簡嚴為平易體當然也然易辭而失其義書事而與經異者多不可以無考故為是編經之外與他書異者亦并載焉案原本更字以下俱闕注云元本闕今據文獻通考補入馬班異辭三十五卷倪思撰以班史仍史記之舊而多刪改大扺務趨簡嚴然或刪而遺其事實或改而失其本意因其異則可以知其筆力之優劣而又知作史述史之法矣杜詩六帖十八卷建安陳應行季陵撰用白氏門類編類杜詩語錦繡萬花谷四十卷續四十卷序稱淳熙十五年作而不著名氏門類無倫理序文亦拙趙氏家孰蒙求二十五卷宗室蒙求三卷趙彥絟撰直齋書録解題卷十四
