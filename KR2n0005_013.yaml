body:
  text: 直齋書録解題卷十三宋陳振孫撰醫書類黄帝内經素問二十四卷黄帝與岐伯問答三墳之書無傳尚矣此固出於後世依託要是醫書之祖也唐太僕令王冰注案新舊唐書俱作氷通考誤作砯自號啓元子案漢志但有黄帝内外經至隋志乃有素問之名又有全元起素問注八卷嘉祐中光録卿林億國子博士髙保衡承詔校定補注亦頗采元起之說附見其中其為篇八十有一王砯者寳應中人也難經二卷案文獻通攷作五卷渤海秦越人撰濟陽丁徳用補注漢志亦但有扁鵲内外經而已隋志始有難經唐志遂題云秦越人皆不可攷徳用者乃嘉祐中人也序言太醫令吕廣重編此經而楊元操復為之注覽者難明故為補之且間為之圖八十一難分為十三篇而首篇為診候最詳凡二十四難蓋脉學自扁鵲始也難當作去聲讀脉訣機要三卷晉太醫令髙平王叔和撰通真子注并序不著名氏熙寧以後人也脉要新括一卷案宋史藝文志作二卷通真子撰以叔和脉訣有臲卼鄙俗處疑非叔和作以其不類故也乃作歌百篇案經為注又自言嘗為傷寒括要六十篇其書未之見傷寒論十卷漢長沙太守南陽張機仲景撰建安中人其文辭簡古奥雅又名傷寒卒病論凡一百一十二方古今治傷寒者未有能出其外也金匱要畧三卷案文獻通攷作金匱玉函經八卷張仲景撰王叔和集林億等校正此書王洙於館閣蠧簡中得之曰金匱玉函要畧方上卷論傷寒中論雜病下載其方并療婦人乃録而傳之今書以逐方次於證候之下以便檢用所論傷寒文多節畧故但取雜病以下止服食禁忌二十五篇二百六十二方而仍其舊名中蔵經一卷漢譙郡華陀元化撰其序稱應靈洞主少室山鄧處中自言為華先生外孫莫可攷也巢氏病源論五十卷案文獻通攷作巢氏病源候論五卷隋太醫博士巢元方等撰大業六年也惟論病證不載方藥今案千金方諸論多本此書業醫者可以叅攷聖濟經十卷政和御製辟廱學生昭武吳禔注醫門玉髓一卷不知作者皆為歌訣論五蔵六腑相傳之理醫經正本書一卷知進賢縣沙隨程迥可久撰専論傷寒無傳染以救薄俗骨肉相棄絕之敝醫說十卷新安張杲李明撰案文獻通攷杲作景食治通說一卷東虢婁居中撰臨安藥肆金藥臼者有子登第以恩得初品官趙忠定丞相䟦其後書凡六篇案文獻通攷作十六篇大要以為食治則身治此上工醫未病之一術也治病須知一卷不知名氏専論外證以用藥之次第為不能脉者設也五運指掌賦圗一卷葉玠撰大觀本草三十一卷唐慎微撰不知何人仁和縣尉艾晟作序名曰經史證類本草案本草之名始見漢書平帝紀樓䕶傳舊經止一卷藥三百六十五種陶隠居増名醫别録亦三百六十五種因注釋為七卷唐顯慶又増一百十四種廣為二十卷謂之唐本草開寳中又益一百三十三種蜀孟㫤又嘗増益謂之蜀本草及嘉祐中掌禹錫林億等重加校正更為補注以朱墨書為之别凡新舊藥一千八十二種蓋亦備矣今慎㣲頗復有所増益而以墨蓋其名物之上然亦殊不多也本草衍義十卷案文獻通攷作本草廣義二十卷通直郎宼宗奭撰援引辨證頗可觀采紹興校定本草二十二卷醫官王繼先等奉詔撰紹興二十九年上之刻板修内司每藥為數語辨說淺俚無髙論本草節要三卷明堂鍼灸經二卷膏肓灸法二卷清源莊綽季裕集肘後百一方三卷晉葛洪撰梁陶隠居増補本名肘後救卒方率多易得之藥凡八十六首陶併七首加二十二首共為一百一首取佛書人有四大一大輙有一百一病之義名之千金方三十卷唐處士京兆孫思邈撰自為之序名曰千金備急要方以為人命至重有貴千金一方濟之徳踰於此其前類例數十條林億等新纂千金翼方三十卷孫思邈撰千金方既成恐其或遺也又為此以翼之亦自為序其末兼及禁術用之亦多驗外臺秘要方四十卷唐鄴郡太守王燾撰案原本誤作夀今據文獻通攷改正自為序天寳十一載也其書博采諸家方論如肘後千金世尚多有之至於小品深師崔氏許仁則張文仲之類今無傳者猶間見於此書大凡醫書之行於世皆仁廟朝所校定也按㑹要嘉祐二年置校正醫書局於編修院以直集賢院掌禹錫林億校理張洞校勘蘇頌等並為校正後又命孫竒髙保衡孫兆同校正每一書畢即奏上億等皆為之序下國子監板行并補注本草修圖經千金翼方金匱要略傷寒論悉從摹印天下皆知學古方書嗚呼聖朝仁民之意溥矣按補注本草以下數句原本有脱誤今據文獻通攷校補太平聖惠方一百卷太平興國七年詔醫官使尚藥奉御王懐隠按宋史藝文志作王懐徳等編集御製序文淳化三年書成王氏博濟方三卷案文獻通攷作五卷太原王衮撰慶厯七年序藥凖一卷潞公文彦博寛夫撰所集方纔四十首以為依本草而用藥則有凖故以此四十方為處方用藥之凖也孫氏傳家祕寳方三卷尚藥奉御太醫令孫用和集其子殿中丞兆父子皆以醫名自昭陵時迄於熙豐無能出其右者元豐八年兆弟宰為河東漕屬吕恵卿帥并従宰得其書序而刻之兆自言為思邈之後晁氏讀書志作孫尚祕寳方凡十卷靈苑方二十卷沈括存中撰蘇沈良方十卷蘇者東坡沈即存中也不知何人所録其間辨雞舌香一段言靈苑所辨猶有未盡者館閣書目别有沈氏良方十卷蘇沈良方十五卷而無靈苑方正俗方一卷知䖍州長樂劉彛執中撰以䖍俗信巫無醫藥集此方以教之奉親養老書一卷泰州興化令陳直撰案文獻通攷直作真元豐中人養生必用書三卷案文獻通攷作十六卷靈泉山初虞世和甫撰紹聖丁丑序尊生要訣二卷即初虞世四時常用要方有廬山陳淮者復附益焉龎氏家蔵祕寳方五卷蘄水龎安時安常撰安時以醫名世所著書傳於世者惟傷寒論而已此書南城吳炎晦父録以見遺傷寒㣲旨論二卷不著作者序言元祐丙寅必當時名醫也其書頗有發明錢氏小兒藥證真訣三卷太醫丞東平錢乙仲陽撰宣教郎大梁閻季忠集上卷言證中卷叙嘗所治病下卷為方季忠亦頗附以已説且以劉斯立所作仲陽傳附於末宣和元年也小兒班疹論一卷東平董汲及之撰錢乙元祐癸酉題其末脚氣治法一卷董汲撰指迷方三卷考城王貺子亨撰吳丞相敏為之序貺為南京名醫宋毅叔之壻宣和中以醫得幸至朝請大夫傷寒救俗方一卷寧海羅適正之尉桐城民俗惑巫不信藥羅以藥施人多愈遂以方書召醫叅校刻石以救迷俗紹興中有王世臣彦輔者序之以傳南陽活人書十八卷按文獻通攷作二十卷朝奉郎直秘閣吳興朱肱翼中撰以張仲景傷寒方論各以𩔖聚為之問答本號無求子傷寒百問方有武夷張蔵作序易此名仲景南陽人而活人者本華陀語也肱祕丞臨之子中書舍人服之弟亦登進士科九籥衛生方三卷宣和宗室忠州防禦使士紆撰治風方一卷張耒文潛所傳凡三十二方小兒醫方妙選三卷成安大夫恵州團練使張渙撰凡四百二十方渙五世為小兒醫未嘗改科靖康元年自為之序雞峯備急方一卷太醫局教授張銳撰紹興三年為序大抵皆單方也産育保慶集一卷濮陽李師聖得産論二十一篇有其說而無其書醫學教授郭稽中以方附諸論之末遂為全書近時括蒼陳言嘗評其得失於三因方婺醫杜荍者又附益之頗為詳備本事方十卷維揚許叔㣲知可撰紹興三年進士第六人以藥餌隂功見於夢寐事載夷堅志晚嵗取平生已試驗之方併記其事實以為此書取本事詩詞之例以名之傷寒歌三卷許叔㣲撰凡百篇皆本仲景法又有治法八十一篇及仲景脉法三十六圖翼傷寒論二卷辨類五卷皆未見指南方二卷蜀人史堪載之撰凡三十一門各有論楊氏方二十卷樞密楊倓子靖以家蔵方一千一百十有一首刻之當塗世多用之本草單方三十五卷工部侍郎宛丘王俁碩父撰取本草諸藥條下所載單方以門類編之凡四千二百有六方何氏方二卷太常博士括蒼何偁徳揚撰洪氏方一卷鄱陽洪氏莫氏方一卷刑部郎中吳興莫伯虚致道刻博濟方於永嘉而以其家蔵經驗方附於後備急總效方四十卷知平江府溧陽李朝正撰大抵皆單方也是齋百一選方三十卷山隂王璆孟玉撰百一者言其選之精也三因極一方六卷括蒼陳言無擇撰三因者内因外因不内外因其說出金匱要略其所述方論往往皆古書也小兒保生方三卷左司郎姑孰李檉興㡬撰傷寒要旨二卷李檉撰列方於前而類證於後皆不外仲景漢東王氏小兒方三卷案文獻通攷作二卷不著名幼幼新書五十卷直龍圗閣知潭州劉昉方明撰集刋未畢而死徐璹夀卿以漕攝郡趣成之大衍方十二卷朝散大夫孫紹逺稽仲撰凡藥當豫備者四十九種故名大衍所在易得者不與焉諸方附於後海上方一卷不著名氏括蒼刻本館閣書目有此方云乾道中知䖏州錢竽編集效方一卷南康守李觀民集胎産經驗方一卷陸子正撰集葉氏方三卷太社令延平葉大㢘撰胡氏方一卷不著名傳信適用方二卷稱拙庵吳彦䕫淳熙庚子陳氏手集方一卷建安陳抃選竒方十卷後集十卷青田余綱堯舉撰傷寒瀉痢要方一卷直龍圖閣長樂陳孔碩膚仲撰湯氏嬰孩妙訣二卷東陽湯衡撰衡之祖民望精小兒醫有子曰麟登科衡麟之子克邃祖業為此書九十九篇太平恵民和劑局方六卷案文獻通攷作十卷宋史藝文志作五卷庫部郎中陳師文等校正凡二十一門二百九十七方其後時有増補諸家名方二卷福建提舉司所刋市肆常貨而局方所未收者易簡方一卷永嘉王碩徳膚撰増損方三十首㕮咀藥三十品市肆常貨圓子藥十種以為倉卒應用之備其書盛行於世四時治要方一卷永嘉屠鵬時舉撰専為時疾瘧痢吐瀉傷寒之類雜病不與焉治竒疾方一卷夏子益撰凡三十八道皆竒形怪證世間所未見者傷寒證類要畧二卷玉鑑新書二卷汴人平堯卿撰専為傷寒而作皆仲景之舊也亦别未有發明瘡疹證治一卷金華謝天錫撰産寳諸方一卷不著名氏集諸家方而以十二月産圗冠之纂要備急諸方一卷不知何人集皆倉卒危急所須藥及雜術也摘要方一卷傷寒十勸及危證十病末載托裏十補散方劉涓子神仙遺論十卷東蜀刺史李頔録按中興書目引崇文總目云宋龔慶宣撰劉涓子者晉末人於丹陽縣得鬼遺方一卷皆治癰疽之法慶宣得而次第之今按唐志有龔慶宣劉涓子男方十卷未知即此書否卷或一板或止數行名為十卷實不多也衛濟寳書一卷稱東軒居士不著名氏治癰疽方也外科保安方三卷知興化軍亳社張允蹈家蔵方龔參政茂良劉太史夙為之序跋五發方論一卷不知名氏亦吳晦父所録李氏集驗背疽方一卷泉江李迅嗣立撰凡五十二條其論議詳盡曲當直齋書録解題卷十三
