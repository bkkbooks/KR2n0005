body:
  text: 直齊書録解題卷十九宋陳振孫撰詩集類上凡無他文而獨有詩及雖有他文而詩集復獨行者别為一類阮步兵集四卷魏步兵校尉陳留阮籍嗣宗撰其題皆曰詠懷首卷四言十三篇餘皆五言八十篇通為九十三篇文選所收十七篇而已宋武帝集一卷孝武駿也梁簡文帝集五卷簡文帝綱也按隋志八十五卷唐已缺五卷中興書目止存一卷詩百篇又缺其三首今五卷皆詩總二百四十四篇梁元帝詩一卷即湘東王繹謝惠連集一卷宋司徒參軍謝惠連撰本集五卷今惟詩二十四首惠連得名早輕薄多尤纍故仕不顯死時財三十七歲劉孝綽集一卷梁祕書監彭城劉孝綽撰宋僕射勔之孫本傳稱文集數十萬言今所存止此又言兄弟及羣從子姪當時有七十人並能屬文近古未有其三妹亦並有才學適徐悱者文尤清拔所謂劉三娘者也今玉臺集中有悱妻詩栁吳興集一卷梁吳興太守河東栁惲文暢撰僅有十八首徐孝穆集一卷陳太子太傅東海徐陵孝穆撰本傳稱其文喪亂散失存者二十卷今惟詩五十餘篇江總集一卷陳尚書令考城江總總持撰總在陳為太子詹事以宫禁為長夜之飲及後主即位當權任日為艷詩君臣昏亂以至亡國入隋為上開府唐志集三十卷中興書目七卷今惟存詩僅百首云陰鑑集一卷陳散騎常侍南平陰鏗子堅撰財三十餘篇杜子美云李侯有佳句往往似陰鏗今考之未見鏗之所以似太白者太白固未易似也子美云爾殆必有說薛道衡集一卷隋內史侍郎河東薛道衡元卿撰詩凡十九篇本集三十卷所存止此大抵隋以前文集存全者亡幾多好事者於類書中鈔出以備家數也杜必簡集一卷唐著作郎襄陽杜審言必簡撰工部之祖也唐初沈宋以來律詩始盛行然未以平側失眼為忌審言詩雖不多句律極嚴無一失粘者甫之家傳有自來矣然遂欲衙官屈宋則不可也薛少保集一卷唐太子少保河東薛稷嗣通撰稷道衡曾孫魏徵外孫喬知之集一卷唐右司郎喬知之撰天授中為酷吏所陷死集中有緑珠怨蓋其所由以致禍也孟襄陽集三卷唐進士孟浩然撰宜城王士源序之凡二百十八首分為七類太常卿韋縚為之重序崔皓集一卷唐司勳員外郎崔皓撰開元十年進士才俊無行黃鶴樓詩盛傳于世祖詠集一卷唐祖詠撰開元十二年進士崔國輔集一卷唐集賢直學士禮部員外郎崔國輔撰開元十三年進士應縣令舉為許昌令天寶中加學士後以王鉷近親坐貶詩凡二十八首臨海李氏本後又得石林葉氏本多六首綦母潛集一卷唐待制集賢院南康綦母潛孝通撰南康今贛州儲光羲集五卷唐監察御史魯國儲光羲撰與崔國輔綦毋潛皆同年進士天寶末任僞官貶死顧况為集序常建集一卷唐盱眙尉常建撰王江寧集一卷唐龍標尉江寧王昌齡少伯撰與常建俱開元十四年進士二十二年選宏辭超絶羣類為泛水尉不護細行貶龍標世亂還里為刺史閭邱曉所殺為詩緒密而思清李頎集一卷唐李頎撰開元二十三年進士崔曙集一卷唐崔曙撰開元二十六年進士狀頭杜工部詩集注三十六卷蜀人郭知達所集九家注世有稱東坡杜詩故事者隨事造文一一牽合而皆不言其所自出且其辭氣首末若出一口蓋妄人依托以欺亂流俗者書坊輒勦入集注中殊敗人意此本獨削去之福清曾噩子肅刻板五羊漕司最為善本門類杜詩二十五卷稱東萊徐宅居仁編次未詳何人類集詩史三十卷莆陽方醇道溫叟編王季友集一卷唐王季友撰元結篋中集有季友詩二首今此集有七篇而篋中二首不在焉杜詩所謂酆城客子王季友者意即其人耶陶翰集一卷唐禮部員外郎丹陽陶翰撰開元十八年進士次年鴻詞秦隱君集一卷唐處士秦系公緒撰系自天寶間有詩名藩鎮奏辟皆不就嘗隱越之剡泉之南安至貞元中年八十餘不知所終此本南安所刻余又嘗於宋次道寶刻叢章得其逸詩二首書册末岑嘉州集八卷唐嘉州刺史南陽岑參撰文本之曾孫案唐書岑參乃岑文本之曾孫原本脫文本二字今補正天寶三載進士為補闕左史郎官與杜甫唱和李嘉祐集一卷唐台州刺史李嘉祐從一撰天寶七載進士亦號臺閣集李肇稱其水田飛白鷺夏木囀黃鸝之句王維取之以為七言今按此集無之皇甫冉集一卷案唐書藝文志作三卷唐左補闕丹陽皇甫冉茂政撰與其弟曾齊名集有獨孤及序皇甫曾集一卷唐侍御史皇甫曾孝常撰天寶十二載進士兄冉後曾三載登第郎士元集一卷唐郢州刺史中山郎士元君胄撰天寶十五載進士寶應中選畿縣官肅宗詔試中書補渭南尉歷拾遺刺史案唐書士元於寶應元年選畿縣官詔試中書補渭南尉歷拾遺郢州刺史原本脫誤今改正包何集一卷唐起居舍人延陵包何幼嗣撰案唐書包何字幼嗣原本作幼正今改正何融之子與弟佶齊名包佶集一卷唐祕書監包佶撰天寶六載進士兄何後一年錢考功集十卷唐考功員外郎吳興錢起撰天寶十載進士世所傳湘靈鼓瑟詩斷句用鬼語者即其試作也蜀本作前後集十三卷韓翃集五卷唐中書舍人韓翃君平撰天寶十三載進士以春城飛花之句受知德宗顧况集五卷唐著作郎吳郡顧况逋翁撰至德二載進士皇甫湜作序湜嘗言吾自為顧况作序未嘗許他人况在唐蓋為人推重也集本十五卷案唐書藝文志作二十卷今止五卷不全嚴維集一卷唐祕書郎山陰嚴維正文撰至德二載辭藻宏麗科韋蘇州集十卷唐韋應物京兆人天寶時為三衛後作洛陽丞京兆府功曹知滁江二州召還或媢其進媒孽之計出為蘇州刺史詩律自沈宋以後日益靡嫚鎪章刻句揣合浮切雖音韻諧婉屬對麗密而間雅平淡之氣不存矣獨應物之詩馳驟建安以還得其風格云耿湋集二卷唐右拾遺河東耿湋撰寶應二年進士登科記一作緯司空文明集二卷唐虞部郎中京兆司空曙文明撰别本一卷財數篇李端集三卷唐杭州司馬趙郡李端撰大歷五年進士盧綸集十卷唐戶部郎中河東盧綸允言撰綸與吉中孚錢起韓翃司空曙苖發崔峒耿湋夏侯審李端皆有詩名號大歷十才子李益集二卷唐集賢學士右散騎常侍李益君虞撰益宰相揆之族子大歷四年進士歌詩與宗人賀齊名舊史本傳稱其少有癡病防間妻妾過於苛酷有散灰扃戶之說聞於時故時謂妒癡為李益疾按世傳霍小玉傳所謂李十郎詩開簾風動竹疑是故人來者即益也舊史所載如此豈小玉將死訣絶之言果驗耶抑好事者因其有此疾遂為此說以實之也孟東野集一卷唐溧陽尉孟郊東野撰朱放集一卷唐右拾遺吳郡朱放長通撰按藝文志云襄州人隱居剡溪貞元初召為右拾遺不就朱灣集一卷案唐書藝文志作四卷唐永平從事朱灣撰自號滄州其為從事李勉辟之也麴信陵集一卷唐望江令麴信陵撰貞元元年進士長孫佐輔集一卷唐長孫佐輔撰按百家詩選云德宗時人其弟公輔為吉州刺史往依焉當必有所據也其詩號古調集栁宗元詩一卷唐栁宗元撰子厚詩在唐與王摩詰韋應物相上下頗有陶謝風氣古律絶句總一百四十五篇在全集中不便於觀覽因鈔出别行張籍集三卷案唐書藝文志作七卷唐國子司業張籍文昌撰川本作五卷木鐸集十二卷張洎所編錢公輔名木鐸集與他本相出八亦有他本所無者張司業集八卷附録一卷湯中季庸以諸本校定且考訂其為吳郡人魏峻叔高刻之平江續又得木鐸集凡他本所無者皆附其末王建集十卷唐陜州司馬王建仲和撰建長於樂府與張籍相上下大歷十年進士也歷官昭應縣丞太和中為陜州司馬尤長宫詞王建宫詞一卷即集中第十卷録出别行李長吉集一卷案唐書藝文志作五卷文獻通考亦云集四卷外集一卷唐奉禮郎李賀長吉撰賀不夀仕不顯而世多喜言其人此不復叙盧同集三卷唐處士洛陽盧同撰自號玊川子其詩古怪而女兒曲小婦吟有所思諸篇輒嫵媚豔冶其第三卷號集外詩凡十首慶歷中有韓盈者為之序川本止前二卷劉義集二卷唐處士劉義撰案唐書附見韓愈傳者乃劉義也作氷柱雪車二詩出盧同孟郊右有集二卷原本作劉義今改正附見新史韓愈傳不知何處人但云歸齊魯不知所終而已其氷柱雪車二詩狂怪誠出盧同右然豈風人之謂哉楊少尹集五卷案唐書藝文志文獻通考俱作一卷唐河南少尹楊巨源景山撰按韓退之有送楊少尹序蓋自司業為少尹稱其都少尹者乃其鄉里也藝文志乃云太和河中少尹誤案唐詩紀事揚巨源蒲州人為國子司業時年滿七十丐歸時宰惜其去署以為其都少尹不絶其祿張籍有送楊少尹赴河中詩云官為本府當身榮因得還鄉任野情則為河中少尹無疑陳氏稱河南少尹反以河中為誤非也又考韓愈送楊少尹序乃在長慶中唐詩紀事稱為大中時固非唐志稱為太和中亦疑誤也第三卷末二十餘篇有目無詩武元衡集一卷唐宰相武元衡伯蒼撰初用莆田李氏本傳録後以石林葉氏本校益以六首及李吉甫唱酬六首川本作二卷張碧歌詩集一卷案唐書藝文志作張碧歌行集二卷唐張碧太碧撰藝文志云貞元時人集中有覽貫休上人詩或勦入之也陳羽集一卷唐東宫衛佐陳羽撰貞元八年陸贄下第二人羊士諤集一卷唐侍御史羊士諤撰貞元元年進士竇羣引為御史共傾李吉甫者也鮑溶集五卷唐鮑溶撰元和四年進士竇拾遺集一卷唐左拾遺扶風竇叔向撰包何為序案竇叔向集包何為之序原本作包行誤今改正羣常牟庠鞏皆其子也賈長江集十卷唐長江尉范陽賈島閬仙撰韓退之有送無本詩即其人也後返初服舉進士不第文宗時坐飛謗貶長江會昌初以普州參軍卒案唐書賈島會昌初以普州司倉參軍遷司戶未受命卒原本作晉州今改正本傳所載如此今遂寧刋本首載大中墨制云比者禮部奏卿風狂且養疾關外今却攜卷軸潛至京城遇朕微行聞卿諷詠觀其志業可謂屈人是用顯我特恩賜卿墨制宜從短簿别俟殊科與傳所稱誹謗不同蓋宣宗好微行小說載島應對忤㫖好事者撰此制以實之安有微行而顯著訓詞者首稱奏卿風狂尤為可笑當以本傳為正本傳亦據墓志也唐貴進士科故志言責授長江如溫飛卿亦謫方城尉當時謂鄉貢進士不博上州刺史則簿尉固宜謂之責授若使今世進士得罪而責授簿尉則惟恐責之不早耳姚少監集十卷唐祕書少監姚合撰崇之曾孫也元和十一年進士嘗為杭州刺史開成末終祕書監川本卷數同編次異莊南傑集一卷唐進士莊南傑撰與賈島同時李涉集一卷唐國子太學博士李涉撰渤之弟也殷堯藩集一卷唐侍御史殷堯藩撰元和元年進士案唐書作元和九年進士章孝標集一卷唐祕書省正字章孝標撰元和十四年進士熊孺登集一卷唐西川從事熊孺登撰元和中人執易其從姪也西山集一卷案唐書藝文志作十卷唐施肩吾撰元和十五年進士雍裕之集一卷唐雍裕之撰未詳何時人張南史集一卷唐試參軍范陽張南史季直撰王涯集一卷唐宰相王涯廣津撰袁不約集一卷唐袁不約還朴撰長慶三年進士其年試麗龜賦追昔遊編三卷唐宰相李紳公垂撰皆平生歷官及遷謫所至述懷紀遊之作也余嘗書其後云讀此編見其飾智矜能誇榮殉勢益知子陵元亮為千古高人朱景元集一卷唐太子諭德朱景元撰朱慶餘集一卷唐朱可久慶餘撰以字行受知於張籍寶歷二年進士李義山集三卷唐太學博士李商隱義山撰溫飛卿集七卷唐方城尉溫庭筠飛卿撰張祜集十卷案唐書藝文志作一卷唐處士張祜承吉撰丁卯集二卷唐郢州刺史丹陽許渾用晦撰太和五年進士案朝公武讀書志作太和六年進士丁卯者其所居之地有丁卯橋蜀本又有拾遺二卷李逺集一卷唐建州刺史李逺求古撰于鵠集一卷唐于鵠撰與張籍同時未詳其人薛瑩集一卷唐薛瑩撰號洞庭集文宗時人集中多蜀詩其曰壬寅歲者在前則為長慶四年後則為中和二年未知定何年也薛逢集一卷案唐書藝文志作十卷唐祕書監薛逢陶臣撰會昌元年進士喻鳧集一卷唐鳥程尉喻鳧撰開成五年進士潘咸集一卷唐潘咸撰不知何人與喻鳧同時藝文志不載項斯集一卷唐丹徒尉江東項斯子遷撰初受知於張籍水部而楊敬之祭酒亦知之有逢人說項斯之句會昌四年進士渭南集一卷案唐書藝文志作三卷唐渭南尉趙嘏承祐撰壓卷有長笛一聲人倚樓之句當時稱為趙倚樓馬戴集一卷唐馬戴虞臣撰以上二人皆會昌五年進士薛許昌集十卷唐許昌節度使薛能撰會昌六年進士李羣玉集三卷唐宏文校書灃陽李羣玉文山撰裴休以處士薦集後有乞假歸别業及朝士送行詩曹鄴集一卷唐洋州刺史曹鄴撰大中四年進士津陽門詩一卷唐鄭嵎撰大中五年進士或作愚者非也愚嘗為嶺南節度好著錦半臂者非此鄭嵎也津陽者華清宫門名劉駕集一卷唐劉駕司南撰大中六年進士李頻集一卷唐建州刺史新定李頻德新撰大中八年進士姚合之壻也李端公集一卷唐侍御史李郢楚望撰大中十年進士儲嗣宗集一卷唐儲嗣宗撰大中十三年進士案儲嗣宗大中十三年進士原本作十年係脫誤今改正司馬先輩集一卷唐司馬札撰與儲嗣宗同時李廓集一卷唐武寧節度李廓撰程之子也案唐書李程子名廓原本作廊誤今改正于濆集一卷唐于濆子漪撰案唐書藝文志作于濆集一卷濆字子漪原本作于瀆誤今改正咸通二年進士李昌符集一卷唐膳部員外郎李昌符撰咸通四年進士司空表聖集十卷唐兵部侍郎司空圖表聖撰咸通十年進士别有全集此集皆詩也其子永州刺史荷為後記聶夷中集一卷唐華陰尉聶夷中撰咸通十二年進士許棠集一卷唐宛陵許棠文化撰亦咸通十二年進士林寬集一卷唐林寬撰與李頻許棠皆同時集有送二人詩周繇集一卷唐周繇撰咸通十三年進士無譏集四卷唐崔櫓撰僖宗時人章碣集一卷唐章碣撰亦僖宗時人高蟾集一卷唐御史中丞高蟾撰乾符三年進士崔塗集一卷唐崔塗禮山撰光啓四年進士雲臺編三卷唐都官郎中宜春鄭谷守愚撰光啓三年進士香奩集二卷入內廷後詩集一卷别集三卷唐翰林學士韓偓致光撰唐英集三卷唐翰林學士吳融子華撰融與偓皆龍紀元年進士張蠙集一卷唐張蠙象文撰乾寧二年進士靈溪集七卷唐校書郎上饒王貞白有道撰乾寧二年進士其集有自序永豐人有藏之者洪景盧得而刻之詩雖多在一時儕輩未為工也翁承贊集一卷唐諫議大夫京兆翁承贊文堯撰乾符二年進士褚載集一卷案唐書藝文志作三卷唐褚載厚之撰王轂集一卷唐王轂虛中撰二人皆乾寧五年進士浣花集一卷蜀韋莊撰唐乾寧元年進士也王駕集一卷案唐書藝文志作六卷唐彭城王駕大用撰大順元年進士自號守素先生喻坦之集一卷唐喻坦之撰張喬集二卷唐進士九華張喬撰喬與許棠張蠙鄭谷喻坦之等同時號十哲喬試京兆月中桂詩擅場傳於今而登科記無名蓋不中第也高駢集一卷唐淮南節度使高駢撰周賀集一卷唐用賀撰嘗為僧名清塞後反初服别本又號清塞集李洞集一卷唐李洞撰與張喬同時稱餘杭明經潘熙載編曹唐集一卷唐桂林曹唐堯賓撰有大小游仙詩來鵬集一卷唐豫章來鵬撰咸通中舉進士不第任藩集一卷唐任藩撰或作翻客居天台有宿帢幘山絶句為人所稱今城中巾子山也元英集十卷唐處士新定方干撰唐風集三卷案朝公武讀書志作十卷唐九華山人杜荀鶴撰詠史詩三卷唐邵陽胡曾撰凡一百五十首曾咸通末為漢南從事羅江東集十卷唐羅隱昭諫撰劉滄集一卷唐進士劉滄藴靈撰羅鄴集一卷唐羅鄴撰曹松集一卷案唐書藝文志作三卷唐曹松夢徵撰天復元年進士别本與印本互有詳略但别本大遊仙十三首乃曹唐詩也比紅兒詩一卷唐鄜州從事羅虬撰紅兒者雕隂官妓杜也唐彥謙集一卷案唐書藝文志作三卷唐河中節度副使襄陽唐彥謙茂業撰號鹿門先生秦韜玉集一卷唐秦韜玊撰東浮集九卷唐荆南崔道融撰自稱東甌散人乾寧乙卯永嘉山齊編成蓋避地於此今缺第十卷唐詩三卷崔道融撰皆四言詩述唐中世以前事實事為一篇篇各有小序凡六十九篇裴說集一卷唐裴說撰天祐三年進士狀頭唐蓋將亡矣說後為禮部員外郎世傳其寄邊衣古詩甚麗此集無之僅有短律而已非全集也其詩有避亂一身多之句劉得仁集一卷唐進士劉得仁撰公主之子纍舉不第而卒唐求集一卷唐唐求撰與顧非熊同時藝文志不載李山甫集一卷唐魏博從事李山甫撰唐末進士不第邵謁集一卷唐國子生曲江邵謁撰集後有胡賓王者為之序言其沒後降巫賦詩自稱邵先輩殆若今世請大仙之類耶李推官披沙集六卷唐李咸用撰其八世孫兼孟達居宛陵亦能詩嘗為台州出其家集求楊誠齊作序于武陵集一卷周濆集一卷陳光集一卷劉威集一卷以上皆唐人于武陵大中進士案此句原本脫漏今據文獻通考補入餘莫詳出處濆集藝文志不載殷文圭集一卷唐殷文圭撰乾寧五年進士後仕南唐其子曰崇義歸朝更姓名即湯悅也盧士衡集一卷後唐盧士衡撰天成二年進士劉昭禹集一卷湖南天策府學士桂陽劉昭禹撰熊皎屠龍集一卷五代晉九華熊皎撰後唐淸泰二年進士集中多下第詩蓋老於場屋者符䝉集一卷題符侍郎同光三年進士也同年四人蒙初為狀頭覆試為第四李建勳集一卷案高柄唐詩品彚作三卷南唐宰相李建􅈴撰孟賓于集一卷五代進士孟賓于撰仕湖南江南廖匡圖集一卷湖南從事廖匡圖撰江為集一卷五代建安江為撰為為王氏所誅當漢乾祐中劉乙集一卷似唐末五代人藝文志不載其詩怪而不律亦不上文丙集一卷稱布衣文丙未詳何人蔣吉集一卷蘇拯集一卷案文獻通考作蘇拯原木作極誤今改正王周集一卷皆未詳何人顧非熊集一卷唐盱眙主簿顧非熊撰案唐書顧非熊大中盱眙主簿原木誤作台州今改正况之子會昌五年進士吳興集一卷唐僧吳興謝皎然淸晝撰康樂十世孫顔魯公為刺史與之唱酬其後刺史于頔為作集序所居龍興寺之西院今天寧寺是也又嘗居杼山寺靈一集一卷唐僧與皇甫曾同時無可集一卷唐僧賈無可撰島弟也禪月集十卷案唐詩紀事作西嶽集十卷文獻通考作寶月詩一卷此本作禪月集者貫休號禪月上人因名其集也唐僧蘭溪貫休撰姓姜氏後入蜀白蓮集十卷唐僧齊已撰長沙胡氏棲白集一卷修睦東林集一卷尚顔供奉集一卷皆唐僧貫休而下盡唐末人也薛濤集一卷唐成都妓女薛濤撰字洪度號薛校書世傳奏授恐無是理殆一時州鎮褒借為戲如今世白帖借補之類耶濤得年最長至近八十李季蘭集一卷唐女冠與劉長卿同時相譏調之語見中興間氣集魚元機集一卷唐女冠坐妒殺女婢抵死余嘗言婦女從釋入道有司不禁亂禮法敗風俗之尤者原注事見補妬記直齊書録解題卷十九
