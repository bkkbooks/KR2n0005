body:
  text: 直齋書録解題卷十五宋陳振孫撰楚辭類楚辭十七卷漢䕶都水使者光禄大夫劉向集後漢校書郎南郡王逸叔師注知饒州曲阿洪興祖慶善補注逸之注雖未能盡善而自淮南王安以下為訓傳者今不復存其目僅見於隋唐志獨逸注幸而尚傳興祖從而補之於是訓詁名物詳矣離騷釋文一卷古本無名氏洪氏得之呉郡林虙徳祖其篇次不與今本同今本首騷經次九歌天問九章逺遊卜居漁父九辨招魂大招惜誓招隠七諫哀時命九懐九歎九思釋文亦首騷經次九辨而後九歌天問九章逺遊卜居漁父招隠士招魂九懐七諫九歎哀時命惜誓大招九思洪氏按王逸九章注云皆解於九辨中則釋文篇第葢舊本也後人始以作者先後次序之耳朱侍講按天聖十年陳説之序以為舊本篇第混并乃考其人之先後重定其篇第然則今本説之所定也余按楚辭劉向所集王逸所注而九歎九思亦列其中葢後人所益也歟楚辭考異一卷洪興祖撰興祖少時從栁展如得東坡手校楚辭十卷凡諸本異同皆兩出之後又得洪玉父而下本十四五家參校遂為定本始補王逸章句之未備者書成又得姚廷輝本作考異附古本釋文之後其末又得歐陽永叔孫莘老蘇子容本於關子東葉少協校正以補考異之遺洪於是書用力亦以勤矣案文獻通攷作補注楚辭十七卷攷異一卷晁公武曰凡王逸章句有未盡者補之自序云以歐陽永叔晁文元諸家參攷之為定本又得姚廷輝本作攷異此所云亦二書葢因補注已見前條故不復載然標題終為脱落也重定楚辭十六卷續楚辭二十卷變離騷二十卷禮部郎中濟北晁補之無咎撰去九思一篇入續楚辭定著十六卷篇次亦頗改易又不與陳説之本同續變二篇皆楚辭流派其曰變者又以其類離騷而少變也新序三篇述其意甚詳然其去取之際或有不可盡曉者楚辭贅説四卷右司郎宣城周紫芝少隠撰嘗為哀湘纍賦以反賈誼揚雄之説又為此書頗有發明楚辭集註八卷辨證二卷侍講建安朱熹元晦撰以王氏洪氏注或迂滯而逺於事情或迫切而害於義理遂别為之注其訓詁文義之外有當攷訂者則見於辨証所以祛前注之蔽陋而明屈子微意於千載之下忠魂義魄頓有生氣其於九歌九章尤為明白痛快至謂山海經淮南子殆因天問而著書説者反取二書以證天問可謂髙世絶識毫髮無遺恨者矣公為此注在慶元退歸之時序文所謂放臣棄子怨妻去婦葢有感而託者也其生平於六經皆有訓傳而其殫見洽聞發露不盡者萃見於此書嗚呼偉矣其篇第視舊本益賈誼二賦而去諫歎懷思屈子所著二十五篇為離騷而宋玉以下則曰續離騷其言七諫以下辭意平緩意不深切如無所疾痛而强為呻吟者尤名言也楚辭後語六卷朱熹撰凡五十二篇以晁氏續變二書刊定而去取則嚴而有意矣龍岡楚辭説五卷永嘉林應辰渭起撰以離騷章分段釋為二十段九歌九章諸篇亦隨長短分之其推屈子不死於汨羅比諸浮海居夷之意其説甚新而有理以為離騷一篇辭雖哀痛而意則宏放與夫直情徑行勇於踣河者不可同日語且其興寄髙逺登昆侖歴閬風指西海陟陞皇皆寓言也世儒不以為實顧獨信其從彭咸葬魚腹以為實者何哉然沈湘之事傳自司馬遷賈誼揚雄皆未嘗有異説漢去戰國未逺決非虚語也校定楚辭十卷翼騷一卷洛陽九詠一卷祕書郎昭武黄伯思長睿撰其序言屈宋諸騷皆書楚語作楚聲紀楚地名楚物故可謂之楚辭若些只羌誶蹇紛侘傺者楚語也悲壯頓挫或韻或否者楚聲也沅湘江澧修門夏首者楚地也蘭茝荃葯蕙若芷蘅者楚物也既以諸家本校定又以太史公屈原傳至陳説之序附以今序别為一卷目以翼騷洛陽九詠者伯思所作也總集類文選六十卷梁昭明太子蕭統徳施撰唐崇賢館學士江都李善注北海太守邕之父也六臣文選六十卷唐工部侍郎吕延祚開元六年表上號五臣集注五臣者常山尉吕延濟都水使者劉承祖男良處士張銑吕向李周翰也以李善注惟引事不説意義故復為此注後人併與李善原注合為一書名六臣注東坡謂五臣乃俚儒之荒陋者反不及善如謝瞻詩苛慝暴三殤引苛政猛於虎以父與夫為殤非是然此説乃實本於善也李善注此句但云苛猶虐也初不及三殤不審直齋之説何所本隨齊批注玉臺新詠十卷陳徐陵孝穆集且為作序古文苑九卷不知何人集皆漢以來遺文史傳及文選所無者世傳孫洙巨源於佛寺經龕中得之唐人所藏也韓無咎類次為九卷刻之婺州中興書目有孔逭文苑非此書孔逭晉人本書百卷惟存十九卷爾又梁孝王忘憂館諸士之賦據題尚欠文鹿酒几三賦家有秦漢遺文七賦皆在常州有板本案忘憂館七賦公孫詭為文鹿賦鄒陽作酒賦文鹿酒止兩賦耳古文苑少文鹿酒几三賦原本作尚欠文鹿酒三賦脱去几字今改正古文章十六卷㑹稽石公輔編與前書相出入而稍多亦有史傳中鈔出者首卷為武王丹書其末蔡琰胡笳十八拍也館閣書目又有漢魏文章二卷集宋玉以下文八十八首未見西漢文類四十卷唐栁宗元之弟宗直嘗輯此書宗元為序亦四十卷唐藝文志有之其書不傳今書陶叔獻元之所編次未詳何人梅堯臣為之序三國文類四十卷不知何人所集三謝詩一卷集謝靈運惠連元暉不知何人集中興書目云唐庚子西謝氏蘭玉集十卷呉興汪聞集謝安而下子孫十六人詩三百餘篇聞熙寧六年進士序稱新天子即位丙寅之歲葢元祐元年也梁詞人麗句一卷唐李商隠集梁明帝蕭巋而下十五人詩并鬼詩童謠玉臺後集十卷唐李康成集篋中集一卷唐元結次山録沈干運趙微明孟雲卿張彪元季川于逖王季友七人詩二十四首盡篋中所有次之荆公詩選盡取不遺唐中世詩髙古如此今人乃專尚季末亦異矣館閣書目以為結自作入别集類何其不審也國秀集三卷唐國子進士苪挺章撰集李嶠至祖詠九十人詩二百二十首天寳三載國子進士樓頴為之序搜玉小集一卷自崔湜至崔融三十七人詩六十一首竇氏聨珠集五卷唐褚藏言所序竇氏兄弟五人詩各有小序曰國子祭酒常中行國子司業牟貽周容管經畧羣丹列婺州刺史庠胄卿武昌節度使鞏友封皆拾遺叔向之子也五人者惟羣以處士薦入諫省庠以辟舉進餘皆進士科唐御覽詩一卷唐翰林學士令狐楚纂劉方平而下迄於梁鍠凡三十人詩二百八十九首一名唐新詩又名選進集又名元和御覽河嶽英靈集二卷唐進士殷璠集常建等詩二百三十四首極元集一卷唐姚合集王維至戴叔倫二十一人詩一百首曰此詩家射鵰手也姚氏殘語云殷璠為河嶽英靈集不載杜甫詩髙仲武為中興間氣集不取李白詩顧陶為唐詩類選如元白劉栁杜牧李賀張佑趙嘏皆不収姚合作極元集亦不収杜甫李白彼必各有意也隨齋批注中興間氣集二卷唐渤海髙仲武序集至徳以後終於大歴錢起等二十六人詩一百三十二首各有小傳叙其大畧且拈提其警句而議論文辭皆凡鄙唐類表二十卷不知集者館閣書目有李吉甫所集五十卷未之見也斷金集一卷唐令狐楚李逢吉自為進士以至宦達所與唱酬之詩開成初裴夷直為之序案晁公武讀書志作令狐楚韓琪李逢吉所與酬唱詩什而唐志亦止載楚與逢吉不著韓琪姓氏唐詩類選二十卷唐太子校書郎顧陶集凡一千二百三十二首自為序大中丙子歲也陶㑹昌四年進士漢上題襟集三卷唐段成式温庭筠逢皓案文獻通攷作崔皎無逢皓余知古韋蟾徐商等倡和詩什徃來簡牘葢在襄陽時也松陵集十卷唐皮日休陸龜䝉呉淞倡和詩也本事詩一卷案唐書藝文志作一卷原本作十卷誤今改正唐司勲郎中孟啓集羣書麗藻六十五卷按三朝藝文志一千卷崔遵度編中興館閣書目但有目録五十卷云南唐司門員外郎崔遵度撰以六例摠括古今之文一曰六籍瓊華二曰信史瑤英三曰玉海九流四曰集苑金鑾五曰絳闕蘂珠六曰鳳首龍編為二百六十七門總一萬三千八百首今無目録合三本共存此卷數斷續訛缺不復成書當其傳寫時固已如此矣其目止有四種無金鑾蘂珠二類姑存之以備闕文按江南餘載遵度青州人居金陵髙尚不仕中興書目云司門郎未知何據也才調集十卷後蜀韋縠集唐人詩洞天集五卷漢王貞範集道家神仙隠逸詩篇漢乾祐中也煙花集五卷蜀後主王衍集艷詩二百篇且為之序文苑英華一千卷太平興國七年命學士李昉扈䝉徐鉉宋白等閲前代文學撮其精要以類分之續又命蘇易簡王祜等至雍熙三年書成唐文粹一百卷兩浙轉運使合肥姚鉉寳臣撰鉉太平興國八年進士第三人在杭州與知州薛映不協映摭其罪狀數條宻以聞當奪一官特除名貶連州文學其自為序稱呉興姚鉉者葢本郡望也集選目録二卷案文獻通攷集選作文選丞相元獻公晏殊集中興館閣書目以為不知名者誤也大略欲續文選故亦及於庾信何遜隂鏗諸人而云唐人文者亦非也莆田李氏有此書凡一百卷力不暇傳姑存其目唐百家詩選二十卷王安石以宋次道家所有唐人詩集選為此編世言李杜韓詩不與為有深意其實不然按此集非特不及此三家而唐名人如王右丞韋蘇州元白劉栁孟東野張文昌之倫皆不在選意荆公所選特世所罕見其顯然共知者固不待選耶抑宋次道家獨有此一百五集据而擇之他不復及耶未可以臆斷也案晁公武讀書志宋敏求為三司判官嘗取其家所藏唐人一百八家詩選擇其佳者凡一千二百四十六首為一編王介甫觀之因再有所去取且題曰欲觀唐詩者觀此足矣世遂以為介甫所纂也四家詩選十卷王安石所選杜韓歐李詩其置李於末而歐反在其上或亦謂有所抑揚云唐僧詩三卷呉僧法欽集唐僧三十四人詩二百餘篇案文獻通攷作詩四百餘篇楊傑次公為之序名臣贄种隠君書啓一卷祥符諸賢所與种放明逸書啓也首篇張司空齊賢書自叙平生出處甚詳可以見國初名臣氣象西崑酬唱集二卷景徳中館職楊億大年錢惟演希聖劉筠子儀唱和凡二百四十七章亦有賡屬者共十五人所謂崑體者於此可見億自為序九僧詩一卷九僧者希晝保暹文兆行肇簡長惟鳳惠崇宇昭懐古凡一百七首景徳元年直昭文館陳克案文獻通攷作陳充序目之曰琢玉工以對姚合射鵰手九人惟惠崇有别集歐公詩話乃云其集已亡惟記惠崇一人今不復知有九僧者未知何也九僧者劔南希晝金華保暹南越文兆天台行肇沃州簡長青城惟鳳淮南惠崇江東宇昭峨嵋懐古隨齋批注寳刻叢章三十卷宋敏求次道以四方碑刻詩文集為此編多有别集中所逸者樂府集十卷題解一卷題劉次莊中興書目直云次莊撰取前代樂府分類為十九門而各釋其命題之意按唐志樂類有樂府歌詩十卷者二有呉兢樂府古題要解一卷今此集所載止於陳隋人則當是唐集之舊而序文及其中頗及杜甫韓愈元白諸人意者次莊因舊而增廣之歟然館閣書目又自有呉兢題解及别出古樂府十卷解題一卷未可考也樂府詩集一百卷太原郭茂倩集凡古今號稱樂府者皆在焉其為門十有二首尾皆無序文中興書目亦不言其人今按茂倩侍讀學士勸仲褒之孫昭陵名臣也本鄆州須城人有子曰源中源明案文獻通攷郭勸有子曰源中源明原本脱明字今補正茂倩源中之子也但未詳其官位所至和陶集十卷蘇氏兄弟追和傅共注仕塗必用集十卷案文獻通攷作二十一卷呉郡祝熙載序云陳君材夫所編皆未詳何人録景徳以來人表牋雜文亦有熙載所撰者題為祝著作當是未改官制前人也汝隂唱和集一卷元祐中蘇軾子瞻守潁與簽判趙令畤徳麟教授陳師道無已唱和晁説之以道為之序李廌方叔後序案李方叔名廌原本作薦誤今改正二序皆為徳麟作也三家宫詞三卷唐王建蜀花蘂夫人本朝丞相王珪三人所著五家宫詞五卷石晉宰相和凝本朝學士宋白中大夫張公庠直祕閣周彥質及王仲修共五人各百首仲修當是王珪之子本朝百家詩選一百卷案文獻通攷作五十七卷太府卿曽慥端伯編官至太府卿編此所以續荆公之詩選而識鑒不髙去取無法為小傳略無義類議論亦凡鄙陸放翁以比中興間氣集謂相甲乙非虛語也其言歐王蘇黄不入選以擬荆公不及李杜韓之意荆公前選實不然余固言之矣皇朝文鑑一百五十卷吕祖謙編初淳熙下酉孝廟因觀文海下臨安府校正刊行翰苑周必大夜直宣引偶及之因奏此書江佃類編案宋史作江鈿殊無倫理書坊板行可耳恐難傳後莫若委館閣别加詮次遂以命祖謙既成賜名文鑑詔必大為之序時祖謙已得末疾遂除直中祕且賚銀絹各三百中書舍人陳騤駮之論皆不行繼有近臣宻啓云其所取之詩多言田里疾苦乃借舊作以刺今又所載章疏皆指祖宗過舉尤非所宜於是鋟板之議亦寢周益公序既成封以遺吕一讀命藏之葢亦未當乎吕之意也張南軒以為無補治道何益後學而朱晦庵晚歲嘗語學者曰此書編次篇篇有意每卷首必取一大文字作壓卷如賦取五鳳樓之類其所載奏議亦繋一時政治大節祖宗二百年規模與後來中變之意盡在其中非選粹比也案每卷首必取一大文字以下原本脱去今據文獻通攷補入歴代確論一百一卷不知何人集自三皇五帝以及五代凡有論述者隨世代編次江西詩派一百三十七卷續派十三卷案宋史藝文志作吕本中江西宗派詩集一百十五卷曽紘江西續宗派詩集二卷自黄山谷而下三十五家又曽紘曽思父子詩詳見詩集類詩派之説本出於吕居仁前輩多有異論觀者當自得之輶軒集一卷鄱陽洪皓歴陽張邵新安朱弁使金得歸道間唱酬邵為之序古今絶句二卷呉説傳朋所書杜子美王介甫詩師禮之子王令逢原之外孫也元真子漁歌碑傳集録一卷元真子漁歌世止傳誦其西塞山前一章而已嘗得其一時倡和諸賢之辭各五章及南卓栁宗元所賦通為若干章因以顔魯公碑述唐書本傳以至近世用其詞入樂府者集為一編以備呉興故事艇齋師友尺牘二卷南豐曽季貍裘父之師友徃復書簡其子濰輯而刻之自吕居仁徐師川以降下至淳熙乾道諸賢咸在焉裘父蕭然布衣而名流敬愛之若此足以知其人之賢而亦以見當時風俗之美也膾炙集一卷朝請郎嚴煥刻於江隂韓吏部而下雜文二十餘篇唐人絶句詩集一百卷洪邁景盧編七言七十五卷五言六言二十五卷各百首凡萬上之重華宫可謂博矣而多有本朝人詩在其中如李九齡郭震滕白王嵒王初之屬其尤不深攷者梁何仲言也唐絶句選五卷莆田柯夢得東海編所選僅一百六十六首去取甚嚴然人之好惡亦各隨所見耳唐絶句選四卷倉部郎中福清林清之直父以洪氏絶句鈔取其佳者七言一千二百八十五言百五十六六言十五首攷徳集三卷强至所集韓魏公琦薨後時賢祭文挽詩四家胡笳詞一卷蔡琰劉商王安石李元白也選詩七卷文選中録出别行以人之時代為次宏辭總類四十一卷後集三十五卷第三集十卷第四集九卷起紹聖乙亥迄嘉定戊辰皆刻於建昌軍學相傳紹興中太守陸時雍所刻前集也餘皆後人續之戊辰以後時相不喜此科主司務以艱僻之題困試者縱有記憶不遺文采可觀輒復推求小疵以故久無中選者初紹聖設科但曰宏辭不試制誥止於表檄露布誡諭箴銘頌記序九種亦不用古題及大觀改曰詞學兼茂案宋史大觀改曰詞學兼茂原本脱兼茂二字今補正去誡諭及檄而益以制誥亦為九種四題而二題以歴代故事及紹興始名博學宏辭復益以誥贊檄為十一種三日試六題各一今一古遂為定制古文關鍵二卷吕祖謙所取韓栁歐蘇曽諸家文標抹注釋以教初學迂齋古文標注五卷宗正寺簿四明樓昉暘叔撰大畧如吕氏關鍵而所取自史漢而下至於本朝篇目增多發明尤精當學者便之歴代奏議十卷吕祖謙集國朝名臣奏議十卷吕祖謙集凡二百篇皇朝名臣奏議一百五十卷丞相沂國忠定公趙汝愚編進時為蜀帥續百家詩選二十卷三衢鄭景龍伯允集以續曽慥前選凡慥所遺及在慥後者皆取之然其率畧尤甚江湖集九卷臨安書坊所刻本取中興以來江湖之士以詩馳譽者而方惟深子通承平人物晁公武子止嘗為從官乃亦在其中其餘亦未免玉石蘭艾混淆雜遝然而士之不能自暴白於世者或賴此以有傳書坊巧為射利可未以責備也回文類聚三卷桑世昌澤卿集以璇璣圖為本初而併及近世詩詞且以至道御製冠於篇首滁陽慶歴集十卷後集十卷朝散郎滁人徐徽仲元集斷自慶歴以來曽肇子開紹聖中謫守為之序其後集則呉珏案宋史藝文志作班張康朝王言㳟案文獻通攷作王彥恭所續宣和四年唐恪欽叟序之末及紹興葢又後人續入之爾呉興詩一卷熙寧中知湖州孫氏集而不著名以其時攷之孫覺莘老也呉興分類詩集三十卷霅川倪祖義子由編大抵以孫氏所集太畧而增廣之且併及近時諸公之作然亦病於太詳祖義齊齋之子少聰俊仕未達得年五十以死㑹稽掇英集二十卷續集四十五卷熙寧中郡守孔延之程師孟相繼纂集其續集則嘉定中汪綱俾郡人丁燧為之潤州類集十卷監潤州倉曹曽敗彥和纂始東漢終南唐京口詩集十卷續二卷鎮江教授熊克集開寳以來詩文本二十卷止刻其詩續又得二卷自南唐而上曽所遺者補八十餘篇嘉禾詩集一卷不知集者永嘉集三卷亦不知何人集天台集二卷别編一卷續集三卷初李庚子長集本朝人詩為二卷未行太守李兼孟達得之又得郡士林師箴所輯前代之作為賦二詩二百乃以本朝人詩為續集而併刻焉别編則師箴之子表民所補也括蒼集三卷後集五卷别集四卷續一卷郡人呉飛英陳百朋相繼纂輯釣臺新集六卷續集十卷郡人王旉集續者郡守謝徳輿子上也長樂集十四卷福建提刑呉興俞向集案文獻通攷作俞尚宣和三年序清漳集三十卷通判漳州趙不敵編揚州詩集二卷教授馬希孟編元豐四年秦觀作序宣城集三卷知宣州安平劉涇元符三年序南州集十卷太平州教授林桷子長集南紀集五卷後集三卷知漢陽軍于霆教授施士衡編其後集則教授鞏豐也相江集三卷案文獻通攷作湘江不知何人集相江者韶州曲江别名艮嶽集一卷不知集者其首則御製記文也桃花源集二卷又二卷紹聖丙子四明田孳序淳熙庚子縣令趙彥琇重編合為一卷下卷則淳熙以後所續庾樓紀述三卷琵琶亭詩一卷不知集者東陽記詠四卷亦不知集者盤洲編二卷洪丞相适兄弟子姪所賦園池詩也瓊野録一卷學士洪邁園池記述題詠其曰瓊野者從維揚得瓊花植之而生遂以名圃清暉閣詩一卷史正志創閣於金陵僚屬皆賦詩㑹稽紀詠六卷汪綱仲舉帥越多所修創嚴陵洪璞每事為一絶賡者四人曰張渂王栐程震龍馮大章又有諸葛興為古詩二十篇蕭秋詩集一卷玉山徐文卿斯逺作蕭秋詩四言九章章四句趙蕃昌甫而下和者十三人紹熙辛亥也趙汝談履常亦與焉後三十三年嘉定癸未乃序而刻之文卿晚第進士未授官而死有詩見江湖集唐山集一卷後集三卷卞圜宋佽編唐山者臨安昌化縣也後典麗賦四十卷金華唐仲友與政編仲友以辭賦稱於時此集自唐末以及本朝盛時名公所作皆在焉止於紹興間先有王戊集典麗賦九十三卷故此名後典麗賦王氏集未見指南賦箋五十五卷指南賦經八卷皆書坊編集時文止於紹熙以前指南論十六卷又本前後二集四十六卷淳熙以前時文擢犀䇿一百九十六卷擢象䇿一百六十八卷擢犀者元祐宣政以及建紹初年時文也擢象則紹興末大抵科舉場屋之文每降愈下後生亦不復識前輩之舊作姑存之以觀世變文章正宗二十卷參知政事真徳秀希元撰自序正宗云者以後世文詞之多變欲學者識其源流之正也自昔集録文章若杜預摯虞諸家往往湮没不傳今行於世者惟梁昭明文選姚鉉文粹而已繇今眡之二書所録果得源流之正乎故今所集以明義理切世用為主其體本乎古而旨近乎經者然後取焉否則辭雖工亦不録其目凡四曰辭命曰議論曰叙事曰詩賦去取甚嚴案此條原本脱漏今據文獻通攷補入直齋書録解題卷十五
