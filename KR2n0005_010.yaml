body:
  text: 直齋書録解題卷十宋陳振孫撰法家類管子二十四卷案隋唐經籍志俱作十九卷齊相管夷吾撰唐房玄齡注案漢志管子八十六篇列於道家隋唐志著之法家之首今篇數與漢志合而卷視隋唐為多管子似非法家而世皆稱管商豈以其操術用心之同故耶然以為道則不類今從隋唐志商子五卷秦相衛公孫鞅撰或稱商君者其封邑也漢志二十九篇今二十六篇又亡其一慎子一卷趙人慎到撰漢志四十二篇先於申韓稱之唐志十卷滕輔注今麻沙刻本才五篇固非全書也案莊周荀卿書皆稱田駢慎到到趙人駢齊人見於史記列傳今中興館閣書目乃曰瀏陽人瀏陽在今潭州吳時始置縣與趙南北了不相涉蓋據書坊所稱不知何謂也崇文總目言三十七篇韓子二十卷韓諸公子韓非撰漢志五十五篇今同所謂孤憤説難之屬皆在焉名家類公孫龍子三卷趙人公孫龍為白馬非馬堅白之辨者也其為説淺陋迂僻不知何以惑當時之聽漢志十四篇今書六篇首敘孔穿事文意重復鄧析子二卷鄭人鄧析左氏傳鄭駟歂嗣子太叔為政殺鄧析而用其竹刑即此人也列子荀子以為子産所殺顔師古辨之矣尹文子三卷案宋史藝文志作一卷文獻通考作二卷齊人尹文撰漢志齊宣王時人先公孫龍今本稱仲長氏撰定魏黃初末得於繆熙伯又言與宋鈃田駢同學於公孫龍則不然也龍書稱尹文乃借文對齊宣王語以難孔穿其人當在龍先班志言之是矣仲長氏即統也耶熙伯名襲人物志三卷案劉劭人物志止上中下三卷原本作二十卷誤今改正魏散騎常侍邯鄲劉劭孔才撰梁儒林祭酒燉煌劉昞注梁史無劉昞中興書目云爾朝氏云偽涼人廣人物志十卷案唐書藝文志作三卷宋史藝文志作二卷唐鄉貢進士京兆杜周士撰敘武德至貞元選舉薦進人物事實凡五十五科墨家類墨子三卷宋大夫墨翟撰孟子所謂邪説詖行與楊朱同科者也韓吏部推尊孟氏而讀墨一章乃謂孔墨相為用何哉漢志七十一篇館閣書目有十五卷六十一篇者多訛脫不相聫屬又二本止存十三篇者當是此本也方楊墨之盛獨一孟子訟言非之諄諄焉惟恐不勝今楊朱書不傳列子僅存其餘墨氏書傳於世者亦止於此孟子越百世益光眀遂能上配孔氏與論語並行異端之學安能抗吾道哉從橫家類鬼谷子三卷案唐書藝文志作二卷戰國時蘇秦張儀所師事者號鬼谷先生其地在潁川陽城名氏不傳於世此書漢志亦無有隋唐志始見之唐志則直以為蘇秦撰不可考也隋志有皇甫謐樂一二家注今本稱陶宏景注案徐廣曰潁川陽城有鬼谷注其書者樂一皇甫謐陶宏景尹知章農家類農家者流本於農稷之官勤耕桑以足衣食神農之言許行學之漢世野老之書不傳於後而唐志著録雜以嵗時月令及相牛馬諸書是猶薄有關於農者至於錢譜相貝鷹鶴之屬於農何與焉今既各從其類而花果栽植之事猶以農圃一體附見於此其實則浮末之病本者也齊民要術十卷後魏髙陽太守賈思協撰起自耕農終於醯醢資生之業靡不畢書凡九十三篇其曰治生之道不仕則農蓋名言也山居要術三卷稱王􅌈撰館閣書目作王旻皆莫知何時人也四時纂要五卷案宋史藝文志作十卷唐韓諤撰雖曰嵗時之書然皆為農事也蠶書二卷案宋史藝文志作三卷孫光憲撰光憲事迹見小説類秦少遊蠶書一卷見少遊淮海集第六卷序略曰豫間居婦善蠶從婦論蠶作蠶書考之禹貢揚梁幽雍不貢繭物兖篚織文徐篚元纎縞荆篚元纁璣組豫篚纎纊青篚檿絲皆繭物也而桑土既蠶獨言於兖然則九州蠶事兖為最乎豫遊濟河之間見蠶者豫事時作一婦不蠶比屋詈之故知兖人可為蠶師今豫所書有與吳中蠶家不同者皆得之兗人也案此條文獻通考引陳氏之言原本脫今補入禾譜五卷宣德郎溫陵曽安止移忠撰東坡所為賦秧馬歌也謂禾譜文既溫雅事亦詳實惜其不譜農器故以此歌附之安止熙寧進士嘗為彭澤令右丞黃履安中志其墓農器譜三卷續二卷耒陽令曽之謹撰安止之姪孫也追述東坡作歌之意為此編周益公為之序陸務觀亦作詩題其後農書三卷稱西山隱居全真子陳敷撰案農書係陳敷撰原本誤作雩今改正未詳何人其書曰田曰牛曰蠶洪慶善為之後序耕桑治生要備二卷左宣教郎通判橫州何先覺撰紹興癸酉序耕織圗一卷於潛令鄞樓璹夀玉撰攻愧參政之伯父也竹譜一卷案宋史藝文志作三卷武昌戴凱之慶預撰皆四字語筍譜一卷僧贊寧撰案朝公武讀書志作僧惠崇撰夢溪忘懷録三卷沈括存中撰自稱夢溪丈人括坐永樂事間廢晚嵗乃以光祿卿分司卜居京口之夢溪有水竹山林之適少有懷山録可資居山之樂者輒記之自謂今可忘於懷矣故名忘懷録越中牡丹花品二卷僧仲休撰其序言越之所好尚惟牡丹其絶麗者三十二種始乎郡齋豪家名族梵宇道宫池臺水榭植之無間來賞花者不間親疏謂之看花局澤國此月多有輕雲微雨謂之養花天里語曰彈琴種花陪酒陪歌末稱丙戌嵗八月十五日移花日序丙戌者當是雍熙三年也越在國初繁富如此殆不減洛中今民貧至骨種花之風遂絶何今昔之異耶其故有二一者鏡湖為田嵗多不登二者和買土著數倍常賦勢不得不貧也牡丹譜一卷歐陽修撰少年為河南從事目擊洛花之盛遂為此譜蔡君謨書之盛行於世冀王宫花品一卷題景祐元年滄州觀察使記以五十種分為三等九品而潛溪緋平頭紫居正一品姚黃反居其次不可曉也吳中花品一卷慶厯乙酉趙郡李英述皆出洛陽花品之外者以今日吳中論之雖曰植花未能如承平之盛也花譜二卷案宋史藝文志作一卷滎陽張峋子堅撰以花有千葉多葉黃紅紫白之别類以為譜凡千葉五十八品多葉六十二品又以芍藥附其末峋與其弟岫子望同登進士第岫嘗從邵康節學牡丹芍藥花品七卷不著名氏録歐公及仲休等諸家牡丹譜孔常甫芍藥譜共為一編芍藥譜一卷中書舍人清江劉攽貢父撰芍藥圗序一卷待制新淦孔武仲常甫撰案孔武仲新淦人原本誤作新塗今改正芍藥譜一卷知江都縣王觀通叟撰三家皆述維揚所産花之盛荔枝譜一卷端眀殿學士莆田蔡襄君謨撰且書而刻之與牡丹記並行閩無佳石以板刋嵗久地又濕皆蠧朽至今猶藏其家而字多不完可惜也荔枝故事一卷無名氏案朝公武讀書志亦作蔡襄撰增城荔枝譜一卷亦無名氏其序言福唐人熙寧九年承乏增城多植荔枝蓋非嶠南之火山實類吾鄉之晚熟搜境內所出得百餘種其初亦得閩中佳種植之故為是譜四時栽接花果圖一卷無名氏桐譜一卷銅陵逸民陳翥撰皇祐元年序何首烏傳一卷初見唐李翺集今後人增廣之耳海棠記一卷吳人沈立撰菊譜一卷彭城劉蒙撰凡三十五品菊譜一卷史正志志道撰孝廟朝為發運使者也范村梅菊譜二卷范成大至能撰有園在居第之側號范村橘録三卷知溫州延安韓彥直子溫撰世忠長子也糖霜譜一卷遂寧王灼晦叔撰言四方所産遂寧為冠灼自號頤堂蟹譜二卷稱怪山傅肱子翼撰嘉祐四年序怪山者越之飛來山也蟹略四卷髙似孫續古撰雜家類吕氏春秋二十六卷案唐宋藝文志俱作二十六卷原本作三十六卷誤今改正秦相吕不韋撰後漢髙誘注其書有十二紀八覽六論十二紀者即今禮記之月令也淮南鴻烈解二十一卷漢淮南王安與賔客撰後漢太尉許慎叔重注案唐志又有髙誘注今本既題許慎記上而詳序文則是髙誘不可曉也序言自誘之少從同縣盧君受其句讀盧君者植也與之同縣則誘乃涿郡人又言是建安十年辟司空掾東郡濮陽令十七年遷監河東則誘乃漢末人其出處略可見子華子十卷稱晉人程本字子華與孔子同時考前世史志及諸家書目並無此書蓋假託也館閣書目辨之當矣家語有孔子遇程子傾蓋贈束帛之事而莊子亦載子華子見昭僖侯一則此其姓字之所從出昭僖與孔子不同時也莊子固寓言而家語亦未可考信班固古今人表亦無之使果有其人遇合於夫子班固豈應見遺也其文不古然亦有可觀者當出於近世能言之流為此以玩世爾論衡三十卷漢上虞王充仲任撰肅宗時人仕為州從事治中初著書八十五篇釋物類同異正時俗嫌疑蔡雍王朗初傳之時以為不見異人當得異書自今觀之亦未見其竒也女誡一卷漢曹世叔妻班昭撰固之妹也俗號女孝經潛夫論十卷漢安定王符節信撰風俗通義十卷漢泰山太守汝南應劭仲逺撰唐志二十卷今惟存十卷餘略見庾仲容子鈔蔣子萬機論二卷魏太尉平河蔣濟子通撰案館閣書目十卷五十五篇今惟十五篇恐非全書也博物志十卷案此書别有注本互見小説家晉司空范陽張華茂先撰多竒聞異事華能辨龍鮓識劔氣其學固然也古今注三卷晉太傅丞崔豹正熊撰孫子十卷題晉孫綽興公撰恐依託唐志及中興書目並無之余從程文簡家借録劉子五卷劉晝孔昭撰播州録事參軍袁孝政為序案劉子序係袁孝政作原本脫姓今補入凡五十五篇案唐志十卷劉協撰今序云晝傷已不遇天下陵遲播遷江表故作此書時人莫知謂為劉協或曰劉歆劉孝標作孝政之言云爾終不知晝為何代人其書近出傳記無稱莫詳其始末不知何以知其名晝而字孔昭也金樓子十卷梁元帝繹世誠為湘東王時所述也雜記古今聞見末一卷為自序瑞應圗十卷不著名氏案唐志有孫柔之瑞應圖記熊理瑞應圖譜各三卷案唐書藝文志作熊理瑞應圖讃三卷顧野王符瑞圗十卷又祥瑞圖十卷今此書名與孫熊同而卷數與顧合意其野王書也其間亦多援孫氏以為注中興書目有符瑞圗二卷定著為野王又有瑞應圖十卷稱不知作者載天地瑞應諸物以類分門今書正爾未知果野王否又云或題王昌齡至李淑書目又直以為孫柔之其為昌齡或不可知而此書多引孫氏則決非柔之矣又恐李氏書别一家也子鈔三十卷梁尚書左丞潁川庾仲容子仲撰所取諸子之書百有五家其間頗有與今世見行書不同者而亡者亦多矣意林三卷唐大理評事扶風馬總會元撰以庾鈔增損裁擇為此書總後宦達嘗副裴晉公平淮西者也顔氏家訓七卷北齊黃門侍郎琅邪顔之推撰古今家訓以此為祖而其書崇尚釋氏故不列於儒家匡謬正俗八卷案前第二卷毛詩補音解題所引顔氏糾謬正俗即此書因避諱匡字改作糾唐祕書監琅邪顔籀師古撰其子符璽郎揚庭永徽二年表上之刋謬正俗跋八卷莆田鄭樵撰理道要訣十卷唐宰相杜佑撰凡三十三篇皆設問答之辭末二卷記古今異制蓋於通典中撮要以便人主觀覽造化權輿六卷唐豐王府法曹趙自勔撰天寶七年表上陸農師著埤雅頗采用之其孫務觀嘗兩為之跋余求之久不獲己亥嵗從吳門天慶觀道藏中借録祝融子兩同書二卷不著名氏中興書目云唐吳筠撰唐藝文志同但入小説類又案崇文總目以為羅隱撰未詳其書采孔老為內外十篇祝融者謂鬻子為諸子之首也刋誤二卷唐國子祭酒李涪撰資暇集三卷唐李匡文濟翁撰兼眀書二卷唐國子太學博士丘光庭撰蘇氏演義十卷唐光啓進士武功蘇鶚德祥撰此數書者皆考究書傳訂正名物辨證訛謬有益見聞尤梁溪以家藏本刻之當塗事始三卷唐吳王咨議宏文館學士南陽劉存撰案唐書藝文志劉孝孫房德懋撰鄭樵通志云皆為王府官以教諸王始學炙轂子三卷唐王睿撰以古今注二儀實録樂府解題等書刪併為一編伸蒙子三卷案宋史藝文志作伸蒙子原本作仲蒙誤今改正唐校書郎長樂林慎思虔中撰中華古今注三卷後唐太學博士馬縞撰蓋推廣崔豹之書也格言五卷南唐中書侍郎北海韓熙載叔言撰化書六卷南唐宰相廬陵宋齊丘子嵩撰物類相感志一卷僧贊寧撰國初名釋也耄智餘書三卷太子少保致仕澶淵朝迥德逺撰迥善養生兼通釋老書年至八十四子孫多聞人昭德新編一卷朝迥撰昭德者京師居第坊名也朝氏子孫皆以為稱聱隅子二卷蜀人黃晞撰聱隅其自號也本朝仁宗時人書名歔欷瑣微論凡十篇宋景文筆記一卷翰林學士安陸宋祁子京撰近事會元五卷李上友撰自唐武德至周顯德雜事細務皆記之徽言三卷司馬光手鈔諸子書題其末曰余此書類舉人所鈔書然舉人所鈔獵其辭余所鈔核其意舉人志科名余志道德其書迂叟年六十八蓋公在相位時也方機務填委且將屬疾而好學不厭克勤小物如此所鈔自國語而下六書其目三百一十有二小楷端重無一筆不謹百世之下使人肅然起敬真迹藏邵康節家其諸孫遵守漢嘉從邵氏借刻攜其板歸越今在其羣從述尊古家泣岐書三卷蜀人龍昌期撰稱上昭文相公有後序言求薦進之意天保正名論八卷龍昌期撰其學迂僻専非周公妄人也事物紀原二十卷不著名氏中興書目十卷開封髙承撰元豐中人凡二百七十事今此書多十卷且數百事當是後人廣之耳孔氏雜説一卷清江孔平仲毅甫撰案文獻通考作孔武仲朝氏客語一卷朝説之以道撰廣川家學三十卷中書舍人董弅令升撰述其父逌之學石林家訓一卷葉夢得少藴撰石林過庭録二十七卷葉夢得與諸子講説者其中子模編輯之程氏廣訓六卷中書舍人三衢程俱致道撰藝苑雌黃二十卷建安嚴有翼撰大抵辨正訛謬故曰雌黃其目子史傳注詩詞時序名數聲畫器用地理動植神怪雜事卷為二十條凡四百條硯岡居士唐稷序之有翼嘗分教泉荆二郡緗素雜記十卷建安黃朝英士俊撰有陳與者為之序言甲辰六試禮部不利蓋政宣中士子也其書亦辨正名物而學頗迂僻言詩芍藥握椒之義鄙褻不典王氏之學前輩以資戲笑而朝英以為得詩人深意其識可見矣聖賢眼目一卷曲阿洪興祖慶善撰摘取經子數十條以已見發眀之義林一卷眉山程敦厚子山撰其上世東坡外家也子山為人凶險與眉守邵溥有隙以匹絹為匿名書誣以罪狀抵帥蕭振振逮溥繫獄鞫之或教溥一切誣服得不以煆鍊死獄上朝議以匿名不當受而制司非得旨不應擅逮繫郡守遂兩罷之溥雖得弗問而終無以自眀憤訴於天子山之居極壯麗一夕燼於火後附秦檜至右史後復得罪謫知安逺縣以沒弟子職等五書一卷漳州教授張時舉以管子弟子職篇班氏女誡吕氏鄉約鄉禮司馬氏居家雜儀合為一編演蕃露十四卷續六卷程大昌泰之撰初在館中見蕃露書以為非説見春秋類又引古今注冕旒綴玉下垂如繁露然蓋與玉杯竹林同為託物名篇可想見也今曰演蕃露意古之蕃露與爾雅釋名廣雅刋誤正俗之類云爾考古編十卷續編十卷程大昌撰上自詩書下及史傳世俗雜事有可考見者皆筆之楚澤叢語八卷右迪功郎李蓍吉先撰不知何人作其書専闢孟子紹興中撰進大意以為王氏之學出於孟氏然王氏信有罪矣孟氏何與焉此論殆得於朝景迂之微意容齋隨筆續筆三筆四筆各十六卷五筆十卷翰林學士鄱陽洪邁景盧撰每編皆有小序五筆未成書續顔氏家訓八卷左朝請大夫李正公撰皆用顔氏篇目而增廣之習學記言五十卷寶文閣學士龍泉葉適正則撰自六經諸史子以及文鑑皆有論説大抵務為新竒無所蹈襲其文刻削精工而義理未得為純眀正大也自孔子之外古今百家隨其淺深咸有遺論無得免者而獨於近世所傳子華子篤信推崇之以為真與孔子同時可與六經並考而不悟其為偽也且既曰其書甚古而文與今人相近則亦知之矣逺自七略下及隋唐國史諸志李邯鄲諸家書目皆未之有豈不足以驗其非古出於近世好事能文者之所為而反謂孟荀以來無道之者蓋望而棄之也不亦惑乎準齋雜説一卷錢塘吳如愚撰灌畦暇語一卷不知作者雜取史傳事略述已意忘筌書二卷潘植子醇撰新安所刻本凡八十二篇與館閣書目諸儒鳴道集及余家寫本篇數皆不同本已見儒家而館目置之雜家者以其多用釋老之説故也今亦别録於此袁氏世範三卷樂清令三衢袁采君載撰直齋書録解題卷十
