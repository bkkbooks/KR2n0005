body:
  text: 直齊書録解題卷九宋陳振孫撰儒家類孔子家語十卷孔子二十二世孫猛所傳魏散騎常侍王肅為之注肅闢鄭學猛嘗受學於肅肅從猛得此書與肅所論多合從而證之遂行於世云博士安國所得壁中書也亦未必然其間所載多已見左氏傳大戴禮諸書云肅東海人父朗曾子二卷案唐書藝文志及文獻通考俱作二卷原本作十卷誤今改正凡十篇具大戴禮後人從其中録出别行慈溪楊簡注晏子春秋十二卷齊大夫平仲晏嬰撰漢志八篇但曰晏子隋唐七卷始號晏子春秋今卷數不同未知果本書否案崇文總目謂其書已亡世所傳者蓋後人采嬰行事而成故栁宗元謂墨氏之徒有齊人者為之非嬰所自著也荀子二十卷楚蘭陵令趙國荀况撰漢志作孫卿子云齊稷下祭酒其曰孫者避宣帝諱也至楊倞始改為荀卿荀子注二十卷唐大理評事楊倞注案劉向序校中書三百二十二篇以校除復重二百九十篇定著三十二篇隋志為十二卷至倞始分為二十卷而注釋之淳熙中錢佃耕道用元豐監本參校刋之江西漕司其同異著之篇末凡二百二十六條視他本最為完善賈子十一卷案崇文總目云隋唐志皆九卷新唐書藝文志作十卷此本作十一卷疑誤漢長沙王太傅洛陽賈誼撰漢志五十八篇今書首載過秦論末為弔湘賦餘皆録漢書語且略節誼本傳於第十一卷中其非漢書所有者輒淺駁不足觀決非誼本書也鹽鐵論十卷漢廬江太守丞汝南桓寬次公撰本始元年召問賢良文學對願罷鹽鐵𣙜酤均輸與御史大夫宏羊相詰難於是止罷𣙜酤而鹽鐵卒不變故昭紀贊曰議鹽鐵而罷𣙜酤也及宣帝時寬推衍增廣著數萬言凡六十篇其末曰雜論班書取以為論贊其言桑大夫據當世合時變上權利之略雖非正法巨儒宿學不能自解博物通達之士也嗚呼世之小人何嘗無才以熙寧日録言之王安石之辨雖曰儒者其實桑大夫之流也霍光號知時務與民更始而鹽鐵之議乃俾先朝首事之臣與諸儒議論反覆不厭或是或非一切付之公論而或行或否未嘗容心焉以不學無術之人而暗合乎孟莊子父臣父政之義曾謂元祐諸賢而慮不及此乎新序十卷漢護都水使者光祿大夫劉向子政撰舜禹以來迄于周嘉言善行往往在焉其書最為近古案曾鞏序略曰向之序此書於今最為近古雖不能無失然逺至舜禹而次及於周秦以來古人之嘉言善行亦往往而有也此云自舜禹以來迄於周疑有脫句說苑二十卷劉向撰序言臣向所校中書說苑雜事除去與新序復重者其餘淺薄不中義理别集以為百家後今以類相從更以造新事凡二十篇七百八十四章號曰說苑案漢志劉向所序六十七篇謂新序說苑世說列女傳頌圖也今本南豐曾鞏序言崇文總目存者五篇從士大夫得十五篇與舊為二十篇未知即當時篇章否新苑之名亦不同法言十卷案唐書藝文志作六卷漢黃門郎蜀揚雄子雲撰凡十三篇篇各有序本在卷末如班固叙傳然今本分冠篇首自宋咸始也法言注十三卷音義一卷晉尚書郎李軌宏範注此本歷景祐嘉祐治平三降詔更監學館閣兩制校定然後頒行與建寧四注本不同錢佃得舊監本刻之與孟荀文中子為四書太𤣥經十卷揚雄撰五業主事章陵宋衷仲子解詰吳鬱林太守陸績公紀釋文晉尚書郎范望叔明解贊案漢志揚雄所叙三十八篇太𤣥十九本傳三方九州二十七部八十一家七百二十九贊分為三卷有首衝錯測攡瑩數文掜圖告十一篇皆以解剝𤣥體蓋與本經三卷共為十四今志云十九未詳初宋陸二家各依舊本解釋范望折中長短或加新意既成此注乃以𤣥首一篇加經贊之上𤣥測一篇附贊之下為九篇列為四卷首測一序仍載之第一卷之首蓋猶王弼離合古易之類也卷首有陸績述元一篇本傳尚有二百四十三表六字隨齊批注說𤣥一篇唐宰相河南王涯廣津撰明宗立例揲法占法辨首凡五篇太𤣥釋文一卷相傳自侯芭虞翻宋衷陸績互相增損非後人所作也吳祕嘗作音義豈即此耶太𤣥集注六卷司馬光撰自宋衷而下四家之外有直昭文館宋惟幹注天水尉陳漸演元司封郎吳祕音義通前凡七家集取其說斷以已意𤣥解四卷𤣥歷一卷右丞襄陵許翰嵩老撰所解十一篇通溫公注為十卷倣韓康伯注繫辭合王弼為全書之例也大抵𤣥首如彖贊如爻案原本脫彖贊如三字今據文獻通考補入測如象文如文言攡瑩掜告如繫辭數如說卦衝如序卦錯如雜卦之類其於易也規規然擬之勤矣太𤣥歷者亦翰所傳云溫公手録不著何人作申鑒五卷漢黃門侍郎潁川荀悅仲豫撰獻帝頗好文學政在曹氏恭已而已悅志在獻替而謀無所用乃作此書五篇奏之其曰教化之廢推中人而墮於小人之域教化之行引中人而納於君子之塗古今名言也本傳止載政體一篇有曰前鑒既明後復申之故名隨齊批注中論二卷漢五官將文學北海徐幹偉長撰唐志六卷今本二十篇有序而無名氏蓋同時人所作案貞觀政要太宗嘗稱見幹中論復三年喪篇宋時館閣本已闕又魏志文帝稱幹著中論二十餘篇則知二十篇非全書也孔叢子七卷孔氏子孫雜記其先世系言行之書也小爾雅一篇亦出於此中興書目稱漢孔鮒撰一名盤盂案孔光傳夫子八世孫鮒魏相順之子為陳涉博士死陳下則固不得為漢人而其書紀鮒之沒第七卷號連叢子者又記太常臧而下數世迄於延光三年季彥之卒則又安得以為鮒撰案儒林傳所載為博士者又曰孔甲顏注曰將名鮒而字甲也今考此書稱子魚名鮒陳人或謂之子鮒或稱孔甲然則顏監未嘗見此書耶藝文志有孔甲盤盂二十六篇本注謂黃帝史或曰夏帝孔甲似皆非也其書蓋田蚡所學者與孔鮒初不相涉也中興書目乃曰一名盤盂不知何據豈以漢志所謂孔甲即陳王博士之孔甲邪帝範一卷案舊唐書經籍志作四卷宋史藝文志作二卷唐太宗撰凡十二篇以賜高宗中說十卷隋河汾王通仲淹撰唐志五卷今本第十卷有文中子世家房魏論禮樂事書關子明事及王氏家書雜録舊傳以此為前後序非也案朝公武讀書志是書係王通之門人共集其師之語中說注十卷太常丞阮逸天隱撰中說注十卷正議大夫淄川龔鼎臣輔之撰自甲至癸為十卷而所謂前後序者在十卷之外亦頗有所刪取李格非跋云龔自謂明道間得唐本於齊州李冠比阮本改正二百餘處潛虛一卷司馬光撰言萬物皆祖於虛𤣥以準易虛以準𤣥潛虛發微論一卷監察御史張敦實撰凡九篇周子通書一卷太極圖說一卷廣東提刑舂陵周敦頤茂叔撰周子通書遺文遺事一卷侍講朱熹集次刋於南康帝學八卷案文獻通考作十卷侍講成都范祖禹淳父元祐中編集上自三皇五帝迄於本朝神宗凡聖學事實皆具焉正䝉書十卷崇文校書長安張載子厚撰凡十九篇案朝公武讀書志是書初無篇次其後門人蘇昞等區别成十七篇范育吕大臨蘇昞為前後序皆其門人也又有待制胡安國所傳編為一卷末有行狀一卷經學理窟一卷張載撰西銘集解一卷張載作訂頑砭愚二銘後更曰東西銘其西銘即訂頑也大抵發明理一分殊之㫖有趙師俠者集吕大臨胡安國張九成朱熹四家之說為一編刻之興化軍通書西銘集解三卷戶部侍郎新昌王夢龍慶翔所集河南師說十卷尚書潁川韓元吉無咎以河南雅言伊川雜說及諸家語録釐為十卷以尹和靖所編為卷首不若遺書之詳訂也山東野録七卷殿中丞臨淄賈同公疏撰本名罔真宗御筆改之蓋祥符祀汾隂時所放經明行修進士也程氏遺書二十五卷附録一卷外書十三卷朱熹集録二程門人李籲端伯而下諸家所聞見問答之語附録行狀哀詞祭文之屬八篇其年譜朱公所撰述也外書則又二十五篇之所遺者皇極經世書十二卷邵雍堯夫撰其學出於李之才挺之之才受之穆修伯長修受之种放明逸放受之陳摶蓋數學也曰元會運世以元經會以運經世自帝堯至於五代天下離合治亂興廢得失邪正之迹以天時而驗人事以隂陽剛柔窮聲音律吕以窮萬物之數末二卷論所以為書之意窮日月星辰飛走動植之數以盡天地萬物之理述皇王帝霸之事以明大中至正之道書謂之皇極經世篇謂之觀物凡六十二篇其子伯溫為之叙系具載先天後天變卦反對諸圖又為易學辨惑一篇叙傳授本末真僞然世之能明其學者蓋鮮焉觀物外篇六卷康節門人太常寺簿張崏子望記其言雖十才一二而足以發明成書觀物內篇二卷康節之子右奉直大夫伯溫撰即經世書之第十一十二卷也張氏曰先生觀物有內外篇內篇先生所著之書也外篇門人所記先生之言也內篇理深而數略外篇數詳而理顯學先天者當自外篇始先生詩云若無揚子天人學安有莊周內外篇以此知外篇亦先生之文門人蓋編集之耳又曰皇極經世者康節之易先天之嗣也觀物篇立言廣大措意精微如繫辭然稽之以理既無不通參之以數亦無不合案以上三書皆已見易類而解題詳略互異今並仍之近思録十四卷朱熹吕祖謙取周程之書關於大體而切於日用者六百十九條取切問近思之義以教後學元城語録三卷右朝散郎維揚馬永卿大年撰永卿初仕亳州永城主簿從寓公劉安世器之學記其所聞之語劉先生談録一卷知秀州韓瓘德全撰瓘億之曾孫緬之孫官二浙道睢陽往來必見劉元城記其所談二十一則道護録一卷胡珵德輝所録劉元城語凡十九則以上三書皆刻章貢末又有邵伯溫吕本中所記數事附焉庭闈槀録一卷即楊迥所録當政和八年其父亡恙時也龜山别録二卷不知何人所録龜山語録五卷延平陳淵幾叟羅從彥仲素建安胡大原伯逄所録楊時中立語及其子迥槀録共四卷末卷為附録墓志遺事順昌廖德明子晦所集也尹和靖語録四卷馮忠恕祈寬居之吕堅中崇實所録尹焞彥明語胡氏傳家録五卷曾幾吉父徐時動舜鄰楊訓子中所記胡安國康侯問答之語及其子寧和仲所録家庭之訓無垢語録十四卷言行編遺文共一卷張九成子韶之甥于恕所編心傳録及其門人郎昱所記日新録近時徐鹿卿德夫教授南安復裒其言行繫以歲月及遺文三十篇附於末南軒語録十二卷蔣邁所記張栻敬夫語晞顏録一卷張栻取經傳中凡言及顔子者録為一編晦庵語録四十六卷著作佐郎陵陽李道傳貫之裒晦翁門人廖德明子晦而下三十二家刻之九江晦庵續録四十六卷李太史之弟樞密性傳成之又得黃幹直卿而下四十一家及前録所無者併刻之合貫之前録益見該備矣節孝先生語一卷江端禮季恭所録山陽徐積仲車語童蒙訓一卷中書舍人東萊吕本中居仁撰師友雜志一卷雜說一卷吕本中撰胡子知言一卷五峰胡宏仁仲撰文定公安國之季子張南軒從之遊忘筌書二卷浦城潘植子醇撰多言易亦涉異端凡五十一篇此書載鳴道集為九十二篇附見者又十有三而館閣書目又稱七十七篇皆未詳諸儒鳴道集七十二卷不知何人所集涑水濓溪明道伊川橫渠元城上蔡無垢以及江民表劉子翬潘子醇凡十一家其去取不可曉兼山遺學六卷河南郭雍録其父忠孝之遺書前二卷為易蓍卦次為九圖又次說春秋又次為性說三篇末卷問答雜說忠孝父子世系出處本末詳見易類玉泉講學一卷沙隨程迥可久所記喻樗子才語樗本末見語孟類周簡惠聖傳録一卷參政荆溪周葵惇義撰案周惇義名葵原本誤作蔡今改正自堯舜至孔孟聖傳正統為絶句詩二十章而自著其說自為一家然無高論小學書四卷朱熹所集古聖格言至論以教學者皆成童幼志進學之序也內篇曰立教明倫敬身稽古外篇曰嘉言善行吕氏讀書記七卷吕祖謙撰乾道癸巳淳熙乙未家居日閲之書隨意手筆或數字或全篇蓋偶有所感發或以備遺忘者閫範十卷吕祖謙撰集經史子傳發明人倫之道見於父子兄弟之間者為一篇時教授嚴州張南軒守郡實為之序少儀外傳二卷吕祖謙撰雜取經傳嘉言善行切於立身應世者皆博學切問之事也而大要以謹厚為本尊孟辨七卷建安余允文隱之撰以司馬公有疑孟及李遘泰伯常語鄭厚叔友折衷皆有非孟之言故辨之為五卷後二卷則王充論衡刺孟及東坡論語說中與孟子異者亦辨焉先聖大訓六卷龍圖閣學士慈溪楊簡敬仲撰案楊簡官龍圖閣學士此本脫龍圖二字今補正取禮記家語左傳國語而下諸書凡稱孔子之言皆類為此編然聖人之言㫖意未易識也喪欲速貧死欲速朽自門弟子已不能知其有為而言况於百氏所記其間淺陋依托可勝道哉多聞闕疑庶乎其弗畔也已易一卷楊簡撰慈湖遺書三卷楊簡撰前二卷雜說末一卷遺文慈湖之學専主乎心之精神是謂聖一語其誨人惟欲發明本心而有所覺然其稱學者之覺亦頗輕於印可蓋其用功偏於上達受人之欺而不疑竊嘗謂誠明一理焉有誠而不明者乎當淳熙中象山陸九淵之學盛行於江西朱侍講不然之朱公於前輩不肯張無垢於同流不肯陸象山為其本原未純故也象山之後一傳而慈湖遂如此甚矣道之不明賢知者過之也明倫集十卷高安塗近止撰取經傳言行之要以孝為本推而廣之為十篇塗有子登科得初品官致仕心經法語一卷參政建安真德秀希元撰集聖賢論心格言三先生諡議一卷嘉定中魏了翁華父為潼川憲奏請賜周程諡寶慶守李大謙集而刻之併及諸郡祠堂記文言子三卷言偃吳人相傳所居在常熟縣慶元間邑宰孫應時季和始為立祠求朱晦翁為記近新昌王爚伯晦復裒論語諸書所載問答為此書邑中至今有言氏亦買田教飬之道家類老子道德經二卷周柱下史李耳伯陽撰昔人言諡曰聃故世稱老聃然聃之為訓耳漫無輪也似不得為諡御注老子二卷徽宗皇帝御製老子注二卷魏王弼撰魏晉之世𤣥學盛行弼之談𤣥冠於流輩故其注易亦多𤣥義朝說之以道曰弼本深於老子而易則未也其於易多假諸老子之㫖而老子無資於易其有餘不足之迹可見矣世所行老子分道德經為上下卷此本道德經且無章目當是古本老子道德論述要二卷司馬光撰太史公曰老子著書言道德之意後人以其篇首之文名上篇曰道下篇曰德夫道德連體不可偏舉合從本名溫公之說如此其不曰經而曰論亦公新意也老子新解二卷蘇轍撰東坡跋曰使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晉宋間有此書則佛老不為二老子解二卷葉夢得撰其說曰孔子稱竊比於我老彭孟子闢楊墨而不及老氏老氏之書孔孟所不廢也所解生之徒十有三死之徒十有三案老子解云生之徒十有三死之徒十有三原本作死之徒有三誤今改正以為四肢九竅本韓非子解老之說易老通言十卷程大昌撰其序言名為訓老而實該六經故曰易老通言易在而六經皆在矣蓋以易為六經之首也列子八卷鄭人列禦寇撰穆公時人案劉向校定八篇謂列禦寇與鄭繆公同時栁宗元云鄭繆公在孔子前幾百載禦寇書言鄭殺其相駟子陽則鄭繻公二十四年當魯穆公之十年向蓋因魯穆公而誤為鄭耳列子注八卷晉光祿勳張湛處度撰列子釋文二卷唐當塗縣丞殷敬順撰案殷敬順撰列子釋文原本作處順今改正莊子十卷蒙漆園吏宋人莊周撰案史記與齊宣梁惠同時則亦當與孟子相先後矣莊子注十卷晉太傅主簿河南郭象子元撰案本傳向秀解義未竟而卒頗有别本遷流象竊以為已注乃自注秋水至樂二篇又易馬蹄一篇其餘㸃定文句而已其後秀義别出故今有向郭二莊其義一也然向義今不傳但時見陸氏釋文莊子音義三卷唐陸德明撰即經典釋文二十六至二十八卷莊子疏三十卷唐道士西華法師陕郡成元英子實撰元英隱東海貞觀五年召至京師永徽中流郁州不知坐何事唐藝文志云鬻子一卷鬻熊為周文王師封於楚為始祖漢志云爾書凡二十二篇今書十五篇陸佃農師所校鬻子注一卷唐鄭縣尉逄行圭撰止十四篇蓋中間以二章合而為一故視陸本又少一篇此書甲乙篇次皆不可曉二本前後亦不同姑兩存之關尹子九卷周關令尹喜蓋與老子同時啓老子著書言道德者案漢志有關尹子九篇而隋唐及國史志皆不著録意其書亡久矣徐藏子禮得之於永嘉孫定首載劉向校定序篇末有葛洪後序未知孫定從何傳授殆皆依托也序亦不類向文亢倉子三卷案唐書藝文志文獻通考俱作二卷何粲注首篇所載與莊子庚桑楚同亢倉者庚桑聲之變也其餘篇亦皆依托唐栁子厚辨其非劉向班固所録是矣今唐志有王士元亢倉子二卷注云天寶元年詔號莊子為南華真經列子沖虛文子通元亢倉子洞靈真經然亢倉子求之不獲襄陽處士王士元謂莊子作庚桑子太史公列子作亢倉子其實一也乃取諸子文義類者補其亡然則今之亢倉士元為之也宗元唐人豈偶不之知耶文子十二卷題默希子注案漢志有文子九篇老子弟子與孔子同時而稱周平王問似依托者也又案史記貨殖傳徐廣注計然范蠡師名鈃裴駰曰計然葵丘濮上人姓辛氏字文子默希子引以為據然自班固時已疑其依托况又未必當時本書乎至以文子為計然之字尢不可考信栁子厚亦辨其為駁書而亦頗有取焉默希子不著名氏朝公武曰唐徐靈府自號也鶡冠子三卷陸佃解案漢志鶡冠子楚人居深山以鶡為冠今書十九篇韓吏部稱十有六篇故陸謂非其全也韓公頗道其書至栁栁州則曰盡鄙淺言也好事者僞為其書反用鵩賦以文飾之其好惡不同如此自今考之栁說為長抱朴子二十卷晉句漏今丹陽葛洪稚川撰洪所著書內篇言神仙黃白變化之事外篇駁難通釋此二十卷者內篇也館閣書目有外篇五十卷坐忘論一卷唐逸人河內司馬承禎子微撰言坐忘安心之法凡七條并樞翼一篇以為修道階次其論與釋氏相出入天隱子一卷司馬子微作序言不知其何許人著書八篇修鍊形氣飬和心靈長生久視無出此書今觀其言殆與坐忘論相表裏豈天隱云者托之别號歟案洪興祖云司馬子微得天隱子之學未知何據元真子外篇三卷唐隱士金華張志和撰唐志元真子十二卷今才三卷非全書也既曰外篇則必有內篇矣志和事迹詳見余所集碑傳無能子三卷不著名氏唐志云光啓中隱民間蓋其自序云爾莊子義十卷參政清源吕惠卿吉父撰元豐七年先表進內篇其餘蓋續成之莊子十論一卷題李士表撰未詳何人直齊書録解題卷九
