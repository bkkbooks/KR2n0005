body:
  text: 直齊書録解題卷十二宋陳振孫撰神仙類列仙傳二卷漢劉向撰凡七十二人每傳有贊似非向本書西漢人文章不爾也館閣書目三卷六十二人崇文總目作二卷七十二人與此合周易參同契三卷後漢上虞魏伯陽撰其書因易以言養生後世言修鍊者祖之參同契分章通真義三卷明鏡圗訣一卷真一子彭曉秀川撰蜀永康人也序稱廣政丁未以參同契分十九章而為之注且為圗八環謂之眀鏡圖曩在麻姑山傳録其末有秀川傳汪綱㑹稽所刻本其前題祠部員外郎彭曉蓋據祕閣本云爾麻姑本附傳亦言仕蜀為此官參同契考異一卷朱熹撰以其詞韻皆古奧雅難通讀者淺聞妄輒更改比他書尤多舛誤合諸本更相讎正其諸同異皆並存之金碧古文龍虎上經一卷不著名氏麻姑所録本無金碧字黃庭內景經一卷外景經一卷案文獻通考作三卷務成子注是南嶽魏夫人所受者魏舒之女也真誥十卷梁華陽隱居陶宏景撰述楊羲許邁許玉斧遇仙真傳受經文等事參同契解一卷題紫陽先生不知何人內景中黃經一卷案文獻通考作二卷題九仙君撰中黃真人注亦名胎藏論靈樞金鏡神景內經十卷稱扁鵲注上清天地宫府圗經二卷唐司馬子微撰中誡經一卷稱黃帝赤松子問答蓋假託也幽傳福善論一卷唐孫思邈撰元綱論一卷唐中嶽道士吳筠撰續仙傳三卷唐溧水令沈汾撰或作玢道教靈驗記二十卷蜀道士杜光庭撰王氏神仙傳一卷案文獻通考作四卷杜光庭撰當王氏有國時為此書以媚之謂光庭有道吾不信也西山羣仙㑹真記五卷九江施肩吾希聖撰唐有施肩吾能詩元和中進士也而曽慥集仙傳稱吕巖之後有施肩吾者撰㑹真記蓋别是一人也鍾吕傳道記三卷施肩吾撰叙鍾離權雲房吕巖洞賔傳授論議養生真訣一卷虞部員外郎耿肱撰大中祥符時人雲笈七籖一百二十四卷案文獻通考作一百二十卷集賢校理張君房撰凡經法符籙修養服食以及傳記無不畢録祥符中君房貶官㑹推崇聖祖朝廷以祕閣道書付杭州俾戚綸等校正王欽若薦君房専其事銓次為此書頃於莆中傳録才二冊蓋略本也後於平江天慶道藏得其全録之靈樞道言發微二卷朝議大夫致仕傅燮撰進専言火候金液還丹圖論一卷不著名氏自稱元真蓋宣和中道流也悟真篇集注五卷天台張伯端平叔撰一名用成熙寧中遇異人於成都所著五七言詩及西江月百篇末卷為禪宗歌頌以謂學道之人不通性理獨修金丹則性命之道未全有葉士表袁公輔者各為之注還丹復命篇一卷毗陵僧道光撰亦擬悟真詩篇靖康丙午序道樞二十卷曽慥端伯撰慥自號至游子采諸家金丹大藥修錬般運之術為百二十二篇初無所發明獨黜採御之法以為殘生害道云集仙傳十二卷曽慥撰自岑道願而下一百六十二人肘後三成篇一卷稱純陽子謂吕洞賔也其言小成七中成六大成五皆導引吐納修鍊之事日月元樞篇一卷稱劉知古唐明皇時綿州昌眀縣令太白還丹篇一卷稱清虛子太白山人唐貞元時人太清養生上下篇二卷稱赤松子寧先生上清金碧篇一卷稱煙蘿子金虎鉛汞篇一卷稱元君鉛汞五行篇一卷稱探元子已上七種共為一集玉芝書三卷朝元子陳舉撰上卷論五篇中為詩八十一首下為賦九道純陽真人金丹訣一卷即前所謂三成篇微不同華陽真人祕訣一卷稱施肩吾吕真人血脉論一卷稱傅婁景先生逺山崔公入藥鏡三卷不知何人四象論一卷稱老子真仙傳道集三卷案此條疑脫解題參同契三卷即魏伯陽書題九華子編巨勝歌一卷道士栁冲用撰逍遙子通元書三卷不知姓名但曰逍遙子百章集一卷稱魏伯陽案此條原本脫去今據文獻通考補入與後條所云已上十八種其數乃符許先生十二時歌一卷不知其名黃帝丹訣玉函祕文一卷文林郎蒲庚進吕公窑頭坯歌一卷以陶器為喻也太上金碧經一卷題魏伯陽注金鏡九真玉書一卷無名氏龍虎金液還丹通元論一卷稱羅浮山蘇真人撰金碧上經古文龍虎傳長白山人元陽子注皆莫知何人已上十八種共為一集其中有龍牙頌及天隱子各已見釋氏道家類羣仙珠玉集一卷其序曰西華真人以金丹刀圭之訣傳張平叔作悟真篇以傳石得之薛道光陳泥丸至白玉蟾玉蟾者葛其姓福之閩清人嘗得罪亡命蓋姦妄流也余宰南城有寓公稱其人云近嘗過此識之否余言不識也此輩何可使及吾門李士寧張懷素之徒皆殷監也是以君子惡異端釋氏類金剛般若經一卷姚秦三藏鳩摩羅什譯石本金剛經一卷南唐保大五年夀春所刻乾道中劉岑季髙再刻於建昌軍不分三十二分相傳以為最善六譯金剛經一卷此經前後六譯各有異同有𢎞農楊䫧者集為此本太和中中貴人楊永和集右軍書案文獻通考作承和刻之興唐寺圓覺了義經十卷唐罽賔佛陀多羅譯華嚴經八十一卷唐于闐實義難陀譯萬行首楞嚴經十卷唐天竺般刺密諦烏長國彌迦釋迦譯語宰相房融筆受所謂譯經潤文者也維摩詰所說經一卷案文獻通考作十卷鳩摩羅什譯維摩經一卷蘇轍所書楞伽經四卷有宋魏唐三譯宋譯四卷唐譯七卷正平張戒集注蓋以三譯參校研究得舊注本莫知誰氏頗有倫理亦多可取句讀遂明白其八卷者分上下也四十二章經一卷後漢竺法蘭譯佛書到中國此其首也所謂經來白馬寺者其後千經萬論一大藏教乘要不出於此中國之士往往取老莊之遺說以附益之者多矣遺教經一卷佛涅槃時所說唐碑本以下三種同阿彌陀經一卷唐陳仁稜所書刻於襄陽金剛經一卷唐武敏之所書在長安金剛經一卷唐塢彤所書在吳興墨妙亭羅漢因果識見頌一卷天竺闍那多迦譯首有范仲淹序言宣撫河東得於傳舍藏經所未録者十六羅漢為比丘摩拿羅等說六祖壇經一卷案文獻通考作三卷僧法海集宗門統要十卷建溪僧宗永集法藏碎金十卷太子少傅朝迥撰景祐天竺字源七卷僧惟淨等集進案文獻通考惟淨作相淨以華梵對翻有十二轉聲三十四字母各有齒牙舌喉脣五音仁宗御製序鏤板頒行吳郡虎丘寺有賜本如新己亥借録金園集三卷錢塘天竺僧遵式撰天竺别集三卷遵式撰世所謂式懴主者也華嚴合論法相撮要一卷青谷真際禪師案真際原本作真除今據文獻通考改正以唐李長者通元合論撮其要義手藁為圗僧寶傳三十卷案文獻通考作三十二卷僧惠洪撰道院集要三卷户部尚書三槐王右敏仲撰以朝迥法藏碎金耄智餘書刪重集粹别為此編禪宗頌古聨珠集一卷僧法應編嘉泰普燈録三十卷僧正受編三録大抵與傳燈相出入接續機緣語句前後一律先儒所謂遁辭也然本初自謂直指人心不立文字今四燈總一百二十卷數千萬言乃正不離文字耳雪峯廣録二卷唐真覺大師義存語丞相王隨序之隨及楊大年皆號參禪有得者也大慧語録四卷僧宗杲語其徒道謙所録張魏公序之兵書類六韜六卷武王太公問答其辭鄙俚世俗依託也司馬法一卷齊司馬穰苴撰孫子三卷吳孫武撰漢志八十一篇魏武帝削其繁冗定為十三篇世之言兵者祖孫氏然孫武事吳闔廬而不見於左氏傳未知其果何時人也吳子三卷魏吳起撰尉繚子五卷六國時人案漢志雜家有二十九篇兵形勢家又有三十一篇今書二十三篇未知果當時本書否黃石公三略三卷世傳張子房受書圯上老人曰濟北穀城山下得黃石即我也故遂以黃石為圯上老人然皆傅㑹依託也黃石公素書一卷亦依託也李衛公問對三卷唐李靖對太宗亦假託也文辭淺鄙尤甚今武舉以七書試士謂之武經其間孫吳司馬法或是古書三略尉繚子亦有可疑六韜問對僞妄眀白而立之學官置師弟子伏而讀之未有言其非者何也何薳春渚紀聞言其父去非為武學博士受詔校七書以六韜問對為疑白司業朱服服言此書行之已久未易遽廢遂止後為徐州教授與陳師道為代師道言聞之東坡世所傳王通元經關子眀易傳及李靖問對皆阮逸僞撰逸嘗以草示奉常公云奉常公者老蘇也注孫子二卷唐中書舍人杜牧之撰閫外春秋十卷唐少室山布衣李筌撰起周武王勝殷止唐太宗擒竇建德明君良將戰爭攻取之事天寶二年上之風后握竒經一卷永嘉薛士龍季宣校定自晉馬隆三百八十四字續圖三百十五字合標題七百字又有馬隆讚述多所發眀并寫陳圗於後馬隆本竒作機三略素書解一卷吕惠卿吉甫撰三朝經武聖略十五卷天章閣侍講王洙撰案文獻通考載朝氏說稱曽公亮丁度撰下文又有是時洙奉詔云云未知何據寶元中上進凡十七門後五卷為奏議中興書目云十卷李淑書目十五卷今本與邯鄲卷數同武經總要四十卷天章閣待制曽公亮等撰制度故事各十五卷邉防占候各五卷昭陵御製序慶厯四年也百將傳十卷清河張預集進凡百人每傳必以孫子兵法斷之熙寧收復熙河陳法三卷觀文殿學士九江王韶子純撰武經龜鑑二十卷保平軍節度使王彥撰隆興御製序其書以孫子十三篇為主而用厯代事證之渭南祕訣一卷昭武謝淵得之於瀘州蓋武侯八陳圖法也為之注釋而傳於世補漢兵制一卷錢文子撰隂符元機一卷即隂符經也監察御史新安朱安國注此書本出於李筌云得於驪山老姥舊志皆列於道家安國以為兵書之祖要之非古書也兩漢兵制一卷建安王珨器之撰制勝方略三十卷修武郎楊肅德欽撰自左氏傳而下迄於陳隋用兵事迹慶元丁巳序漢兵編二卷辨疑一卷姑蘇潘夢旗天錫撰歷象類周髀算經二卷音義一卷題趙君卿注甄鸞重述李淳風等注釋周髀者蓋天之書也稱周公受之商髙而以句股為術故曰周髀唐志有趙嬰甄鸞注各一卷李淳風釋二卷今曰君卿者豈嬰之字耶中興書目又云君卿名爽蓋本崇文總目然皆莫詳時代甄鸞者後周司隸也音義者假承務郎李籍撰星簿讚厯一卷唐志稱石氏星經簿讚館閣書目以其有徐潁婺台等州名疑後人附益今此書明言依甘石巫咸氏則非専申石書也乙巳占十卷唐太史令岐陽李淳風撰起算上元乙巳故以名焉玉厯通政經三卷李淳風撰亦天文占也唐志無之乾坤變異録一卷不著名氏雜占變異凡十七篇古今通占三十卷唐嵩髙潛夫沛國武密撰纂集黃帝巫咸而下諸家及隋以前諸史天文志為此書景祐乾象新書間取其說中興館閣書目作古今通占鏡本唐志云爾景祐乾象新書三十卷司天春官正楊惟德等撰按文獻通考惟作雄以厯代占書及春秋至五代諸史采托撰集元年七月書成賜名仍御製序大宋天文書十五卷不著名氏館閣書目亦無之意其為太史局見今施用之書蓋供報占驗大抵出此天經十九卷同州進士王及甫撰進案文獻通考撰字下無進字不知何人其書定是非協同異由博而約儒者之善言天者也天象法要二卷原注天象當作儀象丞相溫陵蘇頌子容撰元祐三年新造渾天成記其法要而圗其形象進之厯代星史一卷不著名氏鈔集諸史天文志天文考異二十五卷昭武布衣鄒淮撰大抵襲景祐新書之舊淮後入太史局二十四氣中星日月宿度一卷此書傳之程文簡家云得於荆判局荆名大聲太史局官也天象義府九卷宜黃布衣應垕撰其書考究精詳論議新竒而多穿鑿傅㑹象垂於天其曰某星主某事者人實名之也開闢之初神聖在御地天之通未絶其必有得於仰觀俯察之妙者故曰天垂象聖人則之夫天豈諄諄然命之乎如必一切巧為之說而以為天意實然則幾於矯誣矣官厯刻漏圖一卷蓮花漏圖一卷太常博士王普伯照撰唐大衍歷議十卷唐僧一行作新厯草成而卒詔張說與官厯陳元景等次為厯術七篇略例一篇歷議十篇新史志略見之十議者一厯本二日度三中氣四合朔五卦候六九道七日晷八分野九五星十日食大抵皆以考正古今得失也厯志略取其要著於篇者十有二曰歷本曰中氣曰合朔曰卦候曰卦議曰日度曰九道曰日食曰五星蓋厯議之八篇而分卦候為二故共為九條其沒滅盈縮晷漏中星三條則皆取之略例餘歷議日晷分野二篇則具之天文志嘉定辛未辭科用為序題有劉淡如者嘗得其書自詭必在選中而考官但据史文初不知此書尚存於世也以其篇次與史文不合黜之要之史官因此書以述志考官因史志以命題當以此書為本而參考志之所載乃為全善郭雍撰集古厯通議論諸家厯云一行作厯上自劉洪之斗分下及淳風之總法前後五百餘年諸家所得厯術精微之法集其大成以作開元厯此其所以前無古人後無來者可謂盡善盡美矣是以自寶應之後以迄於今幾五百年皆宗之而不能易語以上古聖人之術則又有間矣隨齊批注崇天厯一卷司天夏官正權判監宋行古等撰天聖二年上學士晏殊序國初有建隆應天厯次有乾元歷儀天厯詳見三朝史志太祖建隆應天太宗太平興國乾元真宗咸平儀天仁宗天聖崇天紀元厯三卷立成一卷案原本脫去立成一卷今據文獻通考補入姚舜輔撰崇寧五年成自崇天之後有眀天厯熙寧奉元厯元祐觀天厯至崇寧三年舜輔造新厯曰占天未幾蔡京又令舜輔更造用帝受命之年即位之日元起庚辰日命己卯上親製序頒之天下賜名紀元本朝承平諸厯略具正史志不見全書此二厯近得之蜀人秦九韶道古故存之英宗治平眀天熙寧元年復崇天熙寧七年奉元哲宗元祐觀天徽宗崇寧紀元統元厯一卷常州布衣陳得一更造祕書少監朱震監視紹興五年上厯家不以為工髙宗紹興統元二十二年以後用紀元㑹元厯一卷夏官正劉孝榮造禮部尚書李瓛序案文獻通考瓛作巘紹熙元年也孝榮判太史局凡造三厯此其最後者勝前逺矣孝宗乾道厯淳熙厯光宗紹熙㑹元厯統天厯一卷案統天厯卷數原本闕今據文獻通考補入冬官正楊忠輔撰丞相京鏜表進其厯議甚詳至於星度明言不曽測驗無候簿可以立術最為不欺紹熙五年也其末有神殺一篇流於隂陽拘忌則為俚俗寧宗慶元統天開禧厯三卷立成一卷大理評事鮑浣之撰進時開禧三年詔附統天厯推算至今頒厯用統天之名而實用此厯當時緣金人閏月與本朝不同故於此厯加五刻天道有常而造術以就之非也大抵中興以來雖屢改厯而日官淺鄙不知厯象之本但模襲前厯而於氣朔皆一時遷就爾金大明厯一卷金大定十三年所為也其術疏淺無足取積年三億以上其拙可知然統天開禧改厯皆緣朝論以北厯得天為疑貴耳賤目由來久矣實不然也數術大略九卷魯郡秦九韶道古撰前世算術自漢志皆屬厯譜家要之數居六藝之一故今解題列之雜藝類惟周髀經為蓋天遺書以為厯象之冠此書本名數術而前二卷大衍天時二類於治厯測天為詳故亦置之於此秦博學多能尤邃厯法凡近世諸厯皆傳於秦所言得失亦悉著其語云隂陽家類自司馬氏論九流其後劉歆七略班固藝文志皆著隂陽家而天文厯譜五行卜筮形法之屬别為數術略其論隂陽家者流蓋出於羲和之官欽若昊天厯象日月星辰拘者為之則牽於禁忌泥於小數至其論數術則又以為羲和卜史之流而所謂司星子韋三篇不列於天文而著之隂陽家之首然則隂陽之與數術亦未有以大異也不知當時何以别之豈此論其理彼具其術耶今志所載二十一家之書皆不存無所考究而隋唐以來子部遂闕隂陽一家至董逌藏書志始以星占五行書為隂陽類今稍增損之以時日祿命遁甲等備隂陽一家之闕而其他數術各自為類景祐遁甲玉函符應經二卷司天春官正楊惟德撰御製序景祐太一福應集要十卷楊惟德撰御製序末題紹興元年嵩陽潛士魏郡劉箕其積算自建炎三年己酉推之者其所附益也九宫八門與遁甲相表裏字多訛未有他本可校隂陽二遁圖局一卷并雜訣三元立成圗局二卷遁甲八門機要一卷太一淘金歌一卷以上四種皆無名氏得之旴江吳炎遁甲選時圗二卷紹興府所刻本亦無名氏廣濟隂陽百忌厯二卷稱唐吕才撰有序案才序隂陽書其三篇見於本傳曰祿命曰卜宅曰葬案吕才傳其叙隂陽書見於本傳者三篇曰卜宅曰祿命曰葬此云一篇誤今改正盡掃世俗拘滯之論安得復有此厯本初固已假託後人附益尤不經三厯㑹同十卷不知作者集百忌總聖集正三書萬厯㑹同三卷案文獻通考作三十卷陳從古撰以前書推廣之書坊售利之具也彈冠必用一卷周渭撰案文獻通考渭作謂専為宦游擇日設三厯撮要一卷無名氏又一本名擇日撮要厯大略皆同建安徐清叟宜翁云案文獻通考宜作真其尊人尚書公應龍所輯不欲著名隂陽備用十二卷通判舒州新安胡舜申汝嘉撰此書本為地理形法而諸家選時日法要皆在焉故附於此珞琭子一卷此書祿命家以為本經其言鄙俚閭巷賣卜之所為也壺中賦一卷稱紫雲溪壺中子莫知何人源髓歌六卷後集三卷唐沈芝撰後集妄也太一命訣一卷稱袁天綱妄人假託五星命書一卷不著名氏歌訣頗詳然未必驗也五星三命指南十四卷亦不知名氏大抵書坊售利求俗師為之聿斯歌一卷案文獻通考有聿斯歌一卷原本作聿欺誤今改正青羅山布衣王希明撰不知何人靈臺三十六歌一卷稱武平先生亦不知何人五星六曜約法一卷洞微歌一卷紫宙經一卷以上三種皆無名氏四門經一卷唐待詔陳周輔撰青羅立成厯一卷司天監朱奉奏據其厯起貞元十年甲戌入厯至今乾寧四年丁巳則是唐末人羅計二隱曜立成厯一卷稱大中大夫曹士蒍亦莫知何人但云起元和元年入厯諸家五星書一卷雜録五星祿命之說前數家亦多在焉遁甲八門命訣一卷不知名氏信齊百中經一卷不著名氏安慶府本術士言最善怡齊百中經一卷東陽術士曹東野自言今世言五星者皆用唐顯慶厯厯法更本朝前後無慮十餘變而百中經猶守舊厯安得不差於是用見行厯法推算其說如此未之能質也五行精紀三十四卷清江鄉貢進士廖中撰周益公為之序集諸家三命說三辰通載三十四卷嘉禾錢如璧編集五星命術卜筮類易林十六卷漢小黃令梁焦延夀贛撰又名大易通變唐㑹昌丙寅越五雲溪王俞序凡四千九十六卦其辭假出於經史其意雅通於神祇蓋一卦可以變六十四也舊見沙隨程迥所記南渡諸人以易林筮國事多竒驗求之纍年寶慶丁亥始得之莆田皆韻語古雅頗類左氏所載繇辭或時援引古事間嘗筮之亦驗頗恨多脫誤嘉熙庚子從湖守王寺丞侑借本兩相校十得八九其中亦多重復或諸卦數爻共一繇莫可考也易傳積算法雜占條例一卷漢京房撰詳已見易類世所傳京氏遺學不過如此而已今世卜者世應飛伏納甲之類皆出京氏周易版詞一卷不知名氏當是漢魏以前人所為其間官名皆東京制也周易元悟一卷題李淳風撰火珠林一卷無名氏今賣卜者擲錢占卦盡用此書揲蓍古法一卷開封鄭克武子撰蓍卦辨疑序三卷郭雍撰自序略言學者相傳謂九為老陽七為少陽六為老隂八為少隂及觀乾爻稱九坤爻稱六則九六為隂陽蓋無疑也而六子皆稱九六不言七八則少隂少陽未有所據及考乾坤之䇿曰乾之䇿二百一十有六坤之䇿百四十有四六之一則乾爻得三十六坤爻得二十四是則老隂老陽之數也又考二篇之䇿陽爻百九十有二以三十六乘之積六千九百十有二隂爻百九十有二以二十四乘之積四千六百八合之為萬有一千五百二十則二篇之䇿亦皆老隂老陽之數也而少隂少陽之數又無所見再置陽爻百九十有二以少陽二十八乘之積五千三百七十六再置隂爻百九十有二以少隂三十二乘之積六千一百四十四合之亦為萬有一千五百二十以是知少隂少陽之數隱於老隂老陽之中如是則七九皆為陽六八皆為隂其畫為竒為耦皆同聖人畫卦初未必以隂陽老少為異然卜史之家欲取動爻之後卦故分别老少之象與聖人畫卦之道已不同矣然七九為陽六八為隂蓋謂隂陽各有二道與說卦言立天之道曰隂與陽立地之道曰柔與剛其義皆同是道也以聖人不明載之繫辭後世紛紛互相矛盾至有大失聖人之意者大率多主卜史之論不知所謂䇿數遂妄為臆說也六壬翠羽歌一卷後唐長興中僧令岑撰錯誤極多未有他本可校京氏參同契律厯志一卷虞翻注専言占象而不可盡通字亦多誤未有别本校京氏易式一卷朝說之以道撰六壬洞微賦一卷不知名氏瞽卜劉松年所傳形法類八五經一卷序稱大將軍記室郭璞後序言余受郭公囊書數篇此居一公戒以祕之丞相王公盡索余書余以公言告之得免末稱太興元年六月蓋晉元帝時王公謂導也然皆依託爾其書為相墓作八五者其五行八卦之謂歟狐首經一卷不著名氏稱郭景純序亦依託也胡汝嘉始序而傳之其文亦雅馴言頗有理隂陽備用中全載續葬書一卷稱郭景純鄙俗依託地理小原本缺一卷稱李淳風亦未必然洞林照膽一卷范越鳳撰又名洞林别訣相傳為縉雲人家於將樂地理口訣一卷不知何人所集曰楊筠松曽楊乙黃禪師左仙朱仙桃范越鳳劉公賴太素張師姑王吉凡十家楊公遺訣曜金歌并三十六象圖一卷楊即筠松也人號楊救貧神龍鬼砂一卷羅星妙論一卷皆不知作者九星賦一卷題范公龍髓經一卷疑龍經一卷辨龍經一卷龍髓别旨一卷九星祖局圖一卷五星龍祖一卷二十八禽星圖一卷以上七種皆無名氏并前諸家多吳炎録以見遺江西有風水之學往往人能道之雜相書一卷凡二十三種案文獻通考作三十二卷又有拾遺亦吳晦父所録成和子觀妙經一卷不著名氏希夷先生風鑑一卷按文獻通考風作龜逸人亳社陳摶圗南撰劉康國注館閣書目作人倫風鑑諸家相書五卷知莆田縣昭武黃唐毅夫撰集案文獻通考黃唐作黃庚玉管神照一卷無名氏集馬相書一卷光祿少卿孫圭撰相鶴經一卷稱浮丘公撰相貝經一卷不知作者師曠禽經一卷稱張華注直齊書録解題卷十二
