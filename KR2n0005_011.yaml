body:
  text: 直齋書録解題卷十一宋陳振孫撰小説家類神異經一卷稱東方朔撰張茂先傳十洲記一卷亦稱東方朔撰二書詭誕不經皆假託也漢書本傳叙朔之辭末言劉向所録朔書具是矣世所傳他事皆非也賛又言朔之談諧其事浮淺行於衆庶而後世好事者因取竒言怪語附著之朔故詳録焉史家欲祛妄惑可謂眀矣洞冥記四卷拾遺一卷東漢光禄大夫郭憲子横撰題漢武别國洞冥記其别録又於御覽中鈔出然則四卷亦非全書也凡若是者蔵書之家備名數而已無之不足為損有之不足為益况於詳畧尤非所計也唐志入神仙家拾遺記十卷晉隴西王嘉子年撰蕭綺序録名山記一卷亦稱王子年即前之第十卷案此句原本誤脫今據文獻通攷増入大抵皆詭誕嘉苻秦時人見晉書藝術傳殷芸小說十卷宋殷芸撰邯鄲書目云或題劉餗非也今此書首題秦漢魏晉宋諸帝注云齊殷芸撰非劉餗眀矣故其序事止宋初蓋於諸史傳記中鈔集或稱商芸者宣祖廟未祧時避諱也世說新語三卷叙録二卷宋臨川王劉義慶撰梁劉峻孝標注叙録者近世學士新安汪藻彦章所為也首為考異繼列人物世譜姓氏異同末記所引書目按唐志作八卷劉孝標續十卷自餘諸家所蔵卷第多不同叙録詳之此本董令升刻之嚴州以為晏元獻公手自校定刪去重複者案叙録者以下原本脫去今據文獻通攷補入續齊諧記一卷梁奉朝請吴均撰齊諧志怪本莊子語也唐志又有東陽無疑齊諧志今不傳此書殆續之者歟北齊還寃志二卷顔之推撰古今同姓名録一卷梁元帝撰有陸善經者續之至五代時朝野僉載一卷唐司門郎中饒陽張鷟文成撰其書本三十卷案宋史藝文志朝野僉載二十卷又僉載補遺三卷文獻通攷止載補遺三卷葢亦未見全書此云本三十卷疑誤此特其節畧爾别求之未獲鷟自號浮休子補江總白猿傳一卷無名氏歐陽紇者詢之父也詢貌類獮猿蓋嘗與長孫無忌互相嘲謔矣此傳遂因其嘲廣之以實其事託言江總必無名子所為也冥報記二卷唐吏部尚書京兆唐臨本徳撰劉餗小說三卷唐右補闕劉餗鼎卿撰隋唐嘉話一卷劉餗撰博異志一卷稱谷神子不知何人所記初唐及中世事辨疑志三卷唐宣武行軍司馬吳郡陸長源撰辨里俗流傳之妄宣室志十卷唐吏部侍郎常山張讀聖用撰案文獻通考聖用作聖朋宣室者漢文帝問鬼神之處也封氏見聞記二卷唐吏部郎中封演撰前紀典故末及雜事頗有可觀劉公佳話一卷唐江陵少尹韋絢文眀撰劉公禹錫也絢執誼之子戎幕閒談一卷韋絢撰為西川廵官記李文饒所談聞竒録一卷不著名氏當是唐末人栁常侍言㫖一卷唐栁珵撰常侍者其世父芳也凡六章末有劉幽求及上清傳幽閒鼓吹一卷唐張固撰甘澤謡一卷唐刑部郎中袁郊撰所記凡九條咸通戊子自序以其春雨澤應故有甘澤成謡之語遂以名其書乾􅍧子三卷唐温庭筠飛卿撰序言不爵不觥非炰非炙能恱諸心聊甘衆口庶乎乾􅍧之義􅍧與饌同字従肉見古禮經尚書故實一卷唐李綽撰又名尚書談録首言賔䕶尚書河東張公三代相門謂嘉貞延賞宏靖也宏靖盧龍失御貶賔客分司綽唐未人未必及宏靖宏靖之後文規次宗彦逺皆不登八座未詳所謂唐志即以為延賞尤不然雜纂一卷唐李商隠義山撰俚俗常談鄙事可資戲笑以類相從今世所稱殺風景蓋出於此又有别本稍多皆後人附益盧氏雜記一卷唐盧言撰杜陽雜編三卷唐武功蘇鶚徳祥撰酉陽雜爼二十卷續十卷唐太常少卿臨淄段成式柯古撰所記故多譎怪其標目亦竒詭如天咫玉格壺史貝編尸穸之類成式文昌之子廬陵官下記二卷段成式撰為吉州刺史時也唐闕史三卷唐髙彦休撰自號參寥子乾符中人北里志一卷唐學士孫棨撰載平康狹邪事玉泉筆端三卷又别一卷不著名氏有序中和三年作末有䟦云扶風李昭徳家蔵之書也即古淮海相公孫又稱黄巢䧟洛之眀年䟦亦不知何人别一本號玉泉子比此本少數條而多五十二條無序䟦録其所多者為一卷雲溪友議十二卷唐范攄撰自稱五雲溪人咸通時唐志三卷傳竒六卷唐裴鉶撰髙駢從事也尹師魯初見范文正岳陽樓記曰傳竒體爾然文體隨時要之理勝為貴文正豈可與傳竒同日語哉蓋一時戲笑之談耳唐志三卷今六卷皆後人以其卷帙多而分之也三水小牘三卷唐皇甫牧遵美撰天祐中人三水者安定屬邑也醉鄉日月三卷唐皇甫松子竒撰唐人飲酒令此書詳載然今人皆不能曉也異聞集十卷唐屯田員外郎陳翰撰翰唐末人見唐志而第七卷所載王魁乃本朝事當是後人剿入之耳卓異記一卷案原本不著卷數今據宋史藝文志補入稱李翺撰記當時君臣卓絶盛事或云長城陳翺案宋史藝文志既載李翺卓異記又有卓異記一卷題陳翰撰注云一作翺疑一書而誤分為二也大唐說纂四卷不著名氏分門類事若世説止有十二門恐非全書摭言十五卷唐王定保撰専記進士科名事定保光化三年進士為吳融子華壻喪亂後入湖南棄其妻弗顧士論不齒廣摭言十五卷鄉貢進士何晦撰案晦原本作臨文獻通攷宋史藝文志俱作晦十國春秋亦云何晦著摭言今改正其序言太嵗癸酉下第於金陵鳳臺旅舍癸酉者開寳六年也時江南猶未下晦蓋其國人歟金華子新編三卷大理司直劉崇逺撰五代時人記大中以後雜事耳目記一卷無名氏邯鄲書目云劉氏撰未詳其名記唐末以後事唐朝新纂三卷融州副使石文徳撰豪異秘纂一卷無名氏所録五事其扶餘國王一則即所謂虬須客者也紀聞譚三卷蜀潘逺撰館閣書目按李淑作潘遺今考邯鄲書目亦作潘逺其曰遺者本誤也所記隋唐遺事北夢𤨏言三十卷案文獻通攷作二十卷黄州刺史陵井孫光憲孟文撰載唐末五代及諸國雜事光憲仕荆南髙從誨三世在幕府北夢者言在夢澤之北也後隨繼沖入朝有薦於太祖者將用為學士未及而卒光憲自號葆光子後史補三卷前進士髙若拙撰野人閒話五卷成都景煥撰記孟蜀時事乾徳三年序續野人閒話二卷不知作者開顔集三卷校書郎周文規撰未知何時人以古笑林多猥俗迺於書史中鈔出可資談笑者為此編洛陽搢紳舊聞記五卷案文獻通攷作十卷丞相曹國張齊賢師亮撰所録張全義治洛事甚詳也太平廣記五百卷太平興國二年詔學士李昉扈䝉等修御覽又取野史傳記故事小説撰集眀年書成名太平廣記秘閣閒談五卷起居舍人吳淑正儀撰淑丹陽人廣卓異記二十卷樂史子正撰談苑十五卷案文獻通攷作楊文公談苑八卷丞相宋庠公序所録楊文公億言論初文公里人黄鑑從公遊纂其異聞竒說名南陽談藪宋公删其重複分為二十一門改曰談苑文㑹談叢一卷題華陽上官融撰不知何人天聖五年序國老閒談二卷稱夷門君玉撰不著姓洞微志三卷案文獻通攷作十卷學士錢易希白撰乗異記三卷南陽張君房撰咸平癸夘序取晉之乗之義也君房又有脞説家偶無之晁公武讀書志以脞說為張唐英君房撰又言君房著名臣傳蜀檮杌雲笈七籖行於世按君房祥符天禧以前人楊大年改閑忙令所謂紫微失却張君房者即其人也常為御史屬坐鞫獄貶秩因編修七籖得著作佐郎七籖序自言君房蓋其名非字也唐英字次功熙豐間人丞相商英天覺之兄作名臣傳蜀檮杌者與君房了不相涉不知晁何以合為一人也其誤眀矣補妒記八卷案文獻通攷作一卷稱京兆王績編不知何時人古有宋虞之妒記等今不傳故補之自商周而下迄於五代史傳所有妒婦皆載之末及神怪雜說文論等最後有治妒二方尤可笑也祖異志十卷信陵聶田撰康定元年序括異志十卷後志十卷襄國張師正撰郡閣雅言二卷贊善大夫潘若沖撰案晁公武讀書志稱潘若同撰文獻通攷云書録解題作郡閣雜言題贊善大夫潘欲沖撰今此本仍作郡閣雅言惟稱若沖則互異茅亭客話十卷江夏黄休復端本撰所記多蜀事别有成都名畫記蓋蜀人也嘉祐雜志三卷修起居注陳留江休復鄰㡬撰夢溪筆談二十六卷沈括存中撰其序言退居絶過従所與談者惟筆硯而已苕川子所記三事一卷不知何人三事者勃窣姑王立林果毅皆異事也末有韓蟲兒一事是歐陽公所記偶録附此東齋記事十卷翰林學士蜀郡范鎮景仁撰紀聞一卷集賢殿修撰李復圭審言撰淑之子也東坡手澤三卷蘇軾撰今俗本大全集中所謂志林者也艾子一卷相傳為東坡作未必然也龍川畧志六卷别志四卷蘇轍撰龍川者循州也玉壺清話十卷僧文瑩撰張芸叟雜說一卷吏部侍郎張舜民芸叟撰畫墁集一卷張舜民撰洛游子一卷題司馬光非也所稱樂全子齊物子亦莫知何人麈史三卷司農少卿安陸王得臣彦輔撰嘉祐四年進士其序稱政和乙未行年八十自號鳳臺子蓋王昭素之後王銍性之之伯父也揮麈録詳載蘇氏談訓十卷朝請大夫蘇象先撰述其祖魏公頌子容遺訓續世說三卷案文獻通攷作十二卷孔平仲毅父撰編宋至五代事以續劉義慶之書也孫公談圃三卷臨江劉延世録髙郵孫升君孚所談升元祐中書舍人坐黨籍謫汀州澠水燕談十卷齊國王闢之聖涂撰澠齊水名春秋傳有酒如澠闢之治平四年進士烏臺詩話十三卷蜀人朋九萬録東坡下御史獄公案附以初舉發章疏及謫官後表章書啓詩詞等碧雲騢一卷題梅堯臣撰以廏馬為書名其說曰世以旋毛為醜此以旋毛為貴雖貴矣病可去乎其不遜如此聖俞必不爾也所記載十餘條公卿多所毁訐雖范文正亦所不免或云實魏泰所作託之聖俞王性之辨之甚詳而邵氏聞見後録乃不然之青箱雜記十卷朝散郎吳處厚撰知漢陽軍箋注蔡確詩者也後亦不顯師友閒談一卷案文獻通攷作師友談記李廌方叔撰劍溪野語三卷延平陳正敏撰自號遯翁别有遯齋閒覽十四卷未見冷齋夜話十卷案文獻通攷作六卷僧恵洪撰所言多誕妄墨客揮犀十卷續十卷不知名氏搜神秘覽三卷京兆章炳文叔虎撰石林燕語十卷葉夢得少藴撰宣和五年所作也燕語攷異十卷成都宇文紹奕撰舊聞汪玉山嘗辨駁燕語之誤而未之見也玉澗雜書十卷葉夢得撰攷其中所記亦當在宣和時所作玉澗者石林山居澗水名也巖下放言一卷葉夢得撰休致後所作柏臺雜著一卷石公弼撰雜記典故等事公弼本名公輔改賜今名為御史攻蔡京甚力竟坐深文謫死然本傳言其議論反覆非純正者紺珠集十二卷案文獻通攷作十三卷朱勝非鈔諸家傳記小說視曽慥類説為畧類説五十卷太府卿温陵曽慥端伯撰所編傳記小說古今凡二百六十餘種春渚紀聞十卷浦城何薳撰自號寒青老農東坡所薦為武學博士曰去非者其父也曲洧舊聞一卷雜書一卷骫骳說一卷直秘閣新安朱弁少章撰弁於晦庵為從父建炎丁未使金留十七年既歸而卒骫骳說者以續晁无咎詞話而晁書未見南游記舊一卷曽紆公衮撰翰墨叢紀五卷樞宻睢陽滕康子濟撰鐵圍山叢談五卷蔡絛撰謫欝林博白時所作萍洲可談三卷吳興朱彧無或撰中書舍人服行中之子宣和元年序萍洲老圃其自號也在黄州蓋其僑寓之地事見齊安志而彧作或字無惑未詳孰是硯岡筆志一卷唐稷撰自號硯岡居士泊宅編十卷方勺仁聲撰泊宅在烏程相傳張志和泊舟浮家泛宅之所勺買田卜築號泊宅翁本嚴瀨人却掃編三卷吏部侍郎睢陽徐度敦立撰閒燕常談三卷董弅令升撰取士相與談仁義於閒燕之義唐語林八卷長安王讜正甫撰以唐小説五十家倣世說分門三十五又益十七為五十二門中興書目十一卷而闕記事以下十五門又云一本八卷今本亦止八卷而門目皆不闕道山清話一卷不知何人跋語稱大父國史在館閣久多識前輩著館秘録曝書記與此而三兵火散失近得此書於曽仲存家末題朝奉大夫暐亦不著姓復齋閒記四卷承議郎厯陽龔相聖任撰待制原之孫頤正之父也鄞川志五卷中書舍人龍舒朱翌新仲撰寓居四眀故曰鄞川忩間紀聞一卷稱陳子兼撰未知何人雜論詩文經傳亦間述所聞事枕中記一卷不著名氏崇寧中人所載多國初事姚氏殘語一卷剡姚寛令威撰又名西溪叢話已板行槁簡贅筆二卷承議郎章淵伯深撰始得此書於程文簡氏不知何人作文簡題其後以其中稱先丞相申公知其為章子厚子孫也余又以其書考之言先祖光禄元祐三年省試東坡知舉擢為第一則又知其為援之孫也後以問諸章始得其名字其人博學有文以場屋待士薄如防宼盗用廕入仕遂不就舉居長興故序稱若溪草堂淵自號懲窒子序言録為五卷今此惟分上下卷老學庵筆記十卷陸游務觀撰生識前輩年登耄期所記見聞殊可觀也夷堅志甲至癸二百卷支甲至支癸一百卷三甲至三癸一百卷四甲四乙二十卷大凡四百二十卷翰林學士鄱陽洪邁景盧撰稗官小説昔人固有為之者矣游戲筆端資助談柄猶賢乎已可也未有卷帙如此其多者不亦謬用其心也哉且天壤間反常反物之事惟其罕也是以謂之怪苟其多至於不勝載則不得為異矣世傳徐鉉喜言怪賔客之不能自通與失意而見斥絶者皆詭言以求合今邁亦然晚嵗急於成書妄人多取廣記中舊事改竄首尾别為名字以投之至有數卷者亦不復刪潤徑以入録雖叙事猥釀屬辭鄙俚不恤也睽車志五卷知興國軍厯陽郭彖次象撰取睽上六載鬼一車之語經鋤堂雜志八卷倪思正甫撰續釋常談二十卷秘書丞龔頤正養正撰昔有釋常談一書不著名氏家蔵亦缺此書今故以續稱凡常言俗語皆注其所出北山紀事十二卷戸部侍郎濡須王遘少愚撰雲麓漫鈔二十卷續鈔二卷通判徽州趙彦衡景安撰續二卷乃中庸說及漢定安公補紀也彦衡紹熙間宰烏程有能名儆告一卷不著名氏専叙報應夷堅志類編三卷四川總領陳昱日華取夷堅志中詩文藥方類為一編山齋愚見十書一卷稱灌圃耐得翁不知何人桯史十五卷岳珂撰桯史者猶言柱記也原註説文桯牀前几也游宦紀聞十卷鄱陽張士南光叔撰鼠璞一卷戴埴撰周盧注博物志十卷盧氏注六卷晉張華撰其書多竒聞異事華能辨龍鮓識劔氣其學固然也元怪録十卷唐牛僧孺撰唐志十卷又言李復言續録五卷館閣書目同今但有十一卷而無續録瀟湘録十卷唐校書郎李隠撰館閣書目云爾唐志作栁詳未知書目何據也龍城録一卷稱栁宗元撰龍城謂栁州也羅浮梅花夢事出其中唐志無此書蓋依託也或云王銍性之作樹萱録一卷不著名氏序稱纂尚書滎陽公所談者亦不知何人又云普聖圜丘之眀年普聖者僖宗由普王踐位也書雖見唐志今亦未必真本或云劉燾無言所為也雲仙散録一卷稱唐金城馮贄撰天復元年序馮贄者不知何人自言取家世所蓄異書撮其異説而所引書名皆古今所不聞且其記事造語如出一手正如世俗所行東坡杜詩注之類然則所謂馮贄者及其所蓄書皆子虚烏有也亦可謂枉用其心者矣葆光録三卷陳纂撰自號襲眀子所載多吳越事當是國初人稽神録一卷南唐徐鉉撰元本十卷今無卷第總作一卷當是自他書中録出者啟顔録八卷不知作者雜記詼諧調笑事唐志有侯白啓顔録十卷未必是此書然亦多有侯白語但訛謬極多清異録二卷稱翰林學士陶穀撰凡天文地理花木飲食器物每事皆制為異名新説其為書殆似雲仙散録而語不類國初人蓋假託也歸田録二卷歐陽修撰或言公為此録未傳而序先出裕陵索之其中本載時事及所經厯見聞不敢以進旋為此本而初本竟不復出未知信否公自為序略曰歸田録者朝廷之遺事史官之所不記與夫士大夫談笑之餘而可録者録之以備閒居之覽也又曰唐李肇國史補序云言報應叙鬼神述夢卜近怪異悉去之記事實探物理辨疑惑示勸戒采風俗助談笑則書之余之所録大抵以肇為法而小異於肇者不書人之過惡以為職非史官而掩惡揚善君子之志也覽者詳之歸田後録十卷朝請郎廬江朱定國興仲撰熙豐間人竊取歐公舊録之名實不相闗也清夜録一卷沈括撰續清夜録一卷王銍性之撰王原叔談録一卷翰林學士南京王洙之子録其父所言延漏録一卷不著名氏其間稱伯父郇公知其為章得象之姪也後題此書疑章望之作然未敢必望之者字表民用郇公廕入官歐陽公為作字說者也以宰相嫌遂不仕録中又記皇祐中與滕元發同試滕首冠而已被黜藉令非望之亦當時場屋有聲者章氏雋才固多也清虚居士隨手雜録一卷王鞏定國撰待制素子張安道之婿石渠録十一卷校書郎昭武黄伯思長睿撰避暑録話二卷葉夢得紹興五年所作臺省因話録一卷兵部尚書新昌石公弼國佐撰思逺筆録一卷翰林學士九江王寓撰寓以靖康元年七月以禮部尚書入翰苑雜記當時聞見凡二十七條寓父易簡以布衣召為說書遂顯用寓後拜左轄使金辭行謫散官嶺表父子俱南下沒於盗秀水閒居録三卷丞相汝南朱勝非蔵一撰寓居宜春時作秀水者袁州水名也聞見後録二十卷邵某撰侍兒小名録一卷續一卷序題朋谿居士而不著名氏始洪炎玉父集為此書王銍性之温豫彦㡬續補今又因三家而増益之且為分類其中多用古字或云董彦逺家子弟所為也紀談録十五卷稱傳密居士不著名氏蓋晁公邁伯咎也賢異録一卷亦無名氏所記四事其一曰鬼傳者言王鬷家子弟所遇與世傳王子髙事大同小異當是一事耳能改齋漫録十三卷太常寺主簿臨川吳曽虎臣撰揮麈録三卷後録十一卷第三録三卷餘話一卷朝請大夫汝隂王眀清仲言撰明清銍之子曽紆公衮之外孫故家傳聞前言往行多所憶後録跋稱六卷今多五卷投轄録一卷王明清撰所記竒聞異事客所樂聽不待投轄而留也吳船録一卷范成大至能撰自蜀帥東歸紀遊取門泊東吳萬里船之語𤨏碎録二十卷後録二十卷温革撰陳昱増廣之後録者書坊増益也鑑誡别録三卷廬陵歐陽邦基夀卿撰周益公洪景盧有序䟦樂善録十卷蜀人李昌齡伯崇撰以南中勸戒録増廣之多因果報應之事直齋書録解題卷十一
