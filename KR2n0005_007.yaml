body:
  text: 直齋書錄觧題卷七宋陳振孫撰傳記類古列女傳九卷案此書篇目與文獻通攷異通攷作古列女傳八卷續列女傳一卷載王回序略云以頌攷之每篇皆十五傳耳則凡無頌者疑皆非向本書不特自程嬰母為斷也故并錄其目而以頌證之刪為八篇號古列女傳餘十二傳又以時次之别為一篇號續列女傳此本卷數正與王氏所分同而不别出續列女傳之目葢書則王本而名則仍其舊耳漢䕶都水使者光祿大夫劉向子政撰成帝時趙氏姊弟起㣲賤踰禮制向以為王教由内及外故採取詩書所載賢妃貞婦興國顯家可法則及嬖孽亂亡者序次為八篇以戒天子其七篇篇十五人為一百五人第八篇為頌義隋唐志及崇文總目皆十五卷葢以七篇分為上下并頌為十五卷而自程嬰母以下十六人附入其中或與向同時或在向後者皆好事者所益也王回曾鞏二序辨訂詳矣鞏之言曰後世自學問之士多徇於外物而不安其守其室家既不見可法故競於邪侈豈獨無相成之道哉士之苟於自恣顧利冒耻而不知反已者徃徃以家自累故也故曰身不行道不行於妻子况於南鄉天下之主哉愚嘗三復其言而志之向書傳於世鮮矣惟此書獨全其稱詩芣苢柏舟大車之類與今説詩者乖異葢齊魯韓之學固不盡與毛氏同也東觀漢紀十卷漢謁者僕射劉珍校書郎劉騊駼等撰初班固在顯宗朝嘗撰世祖本紀功臣列傳載記二十八篇至永初中珍騊駼等著作東觀撰集漢紀其後盧植蔡邕馬日磾等皆嘗補續唐藝文志一百二十七卷案隋志作百四十三卷唐志百二十七卷原本作百二十卷誤今改正今所存惟吳漢賈復耿弇宼恂馮異祭遵及景丹蓋延九人列傳而已其卷第凡十二而闕第七八二卷未知果當時之遺否也髙士傳十卷晉徴士安定皇甫謐士安撰序稱自堯至魏咸熙二千四百餘載得九十餘人今自被衣至管寧惟八十七人黄帝内傳一卷序云籛鏗遊衡山得之石室劉向校中秘書傳於世誕妄不經方士輩所託也飛燕外傳一卷稱漢河東都尉伶元子于撰自言與揚雄同時而史無所見或云偽書也然通德擁髻等事文士多用之而禍水滅火一語司馬公載之通鑑矣西京雜記六卷晉句漏令丹陽葛洪稚川撰其卷末言洪家有劉子駿書百卷先父傳之歆欲撰漢書雜錄漢事未及而亡試以此記攷校班固所作殆是全取劉書少有異同耳固所不取不過二萬餘言今鈔出為二卷以裨漢書之闕所謂先父者歆之於向也而館閣書目以為洪父傳之非是唐藝文志亦只二卷今六卷者後人分之也按洪博聞深學江左絶倫所著書幾五百卷本傳具載其目不聞有此書而向歆父子亦不聞其嘗作史傳於世使班固有所因述亦不應全没不著也殆有可疑者豈惟非向歆所傳亦未必洪之作也案晁公武讀書志云此書江左人皆以為吳均依託為之襄陽耆舊傳五卷晉滎陽太守襄陽習鑿齒彥威撰談藪二卷北齊秘書省正字北平陽玠松撰事綜南北時更八代隋開皇中所述也梁四公記一卷唐張説撰按館閣書目稱梁載言纂唐志作盧詵注云一作梁載言邯鄲書目云載言得之臨淄田通又云别本題張説或為盧詵今按此書卷末所云田通事跡信然而首題張説不可曉也其所記多誕妄而四公名姓尤怪異無稽不足深辨載言上元二年進士也景龍文館記八卷案唐書藝文志作十卷唐修文館學士武甄平一撰記中宗初置學士以後館中雜事及諸學士應制倡和篇什雜文之屬亦頗記中宗君臣宴䙝無度以及暴崩其後三卷為諸學士傳今闕二卷平一以字行狄梁公家傳三卷唐海州刺史江都李邕泰和撰髙力士外傳一卷唐大理司直郭湜撰案唐書藝文志作郭湜撰大歴中大理司直原本作鄭湜誤今改正北征雜記一卷唐宰相趙憬撰貞元四年咸安公主下降回紇憬副闗播為册禮使作此書紀行唐年小錄八卷案宋史藝文志作六卷唐戸部尚書扶風馬總會元撰記唐以来雜事分為七門末卷為雜錄舊有一本畧甚復得程文簡本傳之始為全書陵園記一卷唐宗正丞李原註失其名撰光化元年序鳯池歴二卷不著名氏記長孫無忌歴官本末及家世子孫按唐志馮宇鳯池錄五十卷李淑書目惟存五卷記宰相名次事跡非此書鄴侯家傳十卷唐亳州刺史京兆李繁撰繁宰相泌之子坐事下獄知且死恐先人功業冺滅從吏求廢紙拙筆為傳按中興書目有栁玭後序今無之繁嘗為通州韓退之送諸葛覺詩所謂鄴侯家多書揷架三萬軸者也其曰行年餘五十出守數已六屢為丞相言雖懇不見錄則韓公於繁亦拳拳矣新舊史本傳稱繁無行漏言裴延齡以誤陽城師事梁肅而烝其室殆非人類然則韓公無乃溢美而所述其父事庸可盡信乎牛羊日歴一卷唐劉軻撰牛指僧孺羊謂虞卿漢公也是不孫甚矣西南備邊錄一卷唐宰相李德裕文饒撰太和中鎮蜀所作内州縣城鎮兵食之數大畧具矣異域歸忠傳一卷李德裕撰會昌二年嗢没斯内附德裕奉詔采秦漢以来由絶域歸中國以名節自著功業始終者凡三十人為之傳蠻書十卷唐安南宣慰使樊綽撰記南詔事咸通五年奏之閩川名士傳一卷唐崇文館校書郎黄璞撰所記人物自薛令之而下凡五十四人崔氏日錄一卷不著名氏殘缺無始末末有跋尾不知何人言此書出宋敏求家攷訂年月及所載人名姓甚詳蓋廣明元年崔沆為相非其子弟即其門人為之字畫清麗而其所記不過蒱飲交通評議有以見唐末風俗之弊云開元天寳遺事二卷案文獻通攷作四卷五代太子少保天水王仁裕德輦撰所記一百五十九條入洛記一卷王仁裕撰仁裕仕前蜀國亡入洛記行中朝故事二卷偽唐給事中尉遲偓撰載唐末雜事燉煌新錄一卷有序稱天成四年沙州傳舍集而不著名氏蓋當時奉使者叙張義潮本末及彼土風物甚詳涼武昭王時有劉昞者著燉煌實錄二十卷故此號新錄唐末汎聞錄一卷題常山閻自若撰案宋史藝文志作髙自若記五代及諸僭偽事其序自言乾德中得於先人及舅氏聞見且曰傳者難驗見者易慿攷之史策不若詢之耆舊也然所記亦時有不同者如李濤納命事本謂張彥澤今乃云謁周高祖未詳孰是楊妃外傳一卷直史館臨川樂史子正撰渚宫故事五卷後周太子校書郎余知古撰載荆楚事自鬻熊至唐末本十卷今止晉代闕後五卷案唐書藝文志余知古渚宫故事十卷注唐文宗時人晁公武讀書志亦云唐余古撰脱知字此云後周未知何據錦里耆舊傳八卷續傳十卷前應靈縣令平陽句延慶昌裔撰開寳三年秘書丞劉蔚知榮州得此傳其詞蕪穢請延慶修之改曰成都理亂記天成之後别加編次起咸通九載迄乾德四年百餘年蜀事大畧具矣續傳蜀人張緒所撰起乾德乙丑迄祥符己酉自平蜀之後朝廷命令官僚姓名及政事因革以至李順王均劉盱作亂之迹皆畧載之知新繁縣太常博士張約為之序平蜀實錄一卷左藏庫副使康延澤撰平蜀之役延澤以内染院使為鳯州路馬軍都監王全斌等既得罪延澤亦貶唐州團練使按本傳載蜀軍二萬七千人諸將慮其為全師雄内應欲盡殺之延澤請簡老弱疾病七千人釋之餘以兵衞浮江而下諸將不能用此書叙述甚詳邯鄲書目云不知作者館閣書目亦然攷王元之所撰延澤墓誌知其所為也秦王貢奉錄二卷樞宻使吳越錢惟演希聖撰記其父俶貢獻及錫賚之物家王故事一卷錢惟演撰記其父遺事二十二事上之以送史院戊申英政錄一卷婺州刺史錢儼撰記其兄俶事迹俶以戊申正月嗣位玉堂逄辰錄二卷錢惟演撰其載祥符八年四月榮王宫火一日二夜所焚屋宇二千餘間左藏内藏香藥諸庫及秘閣史館香聞數十里三館圖籍一時俱盡大風或飄至汴水之南惟演獻禮賢宅以處諸王以此觀之唐末五代書籍之僅存者又厄於此火可為太息也南部新書十卷翰林學士錢易希白撰倧之子也所記多唐遺事唐登科記十五卷丞相鄱陽洪适景伯編集按唐藝文志有崔氏顯慶登科記五卷姚康科第錄十六卷李奕登科記二卷崔氏書有趙儋序而失崔名所載至周顯德固非崔氏本書而李奕書亦不存洪忠宣得姚康書五卷於北方而丞相又得别本起武德終太和於毗陵錢氏乃以三本輯為一書而用姚氏為正三書皆有序姚字汝諧南仲孫也元和十五年進士本書錄武德至長慶為十一卷其曰十六卷者亦後人所續五代登科記一卷不著名氏前所謂崔氏書至周顯德止者殆即此耶館中有此書洪丞相以國初卿相多在其中故併傳之大宋登科記三十二卷案題觧云二十一卷宋史藝文志同此蓋誤作三十二卷洪适編始吳興郡學有鋟板不分卷第止述進士一科适始倣姚康錄制舉詞科自建隆庚申迄紹興庚辰二萬三千六百人有竒為二十一卷自後皆續書之中興登科小錄三卷姓類一卷通判徽州江都李椿撰新安舊有登科記但逐榜全錄姓名而已椿家藏小錄自建炎戊申至嘉熙戊戌節取名字鄉貫及三代諱刋之後以韻類其姓凡一萬五千八百人有竒太守吳興倪祖常子武刻之以備前記之闕文乗軺錄一卷知制誥祁陽路振子發撰祥符中使契丹歸進此錄奉使别錄一卷丞相河南富弼彥國撰慶歴使契丹歸為語錄以進機宜事節則具於此錄又一本有兩朝徃来書附於末劉氏西行錄一卷直昭文館保塞劉渙仲章撰按康定二年朝廷議遣使通河西唃氏渙以屯田郎知晉州請行以十月十九日出界慶歴元年三月十日回秦州此其行紀也唃氏自此與中國通而元昊始病於牽制矣渙後擢刺史歴典數州至留後以工部尚書致仕契丹講和記一卷不著名氏載契丹初講和本末末有慶歴增幣後北國誓書慶歴正旦國信語錄一卷余靖慶歴三年使遼所記熙寧正旦國信錄一卷天章閣待制竇卞熙寧八年使遼所記接伴送語錄一卷集賢校理沈季長熙寧九年接伴送遼使耶律運所記使遼見聞錄二卷尚書膳部郎中李罕撰奉使雞林志三十卷宣德郎王雲撰崇寧元年雲以書狀從劉達吳栻使髙麗歸而為此書以進自元豐創通髙麗以後事實皆詳載之宣和使金錄一卷太常少卿安陸連南夫鵬舉吊祭阿固達奉使所記時宣和六年奉使雜錄一卷紹興十二年何鑄使金所錄禮物名銜表章之屬館伴日錄一卷無名氏紹興二十四年隆興奉使審議錄一卷左奉議郎雍希稷堯佐撰隆興二年編修官胡昉閤門祇候楊由義使金人軍前審議海泗唐鄧等事不屈而歸希稷其禮物官也所記抗辯應對之語多出由義欖轡錄一卷叅政吳郡范成大至能乾道六年使金所記聞見北行日錄一卷叅政四明樓鑰大防乾道己丑待次温州教授以書狀官從其舅汪大猷仲嘉使金紀行乾道奉使錄一卷叅政諸暨姚憲令則乾道壬辰使金日記奉使執禮錄一卷進士鄭儼撰淳熙己酉中書舍人莆田鄭僑惠叔使金賀正會其主雍病篤欲令于閤門進國書僑不可已而雍殂遂回使燕錄一卷尚書戸部郎龍游余嶸景瞻撰嘉定辛未嶸使金賀生辰會有敵宼行至涿州定興縣而回李公談錄一卷翰林學士饒陽李宗諤昌武撰記其父昉之言凡三十七事丁晉公談錄一卷不知何人作賈公談錄一卷序言庚午銜命宋都聞於補闕賈黄中凡二十六條而不著其名别本題清輝殿學士張洎蓋洎自江南奉使也庚午實開寳三年黄中晉開運中以七歲為童子闗頭案宋史本傳六歲舉童子科十六歲進士及第第三人王沂公筆錄一卷丞相沂公青社王曾孝先撰記開國以来雜事凡三十六條沂公言行錄一卷天章閣待制王皥子融撰沂公之弟也前有葉清臣案文獻通攷作李清臣序文後有晏殊杜把答書王文正家錄一卷端明殿學士王素仲儀記其父旦言行遺事宼莱公遺事一卷不知何人作乖崖政行語錄三卷案文獻通攷作張忠定公語錄四卷虞部員外郎成都李畋撰述張忠定公詠治蜀政事及言行安定先生言行錄二卷雜錄胡瑗翼之事及告詞誌表祭文等其間有賢惠錄孝行錄蓋其父訥所為也孝行錄别見賢惠錄記婦人之賢者曹武惠别傳一卷知石州曹偃撰武惠曾孫也韓魏公家傳十卷案文獻通攷作二卷不著名氏當是其家所傳也案晁公武讀書志稱韓忠彥撰錄其父琦平生行事韓忠獻遺事一卷郡牧判官錢塘強至幾聖撰至魏公之客也魏公語錄一卷與别錄小異而實同别錄分四卷此總為一編先後次第亦不同而末一則别錄所無姑並存之魏公别錄四卷樞宻大名王巖叟彥霖撰亦魏公客杜祁公語錄一卷不知何人作文潞公私記一卷記至和請建儲及元豐褒賞事唐質肅遺事一卷無名氏所記唐介子方事也韓莊敏遺事一卷秘書丞韓宗武文若撰記其父丞相縝玉汝事末亦雜記他事宗武即少年遇洋客者也年八十二乃卒此編亦載其詩云熙寧間得異疾與神物遇范忠宣言行錄二十卷不著姓名其家所錄也范太史遺事一卷翰林學士范沖元長記其父事傅獻簡佳話一卷不知何人作記傅堯俞所談杜公談錄一卷雷澤杜師益等錄其父務滋之言王廣淵作序道鄉語錄一卷不知作者記鄒浩志完語豐清敏遺事一卷給事中章貢李朴先之撰記豐稷相之事朱熹為之後序宗忠簡遺事三卷不著名氏錄留守開封宗澤汝霖事亦其家子孫所為也吕忠穆家傳一卷逄辰記一卷遺事一卷記建炎丞相吕頤浩元直事孫昭問刻之廣德軍褒德集二卷易學辨惑一卷邵伯温撰錄其父誥命諡議行狀墓誌之屬辨惑述傳授源流辨鄭夬之妄吕氏家塾記一卷侍講吕希哲原明撰桐隂舊話十卷吏部尚書潁川韓元吉无咎撰記其家世舊事以京師第門有桐木故云元吉門下侍郎維之四世孫也熙寧日錄四十卷丞相王安石撰本朝禍亂萌於此書陳瓘所謂尊私史而壓宗廟者其彊愎堅辯足以熒惑主聽鉗制人言當其垂死欲秉畀炎火豈非其心亦有所愧悔歟既不克焚流毒遺禍至今為梗悲夫書本有八十卷今止有其半温公日記一卷司馬光熙寧在朝所記凡朝廷政事臣僚差除及前後奏對上所宣諭之語以及聞見雜事皆記之起熙寧元年正月至三年十月出知永興軍而止趙康靖日記一卷叅政睢陽趙槩叔平所記治平乙巳丙午間在政府事劉忠肅行年記一卷丞相東平劉摯莘老撰紹聖甲戌日錄一卷元符庚辰日錄一卷丞相南豐曾布子宣撰記在政府奏對施行及宫禁朝廷事文昌雜錄六卷主客郎中南京龎元英懋賢撰官制初行元英為郎在省四年記一時見聞及古今典故可觀覽元英丞相莊敏公籍之子聞見近錄一卷宗正丞三槐王鞏定國撰辨欺錄一卷韓忠彥記其父嘉祐末命事與文富諸公辨回天錄一卷宣教郎秦湛處度撰記吕好問圍城中事好問除右丞誥詞有回天之力語故以名錄後有好問謝其祖公著復官表及遺表盡忠補過錄一卷修職郎穆伯芻撰記張孝純在偽齊時所上本朝書吳丞相手錄一卷吳敏元忠撰記靖康初元事岳飛事實六卷辨誣五卷飛之孫珂撰丁卯實編一卷成忠郎李珙撰誅曦之功楊巨源為多安丙忌而殺之珙為作傳上之於朝以昭其功而伸其寃孔子編年五卷新安胡仔元任撰其父待制舜陟命仔采摭經傳為之諸葛武侯傳一卷侍講張栻撰以陳壽作史私且陋裒集他傳及裴松之所注為此傳而削去管樂自許一則朱晦翁以為不然又為後論以達其意謂其體正大而學未至使得游洙泗之門所就不止此韓文公歴官記一卷新安張敦頤撰頗疏畧其最誤者序言擒吳元濟出牛元翼為一事此大謬也為裴度行軍司馬在憲宗元和時奉使鎮州王庭湊在穆宗長慶時歐公本末四卷吕祖謙編葢因觀歐陽公集考其歴仕歲月同官同朝之人畧著其事迹而集中詩文亦隨時附見非獨歐公本末而時事時賢之本末亦大略可觀矣故以入傳記類皇祐平蠻記二卷殿中丞馮炳撰記儂智髙事孫威敏征南錄一卷學士睢陽滕甫元發撰言平南之功皆本孫沔元規狄青之至莫能出其右者余靖歸美於青非實也甫時通判潮州唃厮囉傳一卷不著作者陕西聚米圖經五卷閤門通事舍人雄州趙珣撰珣父振博州防禦使久在西邊珣訪得五路徼外山川道里康定二年為此書韓魏公經畧言於朝詔取其書召見執政吕許公宋莒公言用兵以来策士之言以千數無如珣者擢涇原都監定川之敗死焉珣勁特好學恂恂類儒者人皆惜之元豐平蠻錄三卷金部員外郎知鳯翔府家安國撰記乞弟韓存寳事元祐分疆錄三卷直龍圖閣京兆游師雄景叔撰元祐初議棄西邊四寨執政召師雄問之對曰先帝棄之可也主上棄之則不可且示弱夷狄反益邊患爭之甚力不聽卒棄之四寨者葭蘆米脂浮屠安疆也案宋史作米脂原本作乘脂今改正夏人以事出望外萌侵侮之心連年犯順皆如師雄所料此書前三卷記當時論辨本末後一卷行實不知何人作也是歲師雄被命行邊請以便宜行事夏人與鬼章謀宼熙河師雄説劉舜卿出師种誼遂破洮州擒鬼章以獻其功偉矣元祐諸老固欲休兵息民師雄言既不行功復不賞殆以專反熙豐失於偏滯終成紹述之禍亦有以也師雄治平二年進士青唐錄一卷右班殿直李逺撰元符中取邈川青唐已而皆棄之逺紹聖武舉人官鎮洮奉檄軍前記其經歴見聞之實粲然可觀交趾事迹十卷知新州趙勰撰占城國錄一卷不著名氏雞林類事三卷不著名氏政和大理入貢錄一卷右廸功郎錢塘周邦撰其祖穜為集賢修撰知桂州時歸明人黄璘招来大理國入貢詔穜考究其真偽穜言偽妄不可慿乞依熈寧故事支馬價發還璘至京師力主其事穜落職奉祠久而覺其詐乃改正復職知廣州安南表狀一卷紹興二十五年李天祚進貢自靖康二年以後至是始通也邊和錄五卷承議郎河東陳伯疆撰載胡世將承公宣撫川陕事建炎德安守禦録三卷郡丞東平劉荀子卿編次建炎初髙宻陳規元則守德安禦羣盜事迹功狀規後守順昌與劉錡共成郤敵之功者也以樞宻直學士知廬州而卒淮西從軍記一卷不著名氏記紹興十年金人敗盟淮西諸帥守禦事順昌破敵錄一卷不著名氏記劉錡信叔守禦戰勝本末滕公守台錄一卷不著名氏睢陽滕膺子勤為台州戸曹方臘之亂仙居人吕師囊應之攻城甚急膺佐太守備禦卒全一城郡人德之至今廟食行狀事實聚見此編膺後至直秘閣京西漕而終二楊歸朝錄一卷楊堯弼楊載紹興八年所與達賚烏珠書時偽齊初廢也末有探報金事數十條逆臣劉豫傳一卷楊堯弼等撰二楊事迹當攷前錄題銜稱宣義郎廸功郎並為大總管府官屬此傳堯弼為右從事郎載為右廸功郎許右丞行狀一卷吏部員外郎許忻撰許公翰字崧老襄邑人為尚書右丞忻其弟也李忠定行狀一卷通判洪州李綸撰其兄丞相綱伯紀事狀葉適正則所作諡議附於後翟忠惠家傳一卷翟耆年伯壽述其父汝文公㢲事實忠惠者私諡也耆年實邢恕外孫艾軒家傳一卷莆田林成季述其季父工部侍郎光朝謙之事實夾漈家傳一卷所著書目附莆田鄭翁歸述其父樵漁仲事跡樵死時翁歸年八歲安貧不競頃佐莆郡時猶識之葉丞相行狀一卷閣學廬陵楊萬里廷秀撰丞相莆田葉顒子昻乾道丁亥冬雷罷相至建寧而薨謝修撰行狀墓誌一卷昭武謝師稷務本奉使閩部有惠愛没而民祠之行狀里人黄適景聲撰案文獻通攷黄適作黄遹墓誌永嘉陳謙益之撰其廟曰昭應朱侍講行狀一卷奉議郎三山黄幹直卿撰其髙第弟子且子壻也紫陽年譜三卷朱侍講門人通判辰州昭武李方子公晦撰篤行事實一卷丞相趙汝愚子直編其父善應彥逺事狀而羅願朱熹所撰行狀墓銘及諸賢哀詞題跋之屬萃為一編篤行者陳福公題其墓云爾吕太史跋語有云處者易持出者難工朱侍講取其意以為銘所以勉其子之意深矣趙丞相行實一卷附錄二卷知靜江府趙崇憲履常編集忠定長子也其一時諸賢祭文輓歌與嘉定更化之後昭雪誣枉改正史牒本末皆見附錄趙忠定行狀一卷諡議一卷知光州鄱陽柴中行與之撰其諡議劉允濟全之楊方子直所為也倪文節言行錄三卷遺奏誌狀碑銘諡議一卷戸部郎中倪祖常子武輯其父尚書遺事行狀錫山蔣重珍良貴撰碑銘臨卭魏了翁華甫撰趙華文行狀一卷文林郎趙山李燔敬子撰忠定之子吏部崇憲履常也八朝名臣言行錄二十四卷侍講朱熹撰以近代文集及傳記所載本朝名臣言行掇取其要輯為此錄前五朝五十五人後三朝四十二人中興忠義錄三卷龔頤正撰自建炎至紹興辛巳上自李若水劉韐貴臣名士下及一婦人卒伍之微皆錄之孝史五十卷太學博士新喻謝諤昌國撰集曰君紀五后德一宗表五臣傳三十五文類二夷附一諤後至御史中丞淳熙名臣樂易君子也孝行錄三卷京兆胡訥撰始得此書不知訥何人也所記多國初人已而知其為安定先生翼之之父仕為寧海節度推官古今孝悌錄二十四卷廬陵王紹珪唐卿撰亷吏傳十卷成都費樞伯樞撰自春秋至唐凡百十有四人宣和乙巳為序南陽先民傳二十卷題南陽王襄元祐癸酉歲序所記鄧州人物自百里奚直不疑而下至唐范傳正韓翃凡一百六十人典刑錄十二卷苕溪吳宏編凡五十二門大略於言行錄中鈔出近世厚德錄四卷題百鍊真隱李元綱國紀編沈濬道原為作序救荒活民書三卷從政郎鄱陽董煟編進煟紹熙五年進士嘗知瑞安縣仁和活民書二卷案文獻通攷仁和作仁政秀州司戸會稽丁鋭集折獄龜鑑三卷案文獻通攷作決獄龜鑑二十卷承直郎開封鄭克武子撰初五代宰相和凝有疑獄集其子水部郎和濛續為三卷六十七條克因和氏之書分為二十門推廣之凡二百七十六條三百九十五事起鄭子產迄於本朝明刑盡心錄二卷丁鋭為鄂州司理又集此書好還集一卷秀水婁伯髙元龍編報應之事為十門先賢施仁濟世錄一卷奉化丞山隂諸葛興編凡十門皆本朝諸賢事實也莆陽人物志三卷知興化軍永嘉林紘文伯撰以圖志不叙人物故特為是編莆壤地褊小而人物特盛卧遊錄一卷吕祖謙撰晚歲病廢卧家取史傳所載古今人境勝處錄之而以宗少文卧遊之語寘諸卷首上庠錄十卷光州助教吕榮義撰雜記京師太學故事上庠後錄十二卷三山周士貴撰記中興太學事頗疏畧昭明太子事實二卷知池州趙彥博富文編昭明廟食於池頗著靈響元祐始賜額曰文孝案元祐賜額曰文孝原本誤作文序今改正祠山家世編年一卷詹仁澤曾樵編輯廣德横山神張王事跡海神靈應錄一卷永嘉貢士陸維則撰太守韓彥直子温為之序初元祐中太守直龍圖閣范峋夢海神曰吾唐李德裕也郡城東北隅海仙壇之上有廟初不知其為何代人峋明日徃謁其像即夢中所見自是多響應然封爵訓詞惟曰海神而已鄂國金陀稡編二十八卷續編三十卷岳珂撰法令類律文十二卷音義一卷自魏李悝漢蕭何以来更三國六朝隋唐因革損益備矣本朝天聖中孫奭等始撰音義自名例至斷獄歴代異名皆著之唐令三十卷式二十卷唐開元中宋璟蘓頲盧從愿等所刪定攷藝文志卷數同更同光天福校定至本朝淳化中右贊善大夫潘憲著作郎王泗校勘其篇目條例頗與今見行令式有不同者刑統三十卷判大理寺燕山竇儀可象詳定初范質既相周建議律條繁廣輕重無據特詔詳定號大周刑統凡二十一卷至是重加詳定建隆四年頒行紹興刑統申明一卷開寳以来累朝訂正與刑統並行者嘉祐驛令三卷三司使梁國張方平安道等修定前一卷為條貫勅後二卷為則例令官吏幇支驛劵衙官傔從之類皆據此也慶元勅十二卷令五十卷格三十卷式三十卷目錄一百二十二卷隨勅申明十二卷總二百五十六卷丞相豫章京鏜仲逺等慶元四年表上國朝自建隆以来世有編勅每更修定號為新書中興至此凡三修矣其有續降指揮謂之後勅以待他時修入云紹興貢舉法五十卷丞相万俟卨等紹興二十六年表上紹興監學法二十六卷目錄二十五卷申明七卷對修釐正條法四卷共六十二卷宰相秦檜等紹興十三年表上嘉泰條法事類八十卷宰相天台謝深甫子肅等嘉㤗二年表上初吏部七司有條法總類淳熙新書既成孝宗詔倣七司體分門修纂别為一書以事類為名至是以慶元新書修定頒降此書便於檢閲引用惜乎不併及刑統也嘉定吏部條法總類五十卷嘉定中以開禧重修七司法并慶元海行法在京通用法大宗正司法參定凡改正四百六十餘條視淳熙總類增多十卷七年二月頒行役法撮要一百八十九卷提舉編修宰相京鏜等慶元六年上自紹興十七年正月以後至慶元五年七月以前為五十五門又八十二小門門為一卷外為參詳目錄等卷雖多而文甚少其書於州縣差役極便於引用刑名斷例十卷不著名氏以刑統勅令總為一書惜猶未備也營造法式三十四卷看詳一卷將作少監李誡編修初熙寧中始詔修定至元祐六年成書紹聖四年命誡重修元符三年上崇寧二年頒印前二卷為總釋其後曰制度曰功限曰料例曰圖様而壕寨石作大小木雕鏃鋸作泥瓦彩畫刷飾又各分類匠事備矣修城法式條約二卷判軍器監沈括知監丞吕和卿等所修敵樓馬靣團敵式様并申明條約熙寧八年上宣和軍馬司勅十三卷令一卷宣和所修金科類要二卷案宋史藝文志作一卷不著名氏元豐刑部叙法通用一卷末載申明至紹興淳熙以後直齋書錄觧題卷七
