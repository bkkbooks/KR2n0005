body:
  text: 直齊書録解題卷六宋陳振孫撰職官類漢官儀一卷續補一卷後漢軍謀校尉汝南應劭仲逺撰按唐志有漢官五卷漢官儀十卷今惟存此一卷載三公官名及名姓州里而已其全書亡矣李埴季允嘗續補一卷漢官典儀一卷續補一卷漢衛尉蔡質撰雜記官制及上書謁見禮式隋志有漢官典職儀式二卷今存一卷李埴亦補一卷其續者皆出於史中採拾漢官舊儀三卷案隋書經籍志唐書藝文志俱作四卷漢議郎東海衛宏敬仲撰或云胡廣按宏本傳作漢舊儀四篇以載西京雜事不名漢官今此惟三卷而又有漢官之目未知果當時本書否唐志亦無官字舊在儀注類以其載官制為多故著於此案陳氏因是書有漢官之名疑非衛宏作又疑以為胡廣作考漢書注中頗有稱胡廣曰者與漢舊儀互引其文亦絶不相合惟廣傳載廣詩賦銘頌及解詁二十二篇而史注所引别有漢書解詁之名蓋即廣所作而舊儀之出衛宏手當無疑也其稱漢官舊儀者或後人因其所載官制而妄加之耳唐六典三十卷題御撰李林甫等奉敕注按韋述集賢記注開元十年起居舍人陸堅被㫖修六典上手寫白麻紙凡六條曰理教禮政刑事典令以類相從撰録以進張說以其事委徐堅思之歷年未知所適又委毋煚余欽韋述始以令式入六司象周禮六官之制其沿革並入注然用功艱難其後張九齡又以委苑咸二十六年奏草上至今在書院亦不行案唐書藝文志張說以其事委徐堅經歲無規制乃命毋煚余欽咸廙業孫季良韋述參撰及蕭嵩知院加劉鄭蘭蕭晟盧若虛張九齡知院加陸善經李林甫代九齡加苑咸委苑咸者乃李林甫也至云二十六年奏草上考新舊唐書九齡以二十四年罷知政事尋謫荆州程大昌謂書成於九齡為相之日當在二十四年林甫注成奏進當在二十七年故是書卷首止列李林甫而不及九齡也今案新書百官志皆取此書即太宗貞觀六年所定官令也周官六職視周禮六典已有邦土邦事之殊不可考證唐志內外官與周制迥然不同而強名六典可乎善乎范太史祖禹之言曰既有太尉司徒司空而又有尚書省是政出於二也既有尚書省而又有九寺是政出於三也本朝裕陵好觀六典元豐官制盡用之中書造命門下審覆尚書奉行機事往往留滯上意頗以為悔云元和百司舉要二卷唐宰相趙郡李吉甫宏憲撰首稱文班八十四司四百六十員武班二十六司一百八十員都計六百四十員末稱在京文武官及府縣總三千七百九十九員意者當時實數也具員故事十卷唐鳯閣舍人梁載言撰以唐官具員附之歷代事迹蓋後人職林職官分紀之類所從始也或稱職總聯珠崇文總目又作具員事迹中興書目惟有七卷三卷闕案唐書藝文志梁載言具員故事十卷又具員事迹十卷乃二書也官品纂要十卷唐樂安任戩撰以官品令為主而階職勳爵隨品具列歷代沿革頗著其要戩舉進士不第為此書當太和丁未御史臺記十二卷唐殿中侍御史南陽韓琬茂貞撰自唐初迄開元五年御史姓名行事及官制沿革皆詳著之第八卷為琬著傳九卷以後為右臺右臺創於武后廢於中宗歲月蓋不久也末有雜說五十七條御史臺故事三卷唐朝集使洺州録事參軍李結撰結本名構避光堯御諱隨齊批注御史臺記五卷不知何人作記本朝御史臺事至崇觀間集賢注記三卷唐集賢院學士京兆韋述撰叙置院始末學士名氏及院中故事史館故事録三卷不著名氏凡為六門曰叙事史例編修直筆曲筆而終之以雜録末稱皇朝廣順則是周朝史官也翰林志一卷唐學士李肇撰承㫖學士院記一卷唐承㫖河南元稹微之撰專載承㫖姓名自貞元二十一年鄭絪至元和十五年杜元穎并稹為十二人末又有李德裕李紳韋處厚三人蓋後人所益也翰林學士記一卷唐侍講學士萬年韋處厚德載撰翰林院故事一卷唐學士京兆韋執誼撰翰林學士院舊規一卷唐學士馮翊楊巨文碩撰雜記院中事例及文書格式其祠祭祝版社稷宗廟上至天地用伏惟尚饗嶽瀆而降只曰尚饗此例今人皆莫之知則施之尊卑無别矣巨宰相收之子其為學士在昭宗時重修翰林壁記一卷唐學士丁居晦撰開元二年也所記姓名迄於咸通而獨無天寶大歷學士為不可曉金坡遺事三卷學士吳越錢惟演希聖撰題名自建隆至天聖四年凡四十七人自開元而下合三百一十五人其他典故視前記詳矣别書金坡遺事一卷學士澶淵朝迥昭逺撰因錢惟演寄示遺事别書真宗待遇恩禮三則於後案别書以下原本闕今據文獻通考補入翰苑雜記一卷學士饒陽李宗諤昌武撰續翰林志一卷次續志一卷學士承㫖梓潼蘇易簡太簡撰以續唐李肇之書其子耆又以其父遭遇恩禮之盛續於其後翰苑羣書三卷學士承㫖鄱陽洪遵景嚴撰自李肇而下十一家及年表中興後題名共為一書而以其所録遺事附其末總為三卷遵後至簽樞父皓兄適弟邁四人入翰苑可謂盛矣翰林遺事一卷洪遵撰已見上録諸書所未及者掖垣叢志三卷丞相安陸宋庠公序撰時為正字職林二十卷集賢院學士錢唐楊侃撰咸平二年所序有胡昉者明道二年作後序增益事實七百四十五條而以新續標之侃端拱進士晚為知制誥避真宗舊諱更名大雅歐陽公其壻也集中有墓志職官分紀五十卷富春孫逄吉彥同撰大抵本職林而增廣之其條例精密事實詳備矣秦少游序之元祐七年也官制學制各一卷司馬光撰唐職林三十卷石埭尉維揚馬永錫明叟撰以唐六典為主而附以新史所載事實頗采傳記歌詩之屬政和乙未天台左譽序朝集院須知一卷無名氏録承平時京朝官得替回朝見禮式皇宋館閣録五卷不著名氏所記止於元祐中興館閣書目云祕閣校理宋匪躬撰又云共八門元十五卷存十一卷今本止五卷不見門類前三卷又混而為一意未必全書也蓬山志五卷祕書少監劍川羅畸疇老撰凡十五門崇寧四年序麟臺故事五卷中書舍人信安程俱致道撰中興之初復置館職俱為少蓬采托舊聞參考裁定條上既略施行而為書十有二篇以進俱在承平時凡三入省故其見聞為詳中興館閣録十卷續十卷祕書監天台陳騤叔進撰淳熙中騤長蓬山與同僚録建炎以來事為此書李燾仁父為之序續録者後人因舊文增附之案續録乃嘉定三年館閣重行編次後人次第補録迄於咸淳者續史館故事一卷著作佐郎曲阿洪興祖慶善撰記國朝史館事迹以續舊編祖宗官制舊典三卷直龍圖閣東萊蔡惇元道撰案元道原本作元通今據宋史藝文志校改大略以為元豐用官階寄祿雖號正名而流品混淆爵位輕濫故以祖宗舊典與新制參稽並考而論其得失元道文忠公參政齊之姪孫而翰林學士延慶之子渡江卒於涪陵尹和靖焞嘗題其墓官制舊典正誤一卷無名氏國朝官制沿革一卷黃琮元禮撰職官記一卷大理少卿張縯季長撰專載新舊遷轉之異亦以寄祿為未然也以上三家皆附蔡氏書後縯蜀人陸務觀與之厚善官制新典十卷熊克撰其書以元豐新制為主而元祐之略加通變崇政之恣為紛更皆具列焉聖朝職略二十卷熊克撰倣馬永錫唐職林考其廢置因革亦頗采故事摘舊制誥中語附焉其書猶草創未成蓋應用之具也宰輔拜罷録二十四卷史館修撰范沖元長等撰起建隆元年止紹興六年宰相自范質至張浚執政自趙普至折彥質各記除授年月訓詞亦略叙在位本末於後國朝相輔年表一卷續一卷同知太常禮院開封陳繹和叔撰自建隆庚申迄治平丙午續自丁未迄紹興十四年稱臣易記而不著姓當是李易也時方自給事中奉祠其曰私題臣易之次者其書蓋未必上而私續之云爾自後接於嘉定則後人所益也職源五十卷大理司直金華王益之行甫撰亦簡牘應用之書而專以今日見行官制為主蓋中興以後於舊制多所併省故也元輔表一卷龔頤正撰專録宰相不及執政漢官考六卷知金州清江徐筠孟堅撰以百官表官制為主而紀傳及注家所載皆輯而録之漢官總録十卷王益之撰大較亦如前書縣法一卷北京留守溫陵吕惠卿吉甫撰曰法令詞訟刑獄簿歷催科給納災傷盜賊勸課教化凡十門為縣之法備於此矣雖今古事殊而大體不能越也惠卿小人之雄於材術固優然法令居首而教化乃居其末不曰俗吏而謂之何哉縣務綱目二十卷贛陽劉鵬撰凡四十四門四百七十餘事其說不止於作縣而事關縣務者為多焉元符庚辰叙作邑自針十卷李元弼持國撰政和丁酉序中興百官題名五十卷監察御史臨川何異同叔撰首卷為宰輔拜罷録餘以次列之刻板浙漕其後以時增附渡江之初庶務草創諸司間有不可考者多闕之齊齊臺諫論二卷尚書霅川倪思正父撰嘉定初更化矯韓氏用事之弊於是為論三篇言為之鷹犬者罪在臺諫已而其弊自若也則又為續論六篇言其情狀益精詳凡為臺諫之所以得所以失者至矣盡矣禮注類獨斷二卷漢議郎陳留蔡雍伯喈撰記漢世制度禮文車服及諸帝世次而兼及前代禮樂舒台二郡皆有刻本向在莆田嘗録李氏本大略與二本同而上下卷前後錯互因並存之開元禮一百五十卷唐集賢院學士蕭嵩王仲丘等撰唐初有貞觀顯慶禮儀注不同而顯慶又出於許敬宗希旨傅會不足施用開元十四年通事舍人王嵒請删禮記舊文而益以今事張說以為禮記不可改易宜折衷貞觀顯慶以為唐禮乃詔徐堅李鋭施敬本撰述蕭嵩王仲丘繼之書成唐之五禮之文始備於是遂以設科取士新史禮樂志大略采托著于篇然唐初已降凶禮於五禮之末至顯慶遂削去國恤一篇則敬宗諂諛諱惡鄙陋亡稽卒不能正也案唐書藝文志開元禮乃賈登張烜施敬本李鋭王仲丘陸善經洪孝昌撰輯蕭嵩總之不著徐堅姓氏開元禮百問二卷不著名氏案唐志亦稱蕭嵩撰以古今異制設為問答凡百條大唐郊祀録十卷唐太常禮院修撰王涇撰考次歷代郊廟沿革之制及其工歌祝號而圖其壇屋陟降之序貞元中上之禮閣新儀三十卷唐太常修撰京兆韋公肅撰録開元以後禮文損益至元和十年其一卷為目録按館閣書目云卷數雖存而書不全又復差互重出今本不爾但目録稍誤續曲臺禮三十卷唐太常博士太原王彥威撰案宋史藝文志注云一本作崔靈恩元和十三年嘗獻曲臺新禮三十卷至長慶中又自元和之末次第編録下及公卿士庶昏姻喪祭之禮并目録為三十卷通前為六十一卷案此惟續書而亦無目録全書則未之見也館閣書目亦無之文宗朝彥威仕為尚書節度使開寶通禮二百卷御史中丞洛陽劉溫叟永齡等撰開寶四年五月命溫叟及李昉盧多遜扈蒙楊昭儉賈黃中和峴陳諤以開元禮重加損益以成此書太常新禮四十卷提舉編修賈昌朝子明等上景祐四年同知太常禮院浦城吳育春卿言本院所藏禮文故事未經刋修請擇官參定至慶歷四年始成凡通禮所存悉仍其舊裒其異者列之為一百二十篇編修官孫祖德李宥張方平吕公綽曾公亮王洙孫瑜余靖刁約天聖鹵簿圖記十卷翰林學士常山宋綬公垂撰始太祖朝鹵簿以繡易畫號繡衣鹵簿真宗時王欽若為記二卷闕於繪事弗可詳識綬與馮元孫奭受詔質正古義傅以新制車騎人物器服之品皆繪其首者名同飾異亦别出焉天聖六年十一月上之其考訂援證詳洽可稽大饗明堂記二十卷紀要二卷宰相河汾文彥博寬夫等撰國朝開創以來三歲親郊未嘗躬行大饗之禮皇祐二年二月詔以季秋擇日有事於明堂而罷冬至郊祀直龍圖閣王洙言國家每歲大饗止於南郊寓祭不合典禮古者明堂宗廟路寢同制今大慶殿即路寢也九月親祀當於大慶殿行禮詔用其言禮成命彥博及次相宋庠參預高若訥編修為記案宋史作高若訥原本作君納誤今改正上親製序文已而彥博以簡牘繁多别為紀要首載聖訓欲以大慶為明堂禮官之議適與聖意合云元豐郊廟奉祀禮文三十卷崇文院校書楊完撰初元豐元年詔以郊廟奉祀禮文訛舛就太常寺置局命陳襄李清臣王存黃履等詳定完及何洵直孫諤檢討其後本局乞令原檢討官楊完編類上進至五年四月書成奏御閣門儀制十二卷學士李淑等修定皆朝廷禮式也政和五禮新儀二百四十卷目録五卷議禮局官知樞密院鄭居中尚書白時中慕容彥逄學士強淵明等撰首卷祐陵御製序文次九卷御筆指揮次十卷御製冠禮餘二百二十卷局官所修也政和五禮撮要十五卷紹興中有范其姓者為湖北漕取品官士庶冠昏喪祭為一編刻板學宫不著名以武昌志考之為漕者有范正國范寅秩不知其為誰也政和冠昏喪祭禮十五卷紹熙中南康黃灝商伯為禮官請於政和五禮內掇取品官庶人禮摹印頒之郡縣從之其實即前十五卷書也訓俗書一卷許洞洞夫撰述廟祭冠笄之禮而拜掃附於末謝絳希深王舉正皆有序跋洞淳化三年進士希深之舅也孟氏家祭禮一卷唐侍御史平昌孟銑撰曰正祭節祠薦新義例凡四篇徐氏家祭禮一卷唐左金吾衛倉曹參軍徐潤撰鄭氏祠享禮一卷唐侍御史鄭正則撰范氏寢堂時饗禮一卷唐涇縣尉南陽范傳式殿中侍御史傳正修定賈氏家祭禮一卷唐武功縣尉賈頊撰新定寢祀禮一卷不知作者中興館閣書目有此書云前後有序題太常博士陳致雍撰集今此本亦前後有序意其是也致雍晉江人及仕本朝孫氏仲享儀一卷案文獻通考作祭享禮檢校左散騎常侍孫日用撰周顯德中博士後仕本朝開寶時作此書杜氏四時祭享禮一卷丞相山隂杜衍世昌撰韓氏古今家祭式一卷司徒兼侍中相臺韓琦稚圭撰橫渠張氏祭禮一卷張載子厚撰末有吕大鈞和叔說數條附焉伊川程氏祭禮一卷程頤正叔撰首載作主式吕氏家祭禮一卷丞相京兆吕大防微仲正字大臨與叔撰范氏家祭禮一卷范祖禹淳甫撰溫公書儀一卷司馬光撰前一卷為表章書啓式餘則冠昏喪祭之禮詳焉居家雜禮一卷司馬光撰吕氏鄉約一卷鄉儀一卷吕大鈞和叔撰高氏送終禮一卷禮部侍郎髙閌抑崇撰四家禮範五卷張栻朱熹所集司馬程張吕氏諸家而建安劉珙刻於金陵古今家祭禮二十卷朱熹集通典會要所載以及唐本朝諸家祭禮皆在焉朱氏家禮一卷朱熹撰十書類編三卷不知何人所集十書者管子弟子職曹昭女誡韓氏家祭式司馬溫公居家雜禮吕氏鄉禮范氏義莊規高氏送終禮髙登修學門庭朱氏重定鄉約社倉約束也雖不專為禮而禮居多故附之於此廟議一卷吏部侍郎趙粹中撰進專為太祖未正東鄉之位乃裒董弅王普趙渙首議案文獻通考作趙漢與一時討論本末上之時淳熙中也奉常雜録一卷樂章一卷無名氏雜録禮寺牲牢樂舞祝辭其樂章則祠祭見行用者服飾變古元録三卷唐翰林學士汝南袁郊之儀撰郊宰相滋之子唐志作一卷古今服飾儀一卷題蜀人樊建紹興癸酉序時令類前史時令之書皆入子部農家類今案諸書上自國家典禮下及里閭風俗悉載之不專農事也故中興館閣書目别為一類列之史部是矣今從之夏小正傳四卷漢戴德傳給事中山隂傅嵩卿注此書本在大戴禮鄭康成注禮運夏時曰夏四時之書也其存者有小正後人於大戴禮鈔出别行嵩卿以正文與傳相雜倣左氏經傳列正文其前而附以傳且為之注荆楚歲時記六卷案唐宋藝文志俱作一卷梁吏部尚書宗懍撰記荆楚風物故事錦帶一卷梁元帝撰比事儷語若法帖中章草月儀之類也案今本作錦帶書題梁昭明太子蕭統撰玊燭寶典十二卷隋著作郎博陵杜臺卿少山撰以月令為主觸類而廣之博采諸書旁及時俗月為一卷頗號詳洽開皇中所上金谷園記一卷題李雍撰館閣書目云唐中散大夫按雍字泰和江都人至北海太守世號李北海其父善注文選者也中散大夫唐文散階本傳不載不知書目别何所據唐世不應有兩李雍也秦中歲時記一卷唐膳部郎中趙郡李綽撰綽别未見此據中興書目云爾其序曰緬思庚子之歲洊周戊辰之年庚子唐廣明元年戊辰梁開平二年也又曰偶記昔年皇居舊事絶筆自歎橫襟出涕然則唐之舊臣國亡之後傷感疇昔而為此書也按朱藏一紺珠集曾端伯類說載此書有杏園探花使端午扇市歲除儺公儺母及太和八年無名子詩數事今皆無之豈别一書乎咸鎬故事一卷唐韋慎微撰其書與前大同小異竟不知何人作也卷末却有鬼神大者號儺公母一語案館閣書目秦中歲時記一名咸鎬歲時記千金月令三卷唐孫思邈撰韋氏月録一卷唐右領軍衛兵曹韋行規撰李翺為之序歲華紀麗七卷案唐書藝文志作二卷宋史藝文志作四卷唐韓鄂撰采經子史傳歲時事類聚而以儷語間之國朝時令集解十二卷左僕射真定賈昌朝子明撰唐因禮記月令舊文增損為禮記首篇天寶中改名時令景祐初始命復禮記舊文其唐之時令别為一篇遂命禮院修書官丁度李淑宋祁王洙鄭戬及昌朝約唐時令撰定為國朝時令以便宣讀蓋自唐以來有明堂讀時令之禮也及昌朝解相印治郡五臣者皆已淪沒乃采經史諸書及祖宗詔令典式為之集解而上之歲時雜記二卷侍講東萊吕希哲原明撰希哲正獻公公著之子號滎陽公在歷陽時與子孫講誦遇節日則休學者雜記風俗之舊然後團坐飲酒以為樂久而成編承平舊事猶有考焉直齊書録解題卷六
