body:
  text: 直齊書録解題卷十六宋陳振孫撰别集類上宋玉集一卷楚大夫宋玉撰史記屈原傳言楚人宋玉唐勒景差之徒蓋皆原之弟子也而玉之辭賦獨傳至以屈宋並稱於後世餘人皆莫能及案隋志集三卷唐志二卷今書乃文選及古文苑中録出者未必當時本也枚叔集一卷漢𢎞農都尉淮隂枚乘撰叔其字也隋志梁時有二卷亡唐志復著録今本乃於漢書及文選諸書鈔出者董仲舒集一卷漢膠西相廣川董仲舒撰案隋唐志皆二卷今惟録本傳中三策及古文苑所載士不遇賦詣公孫𢎞記室書二篇而已其叙篇略本傳語亦載古文苑仲舒平生著書如玉杯繁露清明竹林之類其泯沒不存多矣所傳繁露亦非本真也劉中壘集五卷漢中壘校尉劉向子政撰前四卷封事並見漢書九歎見楚辭末請雨華山賦見古文苑揚子雲集五卷漢黃門郎成都揚雄子雲撰大抵皆録漢書及古文苑所載案宋玉而下五家皆見唐以前藝文志而三朝志俱不著録崇文總目僅有董集一卷而已蓋古本多已不存好事者於史傳類書中鈔録以備一家之作充藏書之數而已二十四針一卷揚雄撰今廣德軍所刋本校集中無司空尚書博士太常四針集中所有皆據古文苑而此四針或云崔駰或云崔子玉疑不能明也蔡中郎集十卷後漢左中郎將陳留蔡雍伯喈撰唐志二十卷今本闕亡之外才六十四篇其間有稱建安年號及為魏宗廟頌述者非雍文也卷末有天聖癸亥歐陽靜所書辨證甚詳以為好事者雜編他人之文相混非本書陳思王集二十卷魏陳王曹植子建撰卷數與前志合其間亦有采取御覽書鈔類聚諸書中所有者意皆後人附益然則亦非當時全書矣其間或引摯虞流别集此書國初已亡猶是唐人舊傳也陳孔璋集十卷魏丞相軍謀掾廣陵陳琳孔璋撰案魏志文帝為五官中郎將及平原侯植皆好文學山陽王粲仲宣北海徐幹偉長廣陵陳琳孔璋陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹並見友善自邯鄲淳繁欽路粹丁廙楊修荀綽等亦有文采而不在此七人之列世所謂建安七子者也但自王粲而下才六人意子建亦在其間耶而文帝典論則又以孔融居其首并粲琳等謂之七子植不與焉今諸家詩文散見於文選及諸類書其以集傳者仲宣子建孔璋三人而已余家亦未有仲宣集阮步兵集十卷魏步兵校尉陳留阮籍嗣宗撰籍瑀之子也嵇中散集十卷魏中散大夫譙嵇康叔夜撰本姓奚自㑹稽徙譙之銍縣嵇山家其側遂氏焉取稽字之上志其本也案晉書本傳銍縣有嵇山家於其側因而命氏此云取稽字之上蓋以嵇與稽字體相近為不忘㑹稽之意文獻通考作取嵇恐誤所著文論六七萬言今存于世者僅如此唐志猶有十五卷張司空集三卷晉司空范陽張華茂先撰前二卷為四言五言詩後一卷為祭祀哀誄等文陸士衡集十卷晉平原內史吳郡陸機士衡撰陸士龍集十卷晉清河內史陸雲士龍撰太康平吳二陸入洛張茂先所謂利獲二俊者也遜抗之後而有機雲可謂代不乏人矣然皆不免其身才者身之纍也况居亂世乎機好遊權門抑又有以取之耶劉司空集十卷晉司空中山劉琨越石撰前五卷差全可觀後五卷闕誤或一卷數行或斷續不屬殆類鈔節者末卷劉府君誄尤多訛未有别本可以是正陶靖節集十卷晉彭澤令潯陽陶潜淵明撰或云淵明字元亮大司馬侃曾孫自號五栁先生世稱靖節徴士陶靖節年譜一卷年譜辨證一卷雜記一卷吳郡吳仁傑斗南為年譜蜀人張縯季長辨證之又雜記前賢論靖節語此蜀本也卷末有陽休之宋庠序録私記又有治平三年思悅題稱永嘉示以宋丞相刋定之本思悅者不知何人也鮑參軍集十卷宋前軍行參軍東海鮑照明逺撰世多云鮑昭以避唐武后諱也沈約宋書李延夀南史皆作鮑照而館閣書目直以為鮑昭且云上黨人非也謝宣城集五卷齊中書郎陳郡謝朓元暉撰集本十卷樓照知宣州止以上五卷賦與詩刋之下五卷皆當時應用之文衰世之事可采者已見本傳及文選餘視詩劣焉無傳可也孔德璋集十卷案文獻通考作一卷齊太子詹事山隂孔稚圭德璋撰北山移文其所作也沈約集十五卷别集一卷又九卷梁特進吳興沈約休文撰約有文集百卷今所存惟此而已十五卷者前二卷為賦餘皆詩也别集雜録詩文不分卷九卷者皆詔草也閣館書目但有此九卷及詩一卷凡四十八首昭明太子集五卷梁太子蕭統德施撰何仲言集三卷案文獻通考作二卷梁水部郎何遜仲言撰本傳集八卷館閣書目同今所傳止此江文通集十卷梁散騎常侍江淹文通撰庾開府集二十卷周司憲中大夫南陽庾信子山撰信肩吾之子仕梁及周其在揚都有集四十卷及江陵又有三卷皆兵火不存今集止自入魏以來所作而哀江南賦實為首冠稽聖賦三卷北齊黃門侍郎琅邪顔之推撰其孫師古注蓋擬天問而作中興書目稱李淳風注唐太宗集三卷唐太宗皇帝本集四十卷館閣書目但有詩一卷六十九首而已今此本第一卷賦四篇詩六十五首後二卷為碑銘書詔之屬而訛謬頗多世所傳太宗之文見於石刻者如帝京篇秋日效庾信體詩三藏聖教序皆不在又晉書紀傳論稱制曰者四皆太宗御製也今獨載宣武二紀論而陸機王羲之傳論不預焉宣紀論復重出其他亦多有非太宗文者雜厠其中非善本也東臯子五卷唐大樂丞太原王績無功撰績文中子王通仲淹之弟也仕隋為正字嗜酒簡放不樂仕進晚以大樂吏焦革善釀求為其丞不問流品亦阮嗣宗步兵之意也革死乃歸於所居立杜康祠為文祭之以焦革配自號東臯子其友吕才鳩訪遺文編成五卷為之序有醉鄉記傳於世其後陸淳又為後序盧照鄰集十卷唐新都尉范陽盧照鄰撰以久病自沈潁水駱賔王集十卷唐臨海丞義烏駱賔王撰賔王後為徐敬業𫝊檄天下罪狀武后所謂一抔之土未乾六尺之孤安在者也其首卷有魯國郗雲卿序言賔王光宅中廣陵亂伏誅莫有收拾其文者後有敕搜訪雲卿撰焉又有蜀本卷數亦同而次序先後皆異序文視前本加詳而云廣陵起義不捷因致遁逃文集散失中宗朝詔令搜訪案本傳言賔王既敗亡命不知所之與蜀本序合陳拾遺集十卷唐右拾遺射洪陳子昂伯玉撰黃門侍郎盧藏用為之序又有别傳系之卷末子昂仕武后既不遇以父喪家居縣令段簡貪暴取貨弗厭致之獄以死年財四十二子昂為明堂議神鳯頌納忠貢諛於孽后之朝大節不足言矣然其詩文在唐初實首起八代之衰者韓退之薦士詩言國朝盛文章子昂始高蹈非虛語也盧序亦簡古清壯非唐初文人所及宋之問集十卷唐越州長史河汾宋之問延清撰沈佺期集十卷案文獻通考作五卷唐中書舍人內黃沈佺期雲卿撰自沈約以來始以音韻對偶為詩至之問佺期益加靡麗學者宗之號為沈宋唐律蓋本於此二人者皆以諂附二張進景龍中俱為修文館學士佺期回波詞有所謂齒録牙緋者其為人可知之問尤反覆無行卒以罪死張燕公集三十卷唐宰相范陽張說說之撰一字道濟與蘇頲號燕許大手筆家未有蘇許公集二人名相而以文擅天下盛矣哉曲江集二十卷唐宰相曲江張九齡子夀撰曲江本有元祐中郡人鄧開序自言得其文於公十世孫蒼梧守唐輔而刋之卷末附以中書舍人樊子彥所撰行狀㑹稽公徐浩所撰神道碑及太常博士鄭宗珍議諡文獻狀蜀本無之王右丞集十卷唐尚書右丞河中王維摩詰撰建昌本與蜀本次序皆不同大抵蜀刻唐六十家集多異于他處本而此集編次尤無倫維詩清逸追逼陶謝輞川别墅圖畫摹傳至今嘗與裴迪同賦各二十絶句集中又有與迪書略曰夜登華子岡輞水淪漣與月上下寒山逺火明滅林外深巷寒犬吠聲如豹村墟夜舂復與疏鐘相間此時獨坐僮僕靜默每思曩昔攜手賦詩當待春中卉木蔓發輕鯈出水白鷗矯翼露濕青臯麥雉朝雊儻能從我遊乎余每讀之使人有飄然獨往之興迪詩亦佳然他無聞於世蓋亦高人也輞川在藍田縣西南二十里本宋之問别圃維後表為清源寺終墓其西龍筋鳯髓判十卷唐司門員外郎陸澤張鷟文成撰鷟調露中進士事跡見張薦傳薦之祖也唐以書判拔萃科選士此集凡百題自省臺寺監百司下及州縣類事屬辭蓋待選預備之具也鷟自號浮休子李翰林集三十卷案解題中所云應作三十卷原本脫十字今校補唐翰林供奉廣漢李白撰唐志有草堂集二十卷者李陽氷所録也今案陽氷序文但言十喪其九而無卷數又樂史序文稱李翰林集十卷别收歌詩十卷因校勘為二十卷又於館中得賦序表書贊頌等亦為十卷號曰别集然則三十卷者樂史所定也家所藏本不知何處本前二十卷為詩後十卷為雜著首載陽氷史及魏皓曾鞏四序李華劉全白范傳正裴敬碑志卷末又載新史本傳而姑孰十詠笑矣悲來草書三歌行亦附焉復著東坡辨證之語其本最為完善别有蜀刻大小二本卷數亦同而首卷専載碑序餘二十三卷歌詩而雜著止六卷有宋敏求後序言舊集歌詩七百七十六篇又得王溥及唐魏萬集本因裒唐類詩諸編洎石刻所傳廣之無慮千篇以别集雜著附其後曾鞏蓋因宋本而次第之者也以校舊藏本篇數如其言然則蜀本即宋本也耶末又有元豐中毛漸題云以宋公編類之勤曾公考次之詳而晏公又能鏤板以傳於世乃晏知止刻於蘇州者然則蜀本蓋傳蘇本而蘇本不復有矣杜工部集二十卷唐左拾遺檢校工部員外郎劔南節度參謀襄陽杜甫子美撰案唐志六十卷小集六卷王洙原叔搜裒中外書九十九卷除其重復定取千四百五篇古詩三百九十九近體千有六起太平時終湖南所作視居行之次若嵗時為先後别録雜著為二卷合二十卷寶元二年記遂為定本王琪君玉嘉祐中刻之姑蘇且為後記元稹墓銘亦附第二十卷之末又有遺文九篇治平中太守裴集刋附集外蜀本大略同而以遺文入正集中則非其舊也世言子美詩集大成而無韻者幾不可讀然開天以前文體大略皆如此若三大禮賦辭氣壯偉又非唐初餘子所能及也校定杜工部集二十二卷祕書郎黃伯思長睿所校既正其差誤參考嵗月出處異同古律相間凡一千四百十十首案文獻通考作一千四百四十七首雜著二十九首别為二卷李丞相伯紀為序之賈幼幾集十卷唐起居舍人河南賈至幼幾撰唐志二十卷别十五卷李淑書目云至集有三本又有十卷者有序今本無序中興館閣本亦同元次山集十卷唐容管經略使河南元結次山撰蜀本但載自序江州本以李商隱所作序冠其首蜀本拾遺一卷中興頌五規二惡之屬皆在焉江本分置十卷結自號漫叟顔魯公集十五卷補遺一卷附録一卷唐太子太師京兆顔真卿清臣撰之推五世孫師古曾侄孫案館閣書目嘉祐中宋敏求惜其文不傳乃集其刋於金石者為十五卷今本序文劉敞所作乃云吳興沈侯編輯而不著沈之名留元剛刻於永嘉為後序則云劉原父所序即宋次道集其刻於金石者也又不知何據元剛復為之年譜益以拾遺一卷多世所傳帖語且以行狀碑傳為附録魯公之裔孫裕自五代時官溫州與其弟倫祥案文獻通考倫作綸皆徙居永嘉樂清本朝世復其家且時褒録其子孫亦有登科者蕭功曹集十卷唐揚州功曹參軍蕭穎士茂挺撰門人栁并為序穎士梁鄱陽王之裔敏悟夙成負才尚氣見惡於李林甫其後卒不遇以死夀亦不逮中年毛欽一集二卷唐荆州長林毛欽一撰長林荆門軍屬縣欽一上諸公書自稱毛欽一字傑或時又以傑為名唐人以字行者多矣自號雲夢子開元中人吳筠集十卷唐嵩陽觀道士華隂吳筠貞節撰筠舉進士不中第天寶初召至京師為道士待詔翰林為高力士所惡而斥後入剡中天台卒弟子諡為宗元先生事見隱逸傳傳稱筠所善孔巢父李白歌詩相甲乙巢父詩未之見也筠詩固不碌碌豈能與太白相甲乙哉獨孤常州集二十卷唐常州刺史洛陽獨孤及至之撰其門人梁肅編集為後序而李舟為序於篇首且刻崔祐甫所為墓志其子曰郁字古風者亦有名韓退之志其墓高常侍集十卷唐左散騎常侍渤海高適逹夫撰適年五十始為詩即工部子美所善也豪傑之士亦何所往而不能也劉隨州集十卷唐隨州刺史宣城劉長卿文房撰詩九卷末一卷雜著數篇而已建昌本十卷别一卷為雜著長卿開元二十一年進士劉虞部集十卷唐虞部郎中劉商子夏撰武元衡為之序集中有送弟歸懷州舊業序言高祖當武德經綸勳在王府案武德功臣有劉文靜宏基政會史皆有傳文靜之後誅絶宏基政㑹傳後無所考未詳何人之後也胡笳十八拍行於世戎昱集五卷案文獻通考作三卷唐䖍州刺史扶風戎昱撰其侄孫為序言弱冠謁杜甫於渚宮一見禮遇集中有哭甫詩世所傳在家貧亦好之句昱詩也梁補闕集二十卷唐右補闕翰林學士安定梁肅敬之撰崔恭為之序首稱其從釋氏為天台大師元浩之弟子今案獨孤及集後序稱門下生頗述師承之意韓愈亦言其佐助陸相貢士所與及第者皆赫然有聞然則梁固名儒善士也而獨以為師從釋氏者何哉陸宣公集二十二卷唐宰相嘉興陸贄敬輿撰權德輿為序稱制誥集十三卷奏草七卷中書奏議七卷今所存者翰苑集十卷榜子集十二卷序又稱别集文賦表狀十五卷今不傳權丞相集五十卷唐宰相略陽權德輿載之撰楊嗣復為序德輿父臯以不汙祿山見卓行傳其子璩為中書舍人劾李訓傾覆亦能世其家性寬和有大體文亦純雅宏贍三世名迹可謂德門矣墓碑韓昌黎所為也序又言九年掌誥自纂録為五十卷不在此集內今未之見裴晉公集二卷唐宰相河東裴度中立撰昌黎集四十卷外集十卷唐吏部侍郎南陽韓愈退之撰李漢序漢文公壻也其言辱知最厚且親收拾遺文無所失墜者懼後之人僞妄輒附益其中也外有注論語十卷傳學者順宗實録五卷列於史官不在集中今實録在外集然則世所謂外集者自實録外皆僞妄或韓公及其壻所刪去也南陽者唐東都之河陽春秋傳晉於是始啓南陽者也新書以為鄧州非是方嵩卿年譜辨之詳矣韓文公志五卷金堂樊汝霖澤之撰汝霖嘗為韓集譜注四十五卷又集其碑志祭文序譜之屬為一編此是也譜注未之見汝霖宣和六年進士仕至瀘帥以卒玉山汪端明志其墓昌黎集四十卷外集一卷附録五卷年譜一卷舉正十卷外抄八卷年譜洪興祖撰莆田方嵩卿增考且撰舉正以校其同異而刻之南安軍外集但據嘉祐蜀本劉煜所録二十五篇而附以石刻聯句詩文之遺見於他集者及葛嶠刻栁文則又以大庾丞韓郁所編注諸本號外集者案文獻通考作韓都并考校疑誤輯遺事共為外鈔刻之校定韓昌黎集四十卷外集十卷晦庵朱侍講熹以方氏本校定凡異同定歸於一多所發明有益後學外集皆如舊本獨用方本益大顛三書愚案方氏用力於此集勤矣外集刪削甚嚴而存此書以見其邀速常語初無崇信之說但欲明世間問答之僞而不悟此書為僞之尤也蓋由歐陽公跋語之故不知歐陽公自以易大傳之名與已意合從而實之此自通人之一蔽東坡固嘗深辨之然其謬妄三尺童子所共識不待坡公也今朱公決以為韓筆無疑方氏未足責晦翁識高一世而其所定者乃爾殆不可解今案外集第七卷曰疑誤者韓郁注云潮州靈山寺所刻末云吏部侍郎潮州刺史者非也退之自刑部侍郎貶潮晚乃由兵部為吏部流俗但稱韓吏部爾其書蓋國初所刻故其謬如此又潮本韓集不見有此書使靈山舊有此刻集時何不編入可見此書妄也然其妄甚白亦不待此而明栁栁州集四十五卷外集二卷唐禮部員外郎栁州刺史河東栁宗元子厚撰劉禹錫作序言編次其文為三十二通退之之志若祭文附第一通之末今世所行本皆四十五卷又不附志文非當時本也或云沈元用所傳穆伯長本栁先生集四十五卷外集二卷别録一卷案文獻通考作二卷托異一卷音釋一卷附録二卷事迹本末一卷方嵩卿既刻韓集於南安軍其後江隂葛嶠為守復刋栁集以配之别録而下皆嶠所裒集也别録者龍城録及法言注五則龍城近世人僞作重校添注栁文四十五卷外集二卷姑蘇鄭定刋於嘉興以諸家所注輯為一編曰集注曰補注曰章曰孫曰韓曰張曰董氏而皆不著其名其曰重校曰添注則其所附益也韓栁音辨二卷南劍州教授新安張敦頤撰紹興八年進士也李元賔集五卷唐太子校書江東李觀元賔撰觀與韓退之貞元八年同年進士明年試博學宏詞觀中其科而愈不在選顔子不二過論其年所試文也又一年觀年二十九卒愈為之志銘使觀不死可量也哉陸希聲得其文二十九篇為之序慶歷中章察又得十四首於楚人趙昂通為五卷歐陽行周集五卷唐國子四門助教莆田歐陽詹行周撰詹亦韓愈同年進士故其集中各有明水賦詹亦早死愈為之哀詞尤拳拳焉李翺作傳而李集不載其序福建廉使李貽孫所為也詹之為人有哀辭可信矣黃璞何人斯乃有太原函髻之謗好事者喜傳之不信愈而信璞異哉高城已不見之句樂府此類多矣不得以為實也然高城已不見之詩題云途中寄太原所思蓋亦有以召其疑也昔人以曖昧受謗傳之千古尚未能明孰謂今人之行已而可不謹哉元氏長慶集六十卷唐宰相河南元稹微之撰中興書目止四十八卷又有逸詩二卷稹嘗自彚其詩為十體其末為豔詩暈眉約鬢匹配色澤劇婦人之怪艷者今世所傳李娃鶯鶯夢遊春古決絶句贈雙文示楊瓊諸詩皆不見於六十卷中意館中所謂逸詩者即其艷體者耶稹初與白樂天齊名文章相上下出處亦不相悖晚而欲速化依奄宦得相卒為小人之歸而居易終始全節嗚呼為士者可以鑒矣白氏長慶集七十一卷年譜一卷又新譜一卷唐太子少傅太原白居易樂天撰案集後記稱前著長慶集五十卷元微之為序後集二十卷自為序今又續後集五卷自為記前後七十五卷時會昌五年也墓志乃云集前後七十卷當時預為志時未有續後集今本七十一卷蘇本蜀本編次亦不同蜀本又有外集一卷往往皆非樂天自記之舊矣年譜維揚李璜德劭所作樓大防參政得之以遺吳郡守李伯珍諫議刻之余嘗病其疏略抵牾且號為年譜而不繫年乃别為新譜刋附集首白集年譜一卷知忠州漢嘉何友諒以居易舊治既刋其文集又作年譜刋之集首始余為譜既成妹夫王栐叔永守忠録寄之則忠已有此譜視余譜詳略互見亦各有發明其辨李崖州三絶非樂天作及載朝子止之語謂與楊虞卿為姻家與牛僧孺為師生而不陷牛李黨中與余暗合因並存之詳見新譜末章劉賔客集三十卷外集十卷唐檢校禮部尚書兼太子賔客中山劉禹錫夢得撰集本四十卷逸其十卷常山宋次道裒輯其遺文得詩四百七篇雜文二十二篇為外集然未必皆十卷所逸也李文公集十卷案文獻通考作十八卷唐山南東道節度使李翺習之撰蜀本分二十卷集中無詩獨有戲贈一篇拙甚決非其作也然韓集逺遊聯句有習之一聯云前之詎灼灼此去信悠悠亦殊不工他無一語意者於詩非所長而不作耶習之為文源委於退之可謂得其傳矣但其才氣不能及耳樊宗師集一卷絳守園池記注一卷唐諫議大夫南陽樊宗師紹述撰韓文公為墓志稱魁紀公三十卷樊子三十卷詩文千餘篇今所存才數篇耳讀之殆不可句有王晟者天聖中為絳倅取其園池記章解而句釋之猶有不盡通者孔子曰辭逹而已矣為文而晦澀若此其湮沒弗傳也宜哉書以魁紀公名異甚文之不可句當亦類是隨齊批注皇甫持正集六卷唐工部郎中新定皇甫湜持正撰東都修福先寺碑三千字一字索三縑案原本無一字二字今據文獻通考補正其輕傲不羈非裴晉公巨德殆不能容之也今集才數十篇碑不復存意其多所亡逸然湜之矜負如此固不苟為人作人亦未必敢求之也林藻集一卷唐嶺南節度副使莆田林藻緯乾撰藻貞元七年進士試珠還合浦賦叙珠去來之意人謂有神助焉林藴集一卷唐邵州刺史林藴復夢撰藻之弟也見儒學傳藴父披蘇州别駕有子九人世號九牧林氏其族至今衣冠詩禮以藴所為父墓碑考之其八子為刺史司馬其一號處士而披之父為饒陽郡守祖為瀛州刺史蓋亦盛矣沈下賢集十二卷案文獻通考作十卷唐福建團練副使吳興沈亞之下賢撰元和十年進士仕不出藩府長慶中為櫟陽尉案唐詩紀事及文獻通考俱作樂陽太和中謫掾郢州皆集中可見者也吳興者著郡望其實長安人孟東野集十卷唐溧陽尉武康孟郊東野撰惟末卷有書二篇贊一篇餘皆詩也郊貞元十二年進士吕衡州集十卷唐衡州刺史河中吕溫和叔撰一字化光劉禹錫為序溫本善韋執誼王叔文偶使絶域得免在八司馬之數而終以好利敗與竇羣羊士諤昵比傾誣宰相李吉甫謫死屨校不懲至於滅耳此其所以為小人歟會昌一品集二十卷别集十卷外集四卷唐宰相趙郡李德裕文饒撰一品集者皆㑹昌在相位制誥詔冊表疏之類也别集詩賦雜著外集則窮愁志也德裕自穆宗時已掌內外制纍踐方鎮遂相文宗平生著述詎止此此外有姑臧集五卷而已其不傳於世者亦多矣窮愁志晚年遷謫後所作凡四十九篇其論精深其詞峻潔可見其英偉之氣周秦行紀一篇竒章怨家所為而文饒遂信之爾李衛公備全集五十卷年譜一卷托遺一卷比永嘉及蜀本三十四卷之外有姑臧集五卷獻替記辨謗略等諸書共十一卷知鎮江府江隂耿秉直之所輯并考次為年譜托遺姑臧集者兵部員外郎段令緯所集前四卷皆西掖北門制草末卷惟黠戞斯朝貢圖及歌詩數篇其曰姑臧未詳衛公三為浙西出入十年皆治京口故秉直刻其集若永嘉則其事頗異郡故有海神廟本城北隅叢祠元祐中太守范峋夢其神自言李姓唐武宗時宰相南遷以沒寤而意其為德裕訪得其祠遂作新廟且列上其事自是日盛賜廟額號王爵然衛公平生於溫蓋邈乎不相及也殊有不可曉者平泉雜文一卷即别集第九第十卷平泉山居所作詩賦記也樊川集二十卷外集一卷唐中書舍人京兆杜牧牧之撰牧佑之孫其甥裴延翰編而序之外集皆詩也又在天台録得集外詩一卷别見詩集類未知是否牧才高俊邁不羈其詩豪而艷有氣槩非晚唐人所能及也李義山集八卷樊南甲乙集四十卷唐太學博士河內李商隱義山撰商隱令狐楚客開成二年進士書判入等從王茂元鄭亞辟二人皆李德裕所善坐此為令狐綯所憾竟坎壈以終甲乙集者皆表章啓牒四六之文既不得志於時歷佐藩府自茂元亞之外又依盧宏正栁仲郢故其所作應用若此之多商隱本為古文令狐楚長於章奏遂以授商隱然以近世四六觀之當時以為工今未見其工也玉溪生集三卷案文獻通考作二卷李商隱自號此集即前卷中賦及雜著也孫樵集十卷案文獻通考作三卷唐職方郎中孫樵可之撰自為序凡三十五篇蓋其刪擇之餘也樵大中九年進士東坡嘗曰學韓愈而不至者為皇甫湜學湜而不至者為孫樵李甘文集一卷唐侍御史李甘和鼎撰甘欲壞鄭注麻坐貶死杜牧所為賦詩者也薛逢四六集一卷唐祕書監河東薛逢陶臣撰敕語堂判集一卷唐宰相滎陽鄭畋台文撰文泉子十卷唐中書舍人長沙劉蛻復愚撰自為序云覃以九流之㫖配以不竭之義曰泉有文冢銘甚奇蛻大中四年進士其為西掖在咸通時一鳴集十卷案文獻通考作三十卷唐兵部侍郎虞鄉司空圖表聖撰案虞鄉即今解州原本作虞卿誤今改正圖見卓行傳唐末高人勝士也蜀本但有雜著無詩自有詩十卷别行詩格尤非晚唐諸子所可望也其論詩以梅止於酸鹽止於鹹鹹酸之外醇美乏焉東坡嘗以為名言自號知非子又曰耐辱居士文藪十卷唐太常博士襄陽皮日休襲美撰日休咸通八年進士黃巢之難陷賊中為果頭三屈律之讖賊疑譏已髮拳遂見害陸游筆記以皮光業碑辨其不然笠澤叢書四卷補遺一卷唐處士吳郡陸龜䝉魯望撰為甲乙丙丁詩文雜編政和中朱衮刋之吳江末有四賦用蜀本增入笠澤叢書蜀本十七卷案文獻通考作七卷元符中郫人樊開所序龜䝉自號天隨子甫里先生江湖散人與皮日休善有松陵倡和集皆不在文藪叢書中羅江東甲乙集十卷後集五卷湘南集三卷唐鄉貢進士新城羅隱昭諫撰隱舉進士不第更辟諸鎮幕府羅紹威待以從叔晚依吳越奏授給事中甲乙集皆詩後集有律賦數首湘南集者長沙幕中應用之文也隱又有淮海寓言讒書等求之未獲讒書刋于新城縣隨齊批注投知小録三卷唐神策判官郃陽秦韜玉中明撰田令孜客中和二年特賜及第鳯策聯華三卷唐虞部郎中淮南從事秋浦顧雲垂象撰多以擬古為題蓋行卷之文也雲咸通十五年進士聱書十卷唐天復進士沈顔可鑄撰傳師之孫仕僞吳順義中為翰苑名聱者以元結聱叟自况也其文骫骳而自序之語極其矜負李後主集十卷江南國主李煜重光撰田霖四六集一卷南唐田霖撰扈載集十卷後周翰林學士范陽扈載仲熙撰少俊早逹年三十六以死其子䝉顯於國初直齊書録解題卷十六
