body:
  text: 直齋書錄解題卷十八宋陳振孫撰别集類下演山集六十卷端明殿學士延平黄裳冕仲撰元豐二年進士第一人貴顯於崇觀死於建炎年八十有七方三舎法初行裳謂宜近不宜逺宜少不宜老宜富不宜貧不如遵祖宗科舉之制世傳以為口實景迂集二十卷徽猷閣待制晁説之以道撰又本止刋前十卷説之平生著述至多兵火散逸其孫子健裒其遺文得十二卷續廣之為二十卷别本刋前十卷而止者不知何説也劉跂斯立墓誌景迂所撰見學易集後而此集無之計其逸者多矣説之元豐五年進士元祐初蘇文忠范太史曾文昭皆薦之坐元祐邪等廢棄靖康末始為從官卒於建炎三年慕司馬温公為人自號景迂生龜山集二十八卷工部侍郎延平楊時中立撰時及從明道死當建炎四年年八十有七於程門最為夀考梁谿集一百二十卷丞相忠定公昭武李綱伯紀撰父䕫進士起家至右文殿修撰黄右丞履之甥也綱娶吳園先生張根之女亦右丞外孫梁谿名集者修撰葬錫山忠定嘗廬墓云襄陵集二十四卷尚書右丞襄陵許翰崧老撰元祐三年進士靖康初入西府建炎為丞轄與黄潛善輩不合而去後湖集十卷丹陽蘇庠養直撰其父堅伯固亦有詩名庠以遺澤畀其子而自放江湖間東坡見其清江曲大愛之由是得名僧祖可正平號癩可者其弟也庠中子扶亦工詩有清苦之節庠紳之後頌之族初寮集四十卷後集十卷内外制二十四卷尚書左丞中山王安中履道撰安中年十四薦於鄉凡四舉乃登第為中司受㫖攻蔡京京子攸入禁中日夕泣涕告于上安中亟改翰苑事遂止其自政府出守燕京父子排之也然安中之進亦本由梁師成始東坡帥定武安中未弱冠猶及師事焉未卒業而坡去其後晁以道為無極令安中既第修邑子禮用長牋自言以新學竊一第為親榮非其志也以道曰為學當謹初何患不逺到安中築室榜曰初寮其議論聞見多得於以道旣貴顯遂諱晁學但稱成州使君四丈無復先生之號矣甚哉籍湜不畔之難也劉給事集五卷給事中劉安上元禮撰紹聖四年登第歴臺諫掖垣𤨏闥以次對歴三郡而終集中有彈蔡京疏横塘集三十卷尚書右丞瑞安許景衡少伊撰亦嘗從程氏學建炎初為執政與黄汪不合罷建議渡江幸建康言者以為非是及下還京之詔景衡以憂卒於𤓰洲未幾敵騎奄至淮揚倉卒南渡章貢集二十卷秘書監章貢李朴先之撰紹聖元年進士坐言隆祐之賢廢三十年蔡京欲強致之不屈靖康建炎之間半嵗五遷而病不能行以死其教授西京國子監也程伊川與之甚厚然謂其太直以洛中風波為戒朴笑曰不意此言發于先生之口伊川為之改容愧謝其風節可畏也歐陽修撰集六卷崇仁布衣贈秘閣修撰歐陽澈徳明撰澈死時年三十一環溪吳沆裒其詩為飄然集三卷而會稽胡衍晉逺取其所上三書併刻之臨川倅廨空青遺文十卷直寶文閣南豐曾紆公衮撰紆布之子有異材建中靖國初布在相位奉詔為景靈西宫碑紆之筆也建炎紹興之際将漕江浙入為司農少卿知信衢州以卒汪彦章誌其墓孫仲益序其文王銍性之其壻也石林總集一百卷年譜一卷尚書左丞吳郡葉夢得少藴撰紹聖四年進士崇觀間驟貴顯三十一嵗掌外制次年遂入翰林中廢至建炎乃執政然財數日而罷平生所歴州鎭皆有能聲胡文定安國嘗以其蔡潁南京之政薦于朝謂不當以宿累廢晚兩帥金陵當烏珠臨江移三山平羣宼其功不可沒也秦檜秉政欲令帥蜀辭不行忤檜意以崇慶節度使致仕其居在卞山奇石森列藏書數萬卷旣沒守者不謹屋與書俱燼于火石林二字本出楚辭天問石林建康集十卷皆帥建康時詩文其初以所莅官各為一集後其家編次總而合之此集其一也石林審是集八卷其門人盛光祖子紹所錄亦已入總集浮溪集六十卷翰林學士婺源汪藻彦章撰四六偶儷之文起於齊梁歴隋唐之世表章詔誥多用之然令狐楚李商隱之流號為能者殊不工也本朝楊劉諸名公猶未變唐體至歐蘇始以博學富文為大篇長句叙事達意無艱難牽強之態而王荆公尤深厚爾雅儷語之工昔所未有紹聖後置詞科習者益衆格律精嚴一字不苟措若浮溪尤其集大成者也翟忠惠集三十卷參政丹陽翟汝文公巽撰汝文制誥古雅多用全句氣格渾厚近世罕及夫人邢氏恕之女居實其弟也長子耆年寔邢出好古博文高尚不仕忠惠者私諡也鴻慶集四十二卷戸部尚書晉陵孫覿仲益撰大觀三年進士政和四年詞科代高麗謝賜燕樂表膾炙人口生元豐辛酉卒乾道己丑蓋年八十有九可謂耆宿矣而其平生出處至不足道也嘗提舉鴻慶宫故以名集吕忠穆集十五卷丞相濟南吕頤浩元直撰後三卷為燕魏錄雜記古今事卷末言金人敗盟始末甚詳忠正徳文集十卷丞相聞喜趙鼎元鎭撰四字高廟所賜宸翰中語也北山小集四十卷中書舎人信安程俱致道撰俱父祖世科而俱乃以外祖鄧潤甫䕃入仕宣和中賜上舎出身為南宫舎人紹興初入西掖徐俯為諫議大夫封還詞頭罷去後以次對修史病不能赴而卒陵陽集五十卷中書舎人仙井韓駒子蒼撰自幼能詩黄太史稱其超軼絶塵蘇文定以比儲光羲游太學不第政和初獻書召試賜出身後入西掖坐蘇氏鄉黨曲學罷丹陽集四十二卷後集四十二卷顯謨閣待制江陰葛勝仲魯卿撰紹聖四年進士元符三年詞科洪慶善序其文有所謂絶郭天信案郭天信見宋史方技傳原本作大信誤今改正拒朱勔慙盛章而怒李彦者蓋其平生出處之畧也再知湖州後遂家焉尹和靖集一卷附集一卷徽猷閣待制河南尹焞彦明撰子漸之孫年十九舉進士策問欲誅元祐黨籍不對而出遂罷舉靖康賜號和靖處士敵陷洛陽闔門遇害死而復蘇門人潛載以逃客涪州以范元長薦入經筵擢列侍從葬會稽山綦北海集六十卷翰林學士北海綦崈禮叔厚撰工於四六秦檜初罷相崈禮當制有御筆詞頭藏其家檜再相下台州追索時崈禮已死幸不及禍雲龕草堂後集二十六卷參政鉅野李邴漢老撰明受之變以兵部侍郎直學士院叱責兇渠朝廷賴焉旣復辟首擢執政周益公作神道碑言前後集一百卷今惟後集蓋皆南渡後所作也朱文公為之序漢老樂静右史之姪五世祖濤五代時宰相石晉之亂弟澣在翰林陷于敵及邴立節于建炎而其弟鄴守會稽亦隨金人北去世以為異龜谿集十二卷知樞密院忠敏吳興沈與求必先撰建炎紹興之間歴三院翰苑以至執政嘗奏言王安石之罪大者在于取揚雄馮道當時學者惟知有安石喪亂之際甘心從偽無仗節死義之風實安石倡之此論前未之及也紹興七年終于位胡忠獻集六十卷案文獻通考題胡承公集十卷資古紹志集十卷端明殿學士晉陵胡世将承公撰文恭公宿之曾孫以兵部侍郎為川陜副宣金人敗盟繼吳玠之後經畫守禦以迄和議再成分疆未定死于河池世将好古博雅有資古紹志錄倣集古錄跋尾亦見集中諡忠獻案諡忠獻句原本脱去今據文獻通攷増入胡文定公武夷集十五卷給事中崇安胡安國康侯撰紹聖四年進士第三人仕四十年實歴不及三載著春秋傳行于世本喜為文後篤志于學乃不復作其辭召試曰少習藝文不稱語妙晚捐華藻纔取理明旣覺昨非更無餘習故其文集止此毗陵集五十卷參政文靖毗陵張守全眞撰一字子固案子固原本作子同誤今據宋史本傳改正崇寜進士詞科紹興執政張魏公在相位薦秦檜再用守有力焉一日與魏公言某誤公聽今朝夕同班列得欵曲其人似以曩者一跌為戒有患失心宜自劾謝上魏公為作墓志著其語張章簡華陽集四十卷參政金壇張綱彦正撰大觀中舎法三中首選釋褐為承事郎辟雍正蓋專于新學者紹興初在瑣闥忤張俊求去復與秦隙遂引年秦亡乃召用乾道初年八十四而終自號華陽老人華陽者茅山也非有齋類藁五十卷給事中吳興劉一止行簡撰宣和三年進士居𤨏闥僅百餘日忤秦檜罷去閒居十餘年以次對致仕檜死被召力辭進雜學士而終年八十二實紹興庚辰竹西集十卷西垣集五卷兵部侍郎維揚王居正剛中撰宣和三年進士紹興初入詞掖西垣集者制草及繳章也其篇目凢繳章皆云封還詞頭蓋其子孫編次者之失也除授則有詞頭政刑庶事何詞頭之有張巨山集三十卷中書舍人光化張嵲巨山撰嵲為司勲郎官金人再取河南秦相惶恐上章引伊尹善無常主及周任不能者止之文以自解嵲之筆也秦徳之遂擢修注掌制而其具藁倉卒誤以伊尹告太甲為告湯及周任之言為孔子自言時秘書省寓傳法寺有書其門曰周任為孔聖太甲作成湯秦疑諸館職為之多被逐然嵲亦以答檜三折肱之語謂其貳于已無幾亦罷默成居士集十五卷中書舎人潘良貴子賤撰一字義榮剛介之士也朱侍講序其集畧見其出處大致默堂集二十二卷案文獻通攷作二十卷宗正少卿延平陳淵知默撰一字幾叟了翁之姪孫楊龜山門人紹興初嘗為諫官筠谿集二十四卷戸部侍郎連江李彌遜似之撰案遜原本作聖文獻通考作逺俱誤今據宋史改正大觀三年上舎第一知冀州能抗金敵攝江東帥與李忠定平周徳之亂晚為從官沮和議坐廢而終鄱陽集十卷徽猷閣直學士鄱陽洪皓光弼撰皓奉使金國守節不屈既歸為秦所忌謫英州死之日與秦適相先後三子登詞科俱貴顯東窓集四十卷中書舎人鄱陽張廣彦實撰與吕居仁為詩友其在西掖當紹興十一年雪谿集畧八卷汝隂王銍性之撰國初周易博士昭素之後也其父萃樂道嘗從歐公學銍為曾紆婿嘗撰七朝國史紹興初嘗同子正薦之詔視秩史官給札奏御會秦氏柄國中止書竟不傳其子明清著揮麈錄致堂斐然集三十卷禮部侍郎胡寅明仲撰文定公長子也本其兄子初生棄不舉文定于水盆内收育之旣長俾自絶于本生不為心喪止服世父之服寅遵行之集中有與秦丞相書言之甚詳人倫之變古今所未有也寅宣和初進士紹興初已為從官不主和議秦本與其父子有契分竟謫新州檜死北歸没於岳州五峯集五卷右承務郎胡宏仁仲撰文定季子不出仕篤意理學南軒張栻其門人也别本不分卷竹軒雜著十五卷太常少卿永嘉林季仲懿成撰以趙元鎭薦入朝奏疏沮和議得罪仲熊叔豹季貍其弟也皆知名北山集三十卷端明殿學士金華鄭剛中亨仲撰紹興二年進士亞魁受知秦相擢使川陜後忤意貶死封州澹庵集七十八卷端明殿學士忠簡廬陵胡銓邦衡撰建炎甲科第五人旣上書乞斬秦檜謫嶺海秦死得歸孝宗即位始復官召用又以沮再和之議得罪去乾道中入為丞郎亦不容于時奉祠至淳熙七年乃終年七十有九相山集二十六卷朝奉大夫濡須王之道彦猷撰宣和六年兄弟三人同登科建炎宼亂率衆保明避山從之者皆得免以功改京官沮和議得罪晚乃歴麾節其子藺被遇阜陵貴顯韋齋小集十二卷吏部員外郎新安朱松喬年撰侍講文公之父也文公嘗言韋齋先生自為兒童時出語已驚人及去場屋始放意為詩文其詩初亦不事彫飾而天然秀發格律閒暇超然有出塵寰之趣案文公嘗言以下原本脱去今據文獻通攷増入闗博士集二十卷太學博士錢塘闗注子東撰紹興五年進士嘗為湖州教授自號香巖居士石月老人集三十五卷朝議大夫致仕鄱陽余安行勉仲撰安行累舉不第其子應求以童子登崇寜五年進士科為御史歴麾節所至迎養其父至九十六乃終著書號至言蓋純篤之士也王著作集四卷著作佐郎福清王蘋信伯撰從程門學以趙忠簡薦召對賜出身秦檜惡之會其族子坐法牽連文致奪官以死屏山集二十卷通判興化軍崇安劉子翬彦沖撰父韐兄子羽子翬以廕入仕年甫四十八而卒朱文公其門人也嘗謂朱曰吾少聞佛老之説歸讀吾書然後知吾道之大體用之全如此於易得入徳之門焉作復齋銘聖傳論可以見吾志矣東溪集十二卷案文獻通攷作二十卷迪功郎漳浦高登彦先撰考試潮州策問忤秦相謫死繙經堂集八卷知盱眙軍東平畢良史少董撰文簡公士安五世孫嘗陷敵有從之游者因為圖名繙經寫其訪問紬繹之狀藥寮叢藁二十卷太常少卿上蔡謝伋景思撰參政克家之子巖壑老人詩文一卷左朝請大夫洛陽朱敦儒希眞撰初以遺逸召用嘗為館職既挂冠秦檜之孫壎欲學為詩起希眞為鴻臚少卿将使教之懼禍不敢辭不久秦亡物論少之合有全集未見鹤溪集十二卷辟雍博士青田陳汝錫師予撰紹聖四年進士持節數路帥越而卒青田登科人自汝錫始希㸃子與其孫也岳武穆集十卷樞密副使鄴郡岳飛鵬舉撰飛功業偉矣不必以集著也世所傳誦其賀和議成一表當亦是幙客所為而意則出于岳也漢濱集六十卷參政襄陽王之望瞻叔撰周益公為集序玉山翰林詞草五卷尚書玉山汪應辰聖錫撰紹興五年進士首選本名洋御筆改賜天材甚高而不喜為文謂不宜敝精神於無用然毎作輒過人以天官兼翰苑近二年所撰制詔温雅典實得王言體朱晦翁稱為近世第一太倉稊米集七十卷樞宻編修宣城周紫芝少隱撰自號竹坡居士白蘋集四卷右文林郎單父龎謙孺祐甫撰荘敏公籍之曾孫用季父恩仕不遂而死韓南澗志其墓嘗客居吳興故集名白蘋南澗甲乙藁七十卷吏部尚書㯋川韓元吉无咎撰門下侍郎維之元孫與其從兄元龍子雲皆嘗試詞科不利居廣信溪南案廣信原本作廣徳誤今據文獻通攷改正號南澗艇齋雜著一卷南豐曾季貍裘父撰鞏之弟曰湘潭主簿宰宰之孫曰大理司直晦之季貍其子也少從吕居仁徐師川遊嘗一試禮部不中乾淳間名公多敬畏之具見其子濰所集師友尺牘此編蓋其議論古今之文辭質而義正可以得其人之大略溪園集十卷蘄春吳億大年撰其父擇仁為尚書億仕至静江倅居餘干有溪園佳勝世傳其樓雪初銷詞為建康帥晁謙之作于湖集四十卷中書舎人歴陽張孝祥安國撰甲戌冠多士出思陵親擢秦相孫壎遂居其下秦忌惡之以他事下其父子大理獄明年秦亡上旣素眷不五年登法從阜陵尤眷之不幸不得年死時財四十餘上嘗有用不盡之歎其文翰皆超逸天才也南軒集三十卷侍講廣漢張栻敬夫撰魏忠獻公浚之長子當孝宗朝以任子不賜第入西掖者韓元吉劉孝韙其入經筵則栻也王司業集二十卷案文獻通攷作三十卷國子司業宛丘王逨致君撰建炎初其家避亂沿汴南下逨年十一偶小泊登岸敵適至亟解維不暇顧遂失之在金十年間闗得歸其父工部尚書俁也旣歸入太學登癸未科為諫官御史歴麾節終于少司成浮山集十六卷左朝請大夫江都仲并彌性撰紹興壬子進士晚丞光祿寺得知蘄州并嘗倅湖籍中有所盼為作生朝青詞好事者傳誦之遂漏露坐謫官其訓詞畧曰爾為瀆侮之詞曽弗知畏天其知畏吾法乎吾鄉前輩能道其事如此小醜集十二卷續集三卷直秘閣眉山任盡言元受撰元符諫官伯雨之孫紹興從臣申先之子乙夘甲科仕為大常寺主簿終于閩憲拙齋集二十二卷校書郎候官林之奇少潁撰之奇學于吕本中而太史祖謙學于之奇其登第當紹興辛未年已四十未幾即入館方鄉用而得末疾霜傑集三十卷徳興董穎仲達撰紹興初人從汪彦章徐師川游彦章為作序妙筆集四十卷案文獻通考妙筆作妙峯中書舎人福清林遹述中撰元符三年甲科苖劉之變在西掖不失節思陵嘉之終龍圖直學士鄮峰眞隱漫錄五十卷丞相文惠公四明史浩直翁撰詅癡符二十卷御史臨海李庚子長撰詅之義衒鬻也市人鬻物于市誇號之曰詅原註去聲此三字本出顔氏家訓以譏無才思而流布醜拙者以名其集示謙也庚乙丑進士以湯鵬舉薦碎入臺家藏書甚富梯雲集二十五卷中書舎人資川趙逵荘叔撰辛未大魁有氣節四十一歳卒海陵集三十二卷同知樞密院海陵周麟之茂振撰乙丑進士戊辰詞科旣執政被命使金亮辭行得罪去胡獻簡詞垣草四卷禮部尚書會稽胡沂周伯撰介庵集十卷左司郎官趙彦端徳荘撰乾淳間名士也嘗宰餘干趙忠定其邑人初冠多士徳荘在朝往謁謝徳荘語之曰謹勿以一魁先置胸中可謂名言石湖集一百三十六卷參政吳郡范成大致能撰初以起居郎使金附奏受書事抗金主於其殿陛間歸而益被上眷以至柄用石湖在太湖之濱姑蘇臺之下去城十餘里面湖為堂號鏡天閣又一堂扁石湖二字阜陵宸翰也今日就荒毁更數年恐無復遺跡矣頃一再過之為之􅁣然周益公集二百卷年譜一卷附錄一卷丞相益文忠公廬陵周必大子充撰一字宏道其家旣刋六一集故此集編次一切視其凡目其間有奉詔錄親征錄龍飛錄思陵錄凡十一卷以其多及時事託言未刋人莫之見鄭子敬守吉募工人印得之余在莆田借錄為全書然猶漫其數十處益公自號平園叟渭南集三十卷案文獻通考作二十卷劒南詩藁續藁八十七卷華文閣待制山隂陸游務觀撰左丞佃之孫紹興末召對賜出身隆興初為樞宻院編修官鄉用矣坐漏泄省中語阜陵以為反復斥逺之後以夔倅入蜀益自放肆不䕶細行自號放翁在蜀九年乃歸晚由嚴陵召為南宫舎人将内禪益公薦直北門上終不用及韓氏用事游既挂冠久矣有幼子澤不逮為侂胄作南園記起為大蓬以次對再致仕嘉定庚午年八十六而終游才甚高幼為曾吉父所賞識詩為巾興之􅃣他文亦佳而詩最富至萬餘篇古今未有故文與詩别行渭南者封渭南縣伯復齋制表二卷刑部侍郎王秬嘉叟撰初寮安中之孫紹興乾道間名士也陸放翁與之厚善盤洲集八十卷丞相文惠公鄱陽洪适景伯撰忠宣之長子方奉使時文惠甫十三嵗後與其弟遵同中壬戌宏博科本名造後改焉又三年乙丑弟邁繼之世號三洪其自淮東總領入為太常少卿一年而入右府又半年而拜相然在位僅三閲月為林安宅所攻而去嘗一帥越閒居十六年而終小隱集七十卷樞密文安公洪遵景嚴撰其進用最先于兄弟而得年不永薨於淳熙元年野處類藁一卷案文獻通攷作二卷翰林學士文敏公洪邁景盧撰其全集未見誠齋集一百三十三卷寶謨閣學士文節公廬陵楊萬里廷秀撰當淳熙末為大蓬論思陵配饗不合去及韓侂胄用事召之卒不至自次對遷至學士聞開禧出師不食而死自作江湖集序曰予少作有詩千餘篇至紹興壬午皆焚之大概江西體也今所存曰江湖集者蓋學后山及半山及唐人者也案自作江湖集序以下一叚原本脱去今據文獻通攷増入程文簡集二十卷吏部尚書新安程大昌泰之撰毎卷分上下其實四十卷也博學長於攷究著述甚多皆傳于世樵隱集十五卷信安毛幵平仲撰禮部尚書友之子負才傲世仕止州倅與尤遂初厚善臨終以書别之囑以志墓延之旣為銘又序其集梁谿集五十卷禮部尚書錫山尤袤延之撰家有遂初堂藏書為近世冠鄭景望集三十卷宗正少卿永嘉鄭伯熊景望撰歸愚翁集二十六卷秀州判官鄭伯英景元撰近世永嘉學者推二鄭伯熊紹興乙丑進士自隆興初為館職王府東宫官至少司成宗正鄉用矣毎小不合輒乞去卒於建寜守伯英癸未甲科第四人以親養三十年不調竟不出二人皆豪傑之士也晦庵集一百卷紫陽年譜三卷待制侍講文公新安朱熹元晦撰年譜昭武李方子公晦所述其門人也習庵集十二卷戸部侍郎曾逮仲躬撰文清公幾之子東萊吕太史集十五卷别集十六卷外集五卷附錄三卷著作郎東萊吕祖謙伯恭撰其弟祖儉編錄凡家範尺牘之類總之别集筞問宏詞程文之類總之外集年譜遺事則見附錄太史曾文淸外孫隆興癸未鎻廳甲科宏詞亦入等仕未達得末疾奉祠年財四十五卒于淳熙辛丑平生著述皆畧舉端緒未有成書者學者惜之大愚叟集十一卷太府寺丞吕祖儉子約撰祖謙弟也慶元初上封事論救祭酒李祥謫髙安以没寓居大愚寺故以名集千巖擇藁七卷外編三卷續編四卷知峽州三山蕭徳藻東夫撰嘗宰烏程後遂家焉楊誠齋序其集曰近世詩人若范石湖之清新尤梁谿之平淡陸放翁之敷腴蕭千巖之工緻皆余所畏也濟溪老人遺藁一卷通判明州濟源李迎彦将撰永嘉周浮沚先生之壻與先大父為襟袂集中有送先君子赴戊子秋試詩首句籍甚人言易已東蓋先君治易故也集序周益公作訢庵集四十卷案文獻通考訢庵作泝庵新津任淵子淵撰紹興乙丑類試第一人仕至潼川憲嘗註山谷后山詩行於世新津有天社山故稱天社任淵方舟集五十卷後集二十卷資陽李石知幾撰石有盛名於蜀少嘗客蘇符尚書家紹興末為學官乾道中為郎歴麾節皆以論罷趙丞相雄其鄉人也素不善石石以是晚益困其自叙云宋魋魯倉今猶古也歸愚集二十卷吏部侍郎葛立方常之撰勝仲之子丞相邲之父也以郎官攝西掖忤秦相得罪更化召用言者又以為附會沈該罷去遂不復起綺川集十五卷太常寺主簿歸安倪偁文舉撰紹興八年進士齊齋之父象山集二十八卷外集四卷知荆門軍金谿陸九淵子静撰與其兄九齡子夀乾淳間名士也象山在貴溪結茅其上與士友講學山形如象故名施正憲集六十七卷外集二卷案外集文獻通考作三卷知樞宻院廣信施師㸃聖與撰其在政府六年上眷未衰􅁣然勇退引去不可囘識者壯其決趙南塘汝談其壻也為序其集而傳之適齋類藁八卷奉新袁去華定卿撰案文獻通攷作宣卿紹興乙丑進士改官知石首縣而卒善為歌詞嘗賦長沙定王臺見稱於張安國為書之梅溪集三十二卷續集五卷案梅溪集下原本無卷數今據文獻通攷補正詹事樂清王十朋龜齡撰丁丑大魁立朝剛正劉珙作序案末句原本脱去今據文獻通攷增入酒隱集三卷宣州司理趙育去病撰其父鼎臣承之號竹隱畸士者也四六類藁三十卷起居郎建安熊克子復撰皆四六應用之文也亦無過人者克以王丞相季海薦驟用王時在樞府趙温叔當國莫知其所從來頗疑其由徑沮之而上意鄉之不能囘也拙庵雜著三十卷外集四卷工部侍郎東平趙磻老渭師撰門下侍郎野之姪以婦翁歐陽懋待制澤入仕從范石湖使金虞丞相并父亦薦之遂擢用知臨安坐殿司招兵事謫饒州雙溪集二十卷知郴州東陽曹冠宗臣撰由舎選登甲科坐為秦壎假手奪官再赴廷試得初品止齋集五十三卷案文獻通攷作五十二卷中書舎人永嘉陳傅良君舉撰三山本五十卷水心集二十八卷拾遺一卷别集十六卷吏部侍郎永嘉葉適正則撰淮東本無拾遺編次亦不同外集者前九卷為制科進卷後六卷號外藁皆論時事末卷號後總專論買田贍兵邱文定集十卷拾遺一卷樞密江陰邱崈宗卿撰隆興癸未進士第三人其文慷慨有氣而以吏能顯故其文不彰趙忠定集十五卷奏議十五卷丞相福公趙汝愚子直撰别本總為一集亦三十卷龍川集四十卷外集四卷永康陳亮同父撰少入太學嘗三上孝廟書召詣政事堂宰相無宏度迄報罷後以免舉為癸丑進士第一未祿而卒所上書論本朝治體本末源流一時諸賢未之及也亮才甚高而學駁其與朱晦翁往返書所謂金銀銅鐵混為一器者可見矣平生不能詩外集皆長短句極不工而自負以為經綸之意具在是尤不可曉也葉適未遇時亮獨先識之後為集序及跋皆含譏誚識者以為議軒山集十卷樞宻使獻肅公濡須王藺謙仲撰淳熙乙未駕幸太學藺為武學諭在班列中人物偉然上一見奇之自是擢用馴至執政其在經帷論官僚攀附而登輔佐者挾數用術道諛濟私陳義凜然嘉定以來其子孫不敢求仕亦不敢請諡至端平乃得諡合齋集十六卷秘書少監永嘉王柟木叔撰乾道丙戌進士在永嘉諸老最為先登其容貌偉然襟韻灑然雖不以文自鳴而諸老皆推敬之兼山集四十卷端明殿學士劔門黄裳文叔撰在嘉邸最久備盡忠益甲寅御極未及大用病不能朝士論惜之攻媿集一百二十卷參政四明樓鑰大防撰隆興癸未省試考作賦魁以犯諱當黜知舉洪文安遵奏收寘末甲首案原本寘字下闕今據文獻通攷校補齊齋甲藁二十卷乙藁十五卷翰林前藁二十卷後藁二卷掖垣詞草二十卷兼山論著三十卷附録五卷年譜一卷禮部尚書歸安倪思正父撰丙戌進士戊戌宏詞受知阜陵蚤登禁直紹熙間遂位法從立朝剛介不苟合慶元嘉定屢召屢出嘗言與其為有瑕執政寜為無瑕從官由是名重天下端平初詔以先朝遺直得諡文節晦巖集十二卷秘書丞鹽官沈清臣正卿撰嘗為國子錄有薦于朝欲得召試執政有發笑者曰安有張子蓋女壻而可為館職者乎遂罷欲為奇節以蓋之會王希吕為諫官上書力言其不可孝宗大怒時相虞允文惡沈介下清臣大理風使引介不從謫封州晚乃召用勸孝宗力行三年喪為翊善嘉邸以直諒稱初從張無垢學後居霅川自嶺南歸開門受徒動以聖賢自命效禪門入室規式與其徒問答下語不契輒使再參頗為人所譏静安作具十四卷别集十卷清江徐得之思叔撰與其子筠孟堅同甲辰進士次子天麟仲祥亦乙丑甲科其家長於史學定齋集四十卷寶謨閣直學士蔡戡定夫撰君謨四世孫丙戌甲科東江集十卷丞相臨海謝深甫子肅撰小山雜著八卷知樞宻院龍泉何澹自然撰慈谿甲藁二十卷寶謨閣直學士慈谿楊簡敬仲撰鈍齋集六十卷著作郎唐安楊濟濟道撰淳熙五年進士京鏜帥蜀上已出遨濟為樂語首云三月三日豈無水邊麗人一詠一觴亦有山陰禊事又云良辰美景賞心樂事四者難并崇山峻嶺脩竹茂林羣賢畢至一時傳誦京為相召入館權郎出知果州而終周氏山房集二十卷後集二十卷秘書省正字吳郡周南南仲撰南有聲學校庚戌登甲科而仕不偶再入館再罷以殿廷所授文林郎終焉二松集十八卷案文獻通攷二松作三松宋火藝文志不載廬陵王子俊才臣撰周益公楊誠齋客以列薦補官入蜀為成都帥幕横堂小集十卷右司郎中福清林桷子長撰潔齋集二十六卷後集十三卷案後集文獻通攷作十二卷禮部侍郎四明袁燮和叔撰北山集略十卷直龍圖閣三山陳孔碩膚仲撰全集未傳育徳堂外制集八卷内制集三卷兵部尚書永嘉蔡幼學行之撰成童頴異從同郡陳傅良君舉學治春秋年十七試補上庠首選陳反出其下明年陳改用賦冠監舉而幼學為經魁又明年省闈先多士而傅良亦為賦魁一時師弟子雄視場屋莫不歆艷止安齋集十八卷太府寺丞三山陳振震亨撰西山集五十六卷參政浦城眞徳秀希元撰平齋集三十二卷翰林學士於潛洪咨䕫舜俞撰退庵集十五卷提轄文思院龍泉陳炳撰梅軒集十二卷奉化丞山隂諸葛興仁叟撰遁思遺藁六卷事監韻語三卷永康吕皓子陽撰遁思其庵名後溪劉光祖徳修為作記當淳熙中投匭救父兄之難朝奏上夕報可一時非辜盡得清脱其書辭甚偉然非孝廟聖明安能照覆盆之下哉劉汝一進卷十卷諫議大夫吳興劉度汝一撰度嘗應大科此其所業也策曰傳言論曰鑑古各二十五篇唯室兩漢論一卷吳郡陳長方齊之撰紹興八年進士鼎論三卷時議一卷三山何萬一之撰隆興元年進士仕為都司知漳州治述十卷從政郎鄭湜紹興元年撰進按丙戌榜有三山鄭湜溥之是年已為秘書郎面對劄子剴切通練于今傳誦此當别是一鄭湜耶廬山雜著一卷知南康軍錢聞詩撰閑静治本論五卷将論五卷知樞宻院廣陵張巖肖翁撰閨秀集二卷建安徐氏撰徐林穉山之從姑祥符勑頭案唐時舉宏詞第一謂之去頭頭原本勑訛作初又脱今據文獻通攷改正奭之姪孫女嫁括蒼祝璣璣為部使者有子曰永之嘗知滁州直齋書錄解題卷十八
