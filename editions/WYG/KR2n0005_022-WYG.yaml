body:
  text: 直齋書錄解題卷二十二宋陳振孫撰章奏類凡無他文而獨有章奏及雖有他文而章奏復獨行者亦别為一類漢名臣奏事一卷案隋志刑法類有漢名臣奏事三十卷唐志已亡其一中興書目僅存其二一為孔光一為唐林今惟唐林而已所言皆莽朝事無足論者姑以存古云爾陸宣公奏議二十卷唐宰相嘉興陸䞇敬輿撰又名牓子集令狐公表奏十卷唐宰相華原令狐楚慤士撰楚長于應用嘗以授李商隱范文正公奏議二卷范仲淹撰諫垣存藁三卷韓琦撰富文忠劄子十六卷富弼撰平生歴官辭免陳情之文也從諫集八卷歐陽修撰南臺諫垣集二卷參政信安趙抃閲道撰范蜀公奏議二卷學士蜀忠文公成都范鎭景仁撰包孝肅奏議十卷樞密副使合肥包拯希仁撰吕獻可章奏十六卷案文獻通攷作二十卷御史中丞吕誨獻可撰經緯集十四卷樞宻副使會稽孫抃元規撰傅獻簡奏議四卷傅堯俞撰范忠宣彈事五卷國論五卷范純仁撰范徳孺奏議二十五卷龍圖閣直學士范純粹徳孺撰文正公三子中子純禮彛叟至尚書右丞純粹守邊有將才文正嘗謂仁得其忠禮得其静粹得其畧其長子純祐天成尤英悟不幸病廢蚤世富文忠深惜之為作墓誌盡言集十三卷諫議大夫元城劉安世器之撰王明叟奏議二卷翰林學士海陵王覿明叟撰坐黨籍謫臨江而卒其在朝專論蘇程朋黨之弊以為深患丁騭奏議一卷右正言毗陵丁騭撰元祐中在諫坡嘉祐二年進士也諫垣集二卷陳瓘撰閑樂奏議一卷殿中侍御史建陽陳師錫伯修撰熙寜九年第進士裕陵素知其文行擢為第三人蘇軾知湖州師錫掌書記軾下御史獄師錫篤賓友之義安輯其家軾入西掖薦自代明著其事師錫在元豐已為察官坐論進士習律罷去建中靖國再入未幾又罷得得居士戇草一卷正言眉山任伯雨徳翁撰其論蔡卞章惇欲廢宣仁尤切故卞深恨之故獨貶嶺外龔彦和奏議一卷殿中侍御史河間龔夬彦和撰案宋史龔彦和名夬此本作龔美誤今改正以上四人皆建中靖國言事官極論蔡京者也石林奏議十五卷葉夢得撰連寶學奏議二卷寶文閣學士安陸連南夫鵬舉撰紹興初知饒州扞禦有功及和議成南夫知泉州上表畧曰不信亦信其然豈然又曰雖虞舜之十二州昔皆吾有然商於之六百里當念爾欺由是得罪若溪奏議一卷資政長城劉班希范撰案文獻通攷作劉珏嘗以同知三省樞密院扈從隆祐南幸毗陵公奏議二十五卷張守撰陳國佐奏議十二卷禮部侍郎赤城陳公輔國佐撰政和三年上舍釋褐首選紹興初為諫官胡忠簡奏議四卷胡銓撰玉山表奏一卷汪應辰撰陳正獻奏議二十卷表劄二十卷陳俊卿撰龔實之奏藁六卷龔茂良撰南軒奏議十卷張栻撰胡獻簡奏議八卷臺評二卷禮部尚書會稽胡沂撰梅溪奏議三卷太子詹事樂清王十朋龜齡撰省齋歴官表奏十二卷周必大撰軒山奏議二卷王藺撰北山戇議一卷戸部侍郎濡須王􅂒少愚撰藺之兄開禧中諫用兵李祭酒奏議一卷國子祭酒錫山李祥元徳撰慶元初論救趙忠定得罪者齊齋奏議三十卷掖垣繳論四卷銀臺章奏五卷臺諫論二卷昆命元龜説一卷倪思撰文史類文心雕龍十卷梁通事舍人東莞劉勰彦和撰勰後為沙門名慧地文章緣起一卷梁太常卿樂安任昉彦昇撰但取秦漢以來不及六經詩品三卷案隋書經籍志有詩評三卷注云鍾嶸撰或曰詩品唐宋藝文志俱作詩評宋志訛一卷梁記室參軍潁川鍾嶸仲偉撰以古今作者為三品而評之上品十一人中品三十九人下品六十九人史通二十卷唐崇文館學士劉知幾子元撰新史以為工訶古人拙于用已然為書亦博矣史通者漢封司馬遷後為史通子而亦兼白虎通之義也史通析微十卷唐栁璨撰譏評劉氏之失史例三卷唐右補闕劉餗鼎卿撰知幾次子也賦門魚鑰十五卷進士馬偁撰編集唐􅃽防而下至本朝宋祁諸家律賦格訣詩格一卷題魏文帝而所述詩或在沈約後其為假託明矣詩格一卷詩中密㫖一卷唐王昌齡撰評詩格一卷唐李嶠撰嶠在昌齡之前而引昌齡詩格八病亦未然也二南宻㫖一卷案唐書藝文志有賈島詩格一卷宋史藝文志作賈島詩格宻㫖一卷唐賈島撰凡十五門恐亦依託文苑詩格一卷稱白氏尤非也案自史通析微以下七條原本錯簡入歌詞類萬曲類編下今移正詩式五卷詩議一卷唐僧皎然撰以十九字括詩之體風騷指格一卷唐僧齊已撰詩格一卷沙門神彧撰處囊訣一卷金華僧保暹撰流類手鑑一卷僧虚中撰詩評一卷桂林僧原闕淳撰擬皎然十九字一卷稱正字王元撰不知何人炙轂子詩格一卷唐王叡撰詩格要律一卷進士王夢簡撰緣情手鑑詩格一卷題樵人李宏宣撰未詳何人當在五代前風騷要式一卷徐衍述亦未詳何人琉璃堂墨客圖一卷案文獻通攷墨客作墨家不著名氏雅道機要二卷前卷不知何人後卷稱徐寅撰金針詩格一卷白居易撰續金針格一卷梅堯臣撰大抵皆假託也詩評一卷不知名氏御選句圖一卷太宗皇帝所選楊徽之詩十聯眞宗皇帝所選送劉琮詩八聯唐詩主客圖一卷唐張為撰所謂主者白居易孟雲卿李益鮑溶孟郊武元衡各有標目餘有升堂及門入室之殊皆所謂客也近世詩派之説殆出于此要皆有未然者句圖一卷唐李洞撰文章元妙一卷唐任藩撰言作詩聲病對偶之類凡世所傳詩格大率相似余嘗書其末云論詩而若此豈復有詩矣唐末詩格汙下其一時名人著論傳後乃爾欲求高尙豈可得哉詩苑類格三卷李淑撰林和靖摘句圖一卷林逋詩句詩三話一卷無名氏詩話一卷歐陽修撰續詩話一卷司馬光撰案續詩話一卷乃司馬光撰原序云詩話尚有遺者歐公文章聲名雖不可及然紀事一也故敢續之原本稱唐李洞撰誤矣攷李洞另有句圖一卷或為鈔錄者所誤也今續詩話改正為司馬光撰而李洞句圖另行補錄于前楊氏筆苑句圖一卷續一卷黄鑑編蓋楊億大年之所嘗舉者皆時賢佳句續者不知何人亦大年所書唐人句也所錄李義山唐彦謙之句為多西崑體蓋出二家惠崇句圖一卷僧惠崇所作孔中丞句圖一卷中丞者或是孔道輔耶雜句圖一卷不知何人所集皆本朝人詩也自魏文帝詩格而下二十七家已見吟窓雜錄吟忩雜錄三十卷莆田蔡傅撰君謨之孫也取諸家詩格詩評之類集成之又為吟譜凡魏晉而下能詩之人皆畧具其本末總為此書麻沙嘗有刻本節畧不全劉貢父詩話一卷劉攽撰后山詩話二卷陳師道撰潛溪詩眼一卷范温元實撰祖禹之子石林詩話一卷葉夢得撰續詩話一卷無名氏許彦周詩話一卷襄邑許顗撰天厨禁臠三卷僧惠洪撰四六談麈一卷謝伋景思撰四六話一卷王銍性之撰韻語陽秋二十卷葛立方撰漁隱叢話六十卷後集四十卷新安胡仔元任撰案漁隱叢話係胡仔撰原本作胡存誤今改正待制舜陟之子居湖州自號苕溪漁隱䂬溪詩話十卷莆田黄徹常明撰續廣本事詩五卷聶奉先撰雖曰廣孟啓之舊其實集詩話耳山隂詩話一卷李兼孟達撰詩家老杜詩評五卷續一卷莆田方深道集案宋史藝文志作方道醇集諸家老杜詩評五卷方絟續老杜詩評五卷選詩句圖一卷高似孫編杜詩發揮一卷金華杜旃仲高撰觀林詩話一卷楚東吳聿子書撰未詳何人案文獻通攷吳聿作張律文説一卷南城包揚顯道錄朱侍講論文之語四六餘話一卷楊淵撰未詳何人視前二家為汎雜艇齋詩話一卷曾季貍裘父撰賔朋宴話三卷太子中舍致仕貴溪邱昶孟陽撰南唐進士歸朝宰數邑著此書十五篇叙唐以來詩賦源流天禧辛酉鄧賀為序西清詩話三卷題無為子撰案文獻通攷為作名或曰蔡絛使其客為之也宣和間臣寮言其議論專以蘇軾黄庭堅為本奉聖㫖蔡絛落職勒停詳見能改齋漫錄隨齋批注環溪詩話一卷臨川吳沆撰直齋書錄解題卷二十二
