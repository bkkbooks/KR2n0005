body:
  text: 直齋書錄觧題卷八宋陳振孫撰譜牒類姓源韻譜一卷唐張九齡撰依春秋正典栁氏萬姓錄世本圖捃摭諸書纂為此譜分四聲以便尋閲古者賜姓别之黄帝之子得姓者十四人是也後世賜姓合之漢髙帝命婁敬項伯為劉氏是也惟其别之也則離析故古者論姓氏推其本同惟其合之也則亂故後世論姓氏識其本異自五胡亂華百宗蕩析夷夏之裔與夫冠冕輿臺之子孫混為一區不可遽知此周齊以来譜牒之學所以貴於世也歟元和姓纂十卷唐太常博士三原林寳撰元和中朔方别帥天水閻某者封邑太原以為言上謂宰相李吉甫曰有司之誤不可再也宜使儒生條其源系考其郡望子孫職任並總緝之每加爵邑則令閲視吉甫以命寳二十旬而成此書絶無善本頃在莆田以數本參校僅得七八後又得蜀本校之互有得失然粗完整矣李氏皇室維城錄一卷屯田郎中李衢沔王長史林贊修止於僖宗蓋昭宗時所錄也李氏房從譜一卷唐洛陽主簿李匡文撰時為圖譜官聖唐偕日譜一卷前賀州刺史李匡文撰序言前守職圖籍日撰天潢源派譜統務在省畧直取相承一葉旁附首分諸房今特從聖唐以来列聖下諸王公主逐帝書出號曰偕日與日齊行之義也匡文字濟翁又有資暇集見於錄唐宰相甲族一卷唐韋述蕭頴士等撰自王方慶而下十有四家唐相門甲族諸郡氏譜共一卷不著名氏甲族八十六家氏譜自京兆八姓而下凡三百五十姓唐杜氏家譜一卷唐太子賔客杜信撰天下郡望氏族譜一卷唐李林甫等天寳八年所纂並附五音於後姓苑二卷不著名氏古有何承天姓苑今此以李為卷首當是唐人所為姓觧三卷鴈門邵思撰以偏旁字類為一百七十門二千五百六十八氏景祐二年序千姓編一卷不著名氏末云嘉祐八年采真子記以姓苑姓源等書撮取千姓以四字為句每字為一姓題曰千姓編三字亦三姓也逐句文義亦頗相屬殆千字文之比云陳郡袁氏譜一卷袁陟世弼錄陶氏家譜一卷懐州教授陶直夫錄侃之後也帝王系譜一卷武夷吳逵案文獻通攷作吳達公路撰政和壬辰也自漢迄周顯德每代畧具數語其論曹操廹脅君后無復臣禮逆節已顯會其病死故簒竊之惡漏在身後昔人謂其不敢危漢者亦不覈其情耳此論與愚意脗合羣史姓纂韻譜六卷案文獻通攷作羣史姓纂韻譜原本誤作羣吏今改正永福黄邦先宋顯撰凡史傳所有姓氏皆有韻類聚而著其所出建炎元年其兄邦俊宋英為之序古今姓氏書辨證四十卷校書郎史館校勘臨川鄧名世元亞撰其子椿年緒成之皇朝百族譜四卷長沙丁維臯撰周益公為之序時紹興末也僅得百二十有三家其闕遺尚多未有能續裒集者米氏譜一卷奉直大夫米憲錄葢國初勲臣米信之後信五世為芾元章又三世為憲目錄類唐藝文志四卷新唐書中錄出别行監中有印本崇文總目一卷景祐初學士王堯臣同聶冠卿郭縝案文獻通攷作稹吕公綽王洙歐陽脩等撰定凡六十六卷諸儒皆有論議歐公文集頗見數條今此惟六十六卷之目耳題云紹興改定案晁公武讀書志是書刋正訛謬條次之凡四十六類計三萬六百六十九卷通考作總目六十四卷此云一卷者或因鄭漁仲之言以排比諸儒毎書之下必出新意著説嫌其繁蕪無用故紹興中從而去其序釋僅存其目也秘書省四庫闕書目一卷亦紹興改定其闕者注闕字於逐書之下邯鄲書目十卷學士河南李淑獻臣撰號圖書十志皇祐己丑自作序以示子孫曰朋圭芻者其子壽朋復圭德芻也京兆金石錄六卷北平田概纂元豐五年王欽臣為序自為後序皆記京兆府縣古碑所在覽之使人慨然集古錄跋尾十卷歐陽修撰編述之意序文詳之世所共知不復著集古目錄二十卷公子禮部郎官棐叔弼撰公既為跋尾二百九十六篇命棐撮其大要别為目錄棐之序云爾今考集中凡三百五十餘跋案以上三條文獻通攷引陳氏之言原本俱脱去今補入太宗御製御書目一卷玉宸殿所藏兼有真宗御製序十四篇又本稍多而無序文真宗御製碑頌石本目錄一卷凡九十名件乾興所刋板龍圖閣瑞物寳目六閣書籍圖畫目共一卷玉宸殿書數附已上平江虎丘寺御書閣有原頒降印本傳寫得之羣書備檢三卷案文獻通攷作十卷不知名氏皆經史子集目錄廣川藏書志二十六卷徽猷閣待制董逌彥逺撰以其家藏書考其本末而為之論説及於諸子而止蓋其本意專為經設也廣川書跋十卷畫跋五卷董逌撰寳墨待訪錄二卷禮部員外郎米芾元章撰記承平時故家所藏晉唐遺跡金石錄三十卷東武趙明誠德甫撰其所藏二千卷蓋倣歐陽集古而數則倍之本朝諸家蓄古器物欵式其考訂詳洽如劉原父吕與叔黄長睿多矣大抵好附會古人名字如丁字即以為祖丁舉字即以為伍舉方鼎即以為子産仲吉匜即以為偪姞之類邃古以来人之生世夥矣而僅見於簡册者幾何器物之用於人亦夥矣而僅存於今世者幾何廼以其姓字名物之偶同而實焉余嘗竊笑之惟其附會之過併與其詳洽者皆不足取信矣惟此書跋尾獨不然好古之通人也明誠宰相挺之之子其妻易安居士李氏為作後序頗可觀案此條文獻通攷引陳氏之言原本誤脱今補入考古圖十卷汲郡吕大臨與叔撰其書作於元祐七年所紀自御府之外凡三十六家所藏古器物皆圖而錄之博古圖説十一卷祕書郎邵武黄伯思長睿撰有序凡諸器五十九品其數五百二十七印章十七品其數二百四十五案李丞相伯紀為長睿志墓言所著古器説四百二十六篇悉載博古圖今以圖説攷之固多出於伯思亦有不盡然者又其名物亦頗不同錢鑑二品至多此所載二錢二鑑而已博古不載印章而此印章最夥蓋長睿没於政和八年其後修博古圖頗采用之而亦有所刪改云爾其書大抵好傅古人名字説已見前宣和博古圖三十卷宣和殿所藏古器物圖其形製而記其名物錄其款識品有總説以舉其凡而物物考訂則其目詳焉然亦不無牽合也羣書會記二十六卷案文獻通攷作三十六卷鄭樵撰大畧記世間所有之書非必其家皆有之也夾漈書目一卷圖書志一卷鄭樵記其平生所自著之書志者蓋述其著作之意也秦氏書目一卷濡湏秦氏元祐二年有為金部員外郎者聞於朝請以宅舍及文籍不許子孫分割藏六堂書目一卷莆田李氏云唐江王之後有家藏誥命其藏書自承平時今浸以散逸矣吳氏書目一卷奉議郎漳浦吳與可權家藏閩中不經兵火故家文籍多完具然地濕苦蠧損晁氏讀書志二十卷案宋史藝文志作四卷昭德晁公武子止撰其序言得南陽公書五十箧合其家舊藏得二萬四千五百卷其守榮州日夕讎校每終篇輒論其大指時紹興二十一年也其所發明有足觀者南陽公未知何人或云井度憲孟也案井度文獻通攷作丌度遂初堂書目一卷錫山尤氏尚書袤延之淳熈名臣藏書至多法書尤富嘗燼於火今其存亡幾矣中興舘閣書目三十卷祕書監臨海陳騤叔進等撰淳熙五年上之中興以来庶事草創網羅遺逸中秘所藏視前世獨無歉焉殆且過之大凡著錄四萬四千四百八十六卷蓋亦盛矣其間攷究疏謬亦不免焉館閣續書目三十卷祕書丞吳郡張攀從龍等撰嘉定十三年上以淳熙後所得書纂續前錄草率尤甚凡一萬四千九百四十三卷𨽻釋一十七卷𨽻續二十一卷丞相鄱陽洪适景伯撰凡漢刻之存於世者以今文寫之而為之釋又為之世代譜及物象圖碑形式悉具之魏初近古者亦附焉年来北方舊刻不可復得覽此猶可慨想法寳標目十卷戶部尚書三槐王右敏仲撰以釋藏諸函隨其次第為之目錄而釋其因緣凡佛會之先後華譯之異同皆具著之右旦之曾孫入元祐黨籍鄭氏書目七卷莆田鄭寅子敬以所藏書為七錄曰經曰史曰子曰藝曰方技曰文曰類寅知樞宻院僑之子博文彊記多識典故端平初召為都司執法守正出為漳州以没集古系時錄十卷系地錄十一卷鄭樵撰大抵因集古之舊詳考其時與地而系之二書相為表裏案此條文獻通攷引陳氏之言原本脱今補入寳刻叢編二十卷臨安書肆陳思者以諸家集古書錄用九域志京府州縣繫其名物而昔人辨證審定之語具著其下其不詳所在附末卷釋書品次錄一卷題唐僧從梵集末有黎陽張翬跋稱大定丁未蓋北方板本也地理類山海經十八卷漢侍中奉車都尉臣秀所校祕書秀即劉歆也晉郭璞注案唐志二十三卷音二卷今本錫山尤袤延之校定世傳禹益所作其事見吳越春秋曰禹東廵登南岳得金簡玉字通水之理遂行四瀆與益共謀所至使益疏而記之名山海經此其為説恢誕不典司馬遷曰言九州山川尚書近之矣至禹本紀山海經所書怪物余不敢言之也可謂名言孰曰多愛乎故尤跋明其為非禹伯翳所作而以為先秦古書無疑然莫能名其為何人也洪慶善補注楚辭引山海經淮南子以釋天問而朱晦翁則曰古今説天問者皆本此二書今以文意考之疑此二書本皆緣解天問而作可以破千載之惑古今相傳既久姑以冠地理書之錄水經三卷水經注四十卷桑欽撰後魏御史中尉范陽酈道元善長注桑欽不知何人邯鄲書目以為漢人晁公武曰成帝時人當有所據案唐志注或云郭璞撰又杜氏通典案水經晉郭璞注二卷後魏酈道元注四十卷皆不詳所撰者名氏亦不知何代之書佑謂二子博贍觧釋固應精當然其經云濟水過壽張則前漢壽良縣光武更名又東北過臨濟則前漢狄縣安帝更名又云渮水過湖陸則前漢湖陵縣章帝更名又云汾水過河東郡永安則前漢彘縣順帝更名故知順帝以後纂序也詳水經所作殊為詭誕全無慿據案後漢郡國志濟水王莽末因旱渠塞不復截河南過統順帝時所撰都不詳悉其餘可知景純注觧又甚疏略亦為迂怪以其僻書人多不覩謂其審正未之精也案成帝時人以下原本俱脱漏今據文獻通攷所引陳氏之言補入唐十道圖一卷唐宰相趙郡李吉甫宏憲撰首載州縣總數文武官員數俸料唐志云十卷今不分卷元和郡縣志四十卷案新唐書藝文志李吉甫元和郡縣圖誌五十四卷李吉甫撰自京兆至隴右凡四十七鎮篇首有圖今不存唐十道四蕃志十卷案文獻通攷作十三卷唐太府少卿梁載言撰其書廣記備言頗可觀載言不見於史又有具員故事題鳯閣舍人及梁四公記亦云載言所錄太平寰宇記二百卷太常博士直史館宜黄樂史子正撰起自河南周於海外當太宗朝上之元豐九域志十卷知制誥丹陽王存正仲集賢校理南豐曾肇子開官制所檢討邯鄲李德芻等刪定總二十三路四京十府二百四十二州三十七軍四監一千一百三十五縣輿地廣記三十八卷廬陵歐陽忞撰政和中作其前三卷以今之郡縣系於前代郡國之下其序曰以今州縣求於漢則為郡以漢郡縣求於三代則為州三代之九州散而為漢之六十餘郡又分而為今之三百餘州雖或離或合不可討究而吾胸中則已了然矣漢郡國一百三今云六十餘郡不可曉也忞為文忠族孫行名皆連心字地理指掌圖一卷蜀人税安禮撰元符中欲上之朝未及而卒書肆所刋皆不著名氏亦頗闕不備此蜀本有涪右任慥序言之頗詳歴代疆域志十卷臨川布衣吳澥撰輿地紀勝二百卷知江寧縣金華王象之撰蓋以諸郡圖經節其要略而山川景物碑刻詩詠初無所遺行在宫闕官寺實冠其首闗河版圖之未復者猶不與焉眉山李説齋季允為之序輿地圖十六卷王象之撰紀勝逐州為卷圖逐路為卷其搜求亦勤矣至西蜀諸郡尤詳其兄觀之漕夔門時所得也皇朝方域志二百卷東陽布衣王希先撰凡前代謂之譜十六譜為八十卷本朝謂之志為一百二十卷譜叙當時事實而注以今之郡縣志述今日疆理而系於古之州國古今參考譜志互見地理學之詳明者無以過此矣嘉熙二年上于朝得永免文觧其父珨本建寧人己未進士試詞科不中頗該洽希先述其遺藁以成此書東京記三卷龍圖閣直學士宋敏求次道撰上卷為宫城周五里唐時宣武節度使治所建隆三年廣城之北隅用洛陽宫殿之制修之中卷為舊城周二十一里一百五十歩唐汴州城也號闕城亦曰裏城下卷為新城周四十八里二百三十三歩周世宗所築羅城也號曰國城又曰外城三城之内宫殿官府坊巷第宅寺觀營房次第記之河南志二十卷宋敏求撰司馬温公序之時元豐六年次道殁矣長安志二十卷宋敏求撰趙彥若元考為之序二書凡例微不同然漢唐舊都遺事詳矣闗中記一卷晉葛洪稚川撰所載殊簡略三輔黄圖二卷不著名氏案唐志一卷今分上下卷載秦漢間宫室苑囿甚詳多引用應劭漢書觧而如淳顏師古復引此書為據意漢魏間人所作然中興書目以為崇文總目及國史志不載疑非本書也程氏雍錄辨之尤悉長安圖記一卷案吕大防著長安圖記此本作長安國記誤今改正丞相汲公吕大防知永興軍以為正長安故圖著其説於上今信安郡有此圖而别錄其説為一編洛陽伽藍記五卷後魏撫軍司馬楊􅃷之撰專記洛陽城内外寺院爾朱之亂城郭丘墟追述斯記洛陽名園記一卷禮部員外郎濟南李格非文叔撰記開國以来公卿家園圃之盛其末言天下治亂之候在洛陽之盛衰洛陽盛衰之候在名園之興廢使人感慨格非以不肯與編元祐章奏入黨籍國史文苑有傳世所謂易安居士清照者其女也格非苦心為文而集不傳館中亦無有惟錫山尤氏有之文鑑僅存此跋蓋亦未嘗見其全集也鄴中記一卷案唐書藝文志有陸翽鄴中記二卷疑即是書不著名氏記自魏而下及僭偽都鄴者六家宫殿事迹案唐志有鄴都故事二卷肅代時馬温所作今書多引之晉陽事跡雜記十卷唐河東節度使李璋纂序言四十卷唐志亦同今刪為十卷蓋治平中太原府所刻本也從莆田李氏借錄自南渡以来闗河阻絶圖志泯亡得見一二僅存者猶足以發傷今思古之歎然唐并州治晉陽太原二縣國初克復徙治陽曲而墟其故二縣後皆併省則唐之故跡皆不復存矣燕吳行役記二卷不著名氏大中九年崔鉉鎮淮南諸鎮畢賀為此記者燕帥所遣僚佐道中紀所經行郡縣道里及事迹也其曰我府張公者時張允中方帥燕也唐志稱張氏宣宗時人失其名張者其帥之姓爾未審何以知使者之亦為張氏也臨安志十五卷府帥吳興周淙彥廣撰首卷為行在所於宫闕殿閣全不記載藉曰禁省嚴秘不敢明著其視宋次道東京記何其大不侔其他沿革亦多疏畧然淙有才具其尹京開湖濬河皆有成緒今城中河道通利民戸為脚船以濟行旅者蓋自此始吳興統記十卷攝湖州長史左文質撰分門别類古事頗詳序稱甲辰歲者本朝景德元年也吳興志二十卷樞宻院編修郡人談鑰元時撰案文獻通攷作談鑰撰原本誤作論今改正嘉泰元年也其為書草率未得為盡善蘓州圖經六卷翰林學士饒陽李宗諤昌武等撰景德四年詔以四方郡縣所上圖經刋修校定為一千五百六十六卷以大中祥符四年頒下今皆散亡館中僅存九十八卷余家所有惟蘓越黄三州刻本耳吳郡圖經續記三卷秘書省正字郡人朱長文伯原撰記祥符以後事亦頗補前志之闕遺長文吳中名士病廢不仕自號樂圃卒於元符元年吳地記一卷唐陸廣微撰郡人也多記古吳國事唐未有秀州天禧中始割嘉興縣置故此記合二郡為一吳郡志五十卷參政郡人范成大至能撰書始成未行而石湖没有求附見某事而弗得者譁曰此非石湖筆也太守不能決藏其書學官然周益公為范墓碑述所著書目有焉及紹定初桐川李壽朋儔老為守始取而刻之而書止於紹熙案文獻通攷作其書止於紹興其後事實俾寮屬用褚少孫史記例補成之趙南塘履常作序訂其為石湖書不疑且謂郡士龔頤正案宋史藝文志作龔頤正此本誤作順正今改正滕宬周南皆嘗薦所聞於公者而龔尢多鎮江志三十卷教授天台盧憲子章撰新定志八卷郡守東平董弅令升撰紹興己未也淳熙甲辰武義陳公亮重修嘉禾志五卷故事一卷郡守毗陵張元成撰為書極草草毗陵志十二卷教授三山鄒補之撰越州圖經九卷李宗諤祥符所上也末有秘閣校理李垂邵煥修案宋史藝文志作邵煥修此本作撰修誤今改正及覆修名銜然則書成於衆手而宗諤特提總其凡耳會稽志二十卷通判吳興施宿武子郡人馮景中陸子虚朱鼐王度等撰陸放翁為之序首稱禹會諸侯而以思陵廵狩陞府配之氣壯文雅蓋竒作也嘉泰辛酉陸年已七十七矣未幾始落致仕為史官至八十五歲乃終其筆力老而不衰於此序見之會稽續志八卷梁國張淏撰續記辛酉後事而亦補前志之遺前志無進士題名此其尤不可遺者也赤城志四十卷國子司業郡人陳耆卿壽老撰其前為圖十有三赤城續志八卷郡人吳子良拾其所遺續載之赤城三志四卷郡人林表民逄吉撰紹定己丑水壊城修治興築本末詳焉四明志二十一卷贑州錄事參軍廬陵羅璿修時胡榘仲方尚書為守璿其鄉人也永嘉譜二十四卷禮部侍郎郡人曹叔逺器逺撰曰年譜地譜名譜人譜時紹熙三年太守宛陵孫楙屬器逺裒集創為義例如此器逺庚戌進士蓋初第時也永寧編十五卷待制郡人陳謙益之撰漢分章安之東甌鄉為永寧今永嘉四邑是也故以名編時嘉定九年留元剛茂潛為太守東陽志十卷樞宻鄱陽洪遵景嚴撰紹興二十四年案文獻通攷作紹興二十四年此本作三十四年誤紹興止有三十二年也今改正為通判時所作括蒼志七卷教授曾賁撰乾道六年太守四明樓璩叔韞序鑰之父也括蒼志續一卷郡人陳百朋撰信安志十六卷教授衞玠撰太守四明劉垕也實嘉定己卯信安續志二卷教授葉汝明撰太守四明袁甫廣微紹定初也建康志十卷府帥史正志志道撰時乾道五年建康續志十卷府帥吳琚居父以郡人朱舜庸所編銓次與前志並行時慶元六年六朝事迹二卷南朝宫苑記二卷不知何人作記六朝故都事迹頗詳姑孰志五卷教授長樂林桷子長撰太守楊愿原仲也實淳熙五年新安志十卷通判贑州郡人羅愿撰時淳熙二年太守則趙不悔也秋浦志八卷太守南昌胡兆乾道八年修秋浦新志十六卷三山王伯大幼學以前志缺陋重修時以庾節攝郡事端平丙申也南康志八卷郡守朱端章撰淳熙十二年桐汭新志二十卷教授錢塘趙子直撰紹熙五年也太守林棐序案文獻通攷作紹定五年豫章職方乗三卷後乗十二卷郡人洪芻駒父宣和己亥撰乗取晉乗為名後乗淳熙十一年太守程叔達序潯陽志十二卷廸功郎晁百揆元采撰淳熙三年太守開封曹訓為之序宜春志十卷袁州教授南城童宗説修太守李觀民也旴江志十卷續十卷郡守胡舜舉紹興戊寅俾郡人童宗説黄敷忠為之續志慶元五年三山陳岐修亦郡守也富川志六卷軍學教授括蒼潘廷立撰太守趙善宣紹熙四年也軍治永興本富川縣故名南安志二十卷補遺一卷太守方崧卿教授許開修廣陵志十二卷教授三山鄭少魏江都尉會稽姚一謙撰紹熙元年太守鄭興裔也楚州圖經二卷教授霅川吳莘商卿撰太守毗陵錢之望大受時淳熙十三年永陽志三十五卷滁守林㟽命法曹龔維蕃修吳陵志十卷不著名氏淳熙壬寅所修後三年乙巳太守錢塘萬鍾元亨屬僚佐叅正而刻之泰州在唐為吳陵縣高郵志三卷續修十卷興化縣主簿孫祖義撰郡守趙不慙刻之淳熙四五年間也其書在圖志中最為疏略嘉定中守汪綱再修稍詳定矣都梁志八卷郡守霍箎教授周之瑞修紹熙元年也續志一卷嘉泰壬戌郡守耿與義序案郡守以下原本闕今據文獻通攷補合肥志四卷合肥主簿唐錡撰郡守鄭興裔也時淳熙十五年同安志十卷毗陵錢紳伸仲撰宣和五年太守曰曾元禮未幾而有邊難至紹興十三年太守張彥聲始取而刻之歴陽志十卷郡守九華程九萬鵬飛教授天台黄宜達之撰慶元元年黄州圖經四卷附錄一卷李宗諤祥符所修圖經亦頗有後人附益者郡守李訦又以近事為附錄焉訦㕘政邴漢老之子也齊安志二十卷郡守吕昭問俾教授厲居正重修慶元己未也濠梁志三卷郡守永嘉張季樗撰時嘉泰初元無為志三卷教授宋宜之纂太守柴瑾為之序襄陽志四十卷郡守朐山高夔命教授吳興劉宗幕官上蔡任􅀈編纂為書既詳備而刊刻亦精緻圖志之佳者襄沔記三卷唐吳從政撰刪宗懔荆楚歲時記盛宏之荆州記鄒閎甫楚國先賢傳習鑿齒襄陽耆舊傳郭仲產襄陽記鮑堅南雍州記集成此書其紀襄漢事迹詳矣景龍中人自號棲閑子房州圖志三卷郡守毗陵陳宇撰義陽志八卷郡守河内闗良臣撰紹熙二年也信陽軍唐申州所謂申光蔡吳元濟所據竭天下之力以取之者長沙志五十二卷郡守趙善俊以紹熙二年命教授褚孝錫等七人撰時陳止齋將漕相與攷訂商略故序言當與長樂志並也續長沙志十一卷不著名氏錄紹興以後事長沙土風碑一卷唐潭州刺史河南張謂撰前有碑銘後有湘中記載事迹七十件衡州圖經三卷郡守三山孫德輿行之撰嘉定戊寅刻零陵志十卷郡守徐自明嘉定己卯重修舂陵圖志十卷教授臨江章頴茂憲撰淳熙六年太守趙汝誼九疑攷古二卷道州崇道主簿吳致堯格甫撰取舂陵志所紀而為詩以記之宣和甲辰序清湘志六卷郡守永嘉陳峴壽南俾教授林瀛修案文獻通攷作林瀛原本誤作灑今改正嘉泰二年也武昌志三十卷郡守括蒼王信成之命教授許中應等撰武昌土俗編二卷武昌令永嘉薛季宣撰記一縣之事頗詳紹興辛巳壬午間也其邑今為壽昌軍鄖城志十二卷教授傅巖撰慶元戊午太守李楫岳陽志甲二卷乙三卷甲集建安馬子嚴莊父乙集永嘉張聲道聲之所修皆郡守也岳陽風土記一卷宣德郎監商税務建安危致明晦叔撰案文獻通攷作范致明元符進士第二人仕至次對其在岳蓋謫官也辰州風土記六卷教授縉雲田渭伯清撰隆興二年郡守徐彭年成都古今集記三十卷知府事信安趙抃閲道撰清獻自慶歴將漕之後凡四入蜀知蜀事為詳故成此書熙寧七年也續成都古今集記二十二卷知府事王剛中居正撰實紹興三十年余嘗手寫洛陽名園記而題其後曰晉王右軍聞成都有漢時講堂㤗時城池門屋樓觀慨然逺想欲一遊目其與周益州帖蓋數致意焉近時吕太史有感於宗少文卧遊之語凡昔人紀載人境之勝錄為一編其奉祠亳社也自以為譙沛真源恍然在目而兖之太極嵩之崇福華之雲臺皆將卧遊之噫嘻弧矢四方之志髙人達士之懐古今一也顧南北分裂蜀在境内雖逺患不徃爾徃則至矣亳兖嵩華視蜀猶邇封也欲徃其可得乎然則太史之情其可悲也已余近得此記手寫一通與東京記長安河南志夢華錄諸書並藏而時自覽焉是亦卧遊之意云爾于時歲在己丑蜀故亡恙也後七年而有北兵秦漢故跡焚蕩無遺今其可見者惟此二記耳而板本亦不可復得矣嗚呼悲夫己丑實理宗紹定二年也後七年即理宗端平三年丙申歲是年自九月二十九日夜沔利都統兼闗外四川安撫知沔州曹友聞戰死之後十二月北兵入普州順慶潼川府破成都掠眉州五十四州俱陷破獨夔州一路及瀘果合數州僅存友聞初以明經登丙戌科緜谷縣尉制置桂如淵擢為天水教授與田遂陳瑀俱招忠義官至員外郎自乞換武積官至眉州防禦使左驍衞大將軍朝廷贈龍圖學士大中大夫賜廟褒忠諡曰節所部皆精鋭敵畏之目為短曹遍身膽時人稱之曰元戎制勝世間有教授提兵天下無是役也北之主將統兵者四太子并達海也蜀記二卷唐鄭暐撰雜記蜀事人物古跡寺觀之屬未詳何人梁益記十卷著作佐郎益州知錄事參軍任弁撰天禧四年自為序長樂志四十卷府帥清源梁克家叔子撰淳熙九年序時永嘉陳傅良君舉通判州事大畧皆出其手閩中記十卷唐林諝撰本朝慶歴中有林世程者重修其兄世矩作序諝郡人飬髙不仕當大中時世程亦郡人也其言永嘉之亂中原仕族林黄陳鄭四姓先入閩可以證閩人皆稱光州固始之妄建安志二十四卷續志一卷刪定官郡人林光撰慶元四年郡守永嘉張叔椿俾僚屬成之續志嘉定十二年府學士人所錄清源志七卷通判州事永嘉戴溪肖望撰時慶元己未太守信安劉頴也延平志十卷郡守新安胡舜舉汝士與郡人廖拱廖挺裒集時紹興庚辰也序言與旴江志並行蓋其為建昌守亦嘗修圖志云清漳新志十卷司理參軍方杰撰嘉定六年太守趙汝譡蹈中也鄞江志八卷汀州郡守古靈陳昱日華俾昭武士人李臯為之時慶元戊午郡有鄞江溪故名莆陽志十五卷郡守趙彥勵懋訓紹熙三年集郡士為之武陽志十卷教授葛元騭撰太守廖遲元達乾道六年也晉江海物異名記三卷祕書監莆田陳致雍撰致雍仕偽閩南唐後歸朝廣州圖經二卷教授王中行撰南越志七卷宋武康令吳興沈懐逺撰此五嶺諸書之最在前者也懐逺懐充之弟見宋書番禺雜記一卷攝南海主簿鄭熊撰國初人也莆田借李氏本錄之蓋承平時舊書末有河南少尹家藏六字不知何人也桂林志一卷靜江教授江文叔編時乾道五年張維為帥撰次疏略刋刻草率亦不分卷次桂林風土記一卷案唐書藝文志作三卷唐融州刺史權知春州莫休符撰昭宗光化二年也桂海虞衡志二卷府帥吳郡范成大至能撰范自桂移蜀道中追記昔游高凉志七卷教授莆田劉棠撰太守舂陵義太初嘉泰壬戌也邕管雜記一卷庫部員外郎范旻撰旻國初宰相質之子嶺南初平旻知邕州兼轉運使嶺外代答十卷永嘉周去非直夫撰去非癸未進士至郡倅所記皆廣西事南方草木狀一卷晉襄陽太守嵇含撰黄巖志十卷知縣永嘉蔡範蓮甫撰嘉定甲申旌川志八卷知旌德縣歴陽李瞻伯山撰紹熙三年謝昌國為序涇川志十三卷知涇縣濡湏王栐叔永撰嘉定癸酉趙南塘序之初縣歲有水患庚午冬叔永改卜於舊治之東二里曰留村新吳志二卷知奉新縣旴江張國均維之撰新吳縣舊名嘉定甲戌樂清志十卷縣令信安袁采君載撰脩水志十卷分寧宰徐筠撰連川志十卷知連江縣豫章陶武克之撰嘉定乙亥歴代宫殿名一卷翰林承㫖李昉等纂歴代及僭偽宫殿門闕樓觀園苑池舘名無不畢錄五嶽諸山記一卷無名氏多鄙誕不經王屋山記一卷唐乾符三年道士李歸一撰華山記一卷不知名氏西湖古跡事實一卷錢塘進士傅牧撰以楊蟠百詠增廣共為一百八十三首案首字文獻通攷作目紹興壬午序青城山記一卷蜀道士杜光庭撰茅山記一卷嘉祐六年句容令陳倩修幙阜山記一卷案方輿勝覽寧州有幙阜山在分寧西百四十里此本誤作纂阜今改正葛洪撰其山在豫章豫章西山記一卷贊皇李上文撰嘉祐丁酉歲玊笥山記一卷唐道士令狐見堯撰山在新淦别本又有南唐及本朝事後人所益也湘中山水記三卷晉耒陽羅含君章撰范陽盧拯注案文獻通攷作盧拯此本誤作盧極今改正其書頗及隋唐以後事則亦後人附益也天台山記一卷唐道士徐靈府撰元和中人也余假守臨海就使本道嘉熙丙申十月觧郡符趨會稽治所道過之鋭欲徃遊會大雪不果改轅由驛道至今以為恨偶見此記錄之以寄卧遊之意顧渚山記一卷唐陸羽鴻漸撰鄉邦不貢茶久矣遺迹未必存也廬山記五卷屯田員外郎嘉禾陳舜俞令舉撰劉渙凝之李常公擇皆為之序令舉熙寧中謫居所作續廬山記四卷南康守廣陵馬玕錄山中碑記之文以續前錄九華拾遺一卷山居劉放至和二年自序曰滕天章作新錄於前沈太守撰總錄於後博攷傳聞復得三十餘節武夷山記一卷杜光庭撰羅浮山記一卷廬陵郭之美撰皇祐辛卯序霍山記一卷知循州林須撰山在循州境内鴈山行記一卷永嘉陳謙撰嘉定己巳遊山直至絶頂得所謂鴈蕩者前人並未之識也然繼其後者亦未有聞焉廬阜紀遊一卷開封孫惟信季蕃撰嘗大雪登山至絶頂盡得其景物之詳嘉定初年也惟信能為詩詞善談謔蓋嘗有官棄去不仕自號花翁遊江湖間人多愛之何氏山莊次序本末一卷尚書崇仁何異同叔撰其别墅曰三山小隱三山者浮石山巖石山玲瓏山其實一山也周回數里叙其景物次序為此編自號月湖標韻清絶如神仙中人膺高壽而終其山聞今蕪廢矣湘江論一卷案文獻通攷作湘江此本訛作浙今改正太常博士潘洞撰海濤志一卷唐竇叔䝉撰太虚潮論一卷永泰縣令錢棲業述末稱天祐六年海潮圖論一卷龍圖閣學士燕肅撰進潮説一卷知錢塘縣張君房撰凡三篇西南備邊志十二卷嘉州進士鄧嘉猷撰紹興末犍為有蠻擾邊初莫知其何種族也已而有能别識其為虚恨蠻者時蜀邊久無事既去而朝廷憂之詔諸司經度嘉猷取秦漢以来訖於本朝凡史傳所載蠻事皆著於篇時乾道中也其為志九為圖一北邊備對六卷程大昌撰淳熙中進禹貢圖孝廟因以北敵地里為問對以彼無定居無文史不敢強言紹熙退居追采自古中華北邊樞紐相闗者條列其地而推言之名曰備對南北攻守類攷六十三卷監進奏院趙善譽撰進以三國六朝攻守之變鑒古事以攷今地每事為之圖六合掌運圖一卷不著名氏凡為四十圖首列禹跡次為中興後南北三境其後則諸邊闗阨險要以及北地疆界亦著之海外使程廣記三卷南唐如京使章僚撰使高麗所記海道及其國山川事跡物產甚詳史虛白為作序稱己未十月蓋本朝開國前一歲也大唐西域記十二卷唐三藏法師元奘譯大總持寺僧辯機撰契丹疆宇圖一卷不著名氏錄契丹諸夷地及中國所失地遼四京記一卷亦無名氏曰東京中京上京燕京高麗圖經四十卷奉議郎徐兢明叔撰宣和六年路允廸傅墨卿使高麗兢為之屬歸上此書物圖其形事為之説今所刋不復有圖矣兢鉉之後善篆書亦能畫嘗自題保大騎省世家宣和書學博士又自號自信居士諸蕃志二卷福建提舉市舶趙汝适記諸蕃國及物貨所出直齋書錄觧題卷八
