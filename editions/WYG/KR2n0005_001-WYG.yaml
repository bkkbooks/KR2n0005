body:
  text: 直齋書録解題卷一宋陳振孫撰易類周易注六卷略例一卷繫辭注三卷魏尚書郎山陽王弼輔嗣注上下經撰畧例晉太常潁川韓康伯注繫辭說序雜卦自漢以來言易者多溺於象占之學至弼始一切掃去暢以義理於是天下後世宗之餘家盡廢然王弼好老氏魏晉談𤣥自弼輩倡之易有聖人之道四焉去三存一於道闕矣況其所謂辭者又雜以異端之說乎范寗謂其罪深於桀紂誠有以也弼父業長緒本王粲族兄凱之子粲二子坐事誅文帝以業嗣粲弼死時年二十餘古易十二卷出翰林學士雎陽王洙原叔家上下經惟載爻辭外卦辭一彖辭二大象三小象四文言五上繫六下繫七說卦八序卦九雜卦十葉石林以為此即藝文志所謂古易十二篇者也案隋唐志皆無古易之目當亦是後人依倣録之爾周易古經十二卷丞相汲郡吕大防㣲仲所録上下經並録爻辭彖象隨經分上下共為六卷上下繫辭二卷文言說序雜卦各一卷古周易八卷中書舍人清豐晁說之以道所録卦爻一彖二象三文言四繫辭五說卦六序卦七雜卦八其說曰以彖象文言雜入卦中自費氏始孔頴逹又謂輔嗣之意象本釋經宜相附近分爻之象辭各附逐爻則費氏初變古制時猶若今乾坤二卦各存舊本歟古經始變於費氏而卒大亂于王弼奈何後之儒者尤而效之杜預分左氏傳於經宋衷范望散太𤣥測贊於八十一首之下是其明比也揆觀其初乃如古文尚書遷固叙傳揚雄法言叙篇云爾卷首列名氏二十餘家文字異同則散見於卦云古易十二卷音訓二卷著作郎東莱吕祖謙伯恭所定篇次與汲郡吕氏同音訓則其門人王莘叟筆受朱晦庵刻之於臨漳㑹稽益以程氏是正文字及晁氏說其所著本義據此本也古周易十二卷國子録吳郡吳仁傑斗南所録以爻為繫辭今之繫辭為說卦其言十翼謂彖傳象傳繫辭傳上下說卦上中下文言序卦雜卦并上下經為十二篇案漢世傳易者施孟梁丘京費費最晚出不得立於學官其學亡章句惟以彖象文言等解上下經自劉向校中古文易經諸家或脱无咎悔亡惟費氏與古文同東京名儒馬鄭皆傳之其後諸家皆廢而費學孤行以至于今其合彖象文言於經蓋自康成輔嗣以来展轉相傳學者遂不識古文本經甚至今世考官命題或連彖象爻辭為一對大義者志得而已徃徃穿鑿傅㑹而經㫖破碎極矣凡此諸家所録雖頗有同異大較經自為經傳自為傳而於傳之中彖象文言亦各不相混稍復古文之舊均有補于學者宜並存之又有九江周燔所次附見吳氏書篇末今古文參用視諸本為無據又有程逈可久古易攷十二篇見後周易正義十三卷案舊唐書經籍志作十六卷唐書藝文志作十四卷唐國子祭酒冀州孔頴達仲達撰序云十四卷館閣書目亦云今本止十三卷案五經正義本唐貞觀中頴達與顔師古等受詔撰五經義贊後改為正義博士馬嘉運駁正其失永徽二年中書門下于志寧等攷正増損書始布下其實非一手一足之力世但稱孔疏爾其說專釋一家注文為正案唐書孔頴逹顔師古司馬才章王恭馬嘉運趙乾叶王談于志寜等奉詔撰蘓徳融趙宏智覆審崇文總目云唐長孫無忌與諸儒刋定周易釋文一卷唐國子博士吳郡陸徳明撰本名元朗以字行多援漢魏以前諸家說盖唐初諸書皆在也卦首注某宫某世用京房說歸藏三卷晉太尉參軍薛貞注案唐志十三卷司馬膺注今惟存初經本蓍齊母三篇錯謬不可讀非古全書也子夏易傳十卷案隋唐志有卜商傳二卷殘缺陸徳明李鼎祚亦時稱引攷漢志初無此書有孫坦者為周易析藴言此漢杜子夏也未知何據使其果然何為不見於漢志其為依託明矣隋唐時止二卷已殘缺今安得有十卷且其經文彖象爻辭相錯正用王弼本決非漢世書以陸徳明所引求之今傳則皆無之豈惟非漢世書亦非隋唐所傳書矣其文辭淺俚非古人語姑存之以備一家案晁以道傳易堂記曰古今咸謂子夏受於孔子而為之傳然太史公劉向父子班固皆不論著唐劉子元知其偽矣書不傳於今今號為子夏傳者崇文總目知其為偽而不知其所作之人予知其為唐張弧之易也晁之言云爾張弧有王道小疏五卷見館閣書目云唐大理評事亦不詳何時人京房易傳三卷積算雜占條例一卷案晁公武曰隋志有京氏章句十卷又有占候十種七十三卷唐志亦作京氏章句十卷而占候存者五種二十二卷章句既亡今所傳者京氏積算易傳三卷雜占條例法一卷所謂積算易傳疑即隋唐志之錯卦是也雜占條例法疑隋唐志之逆刺占災異是也此本篇目與晁志異吳鬱林太守吳郡陸績公紀注京氏學廢絶久矣所謂章句者既不復傳而占候之存於世者僅若此較之前志什百之一二耳今世術士所用世應飛伏游魂歸魂納甲之說皆出京氏晁景迂甞為京氏學用其傳為易式云或作四卷而條例居其首又有參同契律厯志見隂陽家類專言占候關子明易傳一卷後魏河東關朗子明撰唐趙㽔注隋唐志皆不録或云阮逸偽作也周易集解十卷案唐書作十七卷晁公武謂今止十卷而始末皆全無所亡失或後人併之也唐著作郎李鼎祚集子夏孟喜京房九家乾鑿度馬融荀爽鄭康成劉表何晏王弼宋衷虞翻陸績王肅干寶姚信王廙張璠向秀王凱沖侯果蜀才翟元韓康伯劉瓛何妥崔憬沈麟士盧氏崔覲孔頴逹等諸家凡隋唐以前易家諸書逸不傳者賴此猶見其一二而所取于荀虞者尤多九家者漢淮南王所聘明易者九人荀爽甞為之集解陸氏釋文所載說卦逸象本于九家易蜀才范長生也顔之推云案此書集子夏以來易説三十二家外又引張氏倫朱氏仰之蔡氏景君三家注元包十卷唐衛元嵩撰祕書少監武功蘇源明傳四門助教趙郡李江注其書以八卦為八篇首而一世至歸魂各附其下先坤次乾次兌艮離坎巽震坤曰太隂乾曰太陽餘六子有孟仲少之目每卦之下各為數語用意僻怪文意險澁不可深曉也周易啓源十卷唐太子左諭徳蔡廣成撰皆設為問答之辭其卷首題徳恒徳言徳庸徳翰問者不知何義也補闕周易正義畧例疏一卷案宋史藝文志作三卷唐四門助教邢璹撰案蜀本略例有璹所注止有篇首釋略例二字文與此同餘皆不然此本亦淺近無義理姑存之周易窮㣲一卷稱王輔嗣凡為論五篇館閣書目有王弼易辨一卷其論彖論象亦類畧例意即此書也又言弼著此書已亡至晉得之王羲之承詔録藏於祕府世莫得見未知何所據而云周易物象釋疑一卷唐東陽助撰唐志作東鄉助館閣書目又云守江陵尹東陽東郷皆複姓也其序言隨事義而取象若以龍叙乾以馬明坤凡注疏未釋者標出為此書周易舉正三卷唐蘇州司戸叅軍郭京撰自言得王弼韓康伯手寫真本正其訛謬凡一百三十五條如坤初六象履霜隂始凝也多堅氷二字屯六三象以從禽也闕何字頤拂經當作拂頤坎卦習坎上當有卦名之類皆於義為長易傳解說一卷㣲㫖三卷唐宰相吳郡陸希聲撰案文獻通攷作右拾遺案唐志有易傳二卷中興書目作六卷别出㣲㫖三卷今所謂解說者上下經共一冊不分卷有序言著易傳十篇七篇以上解易義之淵㣲八篇以下廣易道之旁行今第為六卷又撰易圖指說釋變微㫖各一卷通為十卷其上下經蓋第一第二篇經文一句傳亦一句門人以為難曉故復為之解然則其全書十卷不盡傳矣家舊惟有㣲㫖續得解說一編始知其詳周易口訣義六卷河南史之徴撰案宋史藝文志作史文徽文獻通攷作史證鄭樵通志作史之證宋人避諱徵字此改從其舊不詳何代人三朝史志有其書非唐則五代人也避諱作證字易證墜簡二卷毗陵從事建溪范諤昌撰天禧中人序言任職毗陵因事退閒葢嘗失官也又言得於湓浦李處約李得於廬山許堅其上卷如郭京舉正下卷辨繫辭非孔子命名止可謂之賛繫今爻辭乃可謂之繫辭又重定其次序又有補注一篇辨周孔述作與諸儒異為乾坤二傳末有四辭晷刻圖一篇案文獻通攷作四時晷刻圖館閣書目止一卷又有源流圖一卷言納甲納音者即此下卷補注序中語也世或言劉牧之學出于諤昌而諤昌之學亦出种放未知信否晁以道邵子文朱子發皆云爾新注周易十一卷卦徳統論一卷畧例一卷又易數鈎隱圖二卷案宋史以畧例為黄黎獻撰易數鈎隐圖作一卷鄭樵通志作三卷又黄黎獻續者一卷太常博士劉牧長民撰黄黎獻為之序又為畧例圖亦黎獻所序又有三衢劉敏士刻於浙右庾司者有歐陽公序文淺俚決非公作其書三卷與前本大同小異案敏士序稱伯祖屯田郎中臨川先生志其墓今觀誌文所述但言學春秋于孫復而已當慶厯時其易學盛行不應畧無一語及之且黎獻之序稱字長民而誌稱字先之其果一人耶抑二人耶刪定易圖論一卷直講旴江李覯泰伯撰案宋史藝文志作李遇盖南宋避諱所改凡六篇蓋刪劉牧易圖而存之者三焉館閣書目作六卷十九篇覯先著易論十九篇皆見集中與此自為二書當是合為十九也易補注十卷又王劉易辨一卷秘書丞宋咸貫之撰咸嘗撰易明凡一百九十三條以正亡誤及得郭京舉正於歐陽公遂參驗為補注皇祐五年表上之别有易訓未見易辨凡二十篇劉牧之學大扺求異先儒穿鑿破碎故李宋或刪之或辨之周易言象外傳十卷翰林學士雎陽王洙原叔撰其序言學易於處士趙期論次舊義附以新說凡十二篇以王弼傳為内摘其異者表而正之故曰外云周易析藴二卷孫坦撰其首言子夏傳辭不甚粹或取左氏傳語證之晚又得十八占稱天子曰縣官甞疑漢杜子夏之學及讀杜傅見引明夷對䇿疑始釋然坦不知何人國史志及中興書目皆不著易筌六卷太常丞建安阮逸天隱撰每爻各以一古事繫之頗多牽合周易意學六卷案文獻通考鄭樵通志俱作十卷題齊魯後人陸秉撰晁氏讀書志云秉字端夫舊名東甞通判蜀州寶元二年上其書有詔嘉奬其說多異先儒穿鑿無據周易口義十三卷案文獻通攷作易傳十卷宋史作易解十二卷鄭樵通志作口義十二卷直講海陵胡瑗翼之撰新安王炎晦叔嘗問南軒曰伊川令學者先看王輔嗣胡翼之王介甫三家易何也南軒曰三家不論互體故云爾然雜物撰徳具于中爻互體未可廢也南軒之說雖如此要之程氏專治文義不論象數三家者文義皆坦明象數殆扵掃除略盡非特互體也案晁公武云此書乃門人倪天隠所纂非其自著周易解義十卷直講徂徠石介守道撰止解六十四卦亦無大發明晁景迂甞謂守道說孔子作彖象於六爻之前小象繫逐爻之下惟乾悉屬之於後者讓也他人尚何責哉今觀此解義言王弼注易欲人易見使相附近他卦皆然惟乾不同者欲存舊本而已更無他說不知景迂何以云爾也案宋咸補注首章頗有此意晁殆誤記也耶易童子問三卷參政廬陵歐陽永叔撰設為問答其上下卷專言繫辭文言說卦而下皆非聖人所作易意藴凡例總論一卷東海徐庸撰皇祐中人凡為論九篇館閣書目又有卦變解未見周易義類三卷稱顧叔思撰未詳何人序言先儒論説甚衆而其㫖未甞不同卦爻或有不同而辭意未甞不一各立標目總而聚之易解十四卷案宋史藝文志作十九卷鄭樵通志分載易義八卷補注精㣲各三卷與此合尚書右丞皇甫泌撰曰述聞曰隠訣曰補解曰精㣲曰師說曰明義案文獻通攷作辨道其學得于常山抱犢山人而莆陽游中傳之劉彝錢藻皆為之序山人者不知其名氏盖隠者也泌甞守海陵治平以前人易解十四卷丞相荆公臨川王安石介甫撰晁氏讀書志曰介甫三經義皆頒學官獨易解自謂少作未善不專以取士易說三卷丞相温公涑水司馬光君實撰雜說無詮次未成書也東坡易傳十卷端明殿學士眉山蘓軾子瞻撰蓋述其父洵之學也周易聖斷七卷諌議大夫閬中鮮于侁子駿撰多辨王弼劉牧之非乾坤二卦不解爻象欲學者觀彖象文言而自得云伊川易解六卷案文獻通攷宋史藝文志俱作十卷崇政殿說書河南程頤正叔撰止解六十四卦不解大傳而以序卦分置諸卦之首盖唐李鼎祚集解亦然伊川平生著述惟易傳為深而亦不解大傳横渠易說三卷案文獻通攷宋史藝文志俱作十卷崇文校書長安張載子厚撰乾生歸一圖十卷案文獻通攷作二卷英州石汝礪撰嘉祐元年序取乾為生生之本萬物歸于一也有論有圖亦頗與劉牧辨然或雜以釋老之學其所謂一者自注云一則靈寂其元首篇論道專以靈明原注靈字恐誤或當作虚無體無生為主又曰因靈不動而生寂體豈非異端之說乎易義海撮要十卷案宋史藝文志作十二卷熙寧中蜀人房審權編義海凡百卷近時江都李衡彦平刪削而益以東坡蘇氏伊川程氏漢上朱氏之說若房氏百卷之書則未之見也衡乾道中由侍御史改起居郎館閣續書目云紹興監察御史誤矣易解二卷翰林學士錢塘沈括存中撰所解甚略不過數卦而於大小畜大小過獨詳了翁易說一卷左司諌延平陳瓘了翁撰晚年所著也止解六十四卦辭㫖深晦葆光易解義十卷泉州教授莆田張弼舜元撰紹聖中以章惇黄裳等薦賜號葆光處士後又以為福州司戸本州教授其學多言取象案晁公武讀書志弼於紹聖中張惇薦於朝賜號葆光處士後黄裳等再薦詔為福州司户本州教授考宋史紹聖中無張惇此本又作章厚疑為章惇所薦以避光宗諱故名章厚耳又教授上脱本州二字今改正易講義十卷給事中遂昌龔原深之撰嘉祐八年進士初以經學為王安石引用元符後入黨籍此段當在正易心法之前隨齋批注正易心法一卷舊稱麻衣道者授希夷先生崇寧間廬山隠者李潜得之凡四十二章蓋依託也朱先生云南康戴主簿師愈撰乃不唧􅖛底禪不唧􅖛底修養法日時法王炎曰洺山案文獻通攷作洛水李夀翁侍郎喜論易炎嘗問侍郎在當塗板行麻衣新說如何李曰程沙隨見囑炎曰恐託名麻衣耳以撲錢背面喻八卦隂陽純駁此鄙說也以泉雲雨為陽水以澤為隂水與夫子不合李曰然然亦有兩語佳炎曰豈非學者當於羲皇心地上馳騁不當於周孔脚跡下盤旋耶然此二語亦非也無周孔之辭則羲皇心地學者何從探之李無語李名椿太極傳六卷外傳一卷因說一卷中書舍人晁說之以道撰其學本之邵康節自言學京氏易紹聖間遇洛陽楊賢寶得康節二易圖又從其子伯温得其遺編始作易傳名曰商瞿傳兵火後失之晚年復為此書又有易元星紀譜易規二書見本集中又有傳易堂記述漢以來至本朝傳授甚詳易正誤一卷不知何人作但稱其名曰敭又稱元祐以來云云則近世人也據序為書三篇曰正誤曰脫簡曰句讀今所存惟正誤一篇大抵増益郭范之說故併附二書冊後梁谿易傳九卷外篇十卷丞相昭武李綱伯紀撰案序内外篇凡二十三卷内篇訓釋上下經繫辭說序雜卦并總論合十卷外篇釋象七明變一訓辭二類占一衍數二合十有三卷今内篇闕總論外篇闕訓辭及衍數下卷存者十卷蓋罷相遷謫時所作其書未行於世館閣亦無之莆田鄭寅子敬從忠定之曽孫得其家藏本頃倅莆田日借鄭本傳録今攷梁谿集紹興十三年所編其訓辭二序已云有録無書則雖其家亦亡逸久矣豈有其序而書實未成耶其於書辭變象占無不該貫可謂博矣周易外義三卷不知何人作載於三朝史志則其來亦久矣大抵於易中所言及於制度名物者皆詳著之於易之本㫖無所發明故曰外義皇極經世十二卷叙篇系述二卷處士河南邵雍堯夫撰其學出於李之才挺之之才受之穆修伯長修受之种放明逸放受之陳摶盖數學也曰元㑹運世以元經㑹以運經世自帝堯至扵五代天下離合治亂興廢得失邪正之迹以天時而驗人事以人事而驗天時以隂陽剛柔窮聲音律呂以窮萬物之數末二卷論所以為書之意窮日月星辰飛走動植之數以窮天地萬物之理述皇王帝霸之事以明大中至正之道書謂之經世篇謂之觀物凡六十二篇其子伯温為之叙系具載先天後天變卦反對諸圖又為易學辨惑一篇叙傳授本末真偽然世之能明其學者盖鮮焉雍諡康節觀物外篇六卷康節門人張㟭子望記其平生之言雖十纔一二而足以發明成書者為多故名觀物外篇㟭登進士第仕為太常寺主簿觀物内篇解二卷康節之子右奉直大夫伯温子文撰即經世書之第十一十二卷也廣川易學二十四卷中書舍人東平董逌彦逺撰吳園易解十卷秘閣修撰鄱陽張根知常撰卷後有序論五篇雜說泰論各一篇根自號吳園先生漢上易傳十一卷叢說一卷圖三卷翰林學士荆門朱震子發撰紹興初在經筵表上具述源流云陳摶以先天圖傳种放放傳穆修修傳李之才之才傳邵雍放以河圖洛書傳李溉溉傳許堅堅傳范諤昌諤昌傳劉牧修以太極圖傳周敦頤敦頤傳程顥程頤是時張載講學於二程邵雍之間故雍著皇極經世書牧陳天地五十有五數敦頤作通書程頤著易傳載造太和參兩等篇臣今以易傳為宗和㑹雍載之論上采漢魏吳晉下逮有唐及今包括異同庶幾道離而復合盖其學専以王弼盡去舊說雜以莊老専尚文辭為非是故其于象數頗加詳焉序稱九卷盖合説序雜卦為一也周易窺餘十五卷資政殿學士金華鄭剛中亨仲撰不解乾坤二卦獨自屯卦始剛中甞得罪秦檜豈其於乾坤之義有所避耶周易疑難圖解二十五卷三山鄭東卿少梅撰以六十四卦為圖外及六位皇極先天卦氣等圖各附以論說末有繫辭解自言其學出于富沙丘先生以為易理皆在于畫中於是日畫一卦周而復始久而後有所入沙隨程迥可久曰丘程字憲古嘗有詩曰易理分明在畫中又曰不知畫意空箋注何異丹青在畫中其學傳之東卿云永嘉所刋本作二冊不分卷無繫辭解易索十三卷知岳州太和張汝明舜文撰上下經六卷外觀象三觀變玩辭玩占叢說各一汝明元祐壬申進士大觀初為御史省郎游酢定夫誌其墓易解義十卷題凌公弼撰未詳何人善解析文義頗簡潔有所發明館閣書目有集解六卷稱朝奉大夫凌唐佐撰亦不著本末豈即其人耶徽猷閣待制新安凌唐佐字公弼建炎初知應天府以劉豫虚實書奏被殺後其妻田氏以死狀聞詔贈待制隨齋批注易小傳六卷丞相吳興沈該守約撰專釋六爻兼論變卦多本春秋左氏傳占法卦為一論又有繫辭補注十餘則附之卷末昭徳易詁訓傳十八卷敷文閣直學士清豐晁公武子止撰博采古今諸家附以己聞又攷載籍行事以明諸爻之變其文義音讀之異者列之逐條曰同異攷乾道中上之其議論精博不主一家然亦畧於象數晁氏居京師昭徳坊故號昭徳晁家沖之叔用其父也先天易鈐一卷序稱牛師徳祖仁撰未詳何人盖為邵氏之學而專乎術數者也傳家易說十一卷沖晦處士河南郭雍頤正撰自言其父忠孝受學于程伊川伊川示以易之艮曰艮止也學道之要無出於此自是方覺讀易有味牓其室曰兼山立身行道皆自止始兵興之初先人舊學掃地念欲補續其說中心所知者艮止也潛稽易學以述舊聞用傳于家忠孝字立之名將樞密逵之子自言得先天卦變於河陽陳安民子惠其書出李挺之由是頗通象數仕為永興軍路提刑死於狄難其書散逸雍隠居陜州長陽山中帥守屢薦召之不至由處士封頤正先生其末提舉趙善譽言於朝遣官受所欲言得其傳家兵學六卷以進時淳熙丙午也明年卒年八十有四又有兼山遺學六卷見儒家類案晁公武讀書志有兼山易解二卷餘書皆未之見也雍實范忠宣丞相外孫又號白雲先生案頤正本朝廷所賜先生號而館閣書目以為字頤正恐誤讀易老人詳說十卷參政莊簡公上虞李光泰發撰光忤秦檜謫海外為此書光甞學於劉元城其初進頗由蔡氏晚節所立有過人者易傳拾遺十卷敷文閣直學士廬陵胡銓邦衡撰銓謫新州作此書大槩宗主程氏而時出新意於易傳之外李光泰發為之序其曰拾遺者謙辭也逍遙公易解八卷疑問二卷直學士院李椿年仲永撰其門人鄱陽吳説之景傳所述胡銓邦衡為之序疑問者說之所録其問答之語也易傳十一卷本義十二卷易學啟䝉一卷案宋史藝文志啟䝉三卷焕章閣待制侍講新安朱熹晦庵撰初為易傳用王弼本復以吕氏古易經為本義其大㫖畧同而加詳焉首列九圖末著揲法大畧無義理占象而言啟䝉之目曰本圖書原卦畫明蓍筮考變占凡四篇周易變體十六卷吏部郎中京口都潔聖與撰用蔡墨言乾六爻之例專論之卦為主繫辭精義二卷吕祖謙集程氏諸家之說程傳不及繫辭故也館閣書目以為託祖謙之名大易粹言十卷知舒州温陵曽穜獻之集二程張載游酢楊時及二郭之學為一書穜甞受學於郭白雲易原十卷吏部尚書新安程大昌泰之撰首論天地五十有五之數參之河圖洛書大衍之異同以為此易之原也以及卦變揲法皆有圖論徃徃斷以已見出先儒之外易本傳三十三卷隆山李舜臣子思撰其自序以為易起於畫捨畫則無以見易因畫論心以中為用如捨本卦而論他卦及某卦從某卦來者皆所不取案此二句原本脱漏今據文獻通攷補入洪邁景盧為之作序舜臣淳熙中宰饒之徳興有惠政民至今祠之三子皆知名顯於時沙隨易章句十卷外編一卷占法一卷古易攷一卷沙隨程迥可久撰其論占法雜記占事尤詳迥嘗從玉泉喻樗子才學登隆興癸未科仕至邑宰及與前輩名公交游多所見聞故其論說頗有源流根據古易攷十二篇闕序雜卦誠齋易傳二十卷寶謨閣學士廬陵楊萬里廷秀撰其序以為易者聖人通變之書惟中為能中天下之不中惟正為能正天下之不正中正立而萬變通又言古未有字八卦之畫即字也周易經傳集解三十六卷兵部侍郎福清林栗黄中撰淳熙中表進其書末卷為六十四卦立成圖言聖人以八卦重為六十四未聞以復姤泰否臨遯變為六十四也以辨邵堯夫朱子發之說其與朱侍講違言以論易不合為朱公所闢也數學一卷雜録象數諸圖說不知何人所録易說二卷潼川漕趙善譽徳廣撰善譽淳熙中甞進南北攻守類攷及為湖北提舉常平陛辭以易說進每卦為論一篇易辨三卷淵源録三卷案文獻通攷何萬易辨三卷原本作易辭今改正右司郎中三山何萬一之撰其為辨三十三篇大抵多與先儒異淵源録者盖其為易解未成書僅有乾坤二卦而已萬癸未進士髙第受知阜陵官至右司郎中知漳州以没易總說二卷端明殿學士永嘉戴溪肖望撰每卦為一篇嘉定初為東宫端尹作此以授景獻周易玩辭十六卷太府卿松陽項安世平甫撰當慶元中得罪時宰謫居江陵杜門潛心起居不出一室送迎賔友未甞踰閾諸書皆有論說而易為全書其自序以為讀程易三十年此書無一字與之合合則無用乎此書矣世之君子以易傳之理觀吾書則本末條貫無一不本於程氏者以易傳之文觀吾書則恐有西河疑女之誚大抵程氏一於言理盡畧象數而此書未甞偏廢程氏於小象頗欠發明而此書爻象尤貫通盖亦徧攷諸家斷以己意精而博矣易裨傳二卷外篇一卷秘書省正字檇李林至撰凡三篇曰法象本之太極曰極數本之天地之數曰觀變本之揲蓍十八變外篇則曰反對世應互體納甲卦氣之類凡八條述釋葉氏易説一卷吏部侍郎永嘉葉適正則為習學記言易居其首門人建安袁聘儒席之述而釋焉聘儒紹熈癸丑進士易筆記八卷總說一卷軍器少監新安王炎晦叔撰甞以上下經解表進作十卷今但六卷并繫辭二卷為八闕說卦於象數頗有發明易翼傳二卷吏部侍郎括蒼鄭汝諧舜舉撰翼云者所以為程傳之輔也大抵以程傳為本而附以己見之異然汝諧立朝多為善類所不可至互相排擊南塘易說三卷禮部尚書趙汝談履常撰専辨十翼非夫子作其説亦多自得之見西山復卦說一卷參政建安真徳秀景元撰準齋易說一卷錢塘吳如愚撰直齋書録解題卷一
