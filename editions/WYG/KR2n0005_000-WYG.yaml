  text: 欽定四庫全書史部十四
  hash: sha256:1b0fee061afb4650a390a33f011206c9ad39b5a17ebb7b4f5e965df0aa8e4e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0005_WYG_000-1a, image: WYG0674/WYG0674-0525a.png}
body:
  text: 直齋書録解題目録目錄類一經籍之屬卷一易類卷二書類詩類禮類卷三春秋類孝經類語孟類經解類讖緯類小學類案以上經部卷四正史類别史類編年類起居注類卷五詔令類偽史類雜史類典故類卷六職官類禮注類時令類卷七傳記類法令類卷八譜牒類目録類地理類案以上史部卷九儒家類道家類卷十法家類名家類墨家類縱横家類農家類雜家類卷十一小説家類卷十二神仙類釋氏類兵書類歴象類隂陽家類卜筮類形法類卷十三醫書類卷十四音樂類雜藝類類書類案以上子部卷十五楚辭類總集類卷十六别集類上卷十七别集類中卷十八别集類下卷十九詩集類上卷二十詩集類下卷二十一歌詞類卷二十二章奏類文史類案以上集部臣等謹案直齋書録解題宋吳興陳振孫撰以厯代典籍分為五十三類各詳其卷帙多少撰人名氏且為品題其得失故曰解題其書不標經史子集之目而核其所列經之類凡十史之類凡十六子之類凡二十集之類凡七仍不外乎四部之説者也攷諸前史目録類皆入史部自劉歆七畧以下著録者指不勝屈其存於今者崇文總目尤袤遂初堂書目晁公武郡齋讀書志及此書而已遂初堂書目本無註崇文總目註已散佚其可攷見諸書源流者惟晁志及此書故馬端臨經籍攷即據此二書以成編然至今晁志有刻本而此書乆佚惟永樂大典全載之誠希覯之本也苐當時編輯草率訛脱頗多今門類一仍其舊而解題則詳加攷核各以案語附之定為二十二卷方今聖天子稽古右文蒐羅遺籍列于四庫之中者浩如烟海此區區一家之書誠不足以當萬一然古書之不傳于今者得藉是以資徴信而其校核精詳議論醇正於攷古亦有助焉固宜存而不廢也原本間於解題之後附以隨齋批注未詳隨齋何許人然補闕拾遺于本書頗有所裨亦仍其舊並存焉乾隆四十二年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6740c7ef2c4bd20d3ddc51252ff9fc0be6f0cb45010f09464e1ddf1b95b0e399
