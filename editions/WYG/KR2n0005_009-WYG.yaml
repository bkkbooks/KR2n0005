body:
  text: 直齋書錄觧題卷九宋陳振孫撰儒家類孔子家語十卷孔子二十二世孫猛所傳魏散騎常侍王肅為之注肅闢鄭學猛嘗受學於肅肅從猛得此書與肅所論多合從而證之遂行於世云博士安國所得壁中書也亦未必然其間所載多已見左氏傳大戴禮諸書云肅東海人父朗曾子二卷案唐書藝文志及文獻通攷俱作二卷原本作十卷誤今改正凡十篇具大戴禮後人從其中錄出别行慈谿楊簡注晏子春秋十二卷齊大夫平仲晏嬰撰漢志八篇但曰晏子隋唐七卷始號晏子春秋今卷數不同未知果本書否案崇文總目謂其書已亡世所傳者蓋後人采嬰行事而成故栁宗元謂墨氏之徒有齊人者為之非嬰所自著也荀子二十卷楚蘭陵令趙國荀况撰漢志作孫卿子云齊稷下祭酒其曰孫者避宣帝諱也至楊倞始改為荀卿荀子注二十卷唐大理評事楊倞注案劉向序校中書三百二十二篇以校除複重二百九十篇定著三十二篇隋志為十二卷至倞始分為二十卷而注釋之淳熙中錢佃耕道用元豐監本參校刋之江西漕司其同異著之篇末凡二百二十六條視他本最為完善賈子十一卷案崇文總目云隋唐志皆九卷新唐書藝文志作十卷此本作十一卷疑誤漢長沙王太傅洛陽賈誼撰漢志五十八篇今書首載過秦論末為弔湘賦餘皆錄漢書語且略節誼本傳於第十一卷中其非漢書所有者輒淺駁不足觀決非誼本書也鹽鐵論十卷漢廬江太守丞汝南桓寛次公撰本始元年召問賢良文學對願罷鹽鐵𣙜酤均輸與御史大夫宏羊相詰難於是止罷𣙜酤而鹽鐵卒不變故昭紀贊曰議鹽鐵而罷𣙜酤也及宣帝時寛推衍增廣著數萬言凡六十篇其末曰雜論班書取以為論贊其言桑大夫據當世合時變上權利之畧雖非正法鉅儒宿學不能自觧博物通達之士也嗚呼世之小人何嘗無才以熙寧日錄言之王安石之辯雖曰儒者其實桑大夫之流也霍光號知時務與民更始而鹽鐵之議乃俾先朝首事之臣與諸儒議論反覆不厭或是或非一切付之公論而或行或否未嘗容心焉以不學無術之人而暗合乎孟莊子父臣父政之義曾謂元祐諸賢而慮不及此乎新序十卷漢護都水使者光祿大夫劉向子政撰舜禹以来迄于周嘉言善行徃徃在焉其書最為近古案曾鞏序畧曰向之序此書於今最為近古雖不能無失然逺至舜禹而次及於周秦以来古人之嘉言善行亦徃徃而有也此云自舜禹以来迄於周疑有脱句説苑二十卷劉向撰序言臣向所校中書説苑雜事除去與新序複重者其餘淺薄不中義理别集以為百家後今以類相從更以造新事凡二十篇七百八十四章號曰説苑案漢志劉向所序六十七篇謂新序説苑世説列女傳頌圖也今本南豐曾鞏序言崇文總目存者五篇從士大夫得十五篇與舊為二十篇未知即當時篇章否新苑之名亦不同法言十卷案唐書藝文志作六卷漢黄門郎蜀揚雄子雲撰凡十三篇篇各有序本在卷末如班固叙傳然今本分冠篇首自宋咸始也法言注十三卷音義一卷晉尚書郎李軌宏範注此本歴景祐嘉祐治平三降詔更監學館閣兩制校定然後頒行與建寧四注本不同錢佃得舊監本刻之與孟荀文中子為四書太𤣥經十卷揚雄撰五業主事章陵宋衷仲子觧詰吳鬰林太守陸績公紀釋文晉尚書郎范望叔明觧贊案漢志揚雄所叙三十八篇太𤣥十九本傳三方九州二十七部八十一家七百二十九贊分為三卷有首衝錯測攡瑩數文掜圖告十一篇皆以觧剝𤣥體蓋與本經三卷共為十四今志云十九未詳初宋陸二家各依舊本觧釋范望折中長短或加新意既成此注乃以𤣥首一篇加經贊之上𤣥測一篇附贊之下為九篇列為四卷首測一序仍載之第一卷之首蓋猶王弼離合古易之類也卷首有陸績述元一篇本傳尚有二百四十三表六字隨齋批注説𤣥一篇唐宰相河南王涯廣津撰明宗立例揲法占法辨首凡五篇太𤣥釋文一卷相傳自侯芭虞翻宋衷陸績互相增損非後人所作也吳秘嘗作音義豈即此耶太𤣥集注六卷司馬光撰自宋衷而下四家之外有直昭文館宋惟幹注天水尉陳漸演元司封郎吳秘音義通前凡七家集取其説斷以已意𤣥觧四卷𤣥歴一卷右丞襄陵許翰崧老撰所觧十一篇通温公注為十卷倣韓康伯注繫辭合王弼為全書之例也大抵𤣥首如彖贊如爻案原本脱彖贊如三字今據文獻通攷補入測如象文如文言攡瑩掜告如繫辭數如説卦衝如序卦錯如雜卦之類其於易也規規然擬之勤矣太𤣥歴者亦翰所傳云温公手錄不著何人作申鑒五卷漢黄門侍郎潁川荀悦仲豫撰獻帝頗好文學政在曹氏恭已而已悦志在獻替而謀無所用乃作此書五篇奏之其曰教化之廢推中人而墮於小人之域教化之行引中人而納於君子之塗古今名言也本傳止載政體一篇有曰前鑒既明後復申之故名隨齋批注中論二卷漢五官將文學北海徐幹偉長撰唐志六卷今本二十篇有序而無名氏蓋同時人所作案貞觀政要太宗嘗稱見幹中論復三年喪篇宋時館閣本已闕又魏志文帝稱幹著中論二十餘篇則知二十篇非全書也孔叢子七卷孔氏子孫雜記其先世系言行之書也小爾雅一篇亦出於此中興書目稱漢孔鮒撰一名盤盂案孔光傳夫子八世孫鮒魏相順之子為陳渉博士死陳下則固不得為漢人而其書紀鮒之没第七卷號連叢子者又記太常臧而下數世迄於延光三年季彥之卒則又安得以為鮒撰案儒林傳所載為博士者又曰孔甲顏注曰將名鮒而字甲也今攷此書稱子魚名鮒陳人或謂之子鮒或稱孔甲然則顏監未嘗見此書耶藝文志有孔甲盤盂二十六篇本注謂黄帝史或曰夏帝孔甲似皆非也其書蓋田蚡所學者與孔鮒初不相渉也中興書目乃曰一名盤盂不知何據豈以漢志所謂孔甲即陳王博士之孔甲邪帝範一卷案舊唐書經籍志作四卷宋史藝文志作二卷唐太宗撰凡十二篇以賜高宗中説十卷隋河汾王通仲淹撰唐志五卷今本第十卷有文中子世家房魏論禮樂事書闗子明事及王氏家書雜錄舊傳以此為前後序非也案晁公武讀書志是書係王通之門人共集其師之語中説注十卷太常丞阮逸天隱撰中説注十卷正議大夫淄川龔鼎臣輔之撰自甲至癸為十卷而所謂前後序者在十卷之外亦頗有所刪取李格非跋云龔自謂明道間得唐本於齊州李冠比阮本改正二百餘處潛虚一卷司馬光撰言萬物皆祖於虚𤣥以準易虚以準𤣥潛虚發微論一卷監察御史張敦實撰凡九篇周子通書一卷太極圖説一卷廣東提刑舂陵周敦頤茂叔撰周子通書遺文遺事一卷侍講朱熹集次刋於南康帝學八卷案文獻通攷作十卷侍講成都范祖禹淳父元祐中編集上自三皇五帝迄於本朝神宗凡聖學事實皆具焉正䝉書十卷崇文校書長安張載子厚撰凡十九篇案晁公武讀書志是書初無篇次其後門人蘇昞等區别成十七篇范育吕大臨蘓昞為前後序皆其門人也又有待制胡安國所傳編為一卷末有行狀一卷經學理窟一卷張載撰西銘集觧一卷張載作訂頑砭愚二銘後更曰東西銘其西銘即訂頑也大抵發明理一分殊之㫖有趙師侠者集吕大臨胡安國張九成朱熹四家之説為一編刻之興化軍通書西銘集觧三卷戸部侍郎新昌王夢龍慶翔所集河南師説十卷尚書潁川韓元吉无咎以河南雅言伊川雜説及諸家語錄釐為十卷以尹和靖所編為卷首不若遺書之詳訂也山東野錄七卷殿中丞臨淄賈同公疎撰本名罔真宗御筆改之蓋祥符祀汾隂時所放經明行修進士也程氏遺書二十五卷附錄一卷外書十三卷朱熹集錄二程門人李籲端伯而下諸家所聞見問答之語附錄行狀哀詞祭文之屬八篇其年譜朱公所撰述也外書則又二十五篇之所遺者皇極經世書十二卷邵雍堯夫撰其學出於李之才挺之之才受之穆脩伯長脩受之种放明逸放受之陳摶蓋數學也曰元會運世以元經會以運經世自帝堯至於五代天下離合治亂興廢得失邪正之迹以天時而驗人事以隂陽剛柔窮聲音律吕以窮萬物之數末二卷論所以為書之意窮日月星辰飛走動植之數以盡天地萬物之理述皇王帝霸之事以明大中至正之道書謂之皇極經世篇謂之觀物凡六十二篇其子伯温為之叙系具載先天後天變卦反對諸圖又為易學辨惑一篇叙傳授本末真偽然世之能明其學者蓋鮮焉觀物外篇六卷康節門人太常寺簿張崏子望記其言雖十纔一二而足以發明成書觀物内篇二卷康節之子右奉直大夫伯温撰即經世書之第十一十二卷也張氏曰先生觀物有内外篇内篇先生所著之書也外篇門人所記先生之言也内篇理深而數略外篇數詳而理顯學先天者當自外篇始先生詩云若無揚子天人學安有莊周内外篇以此知外篇亦先生之文門人蓋編集之耳又曰皇極經世者康節之易先天之嗣也觀物篇立言廣大措意精㣲如繫辭然稽之以理既無不通參之以數亦無不合案以上三書皆已見易類而觧題詳畧互異今並仍之近思錄十四卷朱熹吕祖謙取周程之書闗於大體而切於日用者六百十九條取切問近思之義以教後學元城語錄三卷右朝散郎維揚馬永卿大年撰永卿初仕亳州永城主簿從寓公劉安世器之學記其所聞之語劉先生談錄一卷知秀州韓瓘德全撰瓘億之曾孫緬之孫官二浙道睢陽徃来必見劉元城記其所談二十一則道䕶錄一卷胡珵德輝所錄劉元城語凡十九則以上三書皆刻章貢末又有邵伯温吕本中所記數事附焉庭闈槀錄一卷即楊迥所錄當政和八年其父亡恙時也龜山别錄二卷不知何人所錄龜山語錄五卷延平陳淵幾叟羅從彥仲素建安胡大原伯逄所錄楊時中立語及其子迥槀錄共四卷末卷為附錄墓誌遺事順昌廖德明子晦所集也尹和靖語錄四卷馮忠恕祈寛居之吕堅中崇實所錄尹焞彥明語胡氏傳家錄五卷曾幾吉父徐時動舜鄰楊訓子中所記胡安國康侯問答之語及其子寧和仲所錄家庭之訓無垢語錄十四卷言行編遺文共一卷張九成子韶之甥于恕所編心傳錄及其門人郎昱所記日新錄近時徐鹿卿德夫教授南安復裒其言行繫以歲月及遺文三十篇附於末南軒語錄十二卷蔣邁所記張栻敬夫語晞顏錄一卷張栻取經傳中凡言及顔子者錄為一編晦庵語錄四十六卷著作佐郎陵陽李道傳貫之裒晦翁門人廖德明子晦而下三十二家刻之九江晦庵續錄四十六卷李太史之弟樞宻性傳成之又得黄幹直卿而下四十一家及前錄所無者併刻之合貫之前錄益見該備矣節孝先生語一卷江端禮季恭所錄山陽徐積仲車語童蒙訓一卷中書舍人東莱吕本中居仁撰師友雜志一卷雜説一卷吕本中撰胡子知言一卷五峰胡宏仁仲撰文定公安國之季子張南軒從之遊忘筌書二卷浦城潘植子醇撰多言易亦渉異端凡五十一篇此書載鳴道集為九十二篇附見者又十有三而館閣書目又稱七十七篇皆未詳諸儒鳴道集七十二卷不知何人所集涑水濓溪明道伊川横渠元城上蔡無垢以及江民表劉子翬潘子醇凡十一家其去取不可曉兼山遺學六卷河南郭雍錄其父忠孝之遺書前二卷為易蓍卦次為九圖又次説春秋又次為性説三篇末卷問答雜説忠孝父子世系出處本末詳見易類玉泉講學一卷沙隨程迥可久所記喻樗子才語樗本末見語孟類周簡惠聖傳錄一卷參政荆溪周葵惇義撰案周惇義名葵原本誤作蔡今改正自堯舜至孔孟聖傳正統為絶句詩二十章而自著其説自為一家然無高論小學書四卷朱熹所集古聖格言至論以教學者皆成童幼志進學之序也内篇曰立教明倫敬身稽古外篇曰嘉言善行吕氏讀書記七卷吕祖謙撰乾道癸巳淳熙乙未家居日閲之書隨意手筆或數字或全篇蓋偶有所感發或以備遺㤀者閫範十卷吕祖謙撰集經史子傳發明人倫之道見於父子兄弟之間者為一篇時教授嚴州張南軒守郡實為之序少儀外傳二卷吕祖謙撰雜取經傳嘉言善行切於立身應世者皆博學切問之事也而大要以謹厚為本尊孟辨七卷建安余允文隱之撰以司馬公有疑孟及李遘泰伯常語鄭厚叔友折衷皆有非孟之言故辨之為五卷後二卷則王充論衡刺孟及東坡論語説中與孟子異者亦辨焉先聖大訓六卷龍圖閣學士慈溪楊簡敬仲撰案楊簡官龍圖閣學士此本脱龍圖二字今補正取禮記家語左傳國語而下諸書凡稱孔子之言皆類為此編然聖人之言㫖意未易識也喪欲速貧死欲速朽自門弟子已不能知其有為而言况於百氏所記其間淺陋依托可勝道哉多聞闕疑庶乎其弗畔也已易一卷楊簡撰慈湖遺書三卷楊簡撰前二卷雜説末一卷遺文慈湖之學専主乎心之精神是謂聖一語其誨人惟欲發明本心而有所覺然其稱學者之覺亦頗輕於印可蓋其用功偏於上達受人之欺而不疑竊嘗謂誠明一理焉有誠而不明者乎當淳熙中象山陸九淵之學盛行於江西朱侍講不然之朱公於前輩不肯張無垢於同流不肯陸象山為其本原未純故也象山之後一傳而慈湖遂如此甚矣道之不明賢知者過之也明倫集十卷高安塗近止撰取經傳言行之要以孝為本推而廣之為十篇塗有子登科得初品官致仕心經法語一卷參政建安真德秀希元撰集聖賢論心格言三先生諡議一卷嘉定中魏了翁華父為潼川憲奏請賜周程諡寳慶守李大謙集而刻之併及諸郡祠堂記文言子三卷言偃吳人相傳所居在常熟縣慶元間邑宰孫應時季和始為立祠求朱晦翁為記近新昌王爚伯晦復裒論語諸書所載問答為此書邑中至今有言氏亦買田教飬之道家類老子道德經二卷周柱下史李耳伯陽撰昔人言諡曰耼故世稱老耼然耼之為訓耳漫無輪也似不得為諡御注老子二卷徽宗皇帝御製老子注二卷魏王弼撰魏晉之世𤣥學盛行弼之談𤣥冠於流輩故其注易亦多𤣥義晁説之以道曰弼本深於老子而易則未也其於易多假諸老子之㫖而老子無資於易其有餘不足之迹可見矣世所行老子分道德經為上下卷此本道德經且無章目當是古本老子道德論述要二卷司馬光撰太史公曰老子著書言道德之意後人以其篇首之文名上篇曰道下篇曰德夫道德連體不可偏舉合從本名温公之説如此其不曰經而曰論亦公新意也老子新觧二卷蘓轍撰東坡跋曰使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晉宋間有此書則佛老不為二老子觧二卷葉夢得撰其説曰孔子稱竊比於我老彭孟子闢楊墨而不及老氏老氏之書孔孟所不廢也所觧生之徒十有三死之徒十有三案老子觧云生之徒十有三死之徒十有三原本作死之徒有三誤今改正以為四肢九竅本韓非子觧老之説易老通言十卷程大昌撰其序言名為訓老而實該六經故曰易老通言易在而六經皆在矣蓋以易為六經之首也列子八卷鄭人列禦宼撰穆公時人案劉向校定八篇謂列禦宼與鄭繆公同時栁宗元云鄭繆公在孔子前幾百載禦宼書言鄭殺其相駟子陽則鄭繻公二十四年當魯穆公之十年向蓋因魯穆公而誤為鄭耳列子注八卷晉光祿勲張湛處度撰列子釋文二卷唐當塗縣丞殷敬順撰案殷敬順撰列子釋文原本作處順今改正莊子十卷蒙漆園吏宋人莊周撰案史記與齊宣梁惠同時則亦當與孟子相先後矣莊子注十卷晉太傅主簿河南郭象子元撰案本傳向秀觧義未竟而卒頗有别本遷流象竊以為已注乃自注秋水至樂二篇又易馬蹄一篇其餘㸃定文句而已其後秀義别出故今有向郭二莊其義一也然向義今不傳但時見陸氏釋文莊子音義三卷唐陸德明撰即經典釋文二十六至二十八卷莊子疏三十卷唐道士西華法師陕郡成元英子實撰元英隱東海貞觀五年召至京師永徽中流郁州不知坐何事唐藝文志云鬻子一卷鬻熊為周文王師封於楚為始祖漢志云爾書凡二十二篇今書十五篇陸佃農師所校鬻子注一卷唐鄭縣尉逄行珪撰止十四篇蓋中間以二章合而為一故視陸本又少一篇此書甲乙篇次皆不可曉二本前後亦不同姑兩存之闗尹子九卷周闗令尹喜蓋與老子同時啟老子著書言道德者案漢志有闗尹子九篇而隋唐及國史志皆不著錄意其書亡久矣徐藏子禮得之於永嘉孫定首載劉向校定序篇末有葛洪後序未知孫定從何傳授殆皆依托也序亦不類向文亢倉子三卷案唐書藝文志文獻通攷俱作二卷何粲注首篇所載與莊子庚桑楚同亢倉者庚桑聲之變也其餘篇亦皆依托唐栁子厚辨其非劉向班固所錄是矣今唐志有王士元亢倉子二卷注云天寳元年詔號莊子為南華真經列子沖虚文子通元亢倉子洞靈真經然亢倉子求之不獲襄陽處士王士元謂莊子作庚桑子太史公列子作亢倉子其實一也乃取諸子文義類者補其亡然則今之亢倉士元為之也宗元唐人豈偶不之知耶文子十二卷題黙希子注案漢志有文子九篇老子弟子與孔子同時而稱周平王問似依托者也又案史記貨殖傳徐廣注計然范蠡師名鈃裴駰曰計然葵丘濮上人姓辛氏字文子黙希子引以為據然自班固時已疑其依托况又未必當時本書乎至以文子為計然之字尢不可攷信栁子厚亦辨其為駁書而亦頗有取焉黙希子不著名氏晁公武曰唐徐靈府自號也鶡冠子三卷陸佃觧案漢志鶡冠子楚人居深山以鶡為冠今書十九篇韓吏部稱十有六篇故陸謂非其全也韓公頗道其書至栁栁州則曰盡鄙淺言也好事者偽為其書反用鵩賦以文飾之其好惡不同如此自今攷之栁説為長抱朴子二十卷晉句漏今丹陽葛洪稚川撰洪所著書内篇言神仙黄白變化之事外篇駁難通釋此二十卷者内篇也館閣書目有外篇五十卷坐忘論一卷唐逸人河内司馬承禎子微撰言坐㤀安心之法凡七條并樞翼一篇以為修道階次其論與釋氏相出入天隱子一卷司馬子㣲作序言不知其何許人著書八篇修鍊形氣飬和心靈長生久視無出此書今觀其言殆與坐㤀論相表裏豈天隱云者托之别號歟案洪興祖云司馬子微得天隱子之學未知何據元真子外篇三卷唐隱士金華張志和撰唐志元真子十二卷今纔三卷非全書也既曰外篇則必有内篇矣志和事迹詳見余所集碑傳無能子三卷不著名氏唐志云光啟中隱民間蓋其自序云爾莊子義十卷參政清源吕惠卿吉父撰元豐七年先表進内篇其餘蓋續成之莊子十論一卷題李士表撰未詳何人直齋書錄觧題卷九
