body:
  text: 直齋書錄解題卷二十一宋陳振孫撰歌詞類花間集十卷蜀歐陽炯作序稱衛尉少卿字宏基者所集未詳何人其詞自温飛卿而下十八人凡五百首此近世倚聲塡詞之祖也詩至晚唐五季氣格卑陋千人一律而長短句獨精巧高麗後世莫及此事之不可曉者放翁陸務觀之言云爾南唐二主詞一卷中主李璟後主李煜撰卷首四闋應天長望遠行各一浣溪沙二中主所作重光嘗書之墨迹在盱江晁氏題云先皇御製歌詞余嘗見之於麥光紙上作撥鐙書有晁景迂題字今不知何在矣餘詞皆重光作陽春錄一卷南唐馮延已撰高郵崔公度伯易題其後稱其家所藏最為詳確而尊前花間諸集往往謬其姓氏近傳歐陽永叔詞亦多有之皆失其眞也世言風乍起為延已所作或云成㓜文也今此集無有當是㓜文作長沙本以寘此集中殆非也家宴集五卷序稱子起失其姓氏雍熙丙戌歲也所集皆唐末五代人樂府視花間不及也末有清和樂十八章為其可以侑觴故名家宴也珠玉集一卷晏元獻公殊撰其子幾道嘗言先公為詞未嘗作婦人語以今攷之信然張子野詞一卷都官郎中吳興張先子野撰李常公擇為六客堂子野與焉所賦詞卒章云也應傍有老人星葢以自謂是時年八十餘矣東坡倅杭數與唱酬聞其買妾為之賦詩首末皆用張姓事吳興志稱其晚年漁釣自適至今號張釣魚灣死葬弁山下在今多寳寺案歐陽集有張子野墓誌死於寳元中者乃博州人名姓字偶皆同非吳中之子野也杜壽域詞一卷京兆杜安世壽域撰未詳其人詞亦不工六一詞一卷歐陽文忠公修撰其間多有與花間陽春相混者亦有鄙䙝之語一二厠其中當是仇人無名子所為也樂章集九卷柳三變耆卿撰景祐元年進士官至屯田員外郎世號柳屯田初磨勘及格昭陵以其浮薄罷之後乃更名永其詞格固不高而音律諧婉語意妥帖承平氣象形容曲盡尤工於覊旅行役若其人則不足道也東坡詞二卷蘇文忠公軾撰集中戚氏叙穆天子西王母事世不知所謂李端叔跋詳之葢在中山燕席間有歌此闋者坐客言調美而詞不典以請於公公方觀山海經即叙其事為題使妓再歌之隨其聲塡寫歌竟篇就纔㸃定五六字而已端叔時在幕府目擊必不誣或言非坡作豈不見此跋耶今坡詞多有刋去此篇者山谷詞一卷黄太史庭堅撰淮海集一卷秦觀撰晁无咎詞一卷晁補之撰晁嘗云今代詞手惟秦七黄九他人不能及也然二公之詞亦自有不同者若晁无咎佳者固未多遜也后山詞一卷陳師道撰閒適集一卷晁端禮次膺撰熙寧六年進士兩為縣令忤上官坐保甲事中以危法廢徙晚乃以承事郎為大晟府協律三閲月而卒其從姪説之志其墓晁叔用詞一卷晁沖之撰壓卷漢宫春梅詞行於世或云李漢老作非也小山集一卷晏幾道叔原撰其詞在諸名勝中獨可追逼花間高處或過之其為人雖縱弛不覊而不苟求進尚氣磊落未可貶也清眞詞二卷後集一卷周邦彦美成撰多用唐人詩語櫽括入律渾然天成長調尤善鋪叙富艶精工詞人之甲乙也東山寓聲樂府三卷賀鑄方回撰以舊譜塡新詞而别為名以易之故曰寓聲東堂詞一卷毛滂澤民撰本以斷魂分付潮回去見賞東坡得名而他詞雖工未有能及此者溪堂詞一卷謝逸無逸撰竹友詞一卷謝薖幼槃撰冠柳集一卷王觀通叟撰號王逐客世傳霜瓦鴛鴦其作也詞格不高以冠柳自名則可見矣姑溪集一卷李之儀端叔撰聊復集一卷安定郡王趙令畤德麟撰後湖詞一卷蘇庠養直撰大聲集五卷万俟雅言撰嘗遊上庠不第後為大晟府製撰周美成田不伐皆為作序石林詞一卷葉夢得少藴撰蘆川詞一卷三山張元幹仲宗撰坐送胡邦衡詞得罪秦相者也赤城詞一卷陳克子高撰詞格頗高麗晏周之流亞也簡齋詞一卷陳與義撰劉行簡詞一卷劉一止撰嘗為曉行詞盛傳於京師號劉曉行順庵樂府五卷康與之伯可撰與之父倬惟章詭誕不檢事見揮麈錄與之又甚焉嘗挾吳下妓趙芷以遁與蘇師德仁仲有隙遂與蘇玭訓直之獄玭仁仲之子而常同子正之壻也與之受知於子正一朝背之士論不齒周南仲嘗為作傳道其實如此世所傳康伯可詞鄙䙝之甚此集頗多佳語陶定安世為之序王性之蘇養直皆稱之而其人不自愛如此不足道也樵歌一卷朱敦儒希眞撰初寮詞一卷王安中撰丹陽詞一卷葛勝仲撰酒邊集一卷戸部侍郎向子諲伯恭撰自號薌林潄玉集一卷易安居士李氏清照撰元祐名士格非文叔之女嫁東武趙明誠德甫晚歲頗失節别本分五卷得全詞一卷趙忠簡鼎元鎭撰焦尾集一卷韓元吉撰放翁詞一卷陸游撰石湖詞一卷范成大撰友古詞一卷左中大夫莆田蔡伸伸道撰自號友古居士君謨之孫相山詞一卷王之道彦猷撰浩歌集一卷蔡柟堅老撰于湖詞一卷張孝祥安國撰稼軒詞四卷寳謨閣待制濟南辛棄疾幼安撰信州本十二卷卷視長沙為多金亮之殞朝廷乘勝取四十郡未幾班師復棄數郡京東義士耿京據東平府遣掌書記辛棄疾赴行在京後為禆將張安國所殺棄疾擒安國以歸斬之詳見朝野雜記可軒曲林一卷盱江黄人傑叔萬撰王武子詞一卷未詳其名字樂齋詞一卷向滈豐之撰鳯城詞一卷三山黄定㤗之撰乾道壬辰牓首竹坡詞一卷周紫芝撰介庵詞一卷趙彦端撰竹齋詞一卷吳興沈瀛子夀撰書丹詞一卷眉山程垓正伯撰王稱季平為作序燕喜集一卷曹冠宗臣撰退圃詞一卷鎭洮馬寧祖奉先撰省齋詩餘一卷衡陽廖行之天民撰克齋詞一卷苕溪沈端節約之撰敬齋詞一卷臨川吳鎰仲權撰逃禪集一卷清江楊无咎補之撰世所傳江西墨梅即其人也袁去華詞一卷豫章袁去華宣卿撰樵隱詞一卷毛幵平仲撰盧溪詞一卷王庭珪民瞻撰知稼翁集一卷考功郎官莆田黄公度師憲撰紹興戊午大魁坐與趙忠簡往來得罪秦檜流落嶺表更化召對為郎未幾死年財四十八呂聖求詞一卷檇李呂渭老聖求撰宣和末人嘗為朝士退齋詞一卷長沙侯延慶季長撰壓卷為天寜節萬年歡又有庚寅京師作水調則大觀元年也金石遺音一卷石孝文次仲撰歸愚詞一卷葛立方常之撰信齋詞一卷葛郯謙問撰澗壑詞一卷雙井黄談子黙撰嬾窟詞一卷東武侯寘彦周撰其曰母舅晁留守者謙之也紹興中以直學士知建康王周士詞一卷長沙王以寧周士撰哄堂集一卷案文獻通攷作哄堂原本作烘今改正盧炳叔易撰定齋詩餘一卷三山林淳太沖撰漫堂集一卷豐城鄧元南秀撰養拙堂詞集一卷董鑑明仲撰坦庵長短句一卷趙師俠介之撰晦庵詞一卷李處全粹伯撰淳熙中侍御史近情集一卷鄱陽王大受仲可撰野逸堂詞一卷歴陽張孝忠正臣撰松坡詞一卷京鏜仲遠撰黙軒詞一卷豫章劉德秀仲洪撰案劉德秀字仲洪原本作沖洪誤今改正慶元中為簽樞岫雲詞一卷長沙鍾將之仲山撰嘗為編修官西樵語業一卷廬陵楊炎止濟翁撰雲谿樂府四卷魏子敬撰未詳何處人西園鼓吹二卷徐得之思叔撰李東老詞一卷李叔獻東老撰東浦詞一卷韓玉温甫撰李氏花蕚集五卷廬陵李氏兄弟五人洪子大漳子清泳子永洤子召淛子秀皆有官閥好庵遊戲一卷莆田方信孺孚若撰開禧中使入金國後至廣西漕鶴林詞一卷簡池劉光祖德修撰紹熙名臣為御史起居郎晚以雜學士終蜀之耆德有文集未見笑笑詞集一卷臨江郭應祥承禧撰嘉定間人自南唐二主詞而下皆長沙書坊所刻號百家詞其前數十家皆名公之作其末亦多有濫吹者市人射利欲富其部帙不暇擇也蕭閒集六卷蔡伯堅撰靖之子陷金者吳彦高詞一卷吳激彦高撰米元章之壻亦陷金二人皆貴顯白石詞五卷姜夔堯章撰西溪樂府一卷姚寛令威撰洮湖詞一卷金壇陳從古晞顔撰審齋詞一卷東平王千秋錫老撰海野詞一卷曾覿撰孝宗潛邸人怙寵依勢世號曾龍者也龍名大淵蓮社詞一卷案張掄詞名蓮社原本作蓮杜今改正張掄才甫撰梅溪詞一卷汴人史達祖邦卿撰張約齋磁為作序不詳何人竹屋詞一卷高觀國賔王撰亦不詳何人高郵陳造併與史二家序之劉改之詞一卷襄陽劉過改之撰泠然齋詩餘一卷蘇泂召叟撰蒲江集一卷永嘉盧祖臯申之撰欵乃集八卷昭武嚴次山撰欵音曖乃如字余甞辨之甚詳花翁詞一卷孫惟信季蕃撰蕭閒詞一卷韓疁子耕撰注坡詞二卷僊谿傅榦撰注琴趣外篇三卷江陰曹鴻注葉石林詞注清眞詞二卷曹杓季中注自稱一壺居士樂府雅詞三卷拾遺二卷案文獻通攷樂府雅詞作十二卷曾慥編復雅歌詞五十卷題鮦陽居士序不著姓名末卷言宫詞音律頗詳然多有詞而無曲草堂詩餘二卷類分樂章二十卷羣公詩餘前後編二十二卷五十大曲十六卷萬曲類編十卷皆書坊編集者陽春白雪五卷趙稡夫編取草堂詩餘所遺以及近人之詞案此條原本脱漏今據文獻通攷補入直齋書錄解題卷二十一
