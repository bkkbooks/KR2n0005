body:
  text: 直齋書録解題卷五宋陳振孫撰詔令類西漢詔令十二卷吳郡林虙德祖編采括志傳參之本紀以示信安程俱致道俱以世次先後各為一卷差比嵗月纂而成書且為之序虙嘗試中詞學為開封府掾尹以佞幸進有所不樂引疾納祿去遂終於家東漢詔令十一卷宗正寺主簿鄞樓昉暘叔編大抵用林氏舊體自為之序帝王之制具在百篇後世不可及矣兩漢猶為近古愚未冠時無書可觀雖二史亦從人借嘗於班書志傳録出諸詔與紀中相附以便覽閲既仕於越乃得見林氏書而樓氏書近出其為好古博雅斯以勤矣惟平獻二朝莽操用事如錫莽及廢伏后之類皆當削去莽時尤多也本朝大詔令二百四十卷寶謨閣直學士案原本誤作實録閣今據文獻通考改正豫章李大異伯珍刻於建寧云紹興間宋宣獻家子孫所編纂也而不著其名始自國初迄於宣政分門别類凡目至為詳也玉堂制草十卷參政巨野李邴漢老編承平以前制誥中興玉堂制草六十四卷同知樞密鄱陽洪遵景嚴編起建炎迄紹興末中興續玉堂制草三十卷丞相益文忠公東里周必大子充為學士院時編進始嘗進言加上德壽尊號不以表而以議且稱嗣皇帝為非是遂革之今書以尊號表為卷首而增附館職䇿問於後起隆興迄淳熙改元自後未有續者綸言集三十一卷宇文粹中虛中兄弟所編集中興綸言集二十八卷左司郎中莆田鄭寅子敬編寅知樞密院僑之子端重博洽藏書數萬卷於本朝典故尤熟偽史類淝上英雄小録二卷信都鎬撰案鄭樵通志作偽吳信都鎬撰所録楊行密將吏有勳名者四十人其二十四人皆淝上餘諸道人又有僧道漁樵之屬十人録其小事故名小録江淮異人録二卷吳淑撰所紀道流俠客術士之類凡二十五人南唐烈祖開基志十卷南唐滁州刺史王顔撰起天祐乙丑止升元癸卯合三十九年南唐烈祖實録十三卷南唐史館修撰髙逺撰闕第八第十二卷逺又嘗為吳録二十卷而徐鉉鄭文寶皆云開寶中逺始緝升元以來事書未成而疾悉焚其草故事多遺落江南録十卷給事中廣陵徐鉉鼎臣光祿卿池陽湯悅德川撰二人皆唐舊臣故太宗命之撰次恱即殷崇義避宣祖諱及太宗舊名并姓改焉南唐近事二卷工部郎江南鄭文寶撰序云三世四十年起天福己酉終開寶乙亥案宋太祖在位十七年首庚申盡丙子乙亥乃開寶八年原本作己亥誤今改正然泛記雜事實小説傳記之類耳江表志三卷鄭文寶撰序言徐鉉湯悅所録事多遺落無年可編然前録固為簡略而猶以年月紀事今此書亦止雜記如事實之類爾近事稱太平興國二年丁丑今稱庚戌者大中祥符三年也南唐書三十卷陽羡馬令撰序言其祖太博元康世家金陵多知南唐故事未及撰次今纂先志而成之實崇寧乙酉其書略備紀傳體而亦言徐鉉湯悅之疏略云江南餘載二卷不著姓名序言徐鉉始奉詔為江南録其後王舉路振陳彭年楊億皆有書大概六家皆不足以史稱而龍衮為尤甚熙寧八年得鄭君所述於楚州其事迹有六家所遺或小異者刪落是正取百九十五段以類相從鄭君者莫知何人豈即文寶也耶新修南唐書十五卷寶謨閣待制山陰陸遊務觀撰采獲諸書頗有史法前蜀紀事二卷後蜀學士毛文錫平圭撰起廣明庚子盡天福甲子凡二十五年文錫唐太僕卿龜範之子十四登進士第入蜀仕建至判樞密院隨衍入洛而卒後蜀紀事二卷直史館太常博士董淳撰惟記孟昶事蜀檮杌十卷殿中侍御史裏行新建張唐英次功撰唐英自號黃松子商英天覺之兄也吳越備史九卷吳越掌書記范坰巡官林禹撰按中興書目其初十二卷盡開寶三年後又增三卷至雍熙四年今書止石晉開運比初本尚闕三卷吳越備史遺事五卷全州觀察使錢儼撰俶之弟也其序言備史亦其所作託名林范而遺名墜迹殊聞異見闕漏未盡者復為是編時皇宋平南海之二年吳興西齋序蓋開寶五年也儼以三年代其兄偡刺湖州閩中實録十卷周顯德中揚州永貞縣令蔣文惲記王審知父子及將吏儒士僧道事迹未亦略及山川土物閩王列傳一卷祕書監晉江陳致雍撰二世七主通六十年閩王事迹一卷不知何人作卷末稱光啓二年至天聖九年一百三十八年其所記頗詳案閩亡於五代之末其世紀不得至天聖九年疑有誤三楚新録三卷知桂州修仁縣周羽沖撰上卷為湖南馬殷中卷為武陵周行逢下卷為荆南髙季興湖南故事十卷不知作者記馬氏至周行逢事館閣書目作十三卷蓋為列傳十三篇其實十卷也文辭鄙甚五國故事二卷不知作者記吳蜀閩漢諸國事九國志五十一卷右正言知制誥祁陽路振子發撰九國者謂吳唐二蜀東南二漢閩楚吳越各為世家列傳凡四十九卷末二卷為北楚書髙季興事張唐英所補撰也十國紀年四十卷劉恕撰十國者即前九國之外益以荆南張唐英所謂北楚也天下大定録一卷殿中丞通判桂州王舉撰景祐間人始髙季興終劉繼元其所記疏略獨江南稍詳書本十卷今但為一卷恐非全書也隂山雜録十六卷不著名氏莆田鄭氏書目云趙志忠撰志忠者遼中書舍人得罪於宗真挺身來歸歐公歸田録云志忠本華人自幼陷敵為人明敏在敵中舉進士至顯官歸國能述敵中君臣世次山川風物甚詳今觀此書可概見矣燕北雜録五卷西征寨地圖附思卿武圭記嘉祐六年宫苑使知雄州趙案此處原本闕一字進於朝圭自契丹逃歸事見國史傳契丹録一卷即隂山雜録之首卷也胸奴須知一卷歸明人田緯編次録契丹地理官制辨鴂録一卷不著名氏契丹譯語也凡八篇邊廷須知一卷左藏庫副使知安肅軍陳昉撰熙寧元年集賢校理鄭穆為之序凡二十一條目案文獻通考作胡穆為之序西夏須知一卷內殿承制鄜延都監劉溫潤撰凡十五條目金人亡遼録二卷燕山史願撰或稱遼國遺事松漠記聞二卷徽猷閣直學士鄱陽洪皓光弼撰皓奉使留敵中録所聞雜事征蒙記一卷金人明威將軍登州刺史李大諒撰建炎巨寇之子隨其父成降金者也所記家人跳梁自其全盛時已不能制矣金國志二卷承奉郎張棣撰淳熙中歸明人記金國事頗詳金國志一卷不著名氏似節略張棣書其末又雜録金國事宜及海陵以後事金國節要三卷右從事郎兖人張匯東卿撰宣和中隨父官保州陷金十五年至紹興十年歸朝偽楚録二卷不著名氏偽齊録二卷不著名氏金人南遷録一卷稱偽著作郎張師顔撰頃初見此書疑非北人語其間有曉然傅會者或曰華嶽所為也近扣之汴人張總管翼則云嵗月皆抵牾不合益證其妄雜史類越絶書十六卷無撰人名氏相傳以為子貢者非也其書雜記吳越事下及秦漢直至建武二十八年蓋戰國後人所為而漢人又附益之耳越絶之義曰聖人發一隅辨士宣其辭聖文越於彼辨士絶於此故題曰越絶雖則云然而終未可曉也越者國之氏也絶者絶也謂勾踐時也絶者絶也絶惡反之於善越專其功故曰越絶並見本書文簡批編尾云越絶書訛不可讀如樂架之有啞鍾漁父辭劔事見於此隨齋批注戰國䇿三十卷司馬遷史記所本劉向所校者也但無撰人名氏後漢髙誘注自東周至中山十二國凡三十三篇鮑氏校定戰國䇿十卷尚書郎括蒼鮑彪注以西周正統所在易為卷首其注凡四易藁乃定九州春秋九卷晉司馬彪紹統撰漢末州部之亂司冀徐兗青荆揚梁幽凡盜賊僭叛皆紀之華陽國志二十卷案唐書藝文志華陽國志作十三卷晉散騎常侍蜀郡常璩道將撰志巴蜀地理風俗人物及公孫述劉焉劉璋先後主以及李特等事迹末卷為序志云肇自開闢終乎永和三年原注劉璋乃焉之子後魏國典三十卷唐太常少卿元行沖撰行沖以系出拓跋乃撰魏典三十篇文約事詳學者尚之此本從莆田劉氏借録卷帙多寡不同嵗月首尾不具殆類鈔節似非全書大業雜記十卷唐著作郎杜寶撰紀煬帝一代事序言貞觀修史未盡實録故為此書以彌縫闕漏建康實録二十卷唐許嵩撰載吳晉宋齊梁陳六朝都建康者編年附傳大略用實録體行在河洛記十卷唐宰相尉氏劉仁軌正則撰記李密王世充事末二卷記隋都城宫殿池苑按唐志作行年記二十卷河洛春秋二卷唐揚州司功包諝撰記安史之亂明皇雜録一卷唐校書郎鄭處誨撰雜記明皇時事大中九年序處誨太和八年進士也開天傳信記一卷唐吏部員外郎鄭棨撰雜記開元天寶時事安祿山事迹三卷唐華隂尉姚汝龍撰案唐書藝文志作姚汝能開元升平源一卷唐史官吳兢撰敘姚崇十事廬陵王傳一卷唐彭王傅會稽徐浩季海撰敘狄仁傑五王事奉天録四卷唐趙元一撰起建中四年涇原叛命終興元元年克復神都燕南記三卷唐恆州司戶魏郡谷况撰専記成德一鎮事自建中二年至太和七年起張孝忠案唐書建中二年九月李納陷宋州李惟嶽將張孝忠以易定二州降原本作張志忠誤今改正終王承元古語有燕南埀趙北際今以其在燕之南故名然河北諸鎮連叛事迹大略具矣建中河朔記六卷唐李公佐撰序言與從弟正封讀國史至建中貞元之際序述河朔故事未甚詳備以舊聞於老僧智融及谷况燕南記所説略同參錯會要以補史闕邠志三卷案唐書藝文志作二卷唐殿中侍御史凌準宗一撰邠軍即朔方軍也此本從旴江朝氏借録其末題曰文忠修唐史求此書不獲今得於忠憲范公之孫伯髙其中尚多誤當訪求正之紹興乙丑朝公酇涼國公平蔡録一卷唐山南東道掌書記鄭澥藴士撰涼國公者李訴也國史補三卷唐學士李肇撰大唐新語十三卷唐江都縣主簿劉肅撰自武德迄大歷分類編纂凡三十類元和丁亥嵗序太和野史三卷不著名氏但稱大中戊辰陳郡袁濤序自鄭注而下十七人本共為一軸濤分之為三卷太和摧凶記一卷文與上同而不分卷豈其初本耶野史甘露記二卷不著名氏上卷記甘露之禍下卷敘諸臣本末乙卯記一卷唐布衣李潛用撰末又有吳郡李實者述訓注本謀附益之乙卯者太和九年也兩朝獻替記三卷唐宰相李德裕文饒撰敘文武兩朝相位奏對事迹會昌伐叛記一卷李德裕撰記平澤潞事次栁氏舊聞一卷李德裕撰記栁芳所聞於髙力士者凡十七條上元中芳謫黔中力士徙巫州芳從力士問禁中事德裕父吉甫從芳子冕聞之四夷朝貢録十卷唐給事中渤海髙少逸撰會昌中宰相李德裕以黠戞斯朝貢莫知其國本原詔為此書凡二百一十國本二十卷合之為十卷東觀奏記三卷唐右補闕裴延裕案文獻通考作裴廷裕膺餘撰記宣宗朝事凡八十九條貞陵遺事二卷續一卷唐中書舍人令狐澄撰吏部侍郎栁玭續之澄所記十七事玭所續十四事咸通庚寅解圍録一卷唐成都少尹張雲景之撰言南詔圍城扞禦事金鑾密記三卷唐翰林學士承旨京兆韓偓致堯撰具述在翰苑時事危疑艱險甚矣昭宗屢欲相之卒不果而貶竟終於閩非不幸也不然與崔垂休輩駢肩就戮於朱溫之手矣廣陵妖亂志三卷唐晉陽鄭延晦撰案唐書藝文志作郭廷誨撰言髙駢吕用之畢師鐸等事汴水滔天録一卷唐左拾遺王振撰言朱溫篡逆事朱梁興創遺編二十卷梁宰相馮翊敬翔子振撰自廣明巢賊之亂朱溫事迹迄於天祐弒逆大書特書不以為愧也其辭亦鄙俚莊宗召禍記一卷後唐中書舍人黃彬撰三朝見聞録八卷不知作者起乾符戊戌至天祐末年及莊宗中興後唐河東事迹三朝者僖昭莊也其文直述多鄙俚大唐補記三卷南唐程匡柔撰案馬令南唐書作程匡柔原本作臣柔誤今改正序言懿宗朝有焦璐者撰年代紀述神堯止宣宗匡柔襲托三百年歷補足十九朝起咸通戊子止癸巳附璐書中乾符以後備存補記末有後論一篇文辭雖拙論議亦正賈氏備史六卷漢諫議大夫賈緯撰敘石晉禍亂每一事為一詩系之晉太康平吳記二卷周兵部尚書張昭撰世宗將討江南昭采晉武平孫皓事迹為書上之晉朝陷蕃記四卷宰相大名范質文素撰據莆田鄭氏書目云爾本傳不載故館閣書目云不知作者未悉鄭氏何所據也五代補録五卷潯陽陶嶽撰每代為一卷凡一百七條嶽雍熙二年進士五代史闕文一卷翰林學士巨野王禹稱元之撰建隆遺事一卷王禹稱撰其記陳橋驛前戒誓諸將事元出熙陵而序文云近取實録入禁中親自筆削然則此書之作誠有謂也邵氏聞見録亦嘗表而出之而或者亦辨此書之偽是見於王明清揮麈録者尤有據當考原注又名篋中記誣案揮麈録建隆遺事世稱王元之所述其間率多謗之詞如稱趙普盧多遜受遺詔昌陵尤為舛謬韓王以開寶六年八月免相至太平興國六年九月始再秉衡鈞當太祖升遐時普政在外何緣前一日與盧丞相同見於寢又稱太祖長子德昭為南陽王初未嘗有此事且載秦王傳中云云安有淳化三年而見三朝國史耶李燾亦譏此書鄙悖不類禹稱平日之文則此書之非禹稱作益足信也甘陵伐叛記一卷題文升撰不知何人末有論稱甘陵人蘇朔為余言其大父慶歷中陷賊親見則初叛時事原注則蓋王則也按中興書目有甘陵誅叛録稱殿中丞王起撰起時為文彥博幕客然則别自一書也涑水記聞十卷司馬光撰此書行於世久矣其間記吕文靖數事吕氏子孫頗以為諱蓋嘗辨之以為非溫公全書而公之曾孫侍郎伋季思遂從而實之上章乞毁板識者以為議書壬戌事一卷不知何人作其記永樂之事甚詳逸史二十卷丞相陽羡蔣芾子禮撰其曽祖魏公之竒潁叔所記逸史殆數百册兵火散失捃托遺藁得六百六十事為十九門淳熙改元書成為之序林氏野史八卷同知樞密院長樂林希子中撰希不得志於元祐起從章惇甘心下遷西掖草諸賢謫詞者也而此書記熙寧元豐以來事頗平直不類其所為或言此書作於元祐之前其後時事既變希亦隨之書藏不毁久而時事復變其孫懋於紹興中始序而行之耳元和録三卷池州石埭縣尉維揚馬永錫明叟撰自元和三年牛李對䇿以至大中十三年令狐綯罷相唐朋黨本末具矣永錫嘗著唐職林實賔録等書崇觀政和間人也又有馬永卿大年者從劉元城遊大觀三年進士當是其羣從館閣書目以永錫為唐人大誤也邵氏辨誣三卷右奉直大夫河南邵伯溫子文撰専辨紹聖羣小誣謗宣仁事本末紹興中其子待制溥上之邵氏聞見録二十卷邵伯溫撰多記國朝事又有後録三十卷其子溥所作不專紀事在子録小説類康節兩孫溥博嘗見川本邵氏聞見後録名博今作溥未知直齋何所據恐博是蓋刊本不應誤也隨齋批注國史後補五卷蔡絛撰絛京之愛子京末年事皆出絛絛兄攸既叛父亦與絛不咸此書大略為其父自解而滔天之惡終有不能隱蓋者其間所載宫闈禁密非臣庶所得知亦非臣庶所宜言既出絛筆事遂傳世殆非人力也北征紀實二卷蔡絛撰敘伐燕本末歸罪童貫蔡攸亦欲為京文飾然京之罪不可掩也靖康要録五卷不著撰人名氏自欽廟潛邸迄靖康元年十二月事朝野僉言二卷不著名氏有序建炎元年八月繫年録稱夏少曽未詳何人靖康傳信録一卷丞相李綱伯紀撰丁未二月靖康奉使録一卷鄭望之撰靖康拾遺録一卷何烈撰又名草史孤臣泣血録三卷拾遺一卷丁特起撰裔夷謀夏録七卷翰林學士新安汪藻彥章撰陷燕記一卷賈子莊撰記燕山初陷事子莊不知其名蔡靖客也南歸録一卷直祕閣沈琯撰亦記燕山事靖康録一卷太學生朱邦基撰金人犯闕記一卷草茅方冠撰汴都記一卷無名氏靖康遺録一卷太學生沈良撰靖康野録一卷無名氏避兵夜話一卷吳興石茂良太初撰靖康小史一卷不著名氏其末稱名曰烈即何烈草史也痛定録一卷不著名氏悲喜記一卷圍城中人作書與所親曰中美知府者具述喪亂本末自稱名曰暘皆不知何人也嘗見一書名皇旋陷邊記中間載祕書少監趙㿩與姚太守書云云雖無中美之稱恐即此書也隨齋批注建炎中興記一卷耿延禧撰建炎中興日歷五卷宰相新安汪伯彥廷俊撰敘元帥開府至南都踐極吕忠穆答客問一卷宰相濟南吕頤浩元直撰吕忠穆勤王記一卷左宣教郎臧梓撰記建炎復辟事渡江遭變録一卷丞相上蔡朱勝非藏一撰記苗劉作難至復辟事建炎復辟記一卷無名氏建炎通問録一卷宣教郎傅雱撰建炎初李丞相綱所進北狩聞見録一卷幹當龍德宫曹勛功顯撰勛扈從北狩以徽廟御札間道走行在所以建炎二年七月至南京北狩行録一卷蔡鞗王若沖撰戊申維揚録一卷無名氏維揚過江録一卷尚書左丞葉夢得少藴撰己酉航海記一卷中書舍人李正民撰又名建炎居邠記建炎假道髙麗録一卷楊應誠撰取道遼東奉使金國不達而還紹興講和録二卷無名氏亂華編三十三卷知盱眙軍東平劉荀子卿編其前有小序數語云方敬塘割幽燕遺契丹之日孰知為本朝造禍之原哉逮王安石創新法為闢國之謀又孰知紹述者召禍之酷哉所集雜史傳記近三十種荀忠肅丞相諸孫也元祐黨籍列傳譜述一百卷龔頤正撰以諸臣本傳及志狀家傳遺事之類集成之其事迹微晦史不可見者則采拾諸書為之補傳凡三百九人其闕者四人而已淳熙中史院取其書以修四朝國史洪邁奏乞甄録補和州文學後賜出身詳見編年類頤正給事中原之曾孫也紹興正論二卷序稱瀟湘野夫不著名氏録文武官不附和議及忤秦檜得罪者紹興正論小傳二十卷宗正寺主簿鄞樓昉暘叔撰以正論中姓名倣元祐黨傳為之三朝北盟會編二百五十卷直祕閣清江徐夢莘商老撰輯諸書二百餘家分上中下上為政宣二十五卷中為靖康七十五卷下為炎興百五十卷北盟集補五十卷夢莘以前書詮載不盡者五家續編次於中下二帙以補其闕靖康炎興各為二十五卷中興十三處戰功録一卷參政眉山李璧季章撰中興以來禦寇立功惟此十三處編為一書所謂司勳藏其二者也開禧乙丑北事將作其書成建炎以來朝野雜記甲乙集共四十卷李心傳撰上自帝系帝德朝政國典下及見聞瑣碎皆録之蓋南渡以後野史之最詳者西陲泰定録九十卷李心傳撰記吳曦叛逆以及削平本末起嘉泰辛酉迄嘉定辛未為三十七卷其後蜀事益多又增修至辛巳之冬通為九十卷仍頗用太史公年表例併記國家大政令邊防大節目首尾二十年典故類貞觀政要十卷唐吳兢撰前題衛尉少卿兼修國史按新舊書列傳兢未嘗為此官而書亦不記嵗月但其首稱良相侍中安陽公中書令河東公亦未詳為何人館閣書目云神龍中所進當考魏鄭公諫録五卷唐尚書吏部郎中琅邪王綝撰綝字方慶以字行相武后其為吏部當在髙宗時館閣書目作王琳誤也所録魏公進諫奏對之語又名魏文貞公故事翰林盛事一卷唐剡尉常山張著處晦撰紀儒臣盛事自武德中迄于天寶首載張文成七登科者即著之祖也衣冠盛事一卷唐武功蘇特撰李司空論事一卷唐大中史官蔣偕録司空者李絳深之元和宰相也太和辨謗略三卷唐宰相李德裕撰初憲宗命令狐楚等為元和辨謗略十卷録周秦漢魏迄隋忠賢罹讒謗事迹德裕等刪其繁蕪益以唐事裁成三卷太和中上之集賢學士裴潾為之序元和書今不存邯鄲書目亦止有前五卷秦傳玉璽譜一卷題博陵崔逢修協律郎嚴士元重修河中少尹魏德謨潤色案文獻通考宋史藝文志俱作魏德謨原本作德譽誤今改正國璽傳一卷傳國璽記一卷傳無名氏所記止唐肅宗記稱嚴士元與前大同小異玊璽雜記一卷徐景撰乾元元年七月記唐志有徐景玊璽正録即此書也楚寶傳一卷杜確撰肅宗乾元二年楚州尼真如獻寶事八寶記一卷無名氏大觀二年唐文宗朝備問一卷不著名氏雜録唐朝典故通典二百卷唐宰相京兆杜佑君卿撰採五經群史歷代沿革廢置羣士論議迄於天寶凡為八門曰食貨選舉職官禮樂兵刑法州郡邊防貞元中表上之李翰為之序初劉秩為政典三十五篇佑以為未盡廣而成之續通典二百卷翰林學士承旨大名宋白太素等撰咸平三年奉詔四年九月書成起唐至德初迄周顯德末王欽若言杜佑通典上下數千載為二百卷而其中四十卷為開元禮今之所載二百餘年亦如前書卷數時論非其重復國朝通典二百卷不著名氏或言魏鶴山所為似方草創未成書也凡通典會要前志及館閣書目皆列之類書按通典載古今制度沿革會要専述典故非類書也唐會要一百卷司空平章事晉陽王溥齊物撰初唐德宗時蘇冕撰四十卷武宗朝崔鉉續四十卷至是溥又采宣宗以降故事共成百卷建隆二年正月上之按唐志蘇冕會要四十卷續會要四十卷楊紹復等撰崔鉉監修而會要稱杭州刺史蘇辨與兄冕纂國朝故事為是書辨聚書至二萬卷次於集賢藝閣辨字元容武功人武后宰相良嗣之從孫冕仕為京兆士曹辨判度支以腐粟給邊坐貶冕亦廢五代會要三十卷王溥撰六朝國朝會要三百卷監修國史華陽王圭禹玉撰始仁宗命纂修自建隆至慶歷四年成八十五卷熙寧三年圭為學士承旨乞續修至熙寧十年總二十一類八百五十五門案文獻通考作總一十一類八百五十八門舊書亦略增損為三百卷政和重修國朝會要百十卷先是王禹玉監修自建隆至熙寧凡三百卷崇寧中重修僅成吉禮百十卷政和進呈餘四類編治垂成宣和庚子罷局遂成散漫紹興間少蓬程俱申請就知桂州許中家借抄之許中嘗與崇寧修書故存此本得以備中禁之採録今重修本題淮康軍節度使充禮制局詳議官蔡攸等奉勑重修續會要三百卷監修仙井虞允文并甫等上自紹興十年編修起元豐元年迄靖康之末乾道六年書成中興會要二百卷監修晉江梁克家叔子等上乾道六年既進續會要有旨自建炎元年續修止紹興三十二年九月成書國朝會要總類五百八十八卷李心傳所編合三書為一刻於蜀中其板今在國子監三朝寶訓三十卷翰林學士李淑等撰天聖五年監修國史青社王曾孝先奏乞用唐吳兢貞觀政要故事取三朝聖語政事及臣僚奏對不入正史者别為一書與國史實録並行至十年書成詔以寶訓為名其後進讀於邇英延義今館閣書目以為二十卷富弼所上者非也乃政要爾三朝訓鑑圖十卷學士李淑楊偉等修纂慶歷八年偉初奉旨檢討三朝事迹乞與淑共編且乞製序皇祐元年書成頃在莆田有售此書者亟求觀之則已為好事者所得蓋當時御府刻本也卷為一册凡十事事為一圖飾以青赤亟命工傳録凡字大小行廣狹設色規模一切從其舊斂袵鋪觀如生慶歷皇祐間目覩聖作明述之盛也按館閣書目載此書云繪采皆闕至續書目乃云得其全未知果當時刻本乎抑亦摹傳也三朝政要二十卷宰相河南富弼彥國撰慶歷三年弼為樞副上言選官置局以三朝典故分門類聚編成一書以為模範命王洙余靖孫甫歐陽修同共編纂四年書成名太平故事凡九十六門每事之後各釋其意至紹興八年右朝議大夫吕源得舊印本刊正增廣名政要釋明䇿備上之於朝館閣書目指政要為寶訓非也兩朝寶訓二十卷禮部郎中長樂林希子中編進用天聖故事也元豐六年表上仁皇訓典六卷翰林侍講范祖禹撰元祐八年經筵所上凡三百十七條大略亦用寶訓體歷代年號并宫殿等名一卷丞相饒陽李昉明叔在翰苑時所纂朝制要覽五十卷屯田郎中宋咸撰此書傳於陸放翁氏放翁書其後曰先君會稽公晚嵗喜觀間為子弟講論因革率至夜分會稽公者其父宰元鈞也其書作於嘉祐中皆國初故實觀之使人有感焉景德會計録六卷丞相吳郡丁謂謂之撰時為三司使序言嵗收兩京十七路帳籍四萬四百有七日入疾徐事一千五百文移倍之倣李吉甫國計簿賈耽國要圖總其目得四十列為六卷一戶賦二郡縣三課入四嵗用五祿食六雜記大抵取景德中一年為準皇祐會計録六卷樞密信都田况元均權三司使時所撰倣景德之舊取一嵗最中者為準又為儲運一篇以補其闕春明退朝録三卷龍圖閣直學士常山宋敏求次道撰所記多故實其父宣獻公綬居第在春明坊如朝氏稱昭德也先朝政範一卷直集賢院徂徠石介守道編進自任將至悔過凡十二篇尊號録一卷丞相安陸宋庠公序撰大意以為徽號夸詡非古而我祖宗往往謙遜不居猶願超然逺覽盡屏前號其愛君以德者歟至神宗遂卻不受至於今行之輔弼名對四十卷天禧中前進士劉顔編自漢迄五代為四十門青社賑濟録一卷丞相富文忠公弼青州救荒施行文牘也元豐問事録二卷光祿寺丞李德芻撰德芻邯鄲李淑之子元豐中為詳定官制撿討文字詔旨所問奏藁録為此書官制局紀事一卷李德芻奉旨編録置局以來命官等事中書備對十卷太常丞撿正戶房公事管城畢仲衍夷仲撰凡一百二十五門附五十八事吕申公掌記一卷丞相申國吕公著晦叔撰在相位所記人材已用未用名姓及事當行已行條目元祐榮觀集五卷左朝奉大夫權太學正汪浹撰記元祐六年視學本末并羣臣所上詩賦頌表之類張舜民藝叟為之序泰陵故事二十卷不著名氏皆敘宣仁臨朝九年中制誥表章奏議之屬四明尊堯集一卷司諫延平陳瓘瑩中撰専辨王安石日録之誣僭不孫與配食坐像之為不恭瓘初在諫省未以安石為非合浦所著尊堯集猶回隱不直未乃悔之復為此書以謂蔡卞専用日録以修神宗實録薄神考而厚安石尊私史而壓宗廟以是編類其語得六十五條總而論之坐此羈管台州尊堯録八卷延平羅從彥仲素撰從彥師事楊時而李侗又師從彥所謂南劍三先生者也從彥當靖康初以為本朝之禍起於熙豐不遵祖宗故事故採四朝事為此録及李沆寇準王旦王曽杜衍韓琦范仲淹富弼司馬光程皓名輔巨儒十人言行附於其後末有别録一卷専載司馬光論王安石陳瓘論蔡京奏疏欲上之朝不果嘉定中太守劉允濟得其書奏之且為版行本朝事實三十卷右承議郎李攸撰案文獻通考作李伋雜録故事不成條貫統紀皇朝治迹統類七十三卷眉山彭百川叔融撰略用袁樞通鑑本末條例為前集四十卷中興後事為後集三十三卷皇朝事類樞要二百五十卷蜀人張和卿編集為一百五十門蓋舉子答䇿之具也東家雜記二卷右朝議大夫孔傳撰歷代追崇先聖故事及孔林古迹傳蓋先聖四十七世孫也長樂財賦志十六卷知漳州長樂何萬一之撰往在鄞學訪同官薛師雍子然几案間有書一編大略述三山一郡財計而纍朝詔令申明沿革甚詳其書雖為一郡設於天下實相通問所從得薛曰外舅陳止齋修圖經欲以為財賦一門後緣卷帙多不果入因借録之書無標目以意命之曰三山財計本末及來莆田為鄭寅子敬道之鄭曰家有何一之長樂財賦志豈此耶復借觀之良是其間亦微有增損末又有安撫司一卷併鈔録附益為全書內治聖鑑二十卷起居舍人兼嘉王府贊讀清江彭龜年子壽撰取列聖修身齊家教子訓齊宗室防制外戚宦官􅉏御等事以紹熙五年表上之光宗稱善且曰祖宗家法最善漢唐所不及也髙宗聖政草一卷陸遊在隆興初奉詔修髙宗聖政草創凡例多出其手未成而去私篋不敢留藁他日追記得此録之而書其後凡二十條髙宗孝宗聖政編要二十卷髙宗聖政五十卷孝宗聖政五十卷乾道淳熙中所修皆有御製序此二帙書坊鈔節以便舉子應用之儲者也孝宗聖政十二卷亦書坊鈔節比前為稍詳會稽和買事宜録七卷浙東帥鄱陽洪邁景盧提舉常平三山鄭湜補之集初承平時預買令下守越者無逺慮凡一路州縣所不受之數悉受之故越之額特重以匹計者十四萬六千九百居浙東之半人戶百計規免皆詭為第五等戶而四等以上戶之害日益甚於是有為畝頭均科之説者帥鄭丙少嘉憲邱崇宗卿張詔君卿頗主之由淳熙十一年以後略施行而議者多以創科五等戶為不便參政李彥頴秀叔尚書王希吕仲行先後帥越皆言之而王畫八事尤力會光廟亦以為貽貧弱之害戶部尚書葉翥叔羽奏乞先減四萬四千餘匹止以十萬為額而後議均敷詔從之仍令侍從集議皆乞闕併詭挾案文獻通考闕字作關誤遂詔邁湜措置既畢以施行次第類成此書時紹熙元年也劉忠肅救荒録五卷王居仁撰淳熙乙未樞密劉珙共父帥江東救荒本末嘉定乙亥真景元刻之漕司以配富鄭公青社之編而以劉公行狀諡議附録於後西漢會要七十卷東漢會要四十卷武學博士清江徐天麟仲祥撰以二史所載漢家制度典章散於紀傳表志者倣唐以來會要體分門編纂其用力勤矣其言范蔚宗志藁為謝儼蠟以覆車劉昭因蔚宗遺緒注而補之夫既曰蠟以覆車安得復有遺緒蓋未考昭之所著實司馬紹統續漢書志也仲祥乙丑進士世有史學其世父夢莘商老著北盟會編案著北盟會編者乃徐夢莘原本作夢華誤今改正父得之思叔為左氏國紀兄筠孟堅作漢官考皆行於世漢制叢録三十二卷案宋史藝文志作二十卷文獻通考作三十三卷袁夢麟應祥撰以二漢所記典故分門編類凡二十五門平陽會四卷通直郎知平陽縣汪季良子駟撰平陽號難治為浙東三陽之冠李良治有聲乃以一邑財計自兩稅而下為二十一篇終於嵗會旁通沿革本末大略備矣又為外篇五條如砧基副本催科檢放及書手除科敷之類以為此財用所從出也季良端明應辰之孫佳士且能吏也得年不永士論惜之唐昌計二卷案計字文獻通考作記知昌化縣趙希􅘊克家撰直齋書録解題卷五
