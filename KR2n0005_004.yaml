body:
  text: 直齊書録解題卷四宋陳振孫撰正史類史記一百三十卷漢太史令夏陽司馬遷子長撰宋南中郎參軍河東裴駰集注案班固云遷據左氏國語采世本戰國䇿述楚漢春秋接其後事迄於大漢斯以勤矣十篇缺有録亡書張晏曰遷沒之後亡景武紀禮樂兵書漢興將相年表三王世家日者龜策傳靳歙傅寬列傳元成之間禇先生補作武紀三王世家日者龜策傳案原本脫元成以下二十字今據文獻通考補入言辭鄙陋非遷本意也顔師古曰本無兵書張說非也今案此十篇者皆具在褚所補武紀全寫封禪書三王世家但述封拜䇿書二列傳皆猥釀不足道而其餘六篇景紀最疏略禮樂書謄荀子禮論河間王樂記傅靳列傳與漢書同而將相年表迄鴻嘉則未知何人所補也褚先生者名少孫裴駰即注三國志松之之子也始徐廣作史記音義駰本之以成集解竊嘗謂著書立言述舊易作古難六藝之後有四人焉托實而有文采者左氏也慿虛而有理致者莊子也屈原變國風雅頌而為離騷及子長易編年而為紀傳皆前未有其比後可以為法非豪傑特起之士其孰能之漢書一百卷漢尚書郎扶風班固孟堅撰唐祕書監京兆顔師古注本傳稱字籀恐當名籀而以字行也固父彪叔皮以司馬氏史記太初以後闕而不録故作後傳數十篇固以所續未詳探撰前紀綴集所聞以為漢書起髙祖終孝平王莽之誅二百三十年為春秋考紀表志傳凡百篇自永平受詔至建初中乃成案班昭傳云八表並天文志未竟而卒和帝詔昭就東觀藏書踵成之今中興書目以為章帝時非也固坐竇憲死永元初不在章帝時師古以太子承乾之命總先儒注解服䖍應劭而下二十餘人刪繁補略裁以己說遂成一家世號杜征南顔監為左氏班氏忠臣後漢書九十卷宋太子詹事順陽范蔚宗撰唐章懷太子賢注案唐藝文志為後漢史者有謝承薛瑩司馬彪劉義慶華嶠謝沈袁山松七家其前又有劉珍等東觀記至蔚宗乃删取衆書為一家之作其自視甚不薄謂諸傳序論精意深㫖實天下之竒作然頗有略取前人舊文者注中亦著其所從出至於論後有贊尤自以為傑思殆無一字虛設自今觀之幾於贅矣蔚宗父泰祖寧皆為時名臣蔚宗乃以怨望反逆至於滅族其與遷固之人禍天刑不侔矣然則豈作史之罪哉十志未成而誅為謝儼蠟以覆車故惟存紀傳賢髙宗太子招集諸儒庶子張大安洗馬劉訥言等共為之注賢坐明崇儼得罪武后廢死大安訥言亦流貶續後漢書四十二卷廬陵貢士蕭常撰案原本脫此句今據文獻通考校補周益公序云曹氏代漢名禪實篡特新莽之流亞丕方登禪壇自形舜禹之言固不敢欺其心矣今隔千載好惡豈復相沿而蘇軾記王彭之說以為途人談三國時事兒童聽者聞劉敗則顰蹙聞曹敗則稱快遂謂君子小人之澤百世不斬兹豈人力强致也歟案通考此上序語節去陳壽身為蜀人徒以仕屢見黜父又為諸葛亮所髠於劉氏君臣不能無憾著三國志以魏為帝而指漢為蜀與孫氏俱謂之主設心已偏故凡當時祫祭髙帝以下昭穆制度皆略而弗書方且乞米於人欲為佳傳私意如此史筆可知矣其死未幾習鑿齒作漢晉春秋起漢光武終晉愍帝以蜀為正魏為篡謂漢亡僅一二年則已為晉炎興之名天實命之是蓋公論也然五十四卷徒見於唐藝文志及本朝太平御覽之目逮仁宗時修崇文總目其書已逸或謂世亦有之而未之見也幸晉史載所著論案原本此下不載繫以隨齊批注蓋有脫誤今據文獻通考所存周平園序校補千三百餘言大㫖昭然劉知幾史通云備王道則曹逆而劉順本朝歐陽修論正統而不黜魏其賔客章望之著明統論非之見於國史近世張栻經世紀年直以先主上繼獻帝為漢而附魏吳於下皆是物也今廬陵貢士蕭常潛心史學謂古以班史為漢書范史為後漢書乃起昭烈章武元年辛丑盡後主案通考作少帝今校改炎興元年癸未為續後漢書既正其名復擇注文之善者並書之積勤二十年成帝紀年表各二卷列傳十八卷吳載紀十一卷魏載紀九卷别為音義四卷惜乎壽疏略於前使不得追記英賢憲章於後以釋裴松之之遺恨也後漢志三十卷晉祕書監河內司馬彪紹統撰梁剡令平原劉昭宣卿補注蔚宗本書隋唐志皆九十七卷今書紀傳共九十卷蓋未嘗有志也劉昭所注乃司馬彪續漢書之八志爾序文固云范志今闕乃借舊志注以補之其與范氏紀傳自别為一書其後紀傳孤行而志不顯至本朝乾興初判國子監孫奭始建議校勘但云補亡補闕而不著其為彪書也館閣書目乃直以百二十卷併稱蔚宗撰益非是今考章懷注所引稱續漢志者文與今志同信其為彪書不疑彪晉宗室髙陽王睦之長子多所著述注莊子及九州春秋之類是也三國志六十五卷晉治書侍御史巴西陳壽承祚撰宋中書侍郎河東裴松之世期注壽書初成時人稱其善叙事張華尤善之然乞米作佳傳以私憾毁諸葛亮父子難乎免物議矣王通謂壽有志於史依大義而黜異端然要為率略松之在元嘉時承詔為之注鳩集傳記增廣異聞大抵本書固率略而注又繁蕪要當會通裁定以成一家而未有奮然以為已任者豐祐間南豐吕南公鋭意為之題其齊曰衮斧書垂成而死遂弗傳又紹興間吳興鄭知幾維心嘗為之鄉里前輩多稱其善而書亦不傳近永康陳亮亦頗有意焉僅成論贊數篇見集中而書實未嘗修也晉書一百三十卷唐宰相房𤣥齡等修題御撰案唐藝文志為晉書者有王隱虞預臧榮緒謝靈運干寶等諸家太宗以為未善命𤣥齡修之與其事者褚遂良許敬宗令狐德棻李延壽敬播趙宏智等二十人案新唐書藝文志預修晉書者有房𤣥齡禇遂良許敬宗來濟陸元仕劉子翼令狐德棻李義甫薛元超上官儀崔行功李淳風辛丘馭劉引之陽仁卿李延壽張文恭敬播李安期李懷儼趙宏智等二十一人此書云二十人誤宣武紀題其陸機王羲之傳論太宗自為之故稱制曰而總書曰御撰其凡例則發於敬播云宋書一百卷齊太子家令吳興沈約休文撰約永明中兼著作郎被𠡠撰本何承天山謙之蘇寶生所撰至徐爰勒為一史起義熙迄大明自永光以來闕而不録今新史始義熙終升明三年本紀列傳七十卷志三十卷獨闕到彥之傳館閣書目謂其志兼載魏晉失於限斷揆以班馬史體未足為疵至其所創符瑞一志不經且無益其贅甚矣約後入梁為僕射侍中齊書五十九卷梁吳興太守蕭子顯景陽撰本傳稱六十卷子顯者齊豫章王嶷之孫也梁書五十六卷唐宏文館學士京兆姚思亷撰思亷名簡以字行陳書三十六卷姚思亷撰初思亷父察嘗修梁陳二史未成以屬思亷後受詔與魏徵共撰思亷采謝炅顧野王等諸書綜括為二史以卒父業後魏書一百三十卷北齊中書令兼著作郎巨鹿魏收伯起撰始魏初鄧彥海撰代記十餘卷其後崔浩典史為編年體李彪始分作紀表志傳收搜採遺亡綴續後事備一代史籍上之時論言收著史不平詔與諸家子孫共加論討前後訴者百有餘人衆口喧然號為穢史僕射楊愔髙德正與收皆親抑塞訴辭遂不復論今紀闕二卷傳闕二十二卷又三卷不全志闕天象二卷收既以史招怨齊亡之嵗竟遭發冢棄骨之禍隋文帝命魏淡等更撰魏書九十二卷案舊唐書經籍志新唐書藝文志俱一百七卷以西魏為正東為僞義例簡要唐志又有張太素後魏書一百卷今皆不傳而收書獨行中興書目謂所闕太宗紀以淡書補之闕志以太素書補之二書既亡惟此紀志獨存不知何據也案宋史存淡紀一卷太素天文志二卷北齊書五十卷唐中書舍人定武李百藥重規撰百藥父德林先已創紀傳諸篇百藥因父業受詔成之後周書五十卷唐祕書監華原令狐德棻撰初德棻武德中建言近代無正史詔德棻及諸臣論撰歷年不能就罷之貞觀二年復詔撰定議者以魏有收淡二家書為已詳唯五家史當立德棻與岑文本崔仁師次周史李百藥次齊史姚思亷次梁陳史魏徵次隋史房元齡總監而修撰之原自德棻發之隋書八十五卷唐祕書監魏徵顔師古等撰其十志髙宗時始成上總梁陳齊周之事俗號五代志唐書二百卷五代晉宰相涿郡劉昫等撰新唐書二百二十五卷案曾公亮進新唐書表及文獻通考鄭樵通志所著卷並與此同惟宋史藝文志作二百五十五卷於李繪補注者仍作二百二十五卷其互異所由不可考翰林學士廬陵歐陽修永叔端明殿學士安陸宋祁子京撰初慶歷中詔王堯臣張方平等刊修久而未就至和初乃命修為紀志祁為列傳范鎮王疇宋敏求吕夏卿劉羲叟同編修嘉祐五年上之凡廢傳六十一增傳三百三十一志三表四故其進書上表曰其事則增於前其文則省於舊第賞增秩訓詞劉敞原父所作最為古雅曰古之為國者法後王為其近於已制度文物可觀故也唐有天下且三百年明君賢臣相與經營扶持之其盛德顯功美政善謀固已多矣而史官非其人記述失序使興壞成敗之迹晦而不章朕甚恨之肆擇廷臣筆削舊書勒成一家具官歐陽修宋祁創立統紀裁成大體范鎮王疇宋敏求等網羅遺逸厥協異同凡十有七年大典乃立閎富精核度越諸子矣校讎有功朕將據古鑑今以立時治為朕得法其勞不可忘也皆增秩一等布其書於天下使學者咸觀焉舊例修書止著官髙一人名銜歐公曰宋公於我為前輩且於此書用力久且深何可沒也遂於紀傳各著之宋公感其退遜今案舊史成於五代文氣卑陋之時紀次無法詳略失中論贊多用儷語固不足傳世而新書不出一手亦未得為全善本紀用春秋例削去詔令雖太略猶不失簡古至列傳用字多竒澀殆類虬戶銑溪體識者病之歐公嘗卧聽藩鎮傳序曰使筆力皆如此亦未易及也然其序全用杜牧罪言實無宋公一語然則歐公殆不滿於宋名銜之著固惡夫爭名抑亦以自表異耶溫公通鑑多据舊史而唐庚子西直謂新唐書敢亂道而不好雖過甚亦不為亡謂也劉元城亦謂事增文省正新書之失處云文簡云進唐書表自言其文減於前其事多於舊此正其所為不逮遷固者顧以自衒何哉論語記夫子與弟子問答率不過數語而季氏將伐顓臾記所詰對甚詳不如是不足以見體要各造其極也今唐史務為省文而拾取小說私記則皆附著無棄其有官品尊崇而不預治亂又無善惡可垂鑑戒者悉聚徒繁無補殆與古作者不侔始唐史置局時其同僚約日著舊史所無者三事則固立於不善矣弊必至於此然其名臣關國治亂者如裴度陸贄魏徵傳悉致其詳則其有補亦不可掩隨齊批注五代史一百五十卷宰相薛居正子平撰開寶中盧多遜扈䝉張淡李昉等所修居正蓋監修官也新五代史七十四卷歐陽修撰其為說曰昔孔子作春秋因亂世而立法余為本紀以治法而正亂君發論必以嗚呼曰此亂世之書也諸臣止事一朝曰某臣傳其更事歷代者曰雜傳尤足以為世訓然不為韓瞪眼立傳識者有以見作史之難案韓通之死太祖猶未踐極也其當在周臣傳明矣惟王皥唐餘録史以入忠義傳云三朝國史一百五十卷景德四年詔王欽若陳堯佐趙安仁朝迥楊億等修太祖太宗正史王旦監修祥符九年書成凡為紀六志五十五列傳五十九目録一共一百一十卷天聖四年吕夷簡夏竦陳堯佐修真宗正史王曾提舉八年上之增紀為十志為六十傳為八十兩朝國史一百二十卷熙寧十年詔修仁宗英宗正史宋敏求蘇頌王存黃履等編修吳充提舉元豐五年王圭李清臣等上之四朝國史三百五十卷案文獻通考作二百五十卷紹興二十八年置修國史院修一朝正史三十一年提舉陳康伯奏紀成乞選日進呈至乾道二年閠九月始與太上聖政同上淳熙五年同修史李燾言修四朝正史開院已十七年乞責以近限七年十月修史王希吕奏志成十二月進呈至十三年修史洪邁奏昨得㫖限一年內修成列傳今已成書十一月與㑹要同進蓋首尾三十年所歷史官不知其幾矣史記音義二十卷唐崇賢館學士劉伯莊撰貞觀初奉𠡠講授采鄹誕生徐廣及隋栁顧言音義為此書案唐書藝文志有劉伯莊撰史記地名二十卷又史記音義二十卷袁凱謂或沿鄹誕生徐廣舊名而並稱之誤也史記索隱三十卷唐宏文館學士河內司馬貞撰採托異聞釋文演注末二卷為述贊為三皇本紀世號小司馬史記附索隱史記一百三十卷淳熙中廣漢張材介仲刊於桐川郡齊削去褚少孫所續而附以司馬貞索隱其後江隂耿秉直之復取所削者别刋之史記正義三十卷案唐宋藝文志俱作三十卷此本作二十卷疑誤今改正唐諸王侍讀張守節撰開元二十四年作序三劉漢書標注六卷侍讀學士清江劉敞原父中書舍人劉攽貢父端明殿學士劉奉世仲馮撰奉世敞之子也又本題公非先生刊誤其實一書案宋史藝文志三劉漢書標注六卷劉攽漢書刊誤四卷宋代著漢書刋誤者四家張泌余靖劉攽其一亡其名氏劉氏之書因宋仁宗讀後漢書見墾田皆作懇字於是使侍中傳詔中書刊正之攽為學官遂刋其誤劉氏書凡四卷趙希辨讀書附志止云東西漢各一卷吳仁傑兩漢刋誤補遺補劉氏之遺也此書云其實一書未知何據公非貢父自號也漢書自顔監之後舉世宗之未有異其說者至劉氏兄弟始為此書多所辨正發明唐書直筆新例四卷修書官溫陵吕夏卿撰紀傳志各一卷摘舊史繁闕又為新例須知附於後略舉名數如目録之類唐書音訓四卷宣義郎汶上竇蘋叔野撰唐書糾繆二十卷朝請大夫知蜀州成都吳縝廷珍撰其父師孟顯於熙豐序言修書之時其失有八而糾摘其繆誤為二十門侍讀胡宗愈言於朝紹聖元年上之世傳縝父以不得預修書故為此案揮麈録嘉祐中宋景文歐陽文忠諸公重修唐書時吳縝初登第因范景仁而請於文忠願預官屬之末文忠以年少輕佻拒之縝恚甚而去逮新書成乃指摘瑕疵為糾繆一書此云世傳其父不能預修故為此未知何據五代史纂誤五卷案宋史藝文志作三卷雜録一卷吳縝撰宇文峕中守吳興以郡庠有二史板遂取二書刻之後皆取入國子監初郡人思溪王氏刻藏經有餘板以刋二史置郡庠中興監書多闕遂取其板以往今監本是也唐書列傳辨證二十卷端明殿學士玊山汪應辰聖錫撰專攻列傳不及紀志以元祐名賢謂列傳記事毁於鐫削暗於藻繪故隨事辨證之西漢決疑五卷國子司業宛丘王逨致君撰案文獻通考作王述一曰失實二曰引古三曰異言四曰雜證五曰注釋西漢刊誤補遺十七卷案宋史藝文志作十卷國子博士吳仁傑斗南撰補三劉之遺也别史類南史八十卷北史八十卷唐崇賢館學士鄴李延壽撰初延壽父大師多識舊事常以宋齊梁陳魏齊周隋天下分隔南謂北為索虜北謂南為島夷詳略訾美失傳思所以改正刊究未成而沒延壽追終先志凡八代合二書為百八十篇其書頗有條理删落釀辭過本書逺甚髙氏小史一百三十卷案唐書藝文志文獻通考俱作一百二十卷唐殿中丞髙峻撰本書六十卷其子迥分為一百二十蓋鈔節歷代史也司馬溫公嘗稱其書使學者觀之今案國史志凡一百九卷目録一卷中興書目一百二十卷止於文宗今本多十卷直至唐末峻元和中人則其書當止於德順之間迥之所序但云分六十卷為百二十取其便易而已初未嘗有所增加也其止於文宗及唐末者殆皆後人傅益之非髙氏本書此書舊有杭本今本用厚紙裝䙡夾面寫多錯誤俟求杭本校之唐餘録史三十卷案文獻通考作六十卷直集賢院益都王皥子融撰寶元二年上是時惟有薛居正五代舊史歐陽修書未出此書有紀有志有傳又博採諸家小說倣裴松之三國志注附其下方蓋五代别史也其書列韓通於忠義傳且表出本朝褒贈之典新舊史皆不及此館閣書目以入雜傳類非是皥曾之弟後以元昊反乞以字為名仕至集賢院學士古史六十卷門下侍郎眉山蘇轍子由撰因馬遷之舊上觀詩書下考春秋及秦漢雜録為七本紀十六世家三十七列傳蓋漢世古文經未出戰國諸子各自著書或增損古事以自信其說遷一切信之甚者或采世俗相傳之語以易古文舊說故為此史以正之然其稱遷淺近而不學疏略而多信遷誠有可議者而以為不學淺近則過矣東都事略一百五十卷承議郎知龍州眉山王稱季平撰其書紀傳附録略具體但無志耳附録用五代史例也淳熙中上其書得直祕閣其所紀太簡略未得為全善新唐書略三十五卷吕祖謙授徒患新史難閲摘要抹出而門人鈔之蓋節本之有倫理者也編年類漢紀三十卷漢侍中汝南荀悅仲豫撰獻帝好典籍常以班固漢書文繁難省乃令悅依左氏傳體以為漢紀詔尚書給筆劄辭約事詳論辨多美其自序曰立典有五志焉曰達道義章法式通古今著功勳表賢能後漢紀三十卷晉東陽太守陽夏袁宏彥伯撰以後漢書煩穢雜亂撰集為此記晉春秋略二十卷唐祕書省正字杜延業撰自王隱而下諸書及諸僭僞傳記皆所詳究而以蕭方等三十國春秋删緝為此書館閣書目作杜光業案唐志亦曰延業考新舊史他無所見未詳何時人元經薛氏傳十五卷稱王通撰薛收傳阮逸補并注案河汾王氏諸書自中說之外皆唐藝文志所無其傳出阮逸或云皆逸僞作也今考唐神堯諱淵其祖景皇諱虎故晉書戴淵石虎皆以字行薛收唐人於傳稱戴若思石季龍宜也元經作於隋世而太興四年亦書曰若思何哉意逸之心勞日拙自不能掩耶此書始得於莆田才三卷止晉成帝後從石林葉氏得全本録成之唐歷四十卷唐集賢學士河東栁芳仲敷撰芳所緝國史叙天寶後事不倫及謫黔中㑹髙力士同貶因從之質開元天寶禁中事本末史已上送不可追刊乃用編年法作此書起隋義寧元年迄大歷十三年續唐歷二十二卷唐監修國史崔龜從元吉撰起大歷十三年春盡元和十五年以續栁芳之書也藝文志載韋澳蔣偕李荀張彥逺崔瑄等撰實大中時大唐統紀四十卷唐江南西道觀察判官陳嶽撰用荀袁體起武德盡長慶為一百卷今止武后如意非全書也通歷十五卷唐泉州别駕扶風馬總會元撰書本十卷止於隋代今書直至五代增五卷者後人所續也朝公武志續通歷十卷孫光憲撰太祖朝嘗詔毁其書唐年補録六十五卷後晉起居郎史館修撰獲鹿賈緯撰以武宗後無實録故為此書終唐末其實補實録之缺也雖論次多缺誤而事迹粗存亦有補於史氏五代通録六十五卷宰相昭文館大學士大名范質文素撰亦以實録繁冗節略而成此書帝王照略一卷案文獻通考照略作鏡略唐洺州刺史劉軻撰僞蜀馮鑑注并續唐祚以後唐志及館閣書目有劉軻帝王歷數歌一卷疑即此書也紀年通譜十二卷丞相宋庠公序撰自漢文後元有年號之後以甲子貫之曰正曰閏曰僞曰賊曰蠻夷以正為主而附列其左號統元為十卷其二卷曰類元因文之同各以彚别慶歷中表上之宣義郎畢仲荀續補一卷止元符三年資治通鑑二百九十四卷目録三十卷考異三十卷丞相溫公河內司馬光君實撰初光嘗約戰國至秦二世如左氏體為志八卷以進英宗悅之遂命論次歷代君臣事迹起周威烈迄乎五代就祕閣置局神宗御製序賜名資治通鑑及補外聽以書局自隨元豐七年書成上曰賢於荀悅漢紀逺矣目録倣史記年表年經國緯用劉羲叟長歷氣朔而撮新書精要散於其中考異參諸家異同正其謬誤而歸於一總三百五十四卷通鑑舉要歷八十卷司馬光撰通鑑既成尚患本書浩大難領略而目録無首尾晚著是書以絶二纍其藁在朝說之以道家紹興初謝克家任伯得而上之纍代歷年二卷司馬光撰即所謂歷年圖也治平初所進自威烈王至顯德本為圖五卷歷代皆有論今本陳輝晦叔刻於章貢為方䇿以便觀覽而自漢髙帝始百官公卿表十五卷司馬光撰其序曰朝廷所以鼓舞羣倫緝熙庶績者曰官曰差遣曰職而已所謂官者乃古之爵也所謂差遣者古之官也所謂職者古之加官也自建隆以來文官知雜御史以上武官閣門使以上內臣押班以上遷轉黜免存其實以先後相次為表本入職官類以稽古録序所謂建隆接乎熙寧臣又著之於百官表即謂此書蓋與通鑑相為表裏故著之於此案朝氏讀書志有一百四十二卷未詳稽古録二十卷司馬光撰其表云由三晉開國迄於顯德之末造臣既具之於歷年圖自六合為宋接於熙寧之元臣又著之於百官表乃威烈丁丑而上伏羲書契以來悉從論纂皆有依慿蓋元祐初所上也此書始刻於越其後再刻於潭越本歷年圖諸論聚見第十六卷蓋因圖之舊也潭本諸論各繫於國亡之時故第十六卷惟存總論通鑑釋文二十卷案宋史藝文志作六卷司諫司馬康公休撰溫公之子也通鑑釋文三十卷左宣義郎眉山史照見可撰馮時行為之序今考之公休之書大略同而加詳焉蓋因其舊而附益之者也通鑑前例一卷修書帖一卷三十六條四圖共一卷司馬光記集修書凡例諸帖則與書局官屬劉恕范祖禹往來書簡也其曾孫侍郎伋季思裒為一編又以前例分為三十六條而考其離合稽其授受推其甲子括其卷帙列為四圖通鑑問疑一卷髙安劉羲仲壯輿纂集其父道原與溫公往復相難者亦附修書帖後通鑑外紀十卷目録三卷祕書丞髙安劉恕道原撰司馬公修歷代君臣事迹辟恕為屬嘗謂史記不及庖犧神農今歷代書不及威烈之前欲為前紀而本朝為後紀將俟書成請於公㑹道原病發絶意後紀乃改前紀為外紀云通鑑書成恕已亡范淳父奏恕於此書用力最多援黃鑑梅堯臣例官其子且以書賜其家道原父渙凝之家廬山歐陽公所為賦廬山髙也疑年譜一卷年略譜一卷雜年號附劉恕撰謂春秋起周平魯隱史記本紀自軒轅列傳首伯夷年表起共和共和至魯隱其間七十一年即與春秋相接矣先儒叙庖犧女媧下逮三代享國之嵗衆說不同懼後人以疑事為信書穿鑿滋甚故周厲王以前三千五百一十九年為疑年譜而共和以下至元祐壬申一千九百一十八年為年略譜大略不取正閏之說而從實紀之四夷及寇賊僭紀名號附之於末唐史論斷三卷天章閣待制陽翟孫甫之翰撰甫以唐書煩冗遺略多失體法乃修為唐史用編年體自康定元年逮嘉祐元年成七十五卷為論九十二首甫沒朝廷取其書留禁中其從子察録以遺溫公而世亦罕見聞蜀有刻本偶未得之今惟諸論存焉編年通載十五卷集賢院學士建安章衡子平撰編歷代帝系年號始自唐虞迄於聖宋治平四年總三千四百年熙寧七年上之其族父楶質夫為之序衡嘉祐二年進士首選也唐鑑十二卷案文獻通考作二十卷翰林學士成都范祖禹淳父撰祖禹與修通鑑分主唐史元祐初上此書考其治亂興廢之由為三百六篇紹運圖一卷諸葛深通甫撰元祐中人未詳爵里其書頗行於世俗歷代帝王年運詮要十卷左朝請大夫朱繪撰紹興五年序未詳何所人歷代紀年十卷濟北朝公邁伯咎撰詠之之子也嘗為提舉常平使者其自為序當紹興七年讀史管見三十卷禮部侍郎胡寅明仲撰以通鑑事備而義少故為此書議論宏偉嚴正間有感於時事其於熙豐以來接於紹興權姦之禍尤拳拳寓意焉晦翁綱目亦多取之案朱子謂讀史管見乃致堂謫嶺表所作當時無一册文字隨行只是記憶而議論儘有好處與此所云宏偉嚴正有感時事大指相同要之其書不外通鑑立義文獻通考及宋史藝文志視解題分類較多故不入編年而入史評史鈔皇王大紀八十卷胡宏撰述三皇五帝至周赧王前二卷自盤古至帝嚳年不可考信姑載其事而已自堯以後用皇極經世歷起甲辰始著年紀博採經傳時有論說自成一家之言然或取莊周寓言以為實及叙邃古之初終於無徵不信云爾案趙希辨讀書附志云五峯先生所述皇帝王霸之事自堯以上六閼逢無紀堯之初載迄於赧王乙巳二千有三十年貫通經典採托史傳又因事而為之論所以述去取之原釋疑似之惑者至矣朱彞尊作皇王大紀跋謂譙周蘇轍撰古史胡衛撰通史緣起羅泌撰路史不盡出于雅馴惟此書擇之精而語之詳云經世紀年二卷侍講廣漢張栻敬夫撰用皇極經世譜編有所發明則著之其言邵氏以數推知去外丙仲壬之年乃合於尚書成湯既沒太甲元年之說今按孔氏正義正謂劉歆班固不見古文謬從史記而張衡通載乃云以紀年推之外丙仲壬合於嵗次尚書殘缺而正義之說誤蓋三代而上帝王歷年逺而難考類如此劉道原所謂疑年者也然孟子亦有明文不得云史記謬通鑑論篤三卷侍講廣漢張栻敬夫撰取通鑑中言論之精確者表而出之多或全篇少至一二語去取甚嚴可以見前輩讀書眼力之髙通鑑紀事本末四十二卷工部侍郎袁樞機仲撰樞自太學官分教嚴陵為此書楊誠齊為之序通鑑綱目五十九卷侍講新安朱熹元晦撰始司馬公通鑑有目録舉要其後胡給事安國康侯又修為舉要補遺朱晦翁因别為義例表嵗以首年因年以著統大書以提要而分注以備言自為之序乾道壬辰也大書者為綱分注者為目綱如經目如傳此書嘗刻於溫陵别其綱謂之提要今板在監中廬陵所刊則綱目並列不復别也國紀五十八卷吏部侍郎睢陽徐度敦立撰度丞相處仁擇之之子也其書詳略頗得中而不大行於世鄞學有魏邸舊書傳得之續通鑑長編一百六十八卷禮部侍郎眉山李燾仁父撰長編云者司馬公之為通鑑也先命其屬為叢目既成乃修長編然後删之以為成書唐長編六百卷今通鑑惟八十卷爾燾所上表自言未可謂之通鑑止可謂之長編故其書雖繁蕪而不嫌也其卷數雖如此而册數至餘三百蓋逐卷又自分子卷或至十餘續通鑑長編舉要六十八卷李燾撰大略皆溫公舊規也九朝通略一百六十八卷起居郎建安熊克子復撰中興小歷四十一卷熊克撰克之為書往往疏略多抵牾不稱良史中興遺史六十卷從義郎趙甡之撰慶元中上進其書大抵記軍中事為詳而朝政則甚略意必當時遊士往來邊陲出入幕府者之所為及觀其記張浚攻濠州一段自稱姓名曰開封張鑑然則此書鑑為之而甡之竊以為已有也或曰鑑即甡之婦翁未知信否丁未録二百卷左修職郎昭武李丙撰自治平丁未王安石初召用迄於靖康童貫之誅故以丁未名之每事皆全載制詔章疏甚詳原注靖康亦丁未也思陵大事記三十六卷阜陵大事記二卷李燾撰建炎以來繫年要録二百卷工部侍郎陵陽李心傳微之撰蓋與李㢲巖長編相續亦嘗自隆興後相繼為之㑹蜀亂散失不可復得大事記十二卷解題十二卷通釋一卷案宋史藝文志作二十七卷著作郎東萊吕祖謙伯恭撰自敬王三十九年以下采左氏傳歷代史皇極經世通鑑稽古録輯而廣之雖上接獲麟而書法則視太史公所録不盡用䇿書凡例解題者略具本末或附以已意多所發明通釋者經典綱要孔孟格言以及歷代名儒大議論初意欲起春秋接於五代僅及漢武征和三年而止東萊年方强仕而得末疾平生論著大抵經始而未及成如讀詩記書說是已是書之作當淳熙七年又二年而沒使天假之年所傳於世者寧止是哉建隆編一卷陳傅良撰蓋長編太祖一朝節略也隨事考訂併及纍朝始末慶元初在經筵所上讀書譜一卷陳傅良撰自伏羲迄春秋終以易書詩春秋諸經考世代而附著之共和而下始有年數紀年統紀論一卷永嘉朱黼文昭撰黼從陳止齊學嘗著記年備遺起陶唐終顯德為百卷蓋亦本通鑑稽古録而擷其中論正統者為統紀論是編葉水心序之皇朝編年舉要三十卷備要二十卷案文獻通考備要亦作三十卷中興編年舉要十四卷備要十四卷太學生莆田陳均平甫撰均丞相俊卿之從孫端平初有言於朝者下福州取其書由是得初品官大抵依倣朱氏通鑑綱目舉要者綱也備要者目也然去取無法詳略失中未為善書續百官公卿表十卷質疑十卷兵部尚書永嘉蔡幼學行之撰續溫公舊書起熙寧至靖康質疑者考異也續稽古録一卷祕書丞歷陽龔頤正養正撰以續司馬光前録而序述繁釀其記紹熙甲寅事歸功於韓托胄頤正本名敦頤避崇陵諱改焉嘗撰元祐黨籍譜傳得官韓氏用事時賜出身入館非端士也此書正以右韓也歷代帝王纂要譜括二卷餘姚孫應符仲潛撰蓋紹運圖之詳者也起居注類唐志起居注類實録詔令皆附焉今惟存穆天子傳及唐創業起居注二種餘皆不存故用中興館閣書目例與實録共為一類而别出詔令穆天子傳六卷晉武帝時汲冡所得書其體制與起居注正同郭璞為之注起居注者案原本脫此四字今據文獻通考補入自漢明德馬皇后始漢魏以來因之唐創業起居注五卷案唐書藝文志作三卷唐工部尚書晉陽溫大雅彥宏撰所載自起義至受禪凡三百五十七日其述神堯不受九錫反復之語甚詳愚嘗書其後曰新史稱除隋之亂比迹湯武湯武未易比也唐之受命正與漢髙帝等爾其不受九錫足以掃除魏晉以來欺天罔人之態而猶不免曰受隋禪者乃以尊立代王之故曾不若以子嬰屬吏之為明白洞達也唐髙祖實録二十卷唐給事中河東敬播撰案志稱房𤣥齡監修許敬宗刪改今本首題監修國史許敬宗奉勑定而第十一卷題司空房𤣥齡奉勑撰不詳其故唐太宗實録四十卷案藝文志有今上實録二十卷敬播等撰房𤣥齡監修又有長孫無忌太宗實録四十卷今本惟題中書令許敬宗奉勑撰蓋敬宗當髙宗時用事以私意竄改國史中興書目言之詳矣但今本既云許敬宗撰而以為恐止是𤣥齡無忌所進則不可考也唐髙宗後修實録十九卷唐左散騎常侍彭城劉知幾子元恆王傅汴州吳兢撰案志令狐德棻撰止乾封知幾續成之故號後修書本三十卷今闕十一卷唐則天實録二十卷吳兢撰案志魏元忠等撰劉知幾吳兢刪正今惟題兢撰武氏罪大惡極固不應復入唐廟而題主猶有聖帝之稱至開元中禮官有言乃去之武氏不應有實録猶正史之不應有本紀皆沿襲史漢吕后例惟沈既濟之論為正而范氏唐鑑用之唐鑑中宗嗣聖元年書至二十一年案神龍元年黜武后光宅至長安並不用唐中宗實録二十卷吳兢撰唐睿宗實録十卷劉知幾撰志有二録五卷者為吳兢今此十卷當是知幾也館閣書目亦别有五卷者唐𤣥宗實録一百卷題元載撰蓋左拾遺令狐峘所為而載以宰相監修也史稱事多漏略拙於取棄不稱良史峘德棻五世孫也唐肅宗實録三十卷案文獻通考作二十卷亦元載監修不見史官姓名唐代宗實録四十卷令狐峘撰尤為漏略不立房琯傳不載顔真卿事跡唐建中實録十卷唐史館修撰吳郡沈既濟撰其書止於建中二年十月既濟罷史官之日唐德宗實録五十卷稱裴垍撰亦監修宰相也案志蔣乂樊紳林寶韋處厚獨孤郁撰垍字宏中河東人唐順宗實録五卷唐史館修撰韓愈撰見愈外集案志稱韓愈沈傳師宇文籍撰李吉父監修新史謂議者閧然不息卒竄定無完篇以閹官惡其書禁中事切直故也唐憲宗實録四十卷題路隋撰隋自長慶中與韋處厚同修撰歷年久而未成至文宗太和中隋為監修乃上之案志稱沈傳師鄭瀚宇文籍蔣繫李漢陳夷行蘇景裔案唐書藝文志注作蘇景允撰蓋前後史官也又稱杜元頴韋處厚路隋監修亦前後宰相也唐穆宗實録二十卷亦路隋監修史官則蘇景裔王彥威楊漢公蘇滌裴休也唐敬宗實録十卷監修李讓夷史官陳商鄭亞同修唐文宗實録四十卷監修魏謨史官盧耽蔣偕王渢盧告牛叢也唐武宗實録三十卷監修韋保衡案原本脫此句今據唐書藝文志校補宣宗實録三十卷懿宗實録二十五卷僖宗實録三十卷昭宗實録三十卷哀帝實録八卷案唐志惟有武宗實録三十卷其後皆未嘗修纂更五代武録亦不存邯鄲書目惟存一卷而已五録者龍圖閣直學士常山宋敏求次道追述為書案兩朝史志初為一百卷其後增益為一百四十八卷今案懿録三十五卷止有二十五卷而始終皆備非闕也實一百四十三卷館閣書目又言闕第九一卷今本亦不闕云後唐莊宗實録三十卷監修趙鳳史官張昭逺撰天成四年上後唐明宗實録三十卷監修姚顗史官張昭逺等撰清泰三年上後唐廢帝實録十七卷張昭案東都事略本傳舊名昭逺避漢祖諱止稱昭尹拙劉溫叟撰案昭本傳撰梁均王郢王後唐愍帝廢帝漢隱帝實録惟梁二王年祀浸逺事皆遺失遂不修餘三帝實録皆藏史閣周世宗時也蓋昭本撰周祖實録以其歷試之迹多在漢隱帝時故請先修隱録因併及前代云晉髙祖實録三十卷晉少帝實録二十卷監修竇正固史官賈緯王伸竇儼等撰周廣順元年上正固字體仁同州人相漢至周罷歸洛陽國初卒漢髙祖實録十七卷監修蘇逢吉史官賈緯等撰乾祐二年上書本二十卷今缺末三卷中興書目作十卷漢隱帝實録十五卷張昭等撰事已見前周太祖實録三十卷張昭等撰顯德五年上昭即昭逺字潛夫濮上人避漢祖諱止稱昭逮事本朝為吏部尚書開寶四年卒案宋史本傳開寶五年卒周世宗實録四十卷監修官晉陽王溥齊物修撰范陽扈䝉日用撰太祖實録五十卷監修國史肥鄉李沆太初史官集賢院學士河南錢若水淡成等重修初淳化中命李至張洎等修太祖史未成及咸平元年太祖實録成書以太祖朝事多漏略故再命若水修撰二年書成上之卷首有沆進書表叙前録之失及新書刊修條目甚詳同修者直館饒陽李宗諤昌武東平梁灝太素直集賢院河南趙安仁樂道李燾云世傳太祖自陳橋推戴馬上約束諸將本太祖聖意前録無太宗叩馬之語乃後録所增也前録既不傳今不可考矣李燾長編具載而云舊録所無今從新録然則燾亦嘗見舊録也耶近聞士大夫家亦多有之求之未獲也太宗實録八十卷錢若水等以至道三年十一月受命咸平元年八月上之九月而畢人難其速同修撰者給事中濟隂柴成務寶臣祕閣校理丹陽吳淑正儀直集賢院建安楊億大年案億傳書凡八十篇而億獨草五十六卷真宗實録一百五十卷學士承㫖肥鄉李維仲方學士臨川晏殊同叔撰乾興元年受詔天聖二年監修新喻王欽若定國上之同修者侍講博平孫奭宗古知制誥趙郡宋綬公垂度支副使閬中陳堯佐舜元校理真定王舉正伯中校勘河南李淑獻臣仁宗實録二百卷學士華陽王圭禹玉范鎮景仁知制誥常山宋敏求次道撰嘉祐八年奉詔歷治平至熙寧二年七月書成宰臣韓琦提舉英宗實録三十卷學士壽春吕公著晦叔長社韓維持國知制誥浦城吳充沖卿撰熙寧元年正月奉詔二年七月宰臣提舉曾公亮上之英宗實録熙寧元年曾宣靖提舉王荆公時已入翰林請自為之兼實録修撰不置官屬成書三十卷出於一手東坡先生嘗語劉壯輿羲仲云此書詞簡而事備文古而意明為國朝諸史之冠揮麈第三録朝氏讀書志云熙寧元年正月詔曽公亮提舉吕公著韓維修撰孫覺曾鞏檢討三月又以錢藻檢討四月又以王安石吳充為修撰二年七月書成上之隨齊批注神宗實録朱墨本二百卷案宋史藝文志作三百卷元祐中兵部侍郎青社趙彥若元考著作郎成都范祖禹淳甫豫章黃庭堅魯直撰紹聖中中書舍人莆田蔡卞元度長樂林希子中等重修其朱書繫新修黃字繫刪去墨字繫舊文其增改刪易處則又有籖貼前史官由是得罪卞王安石之壻大抵以安石日録為主陳瓘所謂尊私史而壓宗廟者也神宗實録考異二百卷監修解梁趙鼎元鎮史官成都范沖元長等撰建炎初有詔重修紹興六年先進呈五十卷六年正月書成考異者備朱墨黃三書而明著其去取之意也闕百六十一至百七十一卷初蔡卞既改舊録每一卷成納之禁中蓋將盡泯其迹而使新録獨行謂朱墨本者世不可得而見也及梁師成用事自謂蘇氏遺體頗招延元祐諸家子孫若范溫秦湛之流師成在禁中見其書為諸人道之諸人幸其書之出因曰此不可不録也師成如其言及敗沒入有得其書者攜以渡江遂傳於世嗚呼此可謂非天乎哲宗實録一百五十卷監修趙鼎史官范沖等重修紹興四年三月思陵嘗謂宰臣朱勝非等曰神宗哲宗史録事多失實當别修定范祖禹之子沖已有詔命可趣來令兼史職沖至以宗正少卿兼直史館辭不許上謂勝非等曰此事朕何敢私頃嵗昭慈誕辰宫中置酒從容語及前朝事曰吾逮事宣仁求之古今母后之賢未見其比姦臣私憤誣謗雖嘗下詔辨明而史録未經刪改豈足貽信後世吾意在天之靈不無望也朕每念及此惕然于懷欲降一語具載昭慈遺㫖庶使中外知朕修史之本意於是以聖語繫之哲録之末徽宗實録一百五十卷監修宰相湯思退等上自紹興七年詔修十一年先成六十卷至二十八年書成修撰官歷年既久前後非一人至乾道五年祕書少監李燾請重修淳熙四年成二百卷考異百五十卷目録二十五卷今百五十卷者前本也欽宗實録四十卷乾道四年修撰洪邁等進髙宗實録五百卷慶元三年修撰濟源傅伯壽景仁撰初進二百八十卷止紹興十六年嘉泰二年修撰建安袁說友起巖等又進二百二十卷止三十二年孝宗實録五百卷嘉泰二年修撰傅伯壽等撰進中興以來兩朝五十餘載事迹置院既久不以時成涉筆之臣乍遷忽徙不可殫紀及有詔趣進則匆遽鈔録甚者一委吏手卷帙猥多而紀載無法疏略抵牾不復可稽據故二録比之前世最為缺典觀者為之太息直齊書録解題卷四
