body:
  text: 直齋書録解題卷三宋陳振孫撰春秋類春秋經一卷每事為一行廣德軍所刋古監本也春秋經一卷朱熹所刻於臨漳四經之一其於春秋獨無所論著惟以左氏經文刻之春秋古經一卷禮部侍郎眉山李燾仁父所述春秋左氏傳三十卷自昔相傳以為左丘明撰其好惡與聖人同者也而其末記晉知伯反喪於韓魏在獲麟後二十八年去孔子沒亦二十六年不應年少後亡如此又其書稱虞不臘矣見於嘗酎及秦庶長皆戰國後制故疑非孔子所稱左丘明别是一人為史官者其釋經義例雖未盡當理而具得當時事實則非二傳之比也春秋公羊傳十二卷齊人公羊髙稱受經於子夏傳子至元孫夀當漢景帝時夀乃與弟子齊胡母子都著於竹帛及董仲舒亦傳之説題辭云傳我書者公羊髙也此亦傅會之言蓋鄭康成亦有公羊善讖之説往往言讖文者多宗之春秋榖梁傳十二卷魯人榖梁赤一名俶字元始亦稱子夏弟子自荀卿申公至蔡千秋江翁凡五傳宣帝好之遂盛行於世春秋左氏經傳集解三十卷晉鎮南大將軍京兆杜預撰其述作之意序文詳之矣専修丘明之傳以釋經後世以為左氏忠臣者也其弊或棄經而信傳於傳則忠矣如經何春秋釋例十五卷杜預撰預既為集解别集諸例及地名譜第厯數相與為部凡四十部唐劉蕡為之序春秋公羊傳解詁十二卷漢司空掾任城何休卲公撰休為太傅陳蕃屬蕃敗坐禁錮作解詁覃思不窺門十七年又作公羊墨守左氏膏肓榖梁廢疾黨禁解拜議郎終諌議大夫其書多引讖緯其所謂黜周王魯變周文從殷質之類公羊皆無明文蓋為其學者相承有此説也三科九旨詳具疏中春秋榖梁傳集解十二卷晉豫章太守順陽范寧武子撰寧嘗謂王何之罪深於桀紂著論以排之仕為中書侍郎其甥王國寶憚之乃相驅扇因求外補抵罪會赦免寧以為春秋惟榖梁氏無善釋故為之注解其序云升平之未先君稅駕於吳帥門生故吏兄弟子姪研講六籍三傳蓋寧父汪為徐兗二州北伐失利屏居吳郡時也汪沒之後始成此書所集諸家之説皆記姓名其稱何休曰及鄭君釋之者即所謂發墨守起廢疾也稱卲曰者寧從弟也稱泰曰雍曰凱曰者其諸子也汪范晷之孫晷在良吏傳自晷至泰五世皆顯於時寧父子祖孫同訓釋經傳行於後世可謂盛矣泰之子蔚宗亦著後漢書以不軌誅死其家始亡三傳釋文八卷唐陸德明撰春秋左氏傳正義三十六卷唐孔穎逹等撰自晉宋傳杜學為義疏者有沈文阿蘇寬劉炫沈氏義例粗可經傳極疏蘇氏不體本文惟攻賈服劉炫好規杜失比諸義疏猶有可觀今據以為本其有疏漏以沈氏補焉春秋公羊傳疏三十卷不著撰者名氏唐志亦不載廣川藏書志云世傳徐彥撰不知何據然亦不能知其定出何代意其在貞元長慶後也景德中侍講邢昺校定傳之春秋榖梁傳疏十二卷唐國子四門助教楊士勛撰國語二十一卷自班固志藝文有國語二十一篇左丘明所著至今與春秋傳並行號為外傳今考二書雖相出入而事辭或多異同文體亦不類意必非出一人之手也司馬子長云左丘失明厥有國語又似不知所謂唐啖助亦嘗辨之案朝公武讀書志云班固藝文志國語二十一篇隋志二十二卷唐志二十一卷今書篇次與漢志同蓋厯代儒者析簡併篇互有損益不足疑也啖助乃姓名隨齋批注國語注二十一卷吳尚書僕射侍中吳郡韋昭撰采鄭衆賈逵虞翻唐固合五家為之注昭字子正事孫皓以忤旨誅死吳志避晉諱作韋曜國語補音三卷丞相安陸宋庠公序撰以先儒未有為國語音者近世傳舊音一卷不著撰人名氏蓋唐人也簡陋不足名書因而廣之悉以陸德明釋文為主陸所不載則附益之春秋繁露十七卷漢膠西相廣川董仲舒撰案隋唐及國史志卷皆十七崇文總目凡八十二篇館閣書目止十卷萍鄉所刻亦財三十七篇今乃樓攻愧得潘景憲本卷篇皆與前志合然亦非當時本書也先儒疑辨詳矣其最可疑者本傳載所著書百餘篇清明竹林繁露玊杯之屬今總名曰繁露而玉杯竹林則皆其篇名此決非其本真况通典御覽所引皆今書所無者尤可疑也然古書存於世者希矣姑以傳疑存之可也又有寫本作十八卷而但有七十九篇考其篇次皆合但前本楚莊王在第一卷首而此本乃在卷末别為一卷前本雖八十三篇而闕文者三實七十九篇也左氏膏肓十卷何休著公羊墨守等三書鄭康成作針膏肓起廢疾發墨守以排之休見之曰康成入吾室操吾戈以伐我乎今其書多不存惟范寧榖梁集解載休之説而鄭君釋之當是所謂起廢疾者今此書並存二家之言意亦後人所録館閣書目闕第七卷今本亦正闕宣公而於第六卷分文十六年以後為第七卷當並合之其十卷止於昭公亦闕定哀固非全書也而錯誤殆未可讀未有他本可正汲冢師春一卷晉汲郡魏安釐王冢所得古簡杜預得其紀年知為魏國史記以考證春秋别有一卷純集疏左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春似是鈔集者人名也今此書首敘周及諸國世系又論分野律吕為圖又雜録諡法卦變與杜預所言純集卜筮者不同似非當時本書也春秋集傳纂例十卷辨疑七卷唐給事中吳郡陸質伯淳撰初潤州丹陽主簿趙郡啖助叔佐明春秋傳洋州刺史河東趙匡伯循質從助及伯循傳其學助考三傳舍短取長又集前賢注釋補以己意為集傳集注又撮其綱目為統例助卒質與其子異繕録以詣伯循請損益焉質隨而纂會之大歷乙卯歲書成質本名淳避憲宗諱改焉故其書但題陸淳助之學以為左氏敘事雖多解意殊少公榖傳經密於左氏至趙陸則直謂左氏淺于公榖誣謬實繁皆孔門後之門人但公榖守經左氏通史其體異爾丘明夫子以前賢人如史佚遲任之流焚書之後學者見傳及國語俱題左氏遂引以為丘明且左傳國語文體不倫敘事多乖定非一人所為也蓋左氏廣集諸國之史以解春秋子弟門人見事迹多不入傳或復不同故各隨國編之以廣異聞自古豈止一丘明姓左乎案漢儒以來言春秋者惟宗三傳三傳之外能卓然有見於千載之後者自啖氏始不可沒也唐志有質集注二十卷今不存然纂例辨疑中大略具矣又有微旨二卷未見質梁陸澄七世孫仕通顯黨王叔文侍憲宗東宫會卒不及貶然則其與不通春秋之義者相去無幾耳春秋折衷論三十卷唐江西觀察判官廬陵陳嶽撰以三傳異義折衷其是非而斷於一嶽唐末十上春官晚乃辟江西從事春秋加減一卷稱元和十三年國子監奉敕定不著人名校定偏旁及文多寡若五經文字之類此本作小䙡册才十餘板前有睿思殿書籍印末稱臣雩校正蓋承平時禁中書也不知何為流落在此春秋名號歸一圖二卷案原本不著卷與宋史藝文志同今據文獻通考補書偽蜀馮繼先撰凡左傳所載君臣名氏字諡互見錯出故為此圖以一之周一魯二齊三晉四楚五鄭六衛七秦八宋九陳十蔡十一曹十二吳十三邾十四杞十五莒十六滕十七薛十八許十九雜小國二十春秋二十國年表一卷案解題自周而下所列止十八國蓋有脫字不知何人作周而下次以魯蔡曹衛滕晉鄭齊秦楚宋杞陳吳邾莒薛小邾按館閣書目有年表二卷元豐中楊彥齡撰自周之外凡十三國仍總記蠻夷戎狄之事又按董氏藏書志年表無撰人自周至吳越凡十國又有附庸諸國别為表凡征伐朝覲會同皆書今此表止記即位及卒皆非二家書也春秋尊王發微十五卷國子監直講平陽孫明復撰明復居太山之陽以春秋教授不惑傳注不為曲説真切簡易明於諸侯大夫功罪以考時之盛衰而推見王道之治亂得於經為多石介而下皆師事之歐陽文忠為作墓志潁川常秩譏之曰明復為春秋如商鞅之法謂其失于刻也春秋口義五卷胡翼之撰至宣十二年而止戴岷隱在湖學嘗續之不傳春秋傳十卷權衡十七卷意林一卷説例一卷案宋史藝文志作春秋傳十五卷權衡十七卷説例十一卷意林二卷文獻通考亦謂春秋傳權衡意林三書共三十四卷此本篇目疑有脫誤集賢院學士清江劉敞原父撰始為權衡以平三家之得失然後集衆説斷以己意而為之傳傳所不盡者見之意林其傳用公榖文體説例凡四十九條春秋經社要義六卷龍圖閣學士髙郵孫覺莘老撰覺從胡安定遊門弟子以千數别其老成者為經社覺年最少儼然居其間衆皆推服此殆其時所作也春秋經解十五卷孫覺撰其自序言三家之説榖梁最為精深且以為本雜取二傳及諸儒之説長者從之其所未安則以所聞於安定先生者斷之楊龜山為之後序海陵周茂振跋云先君傳春秋於孫先生嘗言王荆公初欲釋春秋以行於天下而莘老之書已出一見而忌之自知不復能出其右遂詆聖經而廢之曰此斷爛朝報也不列於學官不用於貢舉云春秋皇綱論五卷明例隱括圖一卷太常博士王哲撰至和中人館閣書目有通義十二卷未見春秋會義二十六卷鄉貢進士江陽杜諤獻可撰自三傳及啖趙諸儒迄於孫氏經社凡三十餘家集而繫之時述以己意有任貫者為之序嘉祐中人也春秋傳二卷程頤撰略舉大義不盡為説襄昭後尤略序文崇寧二年所作蓋其晚年也左氏解一卷專辨左氏為六國時人其明驗十有一事題王安石撰實非也春秋邦典二卷唐既濟潛亨撰案原本脫濟字今據宋史藝文志增入質肅之姪自號真淡翁與其子愗問答而為此書鄒道鄉為之序左氏鼓吹一卷彭門吳元緒撰春秋集傳十二卷蘇轍撰專本左氏不得已乃取二傳啖趙蓋以一時談經者不復信史或失事實故也春秋傳十二卷劉絢質夫撰二程門人其師亟稱之所解明正簡切春秋得法志例論三十卷蜀州晉原主簿遂寧馮正符信道撰其父堯民希元為鄉先生案堯民原本誤作先民今據文獻通考改正正符三上禮部不第教授梓遂學十年著此書及詩易論語解蜀守何郯首以其春秋論上之熙寧末中丞鄧綰薦之得召試賜同進士出身王安石亦待之厚其書首辨王魯素王之説及杜預三體五例何休三科九旨之怪妄穿鑿皆正論也春秋後傳二十卷補遺一卷陸佃撰補遺者其子宰所作也宰字元鈞遊之父春秋列國諸臣傳五十一卷賢良眉山王當子思撰元祐中復制科嘗以蘇軾薦案文獻通考作以蘇轍薦試六論首選廷對切直或欲黜之宣仁后曰以直言取士不可以直言棄此仁宗故事也乃置下第與堂除簿尉所傳諸臣皆本左氏有見於他書者則附其末繫之以贊諸贊論議純正文辭簡古於經傳亦多所發明春秋通訓十六卷五禮例宗十卷直祕閣吳興張大亨嘉父撰其自序言少聞春秋於趙郡和仲先生某初蓋嘗作例宗論立例之大要矣先生曰此書自有妙用學者罕能領會多求之繩約中乃近法家者流苛細繳繞竟亦何用惟丘明識其用然不肯盡談微見端兆使學者自得之豫從事斯語十有餘年始得其倣佛通訓之作所謂去例以求經略微文而視大體者也東坡一字和仲所謂趙郡和仲其東坡乎然例宗考究未為詳洽春秋傳十二卷考三十卷讞三十卷案宋史藝文志作春秋傳二十卷葉夢得撰各有序其序讞曰以春秋為用法之君而已聽之有不盡其辭則欺民有不盡其法則欺君凡啖趙論三家之失為辨疑劉氏廣啖趙之遺為權衡合二書正其差誤而補其疏略目之曰讞其序考曰君子不難於攻人之失而難于正已之是必有得也乃可知其失必有是也乃可斥其非自其讞推之知吾之所正為不妄也而後可以觀吾考自其考推之知吾之所擇為不誣也而後可以觀吾傳其序傳曰左氏傳事不傳義是以詳於史而事未必實以其不知經也公榖傳義不傳事是以詳於經而義未必當以其不知史也乃酌三家求史與經不得於事則考於義不得于義則考於事更相發明以作傳夢得自號石林居士明敏絶人藏書至多博鑒強記故其為書辨訂考究無不精詳然其取何休之説以十二公為法天之大數則所未可曉也春秋經解十六卷本例例要一卷案宋史藝文志作經解十二卷本例例要二十卷涪陵崔子方彥直撰紹聖中罷春秋取士子方三上書乞復之不報遂不應進士舉黃山谷稱之曰六合有佳士曰崔彥直其人不遊諸公然則其賢而有守可知矣其學辨三傳之是非而專以日月為例則正蹈其失而不悟也春秋指南二卷案宋史藝文志作十卷張根知常撰專以編年旁通該括諸國之事如指諸掌又為解例亦用旁通法其他辨疑雜論諸篇略舉要義多所發明春秋本旨二十卷知饒州丹陽洪興祖慶善撰其序言三代各立一王之法其末皆有弊春秋經世之大法通萬世而亡弊又言春秋本無例學者因行事之迹以為例猶天本無度歷者即周天之數以為度又言屬辭比事春秋教也學者獨求于義則其失迂而鑿獨求于例則其失拘而淺若此類多先儒所未發其解經義精而通矣興祖嘗為程瑀作論語解序忤秦檜貶昭州以死春秋傳三十卷通例一卷通旨一卷徽猷閣待制建安胡安國康侯撰紹興中經筵所進也事按左氏義採公榖之精大綱本孟子而微旨多以程氏之説為證近世學春秋者皆宗之通旨者所與其徒問答及其他議論條例凡二百餘章其子寧輯為一書春秋正辭二十卷通例十五卷知盱眙軍東平畢良史少董撰良史為東京留守屬官東京再陷留敵中三年著此書已而得歸表上之息齋春秋集注十四卷禮部侍郎鄞髙閌抑崇撰案文獻通考作髙閲誤其學專本程氏序文可見夾漈春秋傳十二卷考一卷地名譜十卷案宋史藝文志春秋考亦作十二卷鄭樵撰樵之學大抵工于考究而義理多迂僻春秋經解十二卷指要二卷知常州永嘉薛季宣士龍撰指要列譜例于前其序專言諸侯無史天子有外史掌四方之志而職于周之太史隱之時始更周歷而為魯史季宣博學通儒不事科舉陳止齋師事之季宣死當乾道九年年四十九其為此書實紹興三十二年蓋甫二十歲云春秋集傳十五卷監察御史王葆彥光撰朱翌新仲為作序葆周益公之婦翁也其説多用胡氏春秋集解十二卷案宋史藝文志作三十卷呂祖謙撰自三傳而下集諸家之説各記其名氏然不過陸氏及兩孫氏兩劉氏蘇氏程氏許嵩老胡文定數家而已大略如杜諤會義而所擇頗精却無自己議論案趙希辨讀書志第云東萊先生所著長沙陳雍和父為之序而不書其名蓋吕氏望出東萊故三世皆以為稱成公特其最著者耳而宋史藝文志于春秋集解三十卷直書成公姓名世遂因之考吕祖謙年譜凡有著述必書獨春秋集解不書疑世所傳三十卷即本中所撰也朱子亦云吕居仁春秋甚明白正與某詩傳相似左傳類編六卷吕祖謙撰分類內外傳事實制度論議凡十九門首有綱領數則兼采他書左氏國語類編二卷呂祖謙撰與左傳類編略同但不載綱領止有十六門又分傳與國語為二案宋史藝文志注祖謙門人所編左氏博議二十卷呂祖謙撰方授徒時所作自敘曰春秋經旨概不敢僭議而枝辭贅喻則舉子所資課試也左氏説三十卷吕祖謙撰於左氏一書多所發明而不為文似一時講説門人所鈔録者春秋比事二十卷沈棐文伯撰陳亮同父為序曰文伯名棐湖州人嘗為婺之校官以文辭稱而不聞其以經稱也按湖有沈文伯名長卿號審齋居士為常州倅忤秦檜貶化州不名棐也不知同父何以云然豈别有名棐而字文伯者乎然則非湖人也春秋經傳集解三十三卷林栗撰其學專主左氏而黜二傳故為左氏傳解表上之止齋春秋後傳十二卷左氏章指三十卷陳傅良撰樓參政鑰大防為之序大略謂左氏存其所不書以實其所書公羊榖梁以其所書推見其所不書而左氏實録矣此章指之所以作若其他發明多新説序文略見之春秋經辨十卷廬陵蕭楚子荆撰紹聖中貢禮部不第蔡京用事與其徒馮澥書言蔡將為宋王莽誓不復仕死建炎中自號三顧隱客門人諡為清節先生胡邦衡師事之以春秋登甲科歸拜牀下楚告之曰學者非但拾一第身可殺學不可辱毋禍吾春秋乃佳邦衡志其墓春秋集善十一卷端明殿學士廬陵胡銓邦衡撰銓既事蕭楚為春秋學復學於胡文定公安國南遷後作此書張魏公浚為之後序春秋考異四卷不著名氏録三傳經文之異者春秋類事始末五卷朝請大夫吳興章沖茂深撰子厚之曽孫葉少藴之壻左氏發揮六卷臨川吳曽虎臣撰案原本脫吳字今據文獻通考補入取左氏所載事時為之論若史評之類春秋直音三卷德清丞方淑智善撰劉給事一止為作序以學者或不通音切故於每字切腳之下直注其音蓋古文未有反切為音訓者皆如此服虔如淳文穎輩於漢書音義可見左傳約説一卷百論一卷奉議郎新昌石朝英撰又有王道辨一書未板行僅存其書於此編之末其為説平平無甚髙論春秋分記九十卷卭州教授眉山程公説伯剛撰以春秋經傳倣司馬遷書為年表世譜歷天文五行地理禮樂征伐官制諸書自周魯而下及諸小國夷狄皆彚次之時有所論發明成一家之學公説積學苦志早年登科值逆曦亂憂憤以死年三十七兄弟三人皆以科第進今中書舍人公許其季也春秋通説十三卷永嘉黃仲炎若晦撰端平中嘗進之於朝孝經類古文孝經一卷凡二十二章比今文多閨門一章餘三章分出本亦出孔壁中孝經注一卷漢鄭康成撰世傳秦火之後河間人顔芝得孝經藏之以獻河間王今十八章是也相承云康成作注而鄭志目録不載故先儒並疑之古文有孔安國傳不行於世劉炫為作稽疑一篇序所謂劉炫明安國之本陸澄譏康成之注者也及唐開元中詔議孔鄭二家劉知幾以為宜行孔廢鄭諸儒非之卒行鄭學按三朝志五代以來孔鄭注皆亡周顯德中新羅獻别序孝經即鄭注者而崇文總目以為咸平中日本國僧奝然所獻未詳孰是世少有其本乾道中熊克子復從袁樞機仲得之刻于京口學宫而孔傳不可復見御注孝經一卷唐孝明皇帝撰并序今世所行本也始刻石太學御八分書末有祭酒李齊古所上表及答詔且具宰相等名銜實天寶四載號為石臺孝經乾道中蔡洸知鎮江以其本授教授沈必豫熊克使刻石學宫云歐公集古録無之豈偶未之見耶家有此刻為四大軸以為書閣之鎮按唐志作孝經制旨孝經正義三卷翰林侍講學士濟陽邢昺叔明撰眀皇既注孝經元行沖為之疏咸平中以諸説尚多詔昺與直祕閣杜鎬等據元氏本增損定為正義四年上之古文孝經指解一卷司馬光撰按唐志孝經二十七家今溫公序言祕閣所藏止有鄭氏明皇及古文三家而已古文有經無傳以𨽻體寫之而為之指解仁宗朝表上之古文孝經説一卷翰林學士成都范祖禹淳甫撰元祐二年經筵所進孝經解一卷張九成撰孝經刋誤一卷朱熹撰抱遺經于千載之後而能卓然悟疑辨惑非豪傑特起獨立之士何以及此後學所不敢倣效而亦不敢擬議也孝經本旨一卷黃幹撰凡諸經傳於言及孝者輯録之為二十有四篇孝經説一卷項安世撰蒙齋孝經説三卷禮部尚書四明袁甫廣微為鄱憲日為諸生説孝經旁及諸子諸生録之以為此編語孟類前志孟子本列於儒家然趙岐固嘗以為則象論語矣自韓文公稱孔子傳之孟軻軻死不得其傳天下學者咸曰孔孟孟子之書固非荀揚以降所可同日語也今國家設科取士語孟並列為經而程氏諸儒訓解二書常相表裏故今合為一類論語十卷漢有齊魯及古文三家今行於世者魯論語也傳授本末何晏序文備矣論語集解十卷魏尚書駙馬都尉南陽何晏平叔撰論語釋文一卷唐陸德明撰論語注疏解經十卷邢昺撰唐人止為五經疏而不及孝經論語至昺始奉詔為之孟子十四卷趙岐云名軻字則未聞也按史記字子輿孔叢子作子車孟子章句十四卷後漢太僕京兆趙岐邠卿撰本名嘉字臺卿避難改名孟子音義二卷龍圖閣學士侍讀博平孫奭宗右撰舊有張鎰丁公著為之音俱未精當奭方奉詔校定撰集正義遂討論音釋疏其疑滯備其闕遺既成上之孟子正義十四卷孫奭撰序言為之注者有趙岐陸善經其所訓説雖小有異同而共宗趙氏今惟據趙注為本論語筆解二卷唐韓愈退之李翺習之撰按館閣書目云祕書丞許勃為之序今本乃王存序案原本脫此句今據文獻通考補入云得於錢塘汪充而無許序東坡論語傳十卷案宋史藝文志作論語解四卷文獻通考作論語解十卷蘇軾撰穎濵論語拾遺一卷蘇轍撰於其兄之説意有未安者凡二十七章穎濵孟子解一卷蘇轍撰其少年時所作凡二十四章王氏論語解十卷孟子解五卷廣陵王令逢原撰令年二十八終于布衣所講孟子才盡二篇其第三篇盡二章而止王荆公志其墓不言其所著書而朝氏讀書志云令於堯曰篇解曰四海不困窮則天祿不永終矣王氏新經書義取之龜山論語解十卷工部侍郎延平楊時中立撰謝氏論語解十卷上蔡謝良佐顯道撰遊氏論語解十卷監察御史建陽遊酢定夫撰尹氏論語解十卷孟子解十四卷徽猷閣待制河南尹焞彥明撰紹興中經筵所上孟子解未成不及上而卒自龜山而下皆程氏髙弟也論語釋言十卷葉夢得少藴撰張氏論語解二十卷孟子解十四卷張九成撰致堂論語詳説二十卷禮部侍郎建安胡寅明仲撰文定之子也五峯論語指南一卷監南嶽廟胡宏仁仲撰詳論黃祖舜沈大亷之説宏文定之季子也竹西論語感發十卷中書舍人江都王居正撰論語探古二十卷畢良史撰論語續解十卷考異説例各一卷吳棫撰其所援引百家諸史傳出入詳洽所稱欒肇駁王鄭之説間取一二肇晉人隋唐志載論語釋二卷駁二卷按董逌藏書志釋已亡駁幸存而崇文總目及諸藏書皆無有棫蓋嘗見其書也館閣書目亦不載玉泉論語學十卷工部郎官嚴陵喻樗子才撰樗與沈元用張子韶凌彥文樊茂實諸公厚善為館職坐與張通書得罪秦檜玉山汪端明應辰其壻也論語義二卷禮部侍郎章貢曽幾吉父撰胡文定門人也南軒論語説十卷孟子説十七卷侍講廣漢張栻敬夫撰語孟集義二十四卷朱熹撰集二程張氏及范祖禹吕希哲吕大臨謝良佐遊酢楊時侯仲良周孚先凡十一家初名精義後刻於豫章郡學始名集義其所言外自託於程氏而竊其近似之言以文異端之説者蓋指張無垢也無垢與僧宗杲遊故云爾論語集注十卷孟子集注十四卷朱熹撰大略本程氏學通取注疏古今諸儒之説間復斷以己見晦翁生平講解此為第一所謂毫髮無遺憾者矣論語或問十卷孟子或問十四卷朱熹撰集注既成復論次其取舍之所以然别為一書而篇首述二書綱領與讀書者之要法其與集注實相表裏學者所當並觀也石鼓論語答問三卷孟子答問三卷戴溪撰岷隱初仕衡嶽祠官領石鼓書院山長所與諸生講説者也其説切近明白故朱晦翁亦稱其近道論語通釋十卷黃幹撰其書兼載或問發明晦翁未盡之意論語意原一卷不知作者論語本旨一卷建昌軍教授永嘉薑得平撰論語大意二十卷海陵卞圜撰晦庵語類二十七卷蜀人以晦庵語録類成編處州教授東陽潘墀取其論語一類增益其未備刋於學宫論語紀蒙六卷孟子紀蒙十四卷國子司業臨海陳耆卿夀老撰案耆卿原本誤作著卿今改正水心葉適為之序耆卿學於水心者也嘗主麗水簿當嘉定初年成此書讖緯類易緯七卷漢鄭康成注其名曰稽覽圖辨終備是類謀乾元序制記坤靈圖其間推隂陽卦直至唐元和中蓋後世術士所附益也按七緯之名無乾元序制易稽覽圖三卷與上易緯前三卷相出入而詳略不同易通卦驗二卷鄭康成注易乾鑿度二卷亦鄭氏注乾坤鑿度二卷一作川鑿度題包羲氏先文軒轅氏演籀蒼頡修朝氏讀書志云崇文總目無之至元祐田氏書目始載當是國朝人依託為之按後漢書緯候之學注言緯七緯也候尚書中候也所謂河洛七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備也書緯璇璣鈐考靈曜帝命驗運期授也詩緯推度災汜厯樞含神霧也禮緯含文嘉稽命徴斗威儀也樂緯動聲儀稽耀嘉叶圖徴也孝經緯援神契鈎命決也春秋緯演孔圖元命包文耀鈎運斗樞感精符合誠圖考異郵保乾圖漢含孳佐助期握誠圖潛潭巴説題辭也讖緯之説起於哀平王莽之際以此濟其篡逆公孫述效之而光武紹復舊物乃亦以赤伏符自纍篤好而推崇之甘與莽述同志於是佞臣陋士從風而靡賈逵以此論左氏學曹褒以此定漢禮作大豫樂大儒如鄭康成專以讖言經何休又不足言矣二百年間惟桓談張衡力非之而不能回也魏晉以革命受終莫不傅會符命其源實出於此隋唐以來其學寖微矣考唐志猶存九部八十四卷今其書皆亡惟易緯僅存如此及孔氏正義或時援引先儒蓋嘗欲刪去之以絶偽妄矣使所謂七緯者皆存猶學者所不道况其殘缺不完於偽之中又有偽者乎姑存之以備凡目云爾唐志數內有論語緯十卷七緯無之太平御覽有論語摘輔像撰考讖者意其是也御覽又有書帝驗期禮稽命曜春秋命歷序孝經左右契威嬉拒等皆七緯所無要皆不足深考經解類白虎通十卷漢尚書郎班固撰章帝建初四年詔諸儒會白虎觀講議五經同異五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決作白虎議奏蓋用宣帝石渠故事也石渠議奏今不傳矣班固傳稱作白虎通德論令固撰集其事云凡四十四門經典釋文三十卷唐陸德明撰自五經三傳古禮之外及孝經論語爾雅莊老兼解文義廣采諸家不但音切也或言陸吳人多吳音綜其實未必然案前世藝文志列於經解類中興書目始入之小學非也五經文字三卷唐國子司業張參撰大歷中刻石長安太學九經字樣一卷唐沔王友翰林待詔唐元度撰補張參之所不載開成中上之二書却當在小學類以其專為經設故亦附見於此案文獻通考有唐元度五經字樣唐書藝文志不載蓋以其就張參五經文字校正惟九經字樣為新加者此因與張參書並附見故云二書往宰南城出謁有持故紙鬻於道者得此書乃古京本五代開運丙午所刻也遂為家藏書籍之最古者演聖通論六十卷知制誥渤海胡旦周父撰易十七書七詩十禮記十六春秋十其第一卷為目録旦太平興國三年進士第一人恃才輕躁纍坐擯斥晚尤黷貨持吏短長為時論所薄然其學亦博矣羣經音辨七卷丞相真定賈昌朝子明撰康定中侍講天章閣所上凡五門題曰羣經亦不當在小學類七經小傳三卷劉敞撰前世經學大抵祖述注疏其以己意言經著書行世自敞倡之惟春秋既有成書詩書三禮論語見之小傳又公羊左氏國語三則附焉故曰七經河南經説七卷程頤撰繫辭説一書一詩二春秋一論語一改定大學一程氏之學易傳為全書餘經具此龜山經説八卷楊時撰易三詩春秋孟子各一末二卷則經筵講義也無垢鄉黨少儀咸有一德論語孟子拾遺共一卷張九成撰六經圖七卷東嘉葉仲堪思文重編案館閣書目有六卷昌州布衣楊甲鼎卿所撰撫州教授毛邦翰復增補之易七十今百三十書五十五今六十三詩四十七今同周禮六十五今六十一禮記四十三今六十二春秋二十九今七十二然則仲堪蓋又以舊本增損改定者耶福唐俞意掌教建安同里儒劉遊以楊鼎卿所編增益刋之洪景盧作序隨齋批注麗澤論説集録十卷吕祖謙門人所録平日説經之語末三卷則為史説雜説東萊於諸經亦惟讀詩記及書説成書而皆未終也畏齋經學十二卷宣教郎廣安遊桂元發撰桂隆興癸未進士為類試第二人歷三郡學官改秩為制置司機宜以沒項氏家説十卷附録四卷項安世撰九經皆有論著其第八卷以後雜説文史政學附録孝經中庸詩篇次丘乘圖則各為一書重見諸類山堂疑問一卷起居郎簡池劉光祖德修撰慶元中謫居房陵與其子講説諸經因筆記之以其所問于詩為多遂取呂氏讀詩記盡觀之而釋以己意附疑問之後六經正誤六卷柯山毛居正誼甫校監本經籍之誤所欲刋正者魏鶴山為之序而刻傳之大抵多偏傍之疑似者也西山讀書記三十九卷真德秀景元撰其書有甲乙丙丁甲言性理中述治道末言出處大抵本經子格言而述以己意今但有甲三十七卷丁二卷乙丙未見也六家諡法二十卷翰林學士判太常寺周沆等編六家者周公春秋廣諡沈約賀琛扈蒙也今按周公即汲冡書之諡法解春秋即杜預釋例所載也廣諡不著名氏沈約書一卷賀琛書四卷扈蒙書一卷皆祖述古法而增廣之琛字國寶山隂人梁尚書左丞蒙字日用幽州人國初翰林學士此書嘉祐末編集英宗初始上嘉祐諡三卷太常禮院編纂眉山蘇洵明允撰洵與編六家諡法因博采諸書為之為論四篇以序其去取之意諡法與解經無預而前志皆以入此類今姑從之其實合在禮注政和修定諡法六卷禮制局詳議官蔡攸等承詔修定全書八十卷大率祖六家之舊為沿革統論一卷參照二十六卷看詳三十五卷增立十卷合而修定六卷今惟修定六卷存而以沿革繫之篇首按館閣書目亦闕參照二十六卷鄭氏諡法三卷鄭樵撰上卷序五篇中卷諡三篇下卷後論四篇小學類自劉歆以小學入六藝略後世因之以為文字訓詁有關於經藝故也至唐志所載書品書斷之類亦厠其中則龎矣蓋其所論書法之工拙正與射御同科今並削之而列於雜藝類不入經録爾雅三卷晉𢎞農太守河東郭璞景純注按漢志爾雅二十篇今書惟十九篇志初不著撰人名氏璞序亦但稱興於中古隆於漢氏而已至陸氏釋文始謂釋詁為周公所作其説蓋本於魏張揖所上廣雅表言周公制禮以道天下著爾雅一篇以釋其義今俗所傳三篇或言仲尼所增或言子夏所益或言叔孫通所補或言沛郡梁文所考皆解家所説先師口傳疑莫能明也爾雅釋文一卷唐陸德明撰爾雅疏十卷邢昺等撰其敘云為注者劉歆樊光李巡孫炎雖各名家猶未詳備惟郭景純最為稱首其為義疏者惟俗間有孫炎髙璉皆淺近今奉勑校定以景純為主共其事者杜鎬而下八人小爾雅一卷漢志有此書亦不著名氏唐志有李軌解一卷今館閣書目云孔鮒撰蓋即孔叢子第十一篇也曰廣詁廣言廣訓廣義廣名廣服廣器廣物廣鳥廣獸凡十章又廣量衡為十三章當時好事者抄出别行急就章一卷漢黃門令史遊撰唐祕書監顔師古注其文多古語古字古韻有足觀者方言十四卷漢黃門郎成都揚雄子雲撰晉郭璞注首題輶軒使者絶代語末載答劉歆書具詳著書本末其略云天下上計孝亷及內郡衛卒會者雄常抱三寸弱翰齎油素四尺以問其異語歸即以鉛摘次之於槧葛洪西京雜記言子雲好事常懷鉛提槧從諸計訪殊方絶域之語蓋本雄書所云也釋名八卷漢徴士北海劉熙成國撰序云名之於實各有類義百姓日稱而不知其所以然之意故撰天地隂陽四時邦國都鄙車服喪紀下及民庶應用之器即物名以釋義案此句原本脫去今據文獻通考補入凡二十七篇廣雅十卷魏博士張揖撰凡不在爾雅者著於篇仍用爾雅舊目館閣書目云今逸但存音三卷今書十卷而音附逐篇句下不别行隋志稱博雅避逆煬名也揖又有埤蒼三蒼訓詁雜字古文字訓凡四書見唐志今皆不傳博雅乃隋曹憲撰憲因揖之説附以音解避煬帝名更之以為博焉隨齋批注爾雅新義二十卷陸佃撰其於是書用力勤矣自序以為雖使郭璞擁篲清道跂望塵躅可也以愚觀之大率不出王氏之學與劉貢父所謂不徹薑食三牛三鹿戲笑之語殆無以大相過也書云玩物喪志斯其為喪志也宏矣頃在南城傳寫凡十八卷其曽孫子遹刻於嚴州為二十卷埤雅二十卷陸佃撰曰釋魚釋獸以及於鳥蟲馬木草而終之以釋天所以為爾雅之輔也此書夲號物性門類其初嘗以釋魚釋木二篇上之朝編纂將就而永裕上賔不及再上既注爾雅遂成此書其於物性精詳所援引甚博而亦多用字説注爾雅三卷鄭樵撰其言爾雅出自漢代箋注未行之前蓋憑詩書以作爾雅明則百家箋注皆可廢爾雅應釋者也箋注不應釋者也言語稱謂宫室器服草木蟲魚鳥獸之所命不同人所不能識者故為之訓釋義理人之本有無待注釋注釋則人必生疑反舍經之言而泥注解之言或者復舍注解之意而泥已之意以為經意此其為説雖偏而論注釋之害則名言也蜀爾雅三卷不著名氏館閣書目案李邯鄲云唐李商隱采蜀語為之當必有據説文解字三十卷漢太尉祭酒汝南許慎叔重撰凡十四篇并序目一篇各分上下卷凡五百四十部九千三百五十三文重一千一百六十三雍熙中右散騎常侍徐鉉奉詔校定以唐李陽氷排斥許氏為臆説末有新定字義三條其音切則以唐孫愐韻為定字林五卷晉㡉令吕忱撰太乙山僧雲勝注案隋唐志皆七卷三朝國史志惟一卷董氏藏書志三卷其書集説文之漏略者凡五篇然雜揉錯亂未必完書也玉篇三十卷梁黃門侍郎吳興郡顧野王希馮撰唐處士富春孫強增加大約本説文以後漢反切音未備但云讀若某其反切皆後人所加多疏朴脫誤至梁時四聲之學盛行故此書不復用直音矣其文字雖增多然雅俗雜居非若説文之精核也又以今文易篆字易以舛訛世人以篆體難通今文易曉故説文遂罕習要當求其本原可也廣韻五卷隋陸法言撰案陸法言本名切韻孫愐修之為唐韻陳彭年等修之為廣韻雖相因而作實各自成書此以廣韻為法言撰與下文共為撰集句弗貫疑有脫誤開皇初有劉臻等八人同詣法言共為撰集長孫訥言為之箋注唐朝轉有增加至開元中陳州司法孫愐著成唐韻本朝陳彭年等重修中興書目云不知作者案國史志有重修廣韻題皇朝陳彭年等景祐集韻亦稱真宗令陳彭年丘雍等因陸法言韻就為刋益今此書首載景德祥符勑牒以大宋重修廣韻為名然則即彭年所修也説文解字繫傳四十卷南唐校書郎廣陵徐鍇楚金撰為通釋三十篇部敘二篇通論三篇袪妄類聚錯綜疑義系述各一篇鍇至集賢學士右內史舍人不及歸朝而卒鍇與兄鉉齊名或且過之而鉉歸朝通顯故名出鍇上此書援引精博小學家未有能及之者説文韻譜十卷徐鍇撰又取説文以聲韻次之便于檢討鉉為作序佩觽三卷國子周易博士洛陽郭忠恕恕先撰觽者所以解結也忠恕嗜酒狂縱數犯法忤物得罪其死時頗異世傳以尸解景祐集韻十卷直史館宋祁鄭戩等修定學士丁度李淑典領字訓皆本説文餘凡例詳見於序説文所無則引他書為解字五萬三千五百二十五比舊增二萬七千三百三十一案五萬三千二句原本脫去今據文獻通考補入類篇四十五卷丁度等既修集韻奏言今添字多與顧野王玊篇不相參協乞委修韻官别為類篇與集韻並行自寶元迄治平乃成書歷王洙胡宿范鎮司馬光始上之熙寧中頒行凡十五篇各分上中下以説文為本而例有九云只十四篇四十二卷言稱十五篇恐是目録三卷亦與隨齋批注禮部韻略五卷條式一卷雍熙殿中丞丘雍景德龍圖閣待制戚綸所定景祐知制誥丁度重修元祐太學博士增補其曰略者舉子詩賦所常用蓋字書聲韻之略也復古編二卷吳興道士張有謙中撰有工篆書専本許氏説文一點畫不妄錯林中書攄母魏國夫人墓道碑有書之魏字從山攄以為非有曰世俗以從山者為巍不從山者為魏非也其實二字皆當從山蓋一字而二音爾説文所無手可斷字不可易也攄不能強晚著此書専辨俗體之訛手自書之陳了齋為之序韻補五卷吳棫撰取古書自易書詩而下以及本朝歐蘇凡五十種其聲韻與今不同者皆入焉朱侍講多用其説於詩傳楚辭注其為書詳且博矣又有毛詩補音一書别見詩類大歸亦若此以愚考之古今世殊南北俗異語言音聲誠有不得盡合者古之為詩學者多以諷誦不専在竹帛竹帛所傳不過文字而聲音不可得而傳也又漢以前未有反切之學許氏説文鄭氏箋注但曰讀若某而已其于後世四聲七音又豈能盡合哉反切之學自西域入中國至齊梁間盛行然後聲病之説詳焉韻書肇于陸法言于是有音同韻異若東冬鍾魚虞模庚耕清青登蒸之類斷斷乎不可以相雜若此者豈惟古書未之有漢魏以前亦未之有也陸德明于燕燕詩以南韻心有讀南作尼心切者陸以為古人韻緩不煩改字此誠名言今之讀古書古韻者但當隨其聲之叶而讀之若來之為釐慶之為羌馬之為姥聲韻全别不容不改其聲韻苟相近可以叶讀則何必改字如燔字必欲作汾沿反官字必欲作俱員反天字必欲作鐡因反之類則贅矣字始連環二卷鄭樵撰大略謂六書惟類聲之生無窮音切之學自西域流入中國而古人取音制字乃與韻圖吻合論梵書一卷鄭樵撰石鼓文考三卷鄭樵撰其説以為石鼓出于秦其文有與秦斤秦權合者樵以本文函殹兩字秦斤秦權有之遂以石鼓為秦物先文簡論而非之其説甚博隨齊批注嘯堂集古録二卷案文獻通考嘯堂作嘯臺王俅子辨撰李邴漢老序之稱故人長孺之子未詳何王氏也皆録古彛器款識自商迄秦凡數百章以今文釋之疑者闕焉鍾鼎篆韻一卷不著名氏案館閣書目此書有二家其一七卷其一一卷七卷者紹興中通直郎薛尚功所廣一卷者政和中主管衡州露仙觀王楚也則未知此書之為王楚否尚功有鍾鼎法帖十卷刻于江州當是其篆韻之所本也前漢古字韻編五卷侍郎宣城陳天麟季陵撰取漢書所用古字以今韻編入之班馬字類二卷參政嘉禾婁機彥發撰取二史所用古字及假借通用者以韻類之洪邁景盧作序漢隸字源六卷婁機撰以世所存漢碑三百有九韻類其字魏碑附焉者僅三十之一首為碑目一卷每字先載經文而以漢字著其下一字數體者並列之皆以碑目之次第著其所從出亦洪邁序序謂洪文惠公作五種書釋纘圖續皆成唯韻書未就而婁忠簡繼為之隨齊批注廣干祿字書五卷婁機撰唐顔元孫為干祿字書其姪真卿書之刻石吳興為世所寶辨正通俗三體目以干祿謂舉子所資也機熟于小學嘉泰中教授資善堂景獻時為惠國公數問字畫之異因為此書續唐之舊故仍干祿之名既而悟其非所以施於朱邸也則以干祿百福之義傅會焉修校韻略五卷祕書省正字莆田劉孟容以説文字林干祿書五經文字九經字樣佩觽復古編等書修校韻略分毫補注字譜一卷進士耒陽秦昌朝撰附前韻略之後皆永嘉教授臨安錢厚所刻也竊謂小學當論偏傍尚矣許叔重以來諸書是也韻以略稱止施於禮部貢舉本非小學全書於此而校其偏傍既不足以盡天下之字而欲使科舉士子盡用篆籀點畫於試卷不幾于迂而可笑矣哉進退皆無據謂之贅可也附釋文互注韻略五卷以監本增注而釋之押韻釋疑五卷進士廬陵歐陽德隆易有開撰凡字同義異字異義同者皆辨之尤便於場屋字通一卷彭山李從周肩吾撰切韻義一卷纂要圖例一卷汴陽謝暉撰紹興十年序直齋書録解題卷三
